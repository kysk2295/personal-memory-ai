elative performance grade lands. The contract has an at-will-employment clause stamped on it. Anything below \"Meets Expectations\" triggers a daily-report PIP or outright termination. Meta laid off 21,000 in 2023 — over 15% of headcount.\n\n**Dream of rising.** One promotion ≈ ~50% comp jump. Facebook E3 $190K → E4 $300K → E5 $380K → E6 $580K. Promotion isn't a title change; it's a digit-shift.\n\nA worker carrying both loads at once — fear of falling and dream of rising — will run themselves into the ground. The system was built to produce exactly that outcome. The company's accounting works because what the employee delivers exceeds what they cost by the same margin. **Two faces of one system.**13:T50a,Silicon Valley performance reviews split on four axes —\nimpact, expertise, direction, and soft skills.\n\nSilicon Valley's biggest innovation isn't a product. It's the **performance review system itself.** A well-designed eval writes a company's culture and points its people in a direction. The eval splits into four axes:\n\n**Impact** — quantifiable scale: ad revenue for ads teams, cost reduction for infra, project scale for marketers. The definition of impact rotates with the company's yearly priority. In 2023 Meta declared an \"efficiency year\" and impact became cost reduction.\n\n**Expertise** — domain depth: code quality for engineers, customer engagement for marketers, productization for PMs. Criteria are spelled out per discipline and per level, and Silicon Valley companies *intentionally* publish them.\n\n**Direction** — what's next after this project ships? How does the result expand into a bigger problem worth pursuing? Direction-setting is its own axis, scoring whether the IC can map a larger surface.\n\n**Soft skills** — communication, collaboration, mentorship. The work that gets done *through other people*.\n\nThe weighting differs by discipline and by level — that's why the eval is as precise as it is, and why the system selects people accurately at scale.14:T4bc,For one person to be a company,\nDiscord becomes the control plane for agents.\n\nI run a Meta full-time job, a YouTube channel, a paid course, a product launch, and a newborn — all at the same time, on normal sleep. The trick is Discord. **Each channel is one AI agent**; I send messages to them from my phone the way someone delegates to a direct report on a chat app.\n\nEach morning **Rex** (an agent) hands me a daily digest — YouTube performance, side-project progress, the lecture-build at hour 80 of compute. Other channels each have a role: **YouTube agent** for trend analysis, **AutoClick** for thumbnail-service development, **Creative Director** for media generation, **Research** for data work.\n\nThe unit move is **delegation**. I write zero lines of code. I review outputs and give feedback — \"tone is too aggressive,\" \"add this feature.\" Schedulers run jobs while I sleep; results are waiting when I wake.\n\nThe orchestration backbone is **OpenCloud** — a multi-agent framework. The chat interface doesn't have to be Discord; any chat app works. The point is the **structure**: multiple agents addressable through everyday messaging UI. Once that structure clic"])</script><script>self.__next_f.push([1,"ks, one person runs as a company.15:T4a0,Alex ran the Fast Campus open seminar 'Working AI-native' on 2026-05-16.\nA 90-minute session for non-developer professionals, structured around four live demos.\n\nThe seminar ran from a 21-slide deck (`src/content/seminars/fastcampus-2026-05-16/deck.json`) in three acts. PART 1 (10 min) laid down where Silicon Valley currently sits. PART 2 (40 min) ran four live Claude Code demos. PART 3 closed with the four-stage learning path (믿음·목격·활용·행동) and a discount coupon for the full AI-native course.\n\nThe four demos:\n1. Second Brain — live tour of `/memory`, with a real-time `/brain-add` of a Karpathy tweet into the brain.\n2. Agents — OpenClaw as a hub + multiple parallel Claude Code terminals running concurrent work.\n3. Claude × Higgsfield — Claude driving a real browser to operate Higgsfield and generate an image, plus applying `design.md` to a project.\n4. AutoKliq — live demo of a commercial product (`autokliq.com`) shipped without writing a single line of code.\n\nThis deck is the funnel entry-point for the paid \"AI Native\" course, and the canonical 90-minute live-demo template for future non-developer-targeted open seminars on other platforms.16:T50a,To shift a difficult boss, three moves —\nbuild warmth first, speak in facts second, ask back third.\n\nThe single most common \"I'm going to quit\" story is \"my boss doesn't get it.\" I've been there — at the edge of resigning. What pulled me back was a three-step protocol that turned the same boss into someone I now consider close.\n\n**Step 1 — Lead with warmth.** \"Hey, what did you do this weekend?\" That one question solves half the problem. No conflict resolves through hostility — it just becomes a fight. Cialdini's *Influence* names the mechanic: people are more easily persuaded by people they like. Approach first; avoidance costs you more than them.\n\n**Step 2 — Speak in facts, not feelings.** Replace \"this won't work, will it?\" with \"last month Option A delayed eight weeks; Option B looks more efficient.\" Facts **diagnose a situation**. They don't attack a person. They're hard to refuse.\n\n**Step 3 — When facts hit a wall, ask back.** \"What am I missing? Why do you see A as the better path?\" Genuine curiosity, not the rhetorical kind. The boss often talks themselves into the right answer — or surfaces information you didn't have. Either way, the wall comes down.\n\nThree steps. **Adversary becomes collaborator.** The protocol runs the same inside Meta and out.17:T4f2,Meta's 8-year senior engineer says it plainly —\nthe developer role isn't disappearing. Its shape is changing.\n\nOn 2026-03-25 I had my first guest on the channel — **Jay**, a Meta colleague and friend, eight-year senior engineer, four of those at Meta. His view from the inside:\n\n**\"Honestly, things aren't OK.\"** The reason he started a YouTube channel in 2026 was that exact anxiety. Someone who writes code becoming someone who *doesn't* write code overnight — the transition is too rapid to ignore.\n\n**Inside teams, two camps emerge.** The AI-leveraging engineers *make themselves visible* — internal talks, training sessions, posts. A 20-person team typically has one or two people who own AI education. They've positioned themselves as *\"indispensable in the AI era.\"* The other camp has the wrong scoreboard — they measure AI **usage** (tokens, calls) rather than the right metric: *how much faster, how much more, how much money saved.*\n\n**Jay's conclusion**: developers don't disappear. They split into AI-leveraging and AI-displaced. The latter gets replaced. That's the view from inside the senior engineer cohort itself.\n\nThis is an **episodic record of how Meta seniors *internally* read this shift.** Not an outside guess — direct testimony.18:T494,The billion-won engineer\npicks the right direction and pushes it all the way through.\n\nTen traits I've seen common to engineers in Silicon Valley clearing the billion-won threshold. **One**: they solve revenue-shaped problems — they earn the company hundreds of billions directly. **Two**:"])</script><script>self.__next_f.push([1," they're always on the project that matters — they've already done the branding work. **Three**: they outlast — the person who's still there wins by default. **Four**: they negotiate — they don't sell themselves cheap. **Five**: they don't burn emotional fuel on politics — they spend it on results. **Six**: their mental game is sturdy — they pick the right move even mid-crisis. **Seven**: they cut hard — inefficient work doesn't get their time. **Eight**: their network is good — talent matters, but opportunity is delivered through people. **Nine**: they understand the business — they can model 70% of how the company actually makes money. **Ten**: they don't ride a single specialty — meaning they can land any project. The billion-won engineer is whoever **picks the right direction and pushes it all the way through.** The kind that gets everything done."])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L11\",null,{\"data\":{\"nodes\":[{\"id\":\"act-first-apologize-later\",\"label\":\"act-first-apologize-later\",\"claim_ko\":\"허락을 기다리지 말고\\n먼저 저지르고 용서를 구합니다.\",\"claim_en\":\"Don't wait for permission.\\nMove first, apologize after.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"meta-life\"],\"theses\":[\"move-first-or-lose-the-game\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-24\",\"body_ko\":\"허락을 기다리지 말고\\n먼저 저지르고 용서를 구합니다.\\n\\n메타에서 들은 피드백 중 가장 실용적이었던 말입니다. **\\\"눈치 보다 아무것도 못 하느니, 일단 질러 보고 용서를 구하라.\\\"** 실제로 메타에서 인정받는 사람들의 특징입니다. 회의보다 실행이 빠르고, 말보다 결과로 말합니다. **뭐든 먼저 움직인 사람이 결국 판을 만듭니다.** 지금 마냥 허락만 기다리고 있다면 일단 저질러 보는 건 어떻습니까?\",\"body_en\":\"Don't wait for permission.\\nMove first, apologize after.\\n\\nThe single most useful piece of feedback I got at Meta. **\\\"Better to act and apologize than to read the room and do nothing.\\\"** The pattern from the most-recognized people on the team: action faster than meetings, results louder than statements. **Whoever moves first ends up shaping the game.** If you're waiting for someone to say yes — just go.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHj9eOKyy3j\",\"date\":\"2025-03-24\",\"original\":\"메타에서 들은 피드백 중 가장 실용적이였던 말:\\n\\n\\\"눈치보다 아무것도 못하느니,\\n그냥 일단 질러보고 용서를 구해.\\\"\\n\\n실제로 메타에서 인정받는 사람들 특징?\\n회의보다 실행이 빠르고, 말보다 결과로 말해.\\n\\n뭐든 먼저 움직인 사람이 결국 판을 만들더라.\\n\\n지금 마냥 허락만 기다리고 있다면 일단 저질러보는게 어때?\"}]},{\"id\":\"ad-creative-is-now-a-prompt-five-rules\",\"label\":\"ad-creative-is-now-a-prompt-five-rules\",\"claim_ko\":\"좋은 광고는\\n빛 · 금속 · 신경망 · 앵글 · 맥박 다섯 가지 신호로 만들어집니다.\",\"claim_en\":\"Premium ad creative comes down to five visual cues:\\nlight, metal, neural lines, angle, pulse.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"creator-economy\"],\"theses\":[\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-10\",\"body_ko\":\"좋은 광고는\\n빛 · 금속 · 신경망 · 앵글 · 맥박 다섯 가지 신호로 만들어집니다.\\n\\n실리콘밸리 광고팀 엔지니어로 7년을 일하며 익힌, 잘되는 광고의 다섯 가지 시각 신호입니다. **첫째, 빛.** 아래와 뒤에서 들어오는 조명으로 제품에 신성한 느낌을 부여합니다. **둘째, 금속.** 금속 테두리에 부드러운 반사광을 처리합니다. **셋째, 신경망.** 신경망처럼 퍼지는 빛줄기로 지능을 시각화합니다. **넷째, 앵글.** 낮은 각도의 카메라 구도가 monumental한 느낌을 전달합니다. **다섯째, 맥박.** 화면 위의 맥박은 생명과 자각의 감각을 줍니다. 이 다섯을 프롬프트에 풀어 쓰면 ChatGPT가 1억짜리 광고 소재를 한 번에 뽑아냅니다.\",\"body_en\":\"Premium ad creative comes down to five visual cues:\\nlight, metal, neural lines, angle, pulse.\\n\\nSeven years on the Instagram Ads team gave me a grammar for what makes premium ads land. Five visual cues. **One, light** — bottom + back lighting renders the product sacred. **Two, metal** — soft reflections on metallic edges. **Three, neural lines** — branching light beams visualize *intelligence*. **Four, angle** — low camera angle communicates monumentality. **Five, pulse** — an on-screen pulse signals life and self-awareness. Translate the five into a prompt and ChatGPT now ships premium-ad-equivalent creative.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DH2XpHyRrUd\",\"date\":\"2025-03-10\",\"original\":\"ChatGPT로 \\\"1억\\\"짜리 광고 해킹하기 3편 - iPhone 16 광고\\n새로나온 iPhone 16 광고가 재미가 없어서 내가 새로 만들어봤다.\\n실리콘밸리 광고팀 엔지니어로 일하면서 보고 배운 잘되는 광고 느낌을 살려보자.\\n\\n- 신성한 느낌을 주는 아래+뒤 조명으로 제품 강조\\n- 금속 테두리에 부드러운 반사광 처리\\n- 신경망처럼 퍼지는 빛줄기로 지능을 시각화\\n- 낮은 각도의 카메라 구도로 monumental 한 느낌 전달\\n- 화면의 맥박은 생명과 자각의 feel\\n\\n앞으로 적어도 하루에 하나씩은 새로운 광고를 만들어볼 예정.\"}]},{\"id\":\"agent-orchestration-is-the-2026-skill\",\"label\":\"agent-orchestration-is-the-2026-skill\",\"claim_ko\":\"2026년 실리콘밸리도 흔들리는 가운데\\n에이전트 오케스트레이션이 1순위 스킬입니다.\",\"claim_en\":\"Even Silicon Valley is shaken in 2026 —\\nagent orchestration is the year's one skill.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-01-08\",\"body_ko\":\"2026년 실리콘밸리도 흔들리는 가운데\\n에이전트 오케스트레이션이 1순위 스킬입니다.\\n\\n2026년이 밝았는데, 마음이 가볍지 않습니다. 지난 몇 주가 힘들었습니다. 저만 그런 게 아닙니다. **실리콘밸리 전체가 긴장하고 있습니다.** 크리스마스 다음날, Karpathy의 글이 올라왔습니다 — *\\\"프로그래머로서 이렇게 뒤처진다는 느낌은 처음이다.\\\"* Opus 4.5 같은 새로운 모델이 쏟아져 나오는데, 잘 쓰면 훨씬 더 잘할 수 있을 것 같은데, 어떻게 해야 할지 모르겠다는 토로. 그 글 하나로 SV 개발자 커뮤니티가 흔들렸습니다. 메타에서 8년 차로 개발하는 저조차 *오늘 내일 (도태)할 수도 있겠다*는 생각이 들었습니다. 그렇게 정리된 결론입니다 — **2026년의 1순위 스킬은 에이전트 오케스트레이션입니다.** 단순한 사용도 아니고, 모델 따라가기도 아니고, 여러 에이전트를 묶어 하나의 결과로 수렴시키는 능력 — 그 능력이 차이를 만듭니다.\",\"body_en\":\"Even Silicon Valley is shaken in 2026 —\\nagent orchestration is the year's one skill.\\n\\n2026 opened heavy. The last few weeks felt rough. Not just for me. **Silicon Valley as a whole is tense right now.** The day after Christmas, Karpathy posted: *\\\"This is the first time I've felt left behind as a programmer.\\\"* New models pouring in — Opus 4.5 and others — and the sense that *if I used them well I'd be doing much better, but I don't know how to actually use them yet.* One post, and the SV engineering community wobbled. Eight years at Meta and even I had the *\\\"this could happen to me overnight\\\"* thought. The conclusion that settled out: **for 2026, the one skill that matters most is agent orchestration.** Not just *using* a model. Not just *keeping up*. The ability to compose multiple agents into a single converging outcome — *that* is what differentiates.\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=Wak9mVLXfxU\",\"date\":\"2026-01-08\",\"original\":\"2026년이 밝았습니다. 그런데 솔직히 마음은 조금 많이 무거운 거 같아요. 특히 지난 몇 주가 좀 많이 힘란했어요. 근데 재밌는게 저만 그런게 아니더라고요. 지금 실리콘 밸리 전체가 좀 많이 긴장하고 있는 상태거든요.\\n\\n[Karpathy's post: \\\"프로그래머로서 이렇게 뒤쳐진다는 느낌은 처음이다\\\"]\\n\\n이런 [Opus 4.5 같은] 새로운 모델들이 많이 등장해서 이걸 다 잘 쓰면은 훨씬 더 잘할 수 있을 것 같은데 나도 이걸 어떻게 해야 될지 모르겠다. 하필 크리스마스 다음날. 그래 이거 보고 이제 다들 불안해지기 시작하는 거죠. 아, 저 사람도 저런데 나는 지금 괜찮은 거 맞나?\\n\\n지금 제가 실리콘 밸리 메타에서 개발만 8년 차로 하고 있거든요. 지금이 기술 발전하는 거 보니까 진짜 오늘 내일 할 수도 있겠다라는 생각이 드는 거예요. 뭐 물론 아닌 것도 되게 많지만 그런데 이렇게 대단하신 분도 그런 마음을 가지고 있다니까 좀 여기 개발자 커뮤니티 사이 전체에 좀 충격이 온 거죠.\\n\\n2026년은 에이전트 오케스트레이션이 첫 번째로 가장 중요하겠다라는 생각이 들었습니다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"지금의 트렌드는 도구가 아니라 이거를 묶어내고 몇 시간 동안 수행할 수 있는 Agent에 초점이 맞춰져 있다라는 것을 말씀드리고 싶었습니다. 그러니까 사람은 이거를 6번을 해야 되잖아요. 도구를 다 바꾸고. 근데 Agent는 이거를 한 번에, 일 처리를 한 번에 시킬 수 있다.\"}]},{\"id\":\"agent-runs-once-or-runs-every-hour\",\"label\":\"agent-runs-once-or-runs-every-hour\",\"claim_ko\":\"에이전트의 진짜 힘은 한 번 시키는 데 있지 않습니다.\\n시간마다, 매일 같은 임무를 반복해서 끝내게 만드는 데 있습니다.\",\"claim_en\":\"An agent's real power isn't running once.\\nIt's running the same mission every hour, every day,\\nwithout you in the loop.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"agents\",\"productivity\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"에이전트의 진짜 힘은 한 번 시키는 데 있지 않습니다.\\n시간마다, 매일 같은 임무를 반복해서 끝내게 만드는 데 있습니다.\\n\\n에이전트를 한 번 돌리면 사람이 직접 하는 것보다 빠릅니다. 그런데 그건 시작점입니다. 같은 에이전트를 한 시간에 한 번씩, 매일, 사람이 잠든 새벽에도 돌리면, 한 사람이 24시간 일하는 회사가 됩니다. one-off로 쓰는 게 아니라 루틴으로 묶을 때, 처음으로 \\\"팀이 AI다\\\"라는 말이 농담이 아니라 실제 운영 모델이 됩니다.\",\"body_en\":\"An agent's real power isn't running once. It's running the same mission every hour, every day, without you in the loop.\\n\\nRun an agent once and it's faster than doing it yourself. That's the starting line. Run the same agent every hour, every day, while you sleep — and you become a one-person company that operates 24/7. The moment you stop using agents as one-offs and start wiring them into routines, \\\"AI is the team\\\" stops being a slogan and starts being the operating model.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"Agent는 이거를 한 번에, 일 처리를 한 번에 시킬 수 있다. 그리고 심지어 이거를 one-off로 하는 게 아니라, \\\"이거를\\\" 아니라 1시간에 한 번씩 매일 돌 수 있도록까지 설정을 할 수 있다라는 부분이 되게 중요한 것 같은데.\\n…\\n이런 식으로 하나의 임무와 그런 조금 더 큰 마일스톤을 줬을 때 이거를 다 처리할 수 있게끔 만드는 게 중요한 핵심이 될 것 같습니다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"Scheduled task라는 거는 시간에 맞춰서 같은 일을 자동적으로 반복시킬 수 있도록 미리 프리셋으로 저장하는 것. '아침 9시마다 뉴스를 다운로드해서 브리핑을 해줘.' 그러면 24시간 돌아가는 Agent를 만들 수도 있고.\\nLoop — 어떻게 하면 Agent가 밤새 일해서 내가 아침에 보고를 받을 수 있는지. Human-in-the-loop, Human-on-the-loop.\"}]},{\"id\":\"agent-tool-tier-order-cli-then-api-then-mcp\",\"label\":\"agent-tool-tier-order-cli-then-api-then-mcp\",\"claim_ko\":\"AI 에이전트를 외부 도구에 붙일 때 Nate Herk가 권하는 우선순위입니다.\\n먼저 CLI를 찾고, 없으면 API를 쓰고(있으면 거의 100% CLI 래퍼로 감쌀 수 있음), CLI도 API도 없을 때만 MCP를 씁니다.\",\"claim_en\":\"Nate Herk's recommended order for connecting an AI agent to a tool: try CLI first; if no CLI exists, use the API (and likely wrap it as a CLI); fall back to MCP only when neither CLI nor API is available.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/YHk45NEpspE\",\"published_at\":\"2026-05-08\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-08\",\"body_ko\":\"AI 에이전트를 외부 도구에 붙일 때 Nate Herk가 권하는 우선순위입니다.\\n먼저 CLI를 찾고, 없으면 API를 쓰고(있으면 거의 100% CLI 래퍼로 감쌀 수 있음), CLI도 API도 없을 때만 MCP를 씁니다.\\n\\n말 그대로 외우기 좋게 압축된 결정 규칙입니다. \\\"Claude Code를 X에 어떻게 연결해요?\\\"라는 모든 질문에 그대로 답이 되는 한 줄입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/YHk45NEpspE\",\"date\":\"2026-05-08\",\"original\":\"I would say like CLI would be tier one. If there's no CLI option or you just can't do it then the API would be next. If there's an API, you're pretty much like 100% going to be able to make a CLI. But then if there's no API and you can only use an MCP, then that would be the final option.\"}]},{\"id\":\"agentic-workflow-is-context-plus-harness\",\"label\":\"agentic-workflow-is-context-plus-harness\",\"claim_ko\":\"에이전트를 제대로 쓰는 일은\\n맥락을 쌓는 Context 엔지니어링과 규칙을 세우는 Harness 엔지니어링, 이 둘을 익히는 것입니다.\",\"claim_en\":\"Working well with agents comes down to two crafts: context engineering (stacking the context) and harness engineering (setting the rules).\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-19\",\"body_ko\":\"에이전트를 제대로 쓰는 일은\\n맥락을 쌓는 Context 엔지니어링과 규칙을 세우는 Harness 엔지니어링, 이 둘을 익히는 것입니다.\\n\\nContext는 맥락이고 Harness는 규칙입니다. 폴더에 어떤 맥락을 쌓았는가와 어떤 규칙으로 결과물을 만들 것인가, 이 두 축을 계속 공부하고 활용하는 것이 에이전틱 워크플로우입니다.\",\"body_en\":\"Working well with agents comes down to two crafts: context engineering (stacking the context) and harness engineering (setting the rules).\\n\\nContext is the context you've stacked in the folder; harness is the rules the outputs follow. Studying and wielding those two axes — that's the agentic workflow.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"Context Engineering이라는 거는 이 폴더 안에 어떠한 맥락을 내가 쌓아갔는가. 그래서 Context는 맥락, Harness는 규칙.\\n그렇게 하는 게 Agentic Workflow라고 말씀을 드릴 수 있을 것 같아요. Agent를 쓰려면 이 두 가지를 계속해서 공부하고 잘 활용을 해야 된다.\"}]},{\"id\":\"ai-2027-predictions-mostly-shipped\",\"label\":\"ai-2027-predictions-mostly-shipped\",\"claim_ko\":\"다섯 명의 연구자가 2025년에 발표한 AI 2027 시나리오의\\n예측 대부분이 이미 현실이 됐습니다.\",\"claim_en\":\"Most of the predictions in the 2025 AI 2027 scenario\\nfrom five researchers have already shipped.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"synthesized\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"agents\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"다섯 명의 연구자가 2025년에 발표한 AI 2027 시나리오의\\n예측 대부분이 이미 현실이 됐습니다.\\n\\n논문의 2025-2026 구간 — 불완전한 코딩 에이전트, 100만 토큰 컨텍스트 윈도우, 컴퓨터 제어, Deep Research, Agent-1급 추론 모델 — 가 실제 출시되어 운영 중입니다. 시나리오의 후반 — Agent-3급 초인적 코딩(2027 Q1), Agent-4 정렬 실패(2027 Q4), 슈퍼휴먼 자율 연구원 — 는 아직 도래하지 않았지만, 도착 속도는 시나리오가 예측한 곡선에 크게 어긋나지 않습니다. 1년 전이라면 SF로 읽혔을 시나리오가 지금은 캘린더처럼 읽힙니다.\",\"body_en\":\"Most of the predictions in the 2025 AI 2027 scenario from five researchers have already shipped.\\n\\nThe 2025–2026 stretch of the scenario — unreliable coding agents, 1M-token context windows, computer-use, Deep Research, Agent-1-class reasoning models — has actually shipped and is in active use. The later acts — Agent-3-class superhuman coders (Q1 2027), Agent-4 alignment failure (Q4 2027), superhuman autonomous researchers — haven't arrived yet, but the cadence of arrivals so far isn't materially off the scenario's curve. A year ago this would have read as science fiction; today it reads more like a calendar.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"몇 년 전에 다섯 명의 되게 유명한 연구자들이 AI 2027년이라는 자료를 공개를 했거든요. 그게 이 자료인데 이게 2025년쯤에 발표가 됐는데, 앞으로 우리가 이 시대를 맞이하면서 이 AI가 어떻게 발전할까 보여주는 그런 논문을 하나 써낸 게 있거든요. 근데 놀랍게도 이 논문이 생각보다 많은 예측들을 실제로 맞혔다는 놀라운 사실들을 우리가 지금 발견하고 있는데. 지금 현시점에 있어서 한 달 전, 지금 예측 항목 중에 65%가 이미 출시 중이고 운영 중이라고 말씀드릴 수 있을 것 같아요.\\n…\\n이게 보여주는 미래가 또 있거든요. 그게 슈퍼 휴먼 Agent, AGI, Self-Improvement Loop. AI가 스스로 발전하고 알아서 길을 개척하고 학습하고 진화해 나가는 그런 부분들이 있는데.\"}]},{\"id\":\"ai-2027-scenario-models-superhuman-ai-by-2027\",\"label\":\"ai-2027-scenario-models-superhuman-ai-by-2027\",\"claim_ko\":\"다섯 명의 연구자가 2025년 4월에 발표한 AI 2027 시나리오는\\nAI 발전을 월 단위로 시뮬레이션한 가장 상세한 단기 초지능 예측입니다.\",\"claim_en\":\"AI 2027 is a month-by-month scenario of AI development from five researchers, published April 2025 — the most detailed near-term superintelligence forecast on public record.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Daniel Kokotajlo, Scott Alexander, Thomas Larsen, Eli Lifland, Romeo Dean\",\"author_handle\":\"\",\"publication\":\"ai-2027.com\",\"url\":\"https://ai-2027.com/\",\"published_at\":\"2025-04-03\"},\"path\":\"\",\"topics\":[\"ai-native\",\"agents\"],\"theses\":[],\"confidentiality\":\"private\",\"surfaces\":[],\"earliest_date\":\"2025-04-03\",\"body_ko\":\"다섯 명의 연구자가 2025년 4월에 발표한 AI 2027 시나리오는\\nAI 발전을 월 단위로 시뮬레이션한 가장 상세한 단기 초지능 예측입니다.\\n\\n저자는 Daniel Kokotajlo (전 OpenAI), Scott Alexander (Astral Codex Ten), Thomas Larsen, Eli Lifland, Romeo Dean입니다. 핵심 주장은 \\\"향후 10년 동안 초인적 AI가 가져올 영향은 산업혁명을 능가할 것이다\\\"이고, 2025년 중반의 불완전한 코딩 에이전트부터 2027년 10월 Agent-4 정렬 실패 내부 고발까지의 월별 시나리오를 제시합니다. 결말은 두 갈래입니다 — \\\"race\\\"(경쟁) 결말과 \\\"slowdown\\\"(감속) 결말.\",\"body_en\":\"AI 2027 is a month-by-month scenario of AI development from five researchers, published April 2025 — the most detailed near-term superintelligence forecast on public record.\\n\\nAuthors: Daniel Kokotajlo (formerly OpenAI), Scott Alexander (Astral Codex Ten), Thomas Larsen, Eli Lifland, Romeo Dean. Thesis: \\\"the impact of superhuman AI over the next decade will be enormous, exceeding that of the Industrial Revolution.\\\" The scenario walks month by month from mid-2025 (unreliable coding agents) to October 2027 (Agent-4 alignment whistleblower), with two alternative endings — a race ending and a slowdown ending.\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://ai-2027.com/\",\"date\":\"2025-04-03\",\"original\":\"AI 2027 — Five-researcher month-by-month superhuman-AI scenario.\\nAuthors: Daniel Kokotajlo, Scott Alexander, Thomas Larsen, Eli Lifland, Romeo Dean.\\nPublished April 3, 2025 at ai-2027.com.\\nCore thesis: \\\"the impact of superhuman AI over the next decade will be enormous, exceeding that of the Industrial Revolution.\\\"\\nThe scenario models monthly milestones from mid-2025 (unreliable coding agents) through October 2027 (Agent-4 misalignment whistleblower), with two alternative endings (race vs. slowdown).\"}]},{\"id\":\"ai-agents-are-smart-but-forgetful\",\"label\":\"ai-agents-are-smart-but-forgetful\",\"claim_ko\":\"AI 에이전트는 똑똑하지만 잊어버립니다.\\n영구적인 개인 브레인은 원본 대화와 세션 간에 누적되는 유용한 지식 사이의 빠진 층입니다.\",\"claim_en\":\"AI agents are smart but forgetful — a persistent personal brain is the missing layer between raw conversations and useful knowledge that compounds across sessions.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Garry Tan\",\"author_handle\":\"@garrytan\",\"publication\":\"GitHub (gbrain README)\",\"url\":\"https://github.com/garrytan/gbrain\",\"published_at\":\"2026-01-01\"},\"path\":\"\",\"topics\":[\"memory-systems\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-01-01\",\"body_ko\":\"AI 에이전트는 똑똑하지만 잊어버립니다.\\n영구적인 개인 브레인은 원본 대화와 세션 간에 누적되는 유용한 지식 사이의 빠진 층입니다.\\n\\nGarry Tan이 gbrain에서 제시하는 개막 진단입니다. 카르파시의 llm-wiki와 같은 진단, 다른 프레이밍입니다. \\\"똑똑하지만 잊어버린다(smart but forgetful)\\\"라는 표현이 수사적 후크입니다 — 모든 Claude Code / OpenClaw 사용자가 일주일 안에 부딪히는 실패 모드에 이름을 붙입니다. 알렉스의 브레인(memory/)은 정확히 이 전제 위에 지어졌습니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://github.com/garrytan/gbrain\",\"date\":\"2026-01-01\",\"original\":\"Your AI agent is smart but forgetful. GBrain gives it a brain.\"}]},{\"id\":\"ai-builds-a-whole-worldview-solo\",\"label\":\"ai-builds-a-whole-worldview-solo\",\"claim_ko\":\"이제는 혼자서도 케이팝 뮤직비디오 한 편의\\n세계관을 짓는 일이 가능합니다.\",\"claim_en\":\"Today, one person can build\\nthe entire world of a K-pop music video — solo.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"solo-builder\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-11-04\",\"body_ko\":\"이제는 혼자서도 케이팝 뮤직비디오 한 편의\\n세계관을 짓는 일이 가능합니다.\\n\\n낮에는 코딩하고 밤에는 걸그룹을 키우는 중입니다. AI로 처음 만들어 본 케이팝 뮤직비디오 'PARACHUTE'를 공개합니다. AI 기술이 크리에이티브의 장벽을 어디까지 무너뜨릴 수 있는지 실험해 보고 싶었는데, 직접 해 보고 놀랐습니다. **이제는 혼자서도 하나의 세계관을 구축하는 일이 가능해졌습니다.** 노래, 비주얼, 캐릭터 콘셉트, 영상까지 — 한 사람이 하나의 IP를 끝까지 끌고 갈 수 있는 시대입니다.\",\"body_en\":\"Today, one person can build\\nthe entire world of a K-pop music video — solo.\\n\\nCoding by day, raising a K-pop girl group by night. Here's the first AI-generated K-pop MV I made, *PARACHUTE.* I wanted to see how far AI could collapse the creative barrier. The honest answer surprised me: **one person can now build an entire creative universe alone.** Song, visuals, character concepts, video — a single operator carries one IP through all the stages.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DR4KpzuCpTa\",\"date\":\"2025-11-04\",\"original\":\"낮에는 코딩하고 밤에는 걸그룹 키우는 중. 👨🏻‍💻➡️💃🏻\\nAI로 처음 만들어본 케이팝 뮤직비디오 'PARACHUTE'입니다.\\nAI기술이 크리에이티브의 장벽을 어디까지 무너뜨릴 수 있는지 실험해보고 싶었는데 해보고 놀랐습니다.\\n이제는 혼자서 하나의 '세계관'을 구축하는 게 가능해졌네요.\\n만들면서 사용한 툴과 워크플로우, 궁금하신 분 계신가요?\\n반응 좋으면 어떻게 만들었는지 썰 풉니다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"AI는 할 수 있는 것들이 너무 많아요. 그러니까 능력이 거의 캐파가 없다고 생각을 해요. 서비스도 만들 수 있지, 코딩도 할 수 있지, 영상도 만들 수도 있지, 이미지도 할 수 있지, 마케팅도 할 수도 있지, 컨설팅도 할 수 있지. … 그 무엇이든지 만들 줄 알고 그 무엇이든지 해낼 줄 아는 사람으로 거듭나기를 원하고요.\"}]},{\"id\":\"ai-era-competence-is-taste\",\"label\":\"ai-era-competence-is-taste\",\"claim_ko\":\"AI 시대의 능력은 머리가 아니라\\n감각입니다.\",\"claim_en\":\"Competence in the AI era\\nisn't intelligence — it's taste.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-02-06\",\"body_ko\":\"AI 시대의 능력은 머리가 아니라\\n감각입니다.\\n\\n지금까지 \\\"유능하다\\\"는 말은 \\\"머리가 좋고 문제를 잘 푸는 사람\\\"을 가리켰습니다. 이제 그건 AI가 더 잘합니다. AI가 문제를 다 풀어버리면 문제 푸는 사람의 수요는 줄어듭니다. 그럼 무엇이 남습니까. 기술과 사람을 동시에 이해하는 능력, 그리고 한 단계 더 — 문서에도 없고 미팅에서도 안 나오는 \\\"보이지 않는 문제\\\"를 먼저 보는 능력입니다. 숫자로 설명되지 않는 고객의 taste가 어디로 가는지 먼저 잡고, 같은 정보로 사람들을 움직일 메시지를 뽑고, 한 번 데여본 경험으로 \\\"이건 터진다\\\"를 미리 막는 사람. AI 시대의 유능함은 감각입니다. 가장 가르치기 어려운 스킬입니다.\",\"body_en\":\"Competence in the AI era\\nisn't intelligence — it's taste.\\n\\nFor decades \\\"competent\\\" meant \\\"smart, good at solving problems.\\\" That definition is now AI's strong suit. Once AI handles problem-solving, the *demand* for problem-solvers shrinks. What's left is harder. The ability to read technology and people at the same time. And one level deeper — the ability to see invisible problems, the ones that aren't in any doc or meeting yet. Reading where customer taste is heading before the numbers show it. Crafting the message that moves people on the same information everyone else has. Spotting \\\"this is going to blow up\\\" because you've been burned by something shaped like it before. Competence in the AI era is taste. It's probably the hardest skill to teach.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DUaQ7SVkRwE\",\"date\":\"2026-02-06\",\"original\":\"젠슨황 말처럼 이제는 \\\"능력\\\"의 기준이 완벽히 바뀌어버렸다.\\n그동안은 \\\"머리 좋고 문제 잘 푸는 사람\\\"을 유능하다고 했다. 근데 이제 전혀 아니다. 그건 AI가 반드시 더 잘한다.\\n능력은 결국 \\\"수요\\\"에서 나온다. AI가 문제를 다 풀어버리면, 문제 푸는 사람의 수요는 줄어든다.\\n…\\n기술과 사람을 동시에 이해하는 능력. 그리고 한 단계 더, 아직 문서에도 없고 미팅에서도 안 나오는 \\\"보이지 않는 문제\\\"를 먼저 보는 능력.\\n…\\nAI 시대의 유능함은 \\\"감각\\\" 이다. 어쩌면 터득하기 가장 어려운 스킬인지도 모른다.\"}]},{\"id\":\"ai-erases-the-editor-bottleneck\",\"label\":\"ai-erases-the-editor-bottleneck\",\"claim_ko\":\"영상 편집자는 더 이상 병목이 아닙니다.\\n컷을 말로 묘사하는 일이 새로운 공예이고, Claude Code를 든 한 명이 예전 포스트프로덕션 팀 전체가 메우던 역할을 혼자 덮습니다.\",\"claim_en\":\"The video editor is no longer the bottleneck — describing the edit in language is the new craft, and one creator with Claude Code now spans roles a full post-production team used to fill.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/Aw3BkmhYu4I\",\"published_at\":\"2026-04-22\"},\"path\":\"\",\"topics\":[\"creator-economy\",\"solo-builder\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-22\",\"body_ko\":\"영상 편집자는 더 이상 병목이 아닙니다.\\n컷을 말로 묘사하는 일이 새로운 공예이고, Claude Code를 든 한 명이 예전 포스트프로덕션 팀 전체가 메우던 역할을 혼자 덮습니다.\\n\\nAlex의 solo-builder + ai-native 명제에 직격합니다. 역할 자체가 재구성됩니다 — \\\"AI 보조를 받는 편집자\\\"가 아니라 \\\"AI가 실행하고 사람이 감각을 큐레이팅\\\" 합니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/Aw3BkmhYu4I\",\"date\":\"2026-04-22\",\"original\":\"Claude Video Editing Just Became Unrecognizable ... edit videos end to end using Claude Code as the orchestrator\"}]},{\"id\":\"ai-handles-the-undefined\",\"label\":\"ai-handles-the-undefined\",\"claim_ko\":\"컴퓨터는 정해진 답이 있는 문제를 자동화합니다.\\n인공지능은 정해진 답이 없는 문제를 풉니다.\",\"claim_en\":\"Computers automate problems with a defined answer.\\nAI solves problems without one.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-foundations\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"컴퓨터는 정해진 답이 있는 문제를 자동화합니다.\\n인공지능은 정해진 답이 없는 문제를 풉니다.\\n\\n이 한 문장이 ChatGPT가 무엇인지에 대한 가장 정직한 정의입니다. 컴퓨터는 더 빠르고 정확한 계산기였습니다 — 공식이 정해진 문제를 자동화한 기계입니다. 인공지능은 그 다음 단계입니다. 답이 없는 문제, 정해진 풀이가 없는 문제도 다룰 수 있는 기술입니다. 그래서 ChatGPT를 \\\"더 똑똑한 검색\\\"이라고 부르면 절반 이상을 놓칩니다.\",\"body_en\":\"Computers automate problems with a defined answer.\\nAI solves problems without one.\\n\\nThat one line is the most honest definition of what ChatGPT is. The computer was a faster, more accurate calculator — a machine that automated problems with a known formula. AI is the level above: a tool that can take problems with no defined answer and produce something useful anyway. Calling ChatGPT \\\"smarter search\\\" misses more than half of what it actually does.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH02-01\",\"date\":\"2024-05-01\",\"original\":\"컴퓨터와 인공지능의 가장 큰 차이점은 이 정해진 문제를 푸느냐 정해져 있지 않은 문제를 푸느냐 그 레벨업을 했다고 보시면 돼요.\\n…\\n이제는 추론의 시대로 넘어갔다. 정답을 푸는 얼마나 빨리 정확하게 푸는가 그런 기술에서 정답이 없는 문제도 풀 수 있게끔 도와주는 그런 기술이 바로 인공지능이다.\\n…\\n정해져 있지 않은 문제를 풀 수 있는 도구 혹은 기술을 드디어 우리가 인류로서 개발을 했구나.\"}]},{\"id\":\"ai-is-now-a-survival-skill\",\"label\":\"ai-is-now-a-survival-skill\",\"claim_ko\":\"AI는 선택이 아니라\\n생존입니다.\",\"claim_en\":\"AI isn't a choice anymore.\\nIt's survival.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-04-09\",\"body_ko\":\"AI는 선택이 아니라\\n생존입니다.\\n\\nShopify CEO가 최근 전 직원에게 보낸 메모, 핵심은 하나입니다 — **\\\"앞으로 회사에 남고 싶으면 AI를 잘 써라.\\\"** 다섯 가지 포인트입니다. **첫째**, 모든 직원에게 AI 사용 능력이 '기본 스킬'이 됩니다. **둘째**, 프로토타입 단계부터 AI를 적극 활용해야 합니다. **셋째**, 성과 평가 항목에 'AI 활용 능력'이 추가됩니다. **넷째**, 학습은 셀프 — 배우고 팀에 공유하는 사람이 인정받습니다. **다섯째**, 추가 인력을 요청하기 전에 먼저 AI로 해결해 봅니다. 이것은 단순한 트렌드가 아닙니다. **조직이 인재를 선별하는 기준이 바뀌는 순간**입니다. 아직도 ChatGPT를 한 번도 제대로 써 보지 않았다면, 당신은 이미 도태되기 시작한 것일지도 모릅니다.\",\"body_en\":\"AI isn't a choice anymore.\\nIt's survival.\\n\\nShopify's CEO sent an all-hands memo. One line carries it: *\\\"Want to stay at this company? Use AI well.\\\"* Five points. **One**: AI usage becomes a baseline skill for every employee. **Two**: AI gets used from the prototype phase forward. **Three**: AI-utilization is now a performance review criterion. **Four**: learning is self-directed; the ones who teach the team are the ones who get recognized. **Five**: before requesting headcount, try solving the problem with AI first. This isn't a trend. It's the moment the criteria for identifying talent at scale shifted. If you've still never seriously used ChatGPT, you may already be on the wrong side of the line.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DIKbVxhST2_\",\"date\":\"2025-04-09\",\"original\":\"\\\"AI는 선택이 아니라, 생존이다.\\\"\\nShopify CEO가 최근 전직원에게 보낸 메모, 핵심은 딱 하나다:\\n\\\"앞으로 회사에 남고 싶으면, AI를 잘 써라.\\\"\\n\\n포인트 5가지:\\n1. 이제 모든 직원은 AI 사용 능력이 '기본 스킬'이다.\\n2. 프로토타입 단계부터 AI를 적극 활용해야 한다.\\n3. 성과 평가 항목에 'AI 활용 능력'이 추가된다.\\n4. 학습은 셀프. 배우고, 팀에 공유하는 사람이 인정받는다.\\n5. 추가 인력 물어보기 전에, 먼저 AI로 해결해봐라.\\n\\n이건 단순한 트렌드가 아니다. 이건 조직이 인재를 선별하는 '기준'이 바뀌는 순간이다.\\n\\n아직도 ChatGPT 한 번도 제대로 안 써봤다면,\\n당신은 이미 도태되기 시작한 걸지도 모른다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"2026년 세상이 바뀌었다. 이제는 저는 진심으로 AI Native가 되지 않으면 살아남을 수 없다고 생각을 합니다.\"}]},{\"id\":\"ai-is-the-team\",\"label\":\"ai-is-the-team\",\"claim_ko\":\"AI가 팀입니다.\",\"claim_en\":\"AI is the team.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"solo-builder\",\"ai-native\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-05\",\"body_ko\":\"AI가 팀입니다.\\n\\n직원 0명으로 운영되는 1인 빌더 3명 — Pieter Levels, Maor Shlomo, Alex Finn — 이 모두 같은 구조로 작동합니다. 사람 팀이 없는 게 아니라, **팀이 AI 한 명입니다**. 회사라는 단위 자체가 AI 하나만 있으면 한 사람이 운영 가능한 형태로 줄어들었습니다.\",\"body_en\":\"AI is the team.\\n\\nThree solo builders — Pieter Levels, Maor Shlomo, Alex Finn — all operate the same way. They don't lack a team; the team is one AI. The company unit itself shrank to something one person can run with one AI.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"src/content/courses/ai-native/slides/ch00.json\",\"date\":\"2026-05-05\",\"original\":\"slide 1.7 (hook):\\n직원 0명입니다.\\n팀은 AI 한 명입니다.\\nemphasis: AI 한 명\"},{\"platform\":\"lecture\",\"url\":\"src/content/courses/ai-native/slides/ch00.json\",\"date\":\"2026-05-05\",\"original\":\"slide 1.12 (quote):\\n이제는 회사가 필요한 게 아닙니다.\\nAI가 팀입니다.\\nattribution: — 1인 빌더 3명이 증명\"},{\"platform\":\"lecture\",\"url\":\"src/content/courses/ai-native/slides/ch00.json\",\"date\":\"2026-05-05\",\"original\":\"slide 1.13 (takeaway):\\nAI가 팀입니다.\\ncontext: Levels · Shlomo · Finn — 세 사람 모두 직원 0명. 도구는 AI 하나뿐이었습니다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"이들이 가진 공통점은 하나가 있습니다. 바로 직원이 한 명도 없다는 거예요. 직원이 한 명도 없이 스스로 이 AI 군단을 거느려서 여러 가지 서비스들을 발 빠르게 만들고 매출까지 일궈내면서 실질적인 가치를 만들어 내고 있다.\\n…\\n회사들은 사람이 아닌 AI를 고용하기 시작했습니다. 그리고 사람들도 다른 사람이 아닌 AI를 고용하기 시작했다는 게 되게 신기한 변화인 것 같습니다.\"}]},{\"id\":\"ai-leverage-multiplies-across-all-domains\",\"label\":\"ai-leverage-multiplies-across-all-domains\",\"claim_ko\":\"AI를 끝까지 레버리지하면\\n불가능했던 다섯 가지를 동시에 합니다.\",\"claim_en\":\"Push AI leverage to the limit and\\nfive incompatible roles become possible at once.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-04-05\",\"body_ko\":\"AI를 끝까지 레버리지하면\\n불가능했던 다섯 가지를 동시에 합니다.\\n\\n사실 메타에서 8년간 버티는 것만으로도 벅찹니다. 하지만 저는 부업 세 개를 따로 돌립니다. **19만 구독자 유튜브 채널, 사업, 온라인 강의, 그리고 육아**를 동시에 합니다. 다섯 개를 합한 업무량은 말이 안 됩니다. 하나만 해도 벅찬데, 다섯을 동시에 하는 건 현실적으로 불가능합니다. 아니, **불가능했습니다.** 이제는 다릅니다. **인공지능을 최대한으로 레버리지하면 됩니다.** 시간이 늘어난 것도 아니고, 제가 갑자기 똑똑해진 것도 아닙니다. 도구가 바뀌었을 뿐입니다 — 그리고 그 도구를 *전부 쓰기로* 결심한 것이 차이를 만듭니다.\",\"body_en\":\"Push AI leverage to the limit and\\nfive incompatible roles become possible at once.\\n\\nJust surviving eight years at Meta is already a lot. But on top of that I run three side ventures: **a 190K-subscriber YouTube channel, a business, an online course business** — plus parenting. The total workload makes no sense. Any one of these is plenty for a full-time. Doing five at once is, realistically, *impossible*. Or rather — **it was.** Now it's different. **Push AI leverage to the limit and the math changes.** I didn't get more hours. I didn't get smarter. The tools changed, and the decision to *use them fully* is what produces the difference.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DWvDLe0FBAE\",\"date\":\"2026-04-05\",\"original\":\"사실 메타에서 8년간 버티는것만으로도 벅찹니다.\\n하지만 저는 부업을 따로 3개를 돌립니다.\\n19만 구독자 유튜브 채널, 사업, 온라인 강의, \\n그리고 육아를 동시에 하고 있습니다.\\n\\n사실 업무량이 말이 안됩니다.\\n하나만 해도 벅찬데,\\n이 다섯개를 동시에 하는건\\n현실적으로 불가능합니다.\\n\\n아니, 불가능했었습니다.\\n\\n이제는 다릅니다. \\n인공지능을 최대한으로 레버리지하면 됩니다\\n\\n이 모든 일이 어떻게 가능한지\\n제 워크플로우를 전부 공개합니다.\\n\\n👇\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"저는 이 강의에서 보여드릴 12가지 툴을 여러 방면을 가지고 활용을 하고 있고요. 그냥 도움이 되는 모든 툴들은 최대한 섭렵해서 저의 시간과 저의 돈을 아끼고 저의 능력과 그런 스코프를 키우는 데 레버리지 하고 있습니다.\"}]},{\"id\":\"ai-leverage-not-ai-expertise\",\"label\":\"ai-leverage-not-ai-expertise\",\"claim_ko\":\"AI 전문가는 박사 학위가 아니라\\nAI를 잘 쓰고 알리는 사람입니다.\",\"claim_en\":\"An AI expert isn't a PhD —\\nit's whoever uses AI well and spreads it well.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-25\",\"body_ko\":\"AI 전문가는 박사 학위가 아니라\\nAI를 잘 쓰고 알리는 사람입니다.\\n\\n소신 발언입니다. **AI 전문가가 꼭 박사 학위자일 필요는 없습니다.** AI 모델을 직접 연구하는 일도 중요하지만, 그걸 잘 활용하고, 널리 알리고, 실무에서 임팩트를 내는 것도 똑같이 중요한 일입니다. 아무리 기술이 좋아도 사람들이 쓰지 못한다면 의미가 있을까요? 저는 인공지능 연구자가 아닙니다. 그러나 AI로 업무 생산성을 10배 높이고, 수십만 명에게 AI 활용법을 전파하면서 '전문가'로 인정받습니다. **AI는 기술이 아니라 레버리지입니다.** 도구를 잘 쓰는 사람이 결국 이깁니다.\",\"body_en\":\"An AI expert isn't a PhD —\\nit's whoever uses AI well and spreads it well.\\n\\nQuick unpopular opinion. **An \\\"AI expert\\\" doesn't have to be a PhD.** Researching the models matters; *using them well, broadcasting them well, and shipping real-world impact with them* matters just as much. What good is a great model if no one can use it? I'm not an AI researcher. But I 10× my own productivity with AI, I've taught hundreds of thousands of people how to use it, and the market calls me an expert. **AI isn't technology — it's leverage.** Whoever wields the tool well wins, full stop.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFjvjjWxpIt\",\"date\":\"2025-01-25\",\"original\":\"소신발언: \\\"인공지능 전문가\\\"가 꼭 박사 학위자일 필요는 없어.\\n\\nAI 모델을 직접 연구하는 것도 중요하지만,\\n그걸 잘 활용하고, 널리 알리고, 실무에서 임팩트를 내는 것도 중요한 일이라고 생각해.\\n\\n아무리 기술이 좋아도 사람들이 쓰지 못한다면 그게 의미가 있을까?\\n\\n나는 인공지능 연구자가 아니지만, AI를 활용해 업무 생산성을 10배 높이고, 수십만 명에게 AI 활용법을 전파하면서 \\\"전문가\\\"로 인정받고 있어.\\n\\nAI는 기술이 아니라 \\\"레버리지\\\"야.\\n도구를 잘 쓰는 사람이 결국 이긴다.\"}]},{\"id\":\"ai-maximalist-stack-twelve-tools-seven-modalities\",\"label\":\"ai-maximalist-stack-twelve-tools-seven-modalities\",\"claim_ko\":\"AI 맥시멀리스트는 도구 12개로 모달리티 7개를 전부 덮어\\n21세기 디지털 업무 전체를 혼자 처리합니다.\",\"claim_en\":\"An AI maximalist runs 12 tools across 7 modalities\\nand covers every digital task of the 21st century single-handedly.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"productivity\",\"solo-builder\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"AI 맥시멀리스트는 도구 12개로 모달리티 7개를 전부 덮어\\n21세기 디지털 업무 전체를 혼자 처리합니다.\\n\\n도구 12개: ChatGPT · Claude · Claude Code · Claude CoWork · Claude Design · ElevenLabs · Suno · NotebookLM · Nano Banana(또는 Leonardo.ai) · Replit · CapCut · Luma Dream Machine.\\n\\n모달리티 7개: 텍스트(채팅) · 리서치 · 이미지 · 디자인 · 코드 · 영상 · 오디오·보이스.\\n\\n이 묶음을 손에 쥐고 있으면 마케팅이든, 책 집필이든, 카페 창업이든, SaaS 출시든, 21세기 디지털 업무 전부를 혼자 끌고 갈 수 있습니다. 한 칸이라도 빠지면 그 모달리티에서 다른 사람의 손을 빌려야 하고, 그 순간 1인이 1인이 아니게 됩니다.\",\"body_en\":\"An AI maximalist runs 12 tools across 7 modalities and covers every digital task of the 21st century single-handedly.\\n\\nThe twelve tools: ChatGPT · Claude · Claude Code · Claude CoWork · Claude Design · ElevenLabs · Suno · NotebookLM · Nano Banana (or Leonardo.ai) · Replit · CapCut · Luma Dream Machine.\\n\\nThe seven modalities: text (chat) · research · image · design · code · video · audio/voice.\\n\\nOnce you hold the bundle, marketing, book writing, café launches, SaaS launches — every digital job of the 21st century — runs through one person. Drop a modality and you have to borrow a hand for it; the moment you borrow, \\\"one person\\\" stops being literally one person.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"이 도구들을 제가 12가지로 섭렵을 했고 정리를 해왔어요. 가장 핵심 도구들 12가지. 이것만 묶으면 제 생각에는 웬만한 것 다 할 수 있다고 생각을 해서 12가지의 도구들을 가져왔는데, ChatGPT, Claude, 그리고 Claude 안에 여러 가지 부가 프로덕트들이 생겼죠. Claude Code, CoWork, Design. ElevenLabs랑 Suno는 목소리라든지 배경 음악, NotebookLM으로 리서치, Leonardo.ai는 이미지고, Replit은 여러 가지 서비스 론칭, CapCut은 영상 편집 도구, Luma Dream Machine은 영상 제작 도구.\\n…\\n채팅과 대화로 되어 있는 텍스트 모달이 있고요. 리서치도 어떻게 보면 텍스트죠. 텍스트인데 조금 다른 의미의, 다른 사용성을 지닌 텍스트. 이미지랑 디자인은 이미지과죠. 이미지로 할 수 있는 모든 것들, 그리고 코드로 할 수 있는 모든 것들, 영상으로 할 수 있는 모든 것들, 그리고 오디오와 보이스로 할 수 있는 모든 것들.\\n…\\nAI Maximalist가 돼서 모든 도구들을 섭렵하실 수 있게끔, 그래서 내가 그 어떤 것도 만들 수 있게끔.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"그중에서도 오늘은 이 CoWork라는 것을 집중적으로 다루겠다. (CoWork는 강의에서 다루는 도구 스택 중 하나)\"}]},{\"id\":\"ai-native-is-different-species\",\"label\":\"ai-native-is-different-species\",\"claim_ko\":\"AI 네이티브는 AI가 거의 모든 일을 해낼 수 있다고 진심으로 믿고,\\n자신 역시 모든 도구를 끝까지 끌어다 능력과 한계를 최대치로 끌어올리는 사람입니다.\",\"claim_en\":\"An AI native genuinely believes AI can do almost any kind of work — and pulls every tool to its limit to push their own capability and ceiling just as far.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2026-03-18\",\"body_ko\":\"AI 네이티브는 AI가 거의 모든 일을 해낼 수 있다고 진심으로 믿고,\\n자신 역시 모든 도구를 끝까지 끌어다 능력과 한계를 최대치로 끌어올리는 사람입니다.\\n\\nAI를 잘 쓰는 사람과 AI 네이티브의 차이는 숙련도가 아니라 **믿음의 크기**입니다. AI 사용자는 작업 단위로 AI를 호출합니다. AI 네이티브는 AI가 거의 모든 일을 해낼 수 있다는 전제 위에서 일을 시작하고, 그래서 자신이 닿을 수 있는 한계 자체가 달라집니다.\",\"body_en\":\"An AI native genuinely believes AI can do almost any kind of work — and pulls every tool to its limit to push their own capability and ceiling just as far.\\n\\nThe gap between someone who's good with AI and an AI native isn't a skill curve; it's the size of the belief. The AI user invokes AI per task. The AI native begins every task from the premise that AI can do almost all of it — and so the ceiling they can reach is itself different.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"src/content/courses/ai-native/slides/ch00.json\",\"date\":\"2026-05-05\",\"original\":\"slide 2.9 (hook):\\nAI 사용자와 AI 네이티브는\\n다른 종(種)입니다.\\nemphasis: 다른 종(種)\"},{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DWA1Oe5DbXa\",\"date\":\"2026-03-18\",\"original\":\"나는 \\\"AI-네이티브\\\"를 이렇게 정의한다:\\nAI가 이제 거의 모든 일을 할 수 있다고 진심으로 믿는 사람.\\nClaude Code를 비롯한 여러 harness를 직접 써보면서 느꼈다.\\nAI가 컴퓨터로 할 수 있는 거의 모든 일을, 이제 혼자서 다 할 수 있겠다고.\\n이건 이제 과장이 아니라 팩트다.\\n그 사실을 머리로만 아는 게 아니라, 몸으로 받아들인 사람이 진짜 AI-네이티브가 아닐까.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"AI 사용자와 AI 네이티브는 다른 종(種)입니다.\\n…\\n조금 다른 종이라는 말씀을 드리고 싶고, 저희는 이 후자인 AI Native의 종으로서 거듭날 수 있는 훈련 과정을 계속해서 이어나갈 것 같습니다.\"}]},{\"id\":\"ai-native-uses-ai-as-operating-system\",\"label\":\"ai-native-uses-ai-as-operating-system\",\"claim_ko\":\"AI 네이티브는 AI를 운영체제처럼 매일 켜고\\n손에서 놓지 않는 사람입니다.\",\"claim_en\":\"An AI native treats AI as an operating system —\\nswitched on every day, never out of reach.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"AI 네이티브는 AI를 운영체제처럼 매일 켜고\\n손에서 놓지 않는 사람입니다.\\n\\n운영체제라는 말이 비유처럼 들리지만, 비유가 아닙니다. AI가 켜져 있는 시간이 컴퓨터가 켜져 있는 시간과 같아지면, 그게 운영체제입니다. 일은 거기서 시작하고, 거기서 닫힙니다.\",\"body_en\":\"An AI native treats AI as an operating system —\\nswitched on every day, never out of reach.\\n\\n\\\"Operating system\\\" reads like a metaphor but isn't one. When the hours your AI is running line up with the hours your computer is running, that's an OS. Work starts there and closes there.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"AI를 운영체제처럼 매일 사용하고 편하게 활용할 수 있는 그런 사람을 AI Native라고 저는 정의할 것 같습니다.\\n…\\nAI를 운영체제로서 정말 나의 몸과 팔과 다리와 머리로서 활용을 할 수 있게끔 도와드릴 거고요. AI Maximalist가 돼서 모든 도구들을 섭렵하실 수 있게끔.\"}]},{\"id\":\"ai-product-dev-has-no-low-hanging-fruit\",\"label\":\"ai-product-dev-has-no-low-hanging-fruit\",\"claim_ko\":\"AI 프로덕트 개발에는\\n쉬운 길이 없습니다.\",\"claim_en\":\"Building AI products in production\\nhas no easy lane.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-19\",\"body_ko\":\"AI 프로덕트 개발에는\\n쉬운 길이 없습니다.\\n\\n특히 대기업에서 AI 프로덕트를 만드는 일은 빡셉니다. 풀어야 할 변수가 한 줄로 늘어섭니다 — Privacy, capacity, cost, scalability, randomness, model feasibility, model evaluations, sensitivity. 모든 게 동시에 복잡하고, 한 가지를 풀어도 그 옆이 다시 흔들립니다. 아직 누구도 제대로 걸어 본 적이 없는 길이기 때문에 베끼고 들어갈 사례도 없습니다. 그래서 결국 어느 순간부터 low-hanging fruit이 없어집니다. 매일 아침 9시 standup으로 버티는 긴 싸움이 됩니다. 이것이 2025–2026년 대기업 AI 프로덕트 팀의 솔직한 단면입니다. \\\"AI가 일을 다 해 주는 시대\\\"라는 바깥의 서사와 안의 현실은 같은 그림이 아닙니다.\",\"body_en\":\"Building AI products in production\\nhas no easy lane.\\n\\nBuilding AI products inside a large company is genuinely brutal. The variables stack up — privacy, capacity, cost, scalability, randomness, model feasibility, model evaluations, sensitivity. Every one is hard, every one interacts with every other one. There's no playbook because almost no one has built one of these at scale yet. Past a certain point the low-hanging fruit is gone. What's left is daily 9 AM standups and a long fight. This is the honest cross-section of a 2025–2026 big-company AI product team. The outside narrative (\\\"AI is doing all the work now\\\") and the inside reality are not the same picture.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHX5kQPubdO\",\"date\":\"2025-03-19\",\"original\":\"\\\"미안하지만 나 이렇게는 못 산다\\\" 솔직하게 매니저에게 말했다.\\nAI 프로덕트 개발은 특히나 대기업에서는 정말 쉽지 않다. 정말 빡세다. Privacy, capacity, cost, scalability, randomness, model feasibility, model evaluations, sensitivity... 모든 게 복잡하고, 하나 해결하는 것도 쉽지 않다. 아직 그 누구하나 제대로 걸어보지 않은 길이기도 하다.\\n…\\n어느순간부터 low-hanging fruit은 없다.\\n올해부터는 아주 긴 싸움이 될 것 같다.\"}]},{\"id\":\"ai-video-is-a-new-content-market\",\"label\":\"ai-video-is-a-new-content-market\",\"claim_ko\":\"AI 영상은\\n완전히 새로운 콘텐츠 시장입니다.\",\"claim_en\":\"AI video isn't a feature.\\nIt's a brand-new content market.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"creator-economy\"],\"theses\":[\"personal-brand-is-the-moat\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-09-30\",\"body_ko\":\"AI 영상은\\n완전히 새로운 콘텐츠 시장입니다.\\n\\n완전히 새로운 콘텐츠 시장이 열렸습니다. 요즘 AI로 만든 영상이 핫하길래 한번 만들어 봤는데 결과가 진짜 미쳤습니다. 심지어 만드는 과정 자체가 은근히 재미있어서, 몇 시간을 작업하며 놀았습니다. 앞으로 정말 다양한 콘텐츠를 만들 수 있을 것 같은 느낌입니다. 오늘 Sora 2도 발표됐는데, 오픈되면 사람들 반응이 어떨지 궁금합니다.\",\"body_en\":\"AI video isn't a feature.\\nIt's a brand-new content market.\\n\\nA new content market just opened. I jumped on the AI-video wave to see what the fuss was about — the output is unhinged in a good way. The making *itself* is fun; I lost hours just playing. The format space ahead of us feels enormous. Sora 2 was announced today; once it opens up, the reaction will tell us how big this gets.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DPP21t0j4qh\",\"date\":\"2025-09-30\",\"original\":\"완전히 새로운 콘텐츠 시장이 열렸다.\\n요즘 AI로 만든 영상이 핫하다길래 나도 한번 만들어봤는데 결과가 진짜 미쳤다.\\n심지어 만드는 과정이 은근 꿀잼이라 몇시간을 가지고서 제작하며 놀았는데\\n앞으로 정말 다양한 콘텐츠를 만들 수 있을 것 같은 느낌.\\n오늘 SORA2 도 발표됬는데, 오픈되면 사람들 반응이 어떨지 궁금하다.\"}]},{\"id\":\"anthropic-revenue-overtook-openai-2026\",\"label\":\"anthropic-revenue-overtook-openai-2026\",\"claim_ko\":\"Anthropic의 연 매출이 12개월 만에 3배로 뛰며\\n처음으로 OpenAI를 추월했습니다.\",\"claim_en\":\"Anthropic's annual revenue tripled in twelve months and overtook OpenAI's for the first time.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-19\",\"body_ko\":\"Anthropic의 연 매출이 12개월 만에 3배로 뛰며\\n처음으로 OpenAI를 추월했습니다.\\n\\nCH02에서 차트로 제시된 시장 상황입니다. Claude를 만드는 Anthropic이 매출에서 처음으로 OpenAI를 앞섰고, 가속도는 더 붙고 있습니다.\",\"body_en\":\"Anthropic's annual revenue tripled in twelve months and overtook OpenAI's for the first time.\\n\\nA market snapshot shown as a chart in CH02. Anthropic, the company behind Claude, edged past OpenAI on revenue for the first time, and the curve is still steepening.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"Claude의 연 매출을 보자면 12개월 만에 3배로 뛰었다고 하는데, 지금 사실 가속도가 훨씬 더 많이 붙은 상태거든요.\\nClaude가 처음으로 OpenAI의 매출을 뛰어넘는 이 밤색 그래프가, Claude라는 모델을 만들고 판매하는 Anthropic이라는 회사인데, Anthropic이 드디어 OpenAI를 꺾었다는.\"}]},{\"id\":\"any-website-becomes-an-agent-tool-via-cli-factory\",\"label\":\"any-website-becomes-an-agent-tool-via-cli-factory\",\"claim_ko\":\"공개 API가 없는 사이트(Skool, Craigslist, Domino's, ESPN)라도 AI 에이전트가 다룰 수 있습니다.\\nPrinting Press 같은 CLI 팩토리로 엔드포인트를 역공학하고 Go CLI를 만든 뒤 스킬로 감싸면 — 보통 10분이면 됩니다.\",\"claim_en\":\"When a website has no public API (Skool, Craigslist, Domino's, ESPN), an AI agent can still drive it by using a CLI factory like Printing Press to reverse-engineer endpoints, generate a Go CLI, and wrap it as a Skill — typically in about ten minutes.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/YHk45NEpspE\",\"published_at\":\"2026-05-08\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"solo-builder\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-08\",\"body_ko\":\"공개 API가 없는 사이트(Skool, Craigslist, Domino's, ESPN)라도 AI 에이전트가 다룰 수 있습니다.\\nPrinting Press 같은 CLI 팩토리로 엔드포인트를 역공학하고 Go CLI를 만든 뒤 스킬로 감싸면 — 보통 10분이면 됩니다.\\n\\n\\\"공식 API가 없어서 자동화 못 한다\\\"는 핑계가 사라집니다. 특정 도구를 넘어서 일반화되는 패턴입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/YHk45NEpspE\",\"date\":\"2026-05-08\",\"original\":\"Printing Press lets you turn any tool into a CLI that AI agents can actually use efficiently. It gives you a catalog of ready to go CLIs and also helps you turn almost anything into a CLI in minutes.\"}]},{\"id\":\"ask-what-is-hardest-not-what-is-going-well\",\"label\":\"ask-what-is-hardest-not-what-is-going-well\",\"claim_ko\":\"1:1 미팅은 잘된 일이 아니라\\n가장 힘든 일부터 묻습니다.\",\"claim_en\":\"In 1:1s, ask what's hardest first.\\nWhat's going well can wait.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\",\"career-strategy\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-27\",\"body_ko\":\"1:1 미팅은 잘된 일이 아니라\\n가장 힘든 일부터 묻습니다.\\n\\n메타에서 7년을 같이 일한 디렉터와의 1:1은 항상 같은 질문으로 시작했습니다. **\\\"지금 네가 가장 짜증 나고 싫은 게 뭐야? 잘되고 있는 건 말할 필요도 없어.\\\"** 처음엔 매니저한테 억지로 컴플레인하는 기분이라 어색했습니다. 시간이 지나면서 깨달았습니다 — 이 사람은 나를 가장 효율적으로 돕는 방법을 정확히 알고 있다는 사실을. 이제는 저도 팀원에게 말버릇처럼 묻습니다. **\\\"좋은 건 잠깐 넣어두고, 너를 가장 힘들게 하는 걸 알려줘. 내가 어떻게 하면 너를 도와줄 수 있을까?\\\"** 직빵입니다.\",\"body_en\":\"In 1:1s, ask what's hardest first.\\nWhat's going well can wait.\\n\\nThe director I worked with for seven years at Meta opened every single 1:1 the same way: *\\\"What's pissing you off right now? Don't bother with what's going well.\\\"* The first dozen times it was uncomfortable — it felt like he was forcing me to complain. Eventually it clicked: this man knew the highest-leverage version of helping me, and he was getting there in one question. Now I open every 1:1 with my reports the same way. *\\\"Skip what's going well. What's the hardest thing right now? How can I actually help?\\\"* Nothing else moves the needle faster.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGkc2uHx-Rw\",\"date\":\"2025-02-27\",\"original\":\"내가 메타에서 같이 7년동안 일한 디렉터와의 1:1 미팅은 항상 당황스러웠어.\\n\\n항상 다음 질문으로 미팅을 시작했거든:\\n\\\"지금 네가 가장 짜증 나고 싫은 게 뭐야? 잘되고 있는건 말할 필요도 없어.\\\"\\n\\n처음엔 이게 너무 어려웠어.\\n억지로 매니저한테 컴플레인하는 기분이었으니까.\\n\\n근데 나중에 깨달았어.\\n\\\"이 사람은 가장 효율적으로 나를 돕는 방법을 알고 있구나.\\\"\\n\\n나도 이제는 말버릇처럼 내 팀원들에게 물어봐:\\n\\\"좋은건 잠깐 넣어두고, 너를 가장 힘들게 하는걸 알려줘\\\"\\n\\\"내가 어떻게 하면 너를 도와줄 수 있을까?\\\"\\n\\n이게 직빵이더라.\"}]},{\"id\":\"ask-why-not-how-in-ai-era\",\"label\":\"ask-why-not-how-in-ai-era\",\"claim_ko\":\"정답이 흔해진 시대에는\\n사람의 질문과 목소리가 귀해집니다.\",\"claim_en\":\"When answers go cheap,\\na person's question and voice become the asset.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"learning\",\"ai-native\"],\"theses\":[\"pillar-framework\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-04-04\",\"body_ko\":\"정답이 흔해진 시대에는\\n사람의 질문과 목소리가 귀해집니다.\\n\\n이제 우리가 배워 왔던 방식의 교육은 버려야 합니다. 암기하는 법, 문제 푸는 법, 정답 고르는 법 — 이제 그런 건 AI가 우리보다 잘합니다. 앞으로 진짜 중요한 것은 **질문하는 법**과 **문제를 정의하는 법**입니다. 왜냐하면 정답은 넘쳐납니다. 보고서도, 콘텐츠도, 데이터도 넘쳐납니다. 곧 대부분이 AI가 만든 글, 이미지, 오디오가 됩니다. 그래서 더 귀해집니다 — **사람의 질문**과 **사람의 목소리**가. 이제 우리는 질문하고 우리만의 목소리를 내는 법을 길러야 합니다. **How가 아니라 Why를 물어야 합니다.**\",\"body_en\":\"When answers go cheap,\\na person's question and voice become the asset.\\n\\nThrow out the way we've been taught. Memorizing, solving, picking the right answer — AI does all of that better than us now. What actually matters: *how to ask*, and *how to define the problem*. Why? Because answers are flooding in. Reports, content, data — most of it will soon be AI-produced text/images/audio. As that scales, two things get scarce: *the question a human asks*, and *the voice a human writes in.* The new literacy is question-formation plus voice-production. **Stop asking *how*. Ask *why*.**\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DIajd8PRPHo\",\"date\":\"2025-04-04\",\"original\":\"이제 우리가 배워왔던 방식의 교육은 버려야 한다.\\n\\n암기하는 법, 문제 푸는 법, 정답 고르는 법.\\n이제 그런 건 AI가 우리보다 잘한다.\\n\\n앞으로 진짜 중요한 건\\n'질문하는 법'과 '문제를 정의하는 법'이다.\\n\\n왜?\\n정답은 넘쳐난다.\\n보고서도, 콘텐츠도, 데이터도 넘쳐난다.\\n곧 대부분이 AI가 만든 글, 이미지, 오디오가 될 거다.\\n\\n그래서 더 귀해진다.\\n\\\"사람의 질문\\\" 그리고 \\\"사람의 목소리\\\"\\n\\n우리는 이제 \\\"질문하고 우리만의 목소리를 내는 법\\\"을 길러야 한다.\\n\\nHow 말고 why 를 질문해라.\"}]},{\"id\":\"autokliq-shipped-without-writing-code\",\"label\":\"autokliq-shipped-without-writing-code\",\"claim_ko\":\"AutoKliq은 — 알렉스가 한 줄도 직접 짜지 않은 상용 제품입니다.\\n전 코드를 Claude Code가 저작했고, autokliq.com으로 출시되었습니다.\",\"claim_en\":\"AutoKliq is a commercial product Alex shipped without writing a single line.\\nEvery line was authored by Claude Code; the product is live at autokliq.com.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"ai-coding\",\"solo-builder\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-16\",\"body_ko\":\"AutoKliq은 — 알렉스가 한 줄도 직접 짜지 않은 상용 제품입니다.\\n전 코드를 Claude Code가 저작했고, autokliq.com으로 출시되었습니다.\\n\\n엔드-투-엔드입니다. 프론트, 백엔드, 결제, 운영 — 모든 줄을 Claude Code가 썼습니다. 알렉스의 역할은 — 무엇을 만들지, 어떤 순서로 갈지, 어디서 멈출지를 정한 것뿐입니다. 코드 작성 자체는 단 한 줄도 사람의 손이 닿지 않았습니다.\\n\\n이 사실은 — 비개발자 직장인이 \\\"1인 상용 제품\\\" 이라는 위치에 도달할 수 있는 시기가 지금이라는 증거입니다. 도구가 부족해서 못 만든 시절이 끝났습니다. 무엇을 시킬지 — 그것만 정해지면 됩니다.\",\"body_en\":\"AutoKliq is a commercial product Alex shipped without writing a single line.\\nEvery line was authored by Claude Code; the product is live at autokliq.com.\\n\\nEnd-to-end. Frontend, backend, billing, ops — every line came from Claude Code. Alex's role was deciding what to build, in what order, where to stop. The code itself never passed through a human's hands.\\n\\nThis is evidence that \\\"a single person ships a commercial product\\\" is reachable *now*, not later. The era of \\\"I can't build it because the tools aren't there\\\" is over. The bottleneck is what to set in motion.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"https://careerhackeralex.com/seminars/fastcampus-2026-05-16\",\"date\":\"2026-05-16\",\"original\":\"여러분도 — 런칭 가능한 제품을 만드실 수 있습니다.\\n\\nAutoKliq은 엔드-투-엔드 상용 제품입니다.\\n저는 단 한 줄도 직접 코드를 쓰지 않았습니다.\\n전부 Claude Code가 저작했습니다.\\n\\nAutoKliq · 출시된 상용 제품 · autokliq.com\\nClaude Code · 100% 코드 저작\\n\\n코드 한 줄 쓰지 않습니다.\\n제품 하나를 출시합니다.\\nAutoKliq이 그 증거입니다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"이러한 기능들을 전부 다 구현해내는 데까지 저는 코드를 단 한 줄도 쓰지 않았습니다. 물론 검수는 많이 했죠. … 심지어 여기 있는 Prompt들도 제가 직접 쓴 거는 거의 하나도 없습니다. 전부 다 AI를 활용했고.\"}]},{\"id\":\"beware-the-carrot-not-the-stick\",\"label\":\"beware-the-carrot-not-the-stick\",\"claim_ko\":\"회사에서 무서운 건 채찍이 아니라\\n당근입니다.\",\"claim_en\":\"What hurts you at a company isn't the stick.\\nIt's the carrot.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"meta-life\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2025-03-25\",\"body_ko\":\"회사에서 무서운 건 채찍이 아니라\\n당근입니다.\\n\\n회사에서 진짜 무서운 건 채찍이 아니라 **당근**입니다. 곧 승진할 것 같고, 대우도 좋아질 것 같은데, 알고 보면 아직 해야 할 게 산더미입니다. 당근에 설레다가 채찍 한 대 맞으면 더 아픕니다. **기대보다 실행**입니다. 설레발은 독입니다.\",\"body_en\":\"What hurts you at a company isn't the stick.\\nIt's the carrot.\\n\\nThe real danger at a company isn't the stick. It's the **carrot.** \\\"You're about to get promoted. Your comp is about to improve\\\" — and then you find out there's still a mountain of work in front of you. The hangover from a carrot is sharper than the bruise from a stick. **Execution over expectation.** Getting ahead of yourself is poison.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHo0m-7Sm7L\",\"date\":\"2025-03-25\",\"original\":\"회사에서 진짜 무서운 건 채찍이 아니라 당근이다.\\n\\n곧 승진할 것 같고, 대우도 좋아질 것 같은데\\n알고 보면 아직 해야 할 게 산더미야.\\n\\n당근에 설레다가, 채찍 한대 맞으면 더 아프다.\\n기대보다 실행. 설레발은 독이다.\"}]},{\"id\":\"bigtech-extracts-via-fear-and-dream\",\"label\":\"bigtech-extracts-via-fear-and-dream\",\"claim_ko\":\"실리콘밸리는 두려움과 꿈\\n두 축으로 직원을 갈아 넣습니다.\",\"claim_en\":\"Silicon Valley extracts value through two simultaneous forces —\\nfear of falling, and dream of rising.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"meta-life\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2023-09-27\",\"body_ko\":\"실리콘밸리는 두려움과 꿈\\n두 축으로 직원을 갈아 넣습니다.\\n\\n실리콘밸리는 연봉을 많이 줍니다. 그 연봉만큼 직원의 값어치도 끝까지 뽑아냅니다. 51%가 정신건강 진단을 받았고 57%가 번아웃을 경험했다는 통계는 *겉으로 보이는 복지*와는 다른 환경을 가리킵니다. 그 메커니즘은 **두 가지 심리를 동시에 작동시키는 것**입니다.\\n\\n**첫째, 언제든 해고될 수 있다는 두려움.** 6개월마다 상대평가 성적표가 나오고, At-Will Employment 조항이 근로계약서에 박혀 있습니다. Meets Expectations보다 낮은 등급을 받으면 매일 보고서를 쓰는 PIP가 시작되거나 바로 해고됩니다. 메타는 2023년 한 해에 21,000명을 해고했습니다 — 전체의 15% 이상입니다.\\n\\n**둘째, 언제든 승진할 수 있다는 꿈.** 한 단계만 올라가도 연봉이 한 번에 50% 가까이 뜁니다. 페이스북 E3 19만 불 → E4 30만 불 → E5 38만 불 → E6 58만 불. 승진은 직군 타이틀 변경이 아니라 **자릿수 변경**입니다.\\n\\n해고의 두려움과 승진의 꿈을 동시에 짊어진 사람은 스스로를 갈아 넣게 됩니다. 그게 시스템이 의도한 결과입니다. 회사 입장에서는 연봉이 비싸지 않습니다. **직원이 만들어 내는 값어치가 그만큼 크기 때문**입니다. 둘 다 같은 시스템의 두 얼굴입니다.\",\"body_en\":\"$12\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=jnvpn6XJfv4\",\"date\":\"2023-09-27\",\"original\":\"실리콘밸리 직원들은 이 매 순간 해고당할 수 있다라는 생각을 갖고 삽니다. 그리고 또 반대로는\\n항상 좀만 더 하면 승진할 수 있을 것 같다라는 생각을 하고 살아요. 어떻게 보면 양날의 검이죠.\\n매 순간 해고가 될 것 같아서 열심히 하고, 조금 더 하면은 승진할 수 있을 것 같아서 열심히 하고.\\n\\n성적표가 그 해고와 직접적인 공간이 있습니다. 다섯 등급 중에 가장 그 중간 등급이 Meets Expectations.\\n그거보다 못 받게 될 경우에는 두 가지의 경우에 수가 발생해요. 하나는 잘릴 수 있습니다.\\n미국의 대부분의 기업들은 이 at-will employment라는 조항을 근로계약서에 포함하고 있어요.\\n\\n메타는 1년 사이에 21,000명을 해고 했거든요. 거의 한 15% 이상의 직원의 숫자인데.\\n\\n실리콘밸리 직원들은 언제든지 승진할 수 있다라는 마인드셋을 기본적으로 좀 갖고 있습니다.\\n페이스북 E3에서 E4로 승진하면은 19만 불에서 30만 불로 뻥튀기가 됩니다. 한 번 더 한다고 한다면\\n38만 불이고 그 다음에는 58만 불입니다. 거의 한 50%가 뛴다고 보시면 돼요.\\n\\n실리콘밸리 직원들을 대상으로 리서치를 해봤더니 51% 이상이 정신건강 이상 진단을 받아봤고\\n57%가 번아웃을 경험해 봤다고 해요.\"}]},{\"id\":\"bigtech-perf-eval-has-four-axes\",\"label\":\"bigtech-perf-eval-has-four-axes\",\"claim_ko\":\"실리콘밸리 성과 평가는\\n임팩트·전문성·방향성·소프트스킬 네 축으로 갈립니다.\",\"claim_en\":\"Silicon Valley performance reviews split on four axes —\\nimpact, expertise, direction, and soft skills.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"meta-life\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2023-03-04\",\"body_ko\":\"실리콘밸리 성과 평가는\\n임팩트·전문성·방향성·소프트스킬 네 축으로 갈립니다.\\n\\n실리콘밸리의 가장 큰 혁신은 제품이 아니라 **성과 평가 시스템** 자체입니다. 잘 설계된 평가 시스템이 기업의 문화를 만들고, 직원들이 회사에서 나아갈 방향을 결정합니다. 그 평가는 임팩트, 전문성, 방향성, 소프트스킬 네 가지 축으로 분리됩니다.\\n\\n**임팩트**는 수치로 측정 가능한 성과의 크기입니다 — 광고팀이면 매출, 인프라팀이면 비용 절감, 마케터면 프로젝트 규모. 회사의 그 해 우선순위에 따라 임팩트의 정의가 바뀝니다. 2023년 메타는 효율성을 목표로 잡았고, 그 해의 임팩트는 코스트 리덕션이 되었습니다.\\n\\n**전문성**은 직군별 핵심 능력입니다. 엔지니어에게는 코딩의 깊이, 마케터에게는 고객 동원력, PM에게는 어려운 상품의 상품화 능력. 직군과 연차에 따라 기준이 명확히 제시되고, 실리콘밸리 회사들은 그 기준을 의도적으로 공개합니다.\\n\\n**방향성**은 한 프로젝트를 끝낸 후 다음에 무엇을 할 것인지, 어떻게 더 큰 문제로 확장할 것인지 제시하는 능력입니다. 평가받는 사람이 더 큰 영역을 그릴 수 있는가의 척도입니다.\\n\\n**소프트스킬**은 커뮤니케이션, 협업, 멘토링 — 다른 사람을 통해 일을 만드는 능력입니다.\\n\\n같은 IC라도 직군과 연차에 따라 네 축의 비중이 다르게 매겨집니다. 그래서 평가가 그렇게 정교한 것이고, 그래서 시스템이 사람을 정확하게 선별합니다.\",\"body_en\":\"$13\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=h-6CcGl21gs\",\"date\":\"2023-03-04\",\"original\":\"실리콘밸리의 가장 큰 혁신이자 성공 요인이라고 생각하는 부분이 바로 이 성과 평가 시스템이기 때문이에요.\\n잘 설계된 성과평가 시스템은 그 기업의 문화를 조성하고 직원들이 회사에서 해 나아갈 방향성을 잘 잡아주기 때문입니다.\\n\\n다각화된 평가 기준 크게 한 4가지로 나뉘어요. 임팩트, 전문성, 디렉션, 소프트 스킬.\\n\\n첫 번째 임팩트라고 얘기를 하면은 성과에 대한 규모를 이야기하는 거거든요. 정확히 말하면은 숫자로\\n판별할 수 있는 그런 성과의 크기에요. 예를 들면 메타에서는 이번에 효율성을 목표를 했거든요.\\n그렇다면 임팩트가 코스트 리덕션에 해당하는 부분이 될 수도 있어요.\\n\\n두 번째 전문성 평가. 직군에 따라서 전문점을 평가하는 건데 엔지니어들에게는 코딩을 얼마나 잘하는가\\n평가가 되고요, 마케터들한테는 얼마나 상품을 잘 설명하고 고객들을 이끌어냈는가, 프로덕트 매니저들은\\n얼마나 어려운 상품을 잘 상품화 했는가 전문성이 되겠죠.\\n\\n세 번째 방향성. 내가 어떤 프로젝트를 하나 끝내서 어떠한 성취를 냈다가 다가 아니라 이 프로젝트를\\n끝낸 다음에는 어떤 다음 프로젝트가 있는지 그 방향성을 잘 제시해주는 일을 말하는데, 얼마만큼의\\n큰 문제를 풀었고 그 문제를 어떻게 더 발전시켜서 더 큰 문제를 풀게 만드는가.\\n\\n네 번째 소프트 스킬. 커뮤니케이션, 협업, 멘토링.\"}]},{\"id\":\"billion-dollar-engineer-three-traits\",\"label\":\"billion-dollar-engineer-three-traits\",\"claim_ko\":\"연봉 20억 동료의 차이점은\\n객관성·번아웃 면역·전원 존경 세 가지입니다.\",\"claim_en\":\"My 2M-USD teammate's edge is three things —\\nobjectivity, burnout immunity, universal respect.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\",\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\",\"grit-not-genius\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-08\",\"body_ko\":\"연봉 20억 동료의 차이점은\\n객관성·번아웃 면역·전원 존경 세 가지입니다.\\n\\n같은 팀에 연봉 20억이 넘는 개발자가 있습니다. 심지어 저보다 어린 친구인데, 정말 모든 사람에게 리스펙을 받습니다. 6년 동안 같이 일하면서 느낀 그 친구의 다른 점입니다. **첫째**, **절대적으로 객관적입니다.** 일하면서 감정 없이 상황을 판단하고 처리하는 게 진짜 쉽지 않은데, 가장 어려운 순간에도 가장 정확하고 객관적인 판단을 합니다. **둘째**, **번아웃이 없습니다.** 실리콘밸리 메타에서 번아웃이 안 온 사람이 있다면 그건 거짓말입니다. 저도 6개월에 한 번씩은 옵니다. 이 친구는 가장 빡세게 일을 하면서도 거의 번아웃이 없습니다. 그만큼 **멘탈 관리에 철저합니다.** **셋째**, **누구에게나 평판이 좋습니다.** 아무리 일 잘하는 사람도 누구 한 명에게는 밉보이기 쉬운데, 이 친구는 그런 사람이 거의 한 명도 없습니다. 그만큼 모든 **행동과 말에 신중**합니다. 단 한 번도 잘난 척하지 않습니다.\",\"body_en\":\"My 2M-USD teammate's edge is three things —\\nobjectivity, burnout immunity, universal respect.\\n\\nOn my team there's an engineer earning 2M+ USD a year — younger than me, and the entire team respects him. Six years of working alongside him, three things stand out. **One**: **absolute objectivity.** Working without letting emotion drive the call is *hard.* He makes the most accurate, most detached judgment exactly when the situation is hardest. **Two**: **no burnout.** Anyone at Meta who claims they don't burn out is lying — I get one every six months. He works the hardest schedule on the team and almost never breaks. His mental hygiene is that disciplined. **Three**: **universal reputation.** Even the best people usually have at least one person at the office who finds them annoying. He has *no one.* Every word and action is deliberate. Not once does he show off.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DEjhHGFxVdv\",\"date\":\"2025-01-08\",\"original\":\"나는 같은팀에 연봉 20억이 넘는 개발자가 있어.\\n\\n심지어 나보다 어린 친구인데, 정말 모든 사람에게 리스펙을 받아.\\n\\n6년동안 같이 일하면서 느낀 그 친구가 다른 점은:\\n\\n1. 절대적으로 객관적이다. \\n- 일하면서 감정없이 상황을 판단하고 처리하는게 진짜 쉽지 않는데, 가장 어려운 순간에도 가장 정확하고 객관적인 판단을 해.\\n\\n2. 번아웃이 없다.\\n- 사실 실리콘밸리 메타에서 번아웃이 안 온 사람이 있다면 그건 거짓말이야. 나도 6개월에 한번씩은 오는데, 이 친구는 가장 빡세게 일을 하면서도 거의 번아웃이 없어. 그만큼 멘탈관리에 철저해.\\n\\n3. 누구에게나 평판이 좋다.\\n- 아무리 일 잘하는 사람도 누구 한명에게는 밉보이거나 맘에 안들기가 쉬운데, 이 친구는 그런 사람이 거의 한명도 없어. 그만큼 모든 행동과 말에 신중한 편이야. 단 한번을 잘난척 않고.\\n\\n그 친구가 궁금하면 더 이야기해볼게!\"}]},{\"id\":\"bottleneck-shifted-from-craft-to-taste\",\"label\":\"bottleneck-shifted-from-craft-to-taste\",\"claim_ko\":\"병목은 사라지지 않았습니다.\\n편집 기술에서 감각으로 옮겨갔습니다.\",\"claim_en\":\"The bottleneck didn't disappear. It moved from editing skill to taste.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"synthesized\",\"external_source\":null,\"path\":\"\",\"topics\":[\"creator-economy\",\"ai-native\",\"solo-builder\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-16\",\"body_ko\":\"병목은 사라지지 않았습니다.\\n편집 기술에서 감각으로 옮겨갔습니다.\\n\\n자연어로 컷을 설명하면 Claude Code가 트리밍 · 모션 그래픽 · 렌더까지 한 번에 처리합니다. 편집 소프트웨어 사용법이 더 이상 분리장벽이 아닙니다.\\n\\n새로운 분리장벽 — 무엇을 자를지 결정하는 감각입니다. 이 감각은 직함으로 분배되지 않습니다.\",\"body_en\":\"The bottleneck didn't disappear. It moved from editing skill to taste.\\n\\nDescribe the cut in natural language and Claude Code handles the trim, the motion graphics, and the render in one pass. Knowing the editing software is no longer the gate.\\n\\nThe new gate — the taste to decide what gets cut. That taste isn't distributed by job title.\",\"sources\":[]},{\"id\":\"brain-dream-cycle-enriches-overnight\",\"label\":\"brain-dream-cycle-enriches-overnight\",\"claim_ko\":\"잠자는 동안 에이전트가 브레인을 운영합니다.\\n'드림 사이클'이 모든 대화를 스캔하고, 누락된 엔터티를 보강하고, 깨진 인용을 고치고, 기억을 통합하므로 깰 때 브레인은 잠들 때보다 더 똑똑해져 있습니다.\",\"claim_en\":\"Run the agent on the brain while you sleep: a 'dream cycle' scans every conversation, enriches missing entities, fixes broken citations, and consolidates memory — so the brain is smarter at wakeup than at sleep.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Garry Tan\",\"author_handle\":\"@garrytan\",\"publication\":\"GitHub (gbrain README)\",\"url\":\"https://github.com/garrytan/gbrain\",\"published_at\":\"2026-01-01\"},\"path\":\"\",\"topics\":[\"memory-systems\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-01-01\",\"body_ko\":\"잠자는 동안 에이전트가 브레인을 운영합니다.\\n'드림 사이클'이 모든 대화를 스캔하고, 누락된 엔터티를 보강하고, 깨진 인용을 고치고, 기억을 통합하므로 깰 때 브레인은 잠들 때보다 더 똑똑해져 있습니다.\\n\\ngbrain을 데이터베이스가 아닌 브레인으로 만드는 운영 루프입니다. 메타포가 핵심입니다 — \\\"드림 사이클\\\"은 인간은 일관되게 하지 않지만 에이전트는 크론에서 저렴하게 할 수 있는 유지보수 작업 카테고리(보강, 인용 복구, 통합)에 이름을 붙입니다. 알렉스의 브레인은 현재 드림 사이클이 없습니다 — 향후 작업 포인터입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://github.com/garrytan/gbrain\",\"date\":\"2026-01-01\",\"original\":\"The agent runs while I sleep. The dream cycle scans every conversation, enriches missing entities, fixes broken citations, consolidates memory. I wake up and the brain is smarter than when I went to sleep.\"}]},{\"id\":\"brain-remembers-agent-works-human-decides\",\"label\":\"brain-remembers-agent-works-human-decides\",\"claim_ko\":\"AI 네이티브 분업은 셋입니다.\\n두뇌는 기억합니다. 에이전트는 일합니다.\\n사람은 — 무엇을 시킬지 결정합니다.\",\"claim_en\":\"AI-native work splits three ways.\\nBrain remembers. Agents work.\\nThe human decides what to set in motion.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"ai-tooling\",\"memory-systems\",\"solo-builder\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-16\",\"body_ko\":\"AI 네이티브 분업은 셋입니다.\\n두뇌는 기억합니다. 에이전트는 일합니다.\\n사람은 — 무엇을 시킬지 결정합니다.\\n\\n세 역할은 서로 자리를 바꾸지 않습니다. 두뇌(/memory)는 누적된 컨텍스트의 거처입니다 — 어제 한 결정, 작년 운영했던 강의의 카피, 어제 추가한 카르파시 트윗까지 한 곳에 모입니다. 에이전트는 그 두뇌를 읽어 — 실제 작업을 수행합니다. 코드를 쓰고, 브라우저를 작동시키고, 영상의 썸네일을 만들고, 디스코드로 보고를 올립니다. 사람의 자리는 — 그 사이가 아닙니다. 무엇을 시킬지를 결정하는 자리입니다. 무엇을 만들지, 어떤 순서로 갈지, 어디서 멈출지를 정합니다.\\n\\n이 분업이 자리잡으면 — 1인의 처리량이 팀의 처리량으로 바뀝니다. 한 사람이 동시에 다섯 개의 에이전트를 굴리고, 그 다섯 모두가 같은 두뇌를 참조합니다.\",\"body_en\":\"AI-native work splits three ways.\\nBrain remembers. Agents work.\\nThe human decides what to set in motion.\\n\\nThe three roles don't swap. The brain (/memory) is where accumulated context lives — yesterday's decisions, last year's lecture copy, the Karpathy tweet filed an hour ago, all in one place. Agents read that brain and do the actual work: write code, drive the browser, generate thumbnails, post status reports to Discord. The human's seat is not in the middle of either — it's the seat of *what to set in motion*. What to build, in what order, where to stop.\\n\\nOnce this division holds, one person's throughput starts looking like a team's. One human runs five agents at once, and all five reference the same brain.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"https://careerhackeralex.com/seminars/fastcampus-2026-05-16\",\"date\":\"2026-05-16\",\"original\":\"두뇌는 기억합니다.\\n에이전트는 일합니다.\\n\\n사람은 — 무엇을 시킬지 결정합니다.\\n나머지는 에이전트가 합니다.\"}]},{\"id\":\"brain-self-wires-via-typed-graph-edges-on-write\",\"label\":\"brain-self-wires-via-typed-graph-edges-on-write\",\"claim_ko\":\"확장 가능한 개인 브레인은 스스로 연결됩니다.\\n모든 페이지 쓰기가 엔터티 참조를 추출하고 타입화된 그래프 링크(attended, works_at, invested_in, founded, advises)를 LLM 호출 없이 생성하므로, 쓰기마다 추론 비용을 내지 않고 그래프가 확장됩니다.\",\"claim_en\":\"A scalable personal brain self-wires: every page write extracts entity references and creates typed graph links (attended, works_at, invested_in, founded, advises) with zero LLM calls per write — letting the graph scale without per-write inference cost.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Garry Tan\",\"author_handle\":\"@garrytan\",\"publication\":\"GitHub (gbrain README)\",\"url\":\"https://github.com/garrytan/gbrain\",\"published_at\":\"2026-01-01\"},\"path\":\"\",\"topics\":[\"memory-systems\",\"ai-coding\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-01-01\",\"body_ko\":\"확장 가능한 개인 브레인은 스스로 연결됩니다.\\n모든 페이지 쓰기가 엔터티 참조를 추출하고 타입화된 그래프 링크(attended, works_at, invested_in, founded, advises)를 LLM 호출 없이 생성하므로, 쓰기마다 추론 비용을 내지 않고 그래프가 확장됩니다.\\n\\ngbrain의 17,888페이지 코퍼스를 다룰 수 있게 만드는 아키텍처 주장입니다. 0-LLM 추출이 핵심 디테일입니다: 모든 쓰기가 그래프 변형이 되지만, 그래프 변형은 저렴합니다(정규식 + 엔터티 해석). LLM 호출은 비쌉니다. 알렉스의 `edges.jsonl`은 구조적으로 비슷하지만 현재는 LLM이 큐레이트합니다 — 자연스럽게 진화해 갈 방향입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://github.com/garrytan/gbrain\",\"date\":\"2026-01-01\",\"original\":\"The brain wires itself. Every page write extracts entity references and creates typed links (attended, works_at, invested_in, founded, advises) with zero LLM calls. Hybrid search. Self-wiring knowledge graph. Structured timeline. Backlink-boosted ranking.\"}]},{\"id\":\"brainstorming-dashboard-prevents-claude-code-misalignment\",\"label\":\"brainstorming-dashboard-prevents-claude-code-misalignment\",\"claim_ko\":\"Superpowers는 코드를 짜기 전에 로컬호스트 대시보드에 2-3개 시각 시안 — 레이아웃, 컬러, 마인드맵 — 을 띄워 사람이 방향을 고르게 합니다.\\n잘못된 방향에 토큰을 태우기 전에 정렬을 잡습니다.\",\"claim_en\":\"Before coding, Superpowers spins up a localhost dashboard with two or three visual mockup options (layouts, color schemes, mind-maps) so the human picks the direction — catching misalignment before tokens get burned on the wrong build.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/4XqVR6xI6Kw\",\"published_at\":\"2026-04-12\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"prompt-engineering\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-12\",\"body_ko\":\"Superpowers는 코드를 짜기 전에 로컬호스트 대시보드에 2-3개 시각 시안 — 레이아웃, 컬러, 마인드맵 — 을 띄워 사람이 방향을 고르게 합니다.\\n잘못된 방향에 토큰을 태우기 전에 정렬을 잡습니다.\\n\\n코드 전에 시각 옵션을 먼저 보여주는, 모든 크리에이티브 AI 작업에 옮길 수 있는 일반화 가능한 워크플로 형태입니다. 코드 생성 이전 단계로 반복 루프를 옮겨, 수정 비용이 한 자릿수 더 싸지는 지점에 정렬을 잡습니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/4XqVR6xI6Kw\",\"date\":\"2026-04-12\",\"original\":\"What brainstorming does and what superpowers does is it actually puts it into a dashboard for you to look at and says hey do you want option A, B or C? Like which one actually resonates with you the most?... This is where we would correct it. Before it burns all of those tokens, giving us something that we don't actually want.\"}]},{\"id\":\"builder-and-reviewer-are-the-two-roles\",\"label\":\"builder-and-reviewer-are-the-two-roles\",\"claim_ko\":\"앞으로 모든 직군은\\n빌더 아니면 리뷰어로 갈립니다.\",\"claim_en\":\"Every role splits into one of two kinds:\\nbuilder or reviewer.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-02-25\",\"body_ko\":\"앞으로 모든 직군은\\n빌더 아니면 리뷰어로 갈립니다.\\n\\n인공지능으로 뭐든 만들기 쉬워졌지만, 그래도 더 빠르고 더 잘 만들기는 여전히 어렵습니다. 앞으로는 100x 빌더들이 주도합니다. 그런데 빌더에게도 막히는 순간이 옵니다. 그때 필요한 게 **감** — 보이지 않는 것을 보는 능력입니다. 다 만들고 나서야 그다음이 보이는 사람들이 있습니다. 빌더와 리뷰어가 만났을 때 시너지가 폭발합니
