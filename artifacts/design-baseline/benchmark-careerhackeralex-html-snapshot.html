안, 저는 그간의 8년보다 더 큰 변화들을 맞이했습니다.\\nAI는 그저 지나가는 해프닝이 아닙니다. 산업 전체를 바꿀겁니다. 반드시.\\n\\n그래서 사실 본업만으로도 정신이 없고, 진심 이걸 지금 하는게 맞나 싶지만..\\n결국 \\\"AI 네이티브\\\" 라는 주제로 강의를 출고하게 되었습니다.\\n\\n지금 이 시기는 누군가에게는 위기가 되지만, 누군가에게는 기회가 되기도 합니다.\\n\\nAI 네이티브의 길은 멀고도 험하게 느껴집니다.\\n하지만 \\\"보고 따라만 한다면\\\" 누구나 충분히 될 수 있다고 진심으로 믿습니다.\\n\\n제대로 한번 \\\"커리어해킹\\\" 해봅시다.\"}]},{\"id\":\"deep-research-erases-entry-level-jobs\",\"label\":\"deep-research-erases-entry-level-jobs\",\"claim_ko\":\"Deep Research는\\n사회초년생의 일자리를 지웁니다.\",\"claim_en\":\"Deep Research erases\\nthe entry-level job.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-04\",\"body_ko\":\"Deep Research는\\n사회초년생의 일자리를 지웁니다.\\n\\nOpenAI의 Deep Research는 확실히 많은 사람들의 직업을 없앨 것입니다. 특히 갓 대학을 졸업한 사회초년생은 어쩌면 너무 당연하게도 ChatGPT보다 일을 못 할 가능성이 매우 높습니다. 개발자는 물론이고 연구원, 컨설턴트, 디자이너, 기자, 마케터 — 앞으로 신입이 설 자리는 없습니다. 지금 당장은 아니지만 내년이면 확실해집니다. 그렇다면 우리는 어떻게 살아남아야 합니까? AI 시대에 도태되지 않으려면 진짜 중요한 건 무엇입니까? 적어도 하나는 알 것 같습니다 — **사람에 대한 호감.**\",\"body_en\":\"Deep Research erases\\nthe entry-level job.\\n\\nOpenAI's Deep Research will eliminate a lot of jobs — and the segment hit hardest will be fresh graduates, who, almost by definition, are unlikely to outperform ChatGPT at their assigned tasks. Engineering, research, consulting, design, journalism, marketing — there are no seats left at the entry level. Not today, but unmistakably by next year. So what survives? At least one answer: **a person's likability.**\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFw18BoxQTm\",\"date\":\"2025-02-04\",\"original\":\"OpenAI의 Deep Research는 확실히 많은 사람들의 직업을 없앨 것 같다.\\n\\n특히나 이제 갓 대학을 졸업한 사회초년생들은,\\n어쩌면 너무나 당연하게도 ChatGPT보다 일을 못할 가능성이 매우 높다.\\n\\n개발자는 물론이고, 연구원, 컨설턴트, 디자이너, 기자, 마케터, 안타깝게도 앞으로 신입이 설 자리는 없다. 지금 당장은 아니여도 내년이면 확실해진다.\\n\\n앞으로 우리는 어떻게 살아남아야 할까?\\nAI 시대에서 도태되지 않으려면, 진짜 중요한 건 뭘까?\\n\\n적어도 하나는 알 것 같다: \\\"사람에 대한 호감\\\"\\n\\n내가 지금 쓰레드를 미친듯이 파는 이유다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"개발자의 고용이 급감하기 시작했습니다. 그리고 특히 신입 개발자들에 대한 고용이 많이 줄었는데요.\"}]},{\"id\":\"delegation-and-review-are-the-new-skills\",\"label\":\"delegation-and-review-are-the-new-skills\",\"claim_ko\":\"실무는 더 이상 중요하지 않습니다.\\n중요한 건 위임과 검증입니다.\",\"claim_en\":\"Hands-on execution no longer wins.\\nDelegation and review are the new skills.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-08-12\",\"body_ko\":\"실무는 더 이상 중요하지 않습니다.\\n중요한 건 위임과 검증입니다.\\n\\n감히 예측합니다. 앞으로 \\\"실무\\\"는 중요하지 않습니다. \\\"할 줄 아는지\\\"가 아니라 \\\"얼마나, 어떻게\\\" 해냈는지가 중요합니다. 어차피 인공지능이 왠만한 실무는 다 처리합니다. 오늘날 실리콘밸리에서 가장 중요한 개인의 실력은 **위임(delegation)과 검증(review)** 능력입니다. 리소스를 얼마나 효율적으로 관리하고, 얼만큼의 검증된 아웃풋을 내는지가 관건입니다. 경쟁은 점점 더 치열해집니다.\",\"body_en\":\"Hands-on execution no longer wins.\\nDelegation and review are the new skills.\\n\\nI'll go ahead and predict it: hands-on execution stops mattering. *\\\"Can you do it\\\"* no longer separates anyone. *\\\"How much, in what shape, did you deliver\\\"* is the new question. AI will handle most of the doing. The skills that matter in Silicon Valley right now are **delegation** and **review** — how efficiently you allocate the resources you have, and how rigorously you validate the output that comes back. The bar is about to rise, fast.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DNKhvAeOlgO\",\"date\":\"2025-08-12\",\"original\":\"감히 예측해보자면 앞으로 \\\"실무\\\"는 중요하지 않다.\\n\\\"할 줄 아는지\\\" 는 중요하지 않고, \\\"얼만큼, 어떻게\\\" 해냈는지가 중요하다.\\n\\n어차피 인공지능이 왠만한 실무는 다 처리할테니까.\\n\\n오늘날 실리콘밸리에서 가장 중요한 개인의 실력은 \\\"delegation\\\" 과 \\\"review\\\" 능력이다.\\n리소스를 얼마나 효율적으로 관리하고, 얼만큼의 검증된 아웃풋 내는지가 관건이다.\\n\\n앞으로는 더욱 더 치열한 경쟁이 시작될 것이다.\"}]},{\"id\":\"design-system-as-reusable-design-md-artifact\",\"label\":\"design-system-as-reusable-design-md-artifact\",\"claim_ko\":\"Claude Design에서 디자인 시스템(색·로고·타이포·버튼)을 한 번만 만들고, 결과물 design.md를 모든 다음 프로젝트와 Claude Code 레포에서 재사용합니다.\",\"claim_en\":\"Build the design system in Claude Design once — colors, logo, typography, buttons — then export the resulting design.md and reuse it across every future Claude Design project and Claude Code repo.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"published_at\":\"2026-04-29\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"productivity\",\"solo-builder\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-29\",\"body_ko\":\"Claude Design에서 디자인 시스템(색·로고·타이포·버튼)을 한 번만 만들고, 결과물 design.md를 모든 다음 프로젝트와 Claude Code 레포에서 재사용합니다.\\n\\n휴대 가능한 design.md가 전체 강의의 핵심 산출물입니다 — 한 번 만든 브랜드를 모든 표면에서 누적 사용하게 해 주는 그것입니다. \\\"내구성 있는 마크다운 산출물을 세션 간에 재사용한다\\\"는 패턴은 CLAUDE.md의 디자인 대응물입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"date\":\"2026-04-29\",\"original\":\"we kind of started to build our brand, right?... And now we essentially have a design system. We have a design.md that we could export anywhere and a design.md that we can use for any of our future projects... that design system took about 6% of my session limit already... be selective about what you give your Claude Design.\"}]},{\"id\":\"discord-as-agent-control-plane\",\"label\":\"discord-as-agent-control-plane\",\"claim_ko\":\"한 사람이 회사가 되려면\\n디스코드가 새로운 조작판이 됩니다.\",\"claim_en\":\"For one person to be a company,\\nDiscord becomes the control plane for agents.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"ai-tooling\",\"solo-builder\"],\"theses\":[\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-04-05\",\"body_ko\":\"한 사람이 회사가 되려면\\n디스코드가 새로운 조작판이 됩니다.\\n\\n저는 메타 풀타임, 유튜브 채널, 강의 제작, 사업 런칭, 그리고 신생아 한 명을 동시에 굴리고 있습니다. 잠을 안 자는 것도 아닙니다. 비결은 디스코드입니다. **디스코드의 각 채널이 AI 에이전트 한 명**이고, 저는 핸드폰으로 그들에게 메시지를 보냅니다 — 카카오톡으로 부하 직원을 부리듯이.\\n\\n아침에 일어나면 **렉스**라는 에이전트가 그날 할 일 다이제스트를 보냅니다. 유튜브 채널 성과 분석, 사이드 프로젝트 진행 현황, 강의 빌드 80시간차 업데이트. 다른 채널들은 각자 역할이 있습니다 — **유튜브 에이전트**는 트렌드 분석, **오토클릭**은 썸네일 서비스 개발, **크리에이티브 디렉터**는 사진·영상 제작, **리서치 에이전트**는 데이터 정리.\\n\\n핵심은 **위임**입니다. 저는 코드를 한 줄도 안 씁니다. 결과물만 보고 피드백을 줍니다 — \\\"이 톤은 너무 강한 것 같아\\\", \\\"기능 하나 더 만들어 줄래?\\\" 자고 있을 때도 스케줄러로 일을 시켜 두기 때문에, 깨어났을 때 결과가 와 있습니다.\\n\\n이 워크플로우의 백본은 **OpenCloud**라는 멀티-에이전트 오케스트레이션 프레임워크입니다. 도구가 꼭 디스코드일 필요는 없습니다 — 누구나 자기에게 맞는 채팅 인터페이스를 고를 수 있습니다. 핵심은 **AI 에이전트 여러 명을 일상 도구 안에서 부리는 구조**입니다. 그 구조가 잡히면 1인이 회사가 됩니다.\",\"body_en\":\"$14\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=QzRcYt1Gy_Y\",\"date\":\"2026-04-05\",\"original\":\"이 모든 걸 핸드폰으로 하면 핸드폰으로 거의 대부분의 일을 처리하고 있습니다. 핸드폰으로\\n디스코드의 채널에 메시지를 보내면 컴퓨터가 인공지능을 통해서 일을 하고 있는 거죠.\\n\\n디스코드는 카카오톡 같은 거고요. 그리고 여기 왼쪽에 있는 채널들은 카카오톡 방 같은 거예요.\\n근데 이 방들에 있는 모든 것들이 사실 인공지능 서브 에이전트입니다. 저는 아침에 일어나서\\n일단 이 렉스라는 친구한테 물어봐요. 오늘 내가 할 일들은 도대체 어떤 것들이 있을까?\\n이 인공지능은 저의 뭐랄까 비서 느낌으로 일을 하고 있습니다.\\n\\n여러 가지 봇들을 하고 있거든요. 유튜브 당연히 하고 있고요. 오토클릭이라는 사이드 프로젝트\\n만들고 있고요. 온라인 강의 만들고 있고 항상 저는 이 미디어 어 사진이나 영상이 필요하기\\n때문에 그러한 것들을 도와주는 크리에이티브 디렉터도 있고요. 리서치도 시키고.\\n이 모든 것들을 저는 인공지능 파트너들이랑 일을 같이 하고 있습니다. 이거를 멀티 에이전트\\n오케스트레이션이라고 하죠. 이거를 백킹해 주는 프레임웍은 오픈클러라는 거를 쓰고 있어요.\\n\\n저는 요즘에 서비스 만들 때 코딩을 당연히 단 한 줄도 쓰고 있지 않습니다. 단 한 줄도\\n쓰고 있지 않고 모든 것들을 이 에이전트를 통해서 만들고 있는데... 실제로 이 에이전트를 통해서\\n모든 개발을 외주를 주고 있습니다. 델리게이트라고 하는데 모든 개발을 총 책임하고 있고\\n테스트를 하고 있고 저는 확인만 해요.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"Dispatch — 내 핸드폰으로 내 컴퓨터를 조작시킬 수가 있거든요. 출장 간 와중에도 내 집에 있는 컴퓨터를 사용할 수 있게끔. 핸드폰으로 메시지를 보냈을 때 그 메시지가 Anthropic 서버에 Queue가 돼서 연결된 컴퓨터로 임무를 열 수 있는.\"}]},{\"id\":\"dont-craft-prompts-let-ai-write-them\",\"label\":\"dont-craft-prompts-let-ai-write-them\",\"claim_ko\":\"잘 만든 프롬프트는 직접 쓰지 않습니다.\\nAI에게 '프롬프트부터 만들어줘'라고 부탁하면\\n더 좋은 프롬프트가 돌아옵니다.\",\"claim_en\":\"The best prompts aren't hand-crafted.\\nAsk the AI to write the prompt first —\\nand the prompt it returns is usually better than yours.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"prompting\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"잘 만든 프롬프트는 직접 쓰지 않습니다.\\nAI에게 \\\"프롬프트부터 만들어줘\\\"라고 부탁하면\\n더 좋은 프롬프트가 돌아옵니다.\\n\\n원하는 결과를 한국어로 자연스럽게 설명하고, AI에게 \\\"이걸 원하는 프롬프트로 만들어줘\\\"라고 부탁합니다. 그러면 사람이 머리를 쥐어짜서 만든 정형화된 프롬프트보다 — XML 태그, 페르소나 헤더, 출력 포맷 명시까지 갖춘 — 훨씬 더 좋은 프롬프트가 돌아옵니다. 프롬프트를 짜는 노동이 사라지는 게 아니라, 그 노동도 AI에게 맡기는 단계로 넘어간 것입니다.\",\"body_en\":\"The best prompts aren't hand-crafted. Ask the AI to write the prompt first — and the prompt it returns is usually better than yours.\\n\\nDescribe the outcome you want in plain language, then ask the model to write the prompt that would produce that outcome. What comes back — with XML tags, persona headers, output schemas, the works — is almost always better than what a human would have hand-crafted. The labor of prompt-writing didn't disappear. It shifted to the AI itself.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"Prompt는 저는 무조건 말로 하라고 하는 거를 추천드리는 이유가 Prompt를 우리가 만들 일은 거의 많이 없다고 생각해요.\\n이제는 웬만하면 ChatGPT한테 물어보면 걔가 알아서 Prompt를 작성해 주기 때문에 그냥 우리는 편한 대로 필요한 것을 얘기를 하면 된다고 생각을 하거든요.\\n오히려 그게 더 좋은 Prompt가 될 수 있다고 생각을 해요.\"}]},{\"id\":\"engineer-levels-build-different-castles\",\"label\":\"engineer-levels-build-different-castles\",\"claim_ko\":\"엔지니어 레벨은\\n다른 크기의 성을 짓는 사람들입니다.\",\"claim_en\":\"Each engineer level\\nbuilds a different scale of castle.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\",\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-16\",\"body_ko\":\"엔지니어 레벨은\\n다른 크기의 성을 짓는 사람들입니다.\\n\\n실리콘밸리 엔지니어가 성(🏰)을 짓는다고 가정하면, 레벨마다 역할이 이렇게 달라집니다. **E3 (신입)** — 벽돌 하나하나를 열심히 쌓으며 '이게 맞는가?' 고민 중입니다. **E4 (중급)** — 바닥부터 설계하며 '무너지지 않으려면 어떻게 해야 하는가?' 고민한 후 일단 합니다. **E5 (시니어)** — 벽돌뿐 아니라 방 위치, 성문 설계, 방어 전략까지 고민하며 성의 각 부분 구조를 만듭니다. **E6 (스태프)** — \\\"이 성만 생각하면 안 된다. 주변 마을과 도로 연결도 필요하다\\\"라고 보고, 인프라를 확장해 마을 설계도를 그립니다. **E7 (시니어 스태프)** — \\\"미래를 위한 성은 어떤 모습인가?\\\"를 묻고, 성의 주거 개념 자체를 바꾸어 확장 가능한 **스마트 캐슬**을 구상합니다. **E8 (Director)** — \\\"공중부양하는 하늘 성을 지어 볼까?\\\"입니다.\",\"body_en\":\"Each engineer level\\nbuilds a different scale of castle.\\n\\nIf Silicon Valley engineers built castles, the role would shift by level. **E3 (new grad)** — stacks each brick, wondering if any of them are in the right place. **E4 (mid)** — designs from the foundation up, asking *what keeps this from collapsing,* and then just builds. **E5 (senior)** — thinks about brick + room layout + gate design + defense, structuring each section of the castle. **E6 (staff)** — \\\"I can't only think about this castle — the surrounding town and roads matter too,\\\" and expands the infrastructure into a town blueprint. **E7 (senior staff)** — asks *what's the castle of the future?* and rethinks the unit of habitation entirely, designing scalable systems: the **smart castle.** **E8 (Director)** — \\\"what if we built a floating castle in the sky?\\\"\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DE3mZuHv6-L\",\"date\":\"2025-01-16\",\"original\":\"만약 실리콘밸리 엔지니어들이 성(🏰)을 짓는다면?\\n\\n레벨마다 맡는 역할이 이렇게 달라질거야:\\n\\n3️⃣ E3 (신입):\\n벽돌 하나하나를 열심히 쌓으며 '이게 맞는 건가?' 고민 중.\\n\\n4️⃣ E4 (중급):\\n바닥부터 설계하며 '이게 무너지지 않으려면 어떻게 해야 하지?' 고민 후 일단 한다.\\n\\n5️⃣ E5 (시니어):\\n벽돌뿐 아니라 방 위치, 성문 설계, 방어 전략까지 고민하며 성의 각 부분 구조를 만든다.\\n\\n6️⃣ E6 (스태프):\\n'이 성만 생각하면 안 돼. 주변 마을과 도로 연결도 필요해.' 인프라를 확장해 마을 설계도를 그려본다.\\n\\n7️⃣ E7 (시니어 스태프):\\n'미래를 위한 성은 어떤 모습일까?' 성의 주거 개념 자체를 바꾸고, 확장 가능한 시스템을 구상한다: \\\"스마트  캐슬\\\"\\n\\n8️⃣ E8 (Director):\\n'공중부양하는 하늘 성을 지어볼까?'\\n\\n스친이들이라면 어떤 일이 가장 재밌을것 같아?\"}]},{\"id\":\"execution-is-now-the-real-job\",\"label\":\"execution-is-now-the-real-job\",\"claim_ko\":\"AI 시대의 진짜 차이는\\n누가 먼저 실행하느냐입니다.\",\"claim_en\":\"In the AI era the real edge\\nbelongs to whoever moves first.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"solo-builder\"],\"theses\":[\"move-first-or-lose-the-game\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-05-15\",\"body_ko\":\"AI 시대의 진짜 차이는\\n누가 먼저 실행하느냐입니다.\\n\\nAI 시대에는 다들 똑같이 잘 만든다고들 합니다. 그러나 진짜 차이는 거기에 있지 않습니다. **누가 먼저 실행하느냐**입니다. 개발자든, 디자이너든, 기획자든, 이제는 직군보다 실행력이 중요합니다. 일단 만들고, 테스트하고, 피드백을 받고, 남들보다 먼저 부딪히는 사람이 이깁니다. 망설일 시간이 없습니다. 이미 늦었을 수도 있고 — 혹은, 당신이 가장 처음일 수도 있습니다.\",\"body_en\":\"In the AI era the real edge\\nbelongs to whoever moves first.\\n\\nPeople say everyone in the AI era will be equally capable. They're wrong about the variable. *Who moves first* is what splits the field. Engineer, designer, PM — the title matters less than execution. Build it, test it, take the feedback, take the hit before others do. The hesitating window has closed. You may already be late. Or — you may be the first one through the door.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DK6J6lQugBa\",\"date\":\"2025-05-15\",\"original\":\"AI 시대에 다들 똑같이 잘 만든다고?\\n진짜 차이는 '누가 먼저 실행하느냐'야.\\n개발자든 디자이너든 기획자든,\\n이젠 직군보다 중요한 건 무조건 \\\"실행력\\\"이라고 봐.\\n일단 만들고, 테스트하고, 피드백 받고\\n남들보다 먼저 부딪히는 사람이 이긴다.\\n망설이지 마. 이미 늦었을 수도 있어.\\n혹은, 네가 가장 처음일 수도 있어.\"}]},{\"id\":\"execution-needs-politics-voice-ownership\",\"label\":\"execution-needs-politics-voice-ownership\",\"claim_ko\":\"실력은 최소 조건일 뿐이고\\n정치·목소리·책임이 그 위를 만듭니다.\",\"claim_en\":\"Skill is the floor.\\nPolitics, voice, and ownership are what build above it.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"meta-life\",\"leadership\"],\"theses\":[\"bigtech-comp-is-a-system\",\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-12\",\"body_ko\":\"실력은 최소 조건일 뿐이고\\n정치·목소리·책임이 그 위를 만듭니다.\\n\\n실리콘밸리에서 배운 가장 중요한 커리어 원칙 하나입니다. **\\\"실력은 최소한의 조건일 뿐입니다.\\\"** 메타에서 연봉 10억을 넘는 사람들을 보면 코딩을 잘하는 것은 기본입니다. 그들을 진짜 성공하게 만든 건 다른 세 가지입니다. **첫째**, 보이지 않는 정치력을 이해합니다. 실리콘밸리에서는 정치가 능력보다 중요한 순간이 많습니다. **누구와 어떻게 일하느냐**가 결국 성과를 만듭니다. **둘째**, 목소리를 냅니다. 한국식으로 묵묵히 일만 하면 그냥 묻힙니다. 중요한 순간에 적극적으로 의견을 내야 합니다. 욕먹을 각오도 해야 빛을 봅니다. **셋째**, 결정적인 순간에 책임을 집니다. 리더가 되는 사람들은 문제를 피하지 않습니다. **가장 어려운 순간에 책임지고 해결하는 사람이 리더가 됩니다.** 결국 단순히 '일 잘하는 사람'이 아니라 **'함께 일하고 싶은 사람'**이 되는 게 더 중요합니다.\",\"body_en\":\"Skill is the floor.\\nPolitics, voice, and ownership are what build above it.\\n\\nThe most important career principle Silicon Valley taught me. **Skill is the floor, not the ceiling.** Among the billion-won engineers at Meta, coding well is table stakes. What separates them is three layered things on top. **One**: they read the invisible politics. In Silicon Valley politics often beats raw competence — *who you work with and how* is what manufactures the result. **Two**: they speak up. The Korean default of working silently gets you buried. You speak in the moments that matter, and you accept being disliked as the price of being seen. **Three**: they own the hard moment. People who become leaders don't dodge problems. **Whoever takes responsibility at the worst moment becomes the leader.** The takeaway: don't aim to be the *most competent* person on the team. Aim to be the *most wanted-on-the-team*.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DF9LRgIRnwt\",\"date\":\"2025-02-12\",\"original\":\"내가 실리콘밸리에서 배운 가장 중요한 커리어 원칙 하나.\\n\\n\\\"실력은 최소한의 조건일 뿐이다.\\\"\\n\\n메타에서 연봉 10억 넘는 사람들을 보면, 코딩을 잘하는 건 기본이야.\\n그들을 진짜 성공하게 만든 건 다른 능력이야.\\n\\n1. \\\"보이지 않는 정치력을 이해한다.\\\"\\n- 실리콘밸리에선 '정치'가 능력보다 중요한 순간이 많아. 누구와 어떻게 일하느냐가 결국 성과를 만든다.\\n\\n2. \\\"목소리를 내야 한다.\\\"\\n- 한국식으로 묵묵히 일만 하면? 그냥 묻힌다. 중요한 순간엔 적극적으로 의견을 내야 한다. 욕먹을 각오도 해야 빛을 본다.\\n\\n3. \\\"결정적인 순간에 책임을 진다.\\\"\\n- 리더가 되는 사람들은 결국 문제를 피하지 않아. 가장 어려운 순간에 책임지고 해결하는 사람이 리더가 된다.\\n\\n결국, 단순히 '일 잘하는 사람'이 아니라, '함께 일하고 싶은 사람'이 되는 게 더 중요하다.\\n\\n당신은 이 원칙을 지키고 있는가?\"}]},{\"id\":\"fastcampus-2026-05-16-ai-native-seminar\",\"label\":\"fastcampus-2026-05-16-ai-native-seminar\",\"claim_ko\":\"알렉스는 2026-05-16 패스트캠퍼스 무료 세미나 「AI 네이티브로 일하기」를 진행했습니다.\\n비개발자 대상 90분, 네 가지 라이브 데모로 구성되었습니다.\",\"claim_en\":\"Alex ran the Fast Campus open seminar 'Working AI-native' on 2026-05-16.\\nA 90-minute session for non-developer professionals, structured around four live demos.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\",\"pillar-framework\",\"solo-is-the-new-team-size\",\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-16\",\"body_ko\":\"알렉스는 2026-05-16 패스트캠퍼스 무료 세미나 「AI 네이티브로 일하기」를 진행했습니다.\\n비개발자 대상 90분, 네 가지 라이브 데모로 구성되었습니다.\\n\\n세미나는 21장의 슬라이드 덱(`src/content/seminars/fastcampus-2026-05-16/deck.json`)으로 운영되었습니다. 구조는 셋입니다 — PART 1(10분)에서 실리콘밸리의 현재 흐름을 깔고, PART 2(40분)에서 Claude Code 활용을 네 가지 라이브 데모로 보여드렸으며, PART 3에서 4단계 학습 경로(믿음·목격·활용·행동)와 AI 네이티브 강의 할인쿠폰으로 마무리했습니다.\\n\\n네 가지 데모:\\n1. Second Brain — `/memory` 라이브 탐색, 카르파시 트윗을 `/brain-add` 슬래시 커맨드로 두뇌에 실시간 추가.\\n2. 에이전트 활용 — OpenClaw 허브 + 다수 Claude Code 터미널 병렬 실행으로 동시 작업.\\n3. Claude × Higgsfield — 브라우저 자동화로 Claude가 Higgsfield 사이트를 직접 운전하여 이미지 생성, design.md 적용 시연.\\n4. AutoKliq — 코드 한 줄도 직접 짜지 않고 출시한 상용 제품(`autokliq.com`) 시연.\\n\\n이 세미나는 — 패스트캠퍼스 트래픽에 대한 \\\"AI 네이티브\\\" 강의 깔때기 진입점이자, 비개발자 직장인 대상의 첫 90분짜리 공개 라이브 데모 표준입니다. 향후 다른 무료 세미나(다른 플랫폼, 다른 일자)의 베이스 덱이 됩니다.\",\"body_en\":\"$15\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"https://careerhackeralex.com/seminars/fastcampus-2026-05-16\",\"date\":\"2026-05-16\",\"original\":\"FAST CAMPUS · 무료 세미나 · 2026-05-16\\nAI 네이티브로 일하기 — 비개발자를 위한 90분\\n\\nPART 1 · 10분 — 실리콘밸리는 어디까지 와 있는가\\nPART 2 · 40분 — 클로드 코드 실전 활용 (4 라이브 데모)\\n  DEMO 1 · Second Brain (/memory · brain-add karpathy tweet)\\n  DEMO 2 · 에이전트 (OpenClaw + 다수 Claude Code 병렬)\\n  DEMO 3 · Claude × Higgsfield (브라우저 자동화 + design.md)\\n  DEMO 4 · AutoKliq (코드 한 줄 안 쓰고 상용 제품 출시)\\nPART 3 · 클로징 — 믿음·목격·활용·행동 + AI 네이티브 강의 할인쿠폰\\n\\n마지막 한 줄:\\n\\\"지금이 — 가장 중요한 시기입니다.\\n여러분의 다음 90일이 — 다음 10년을 결정합니다.\\\"\"}]},{\"id\":\"feedback-not-help\",\"label\":\"feedback-not-help\",\"claim_ko\":\"남을 도와주지 말고\\n피드백을 주십시오.\",\"claim_en\":\"Stop helping.\\nGive feedback instead.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-12\",\"body_ko\":\"남을 도와주지 말고\\n피드백을 주십시오.\\n\\n요즘 메타 디렉터들에게 가장 많이 듣는 피드백은 \\\"남들 좀 그만 도와줘라\\\" 입니다. 처음엔 이해가 가지 않았습니다. 팀을 위해 도와주는 건데 왜 멈추라는 걸까? 이유는 명확했습니다. 첫째, 실리콘밸리에서의 30분은 엄청난 가치가 있습니다. 가볍게 쓸 시간이 아닙니다. 둘째, 모두를 구할 수는 없습니다. 에너지는 한정적이고, 정말 필요한 곳에 써야 합니다. 셋째, 내가 다 해버리면 상대는 성장할 기회를 빼앗깁니다. 어려움을 겪어야 성장합니다. 넷째, **\\\"돕지 말고, 피드백을 주라.\\\"** 직접 해결해주는 대신, 스스로 해결할 수 있도록 가이드해야 합니다. 남을 돕는 일이 때로는 팀에게도, 본인에게도 해가 됩니다. 리더가 되려면 불편함과도 마주할 수 있어야 합니다.\",\"body_en\":\"Stop helping.\\nGive feedback instead.\\n\\nThe most frequent piece of feedback I get from Meta directors right now: *\\\"Stop helping people so much.\\\"* It didn't make sense at first — I thought I was being team-spirited. The reasoning is clean. **One**: thirty minutes in Silicon Valley costs more than you think; don't spend it casually. **Two**: you can't save everyone. Your energy is finite; spend it where it actually matters, even when that feels uncomfortable. **Three**: when you do the work for them, you take their growth opportunity with you. Difficulty *is* the mechanism. **Four**: don't help — give feedback. Coach them to solve it; don't solve it. Helping people can harm them. Becoming a leader means being willing to sit with that discomfort.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHHkR8tSVPO\",\"date\":\"2025-03-12\",\"original\":\"요즘 메타 디렉터들에게 가장 많이 듣는 피드백: \\\"남들 좀 그만 도와줘라.\\\"\\n\\n처음엔 이해가 안 갔다.\\n나는 팀을 위해 돕는다고 생각했는데, 왜 멈추라는 걸까?\\n\\n그 이유는 명확했다.\\n\\n1. 내 시간을 효율적으로 써야 한다.\\n - 실리콘밸리에서의 30분은 엄청난 가치가 있다. 30분을 가볍게 여기면 안된다.\\n\\n2. 모두를 구할 수는 없다.\\n - 내 에너지는 한정적이고, 정말 필요한 곳에 써야 한다. 마음이 불편해도 어쩔수없다.\\n\\n3. 내가 다 해버리면, 상대는 성장할 수 없다.\\n - 어려움을 겪어야 성장하는데, 내가 해결해주면 그 기회를 빼앗는 셈이다.\\n\\n4. \\\"돕지 말고\\\", \\\"피드백\\\"을 줘라.\\n - 직접 해결하는 대신, 스스로 해결할 수 있도록 가이드해야 한다.\\n\\n남을 도우는일이, 우리팀과 그 당사자들에게 때로는 해가 될 수도 있다.\\n\\n리더가 되기 위해서는길은 불편함과도 마주할 수 있어야 한다.\"}]},{\"id\":\"garry-tan-ships-810x-his-2013-pace\",\"label\":\"garry-tan-ships-810x-his-2013-pace\",\"claim_ko\":\"Garry Tan의 2026년 논리적 코드 변경 속도는 2013년 페이스의 약 810배입니다 (하루 11,417 vs 14 논리적 라인, AI로 부풀려진 원시 LOC 보정).\\n40개 개인 저장소에서 측정 — AI 생산성 향상이 부풀림 보정 후에도 살아남는다는 구체적 증거입니다.\",\"claim_en\":\"Garry Tan's 2026 logical-code-change run rate is approximately 810× his 2013 pace (11,417 vs 14 logical lines/day, normalized for AI-inflated raw LOC), measured across 40 personal repos — concrete evidence that AI productivity gains survive even after deflating for inflation.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Garry Tan\",\"author_handle\":\"@garrytan\",\"publication\":\"GitHub (gstack README)\",\"url\":\"https://github.com/garrytan/gstack\",\"published_at\":\"2026-01-01\"},\"path\":\"\",\"topics\":[\"ai-native\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-18\",\"body_ko\":\"Garry Tan의 2026년 논리적 코드 변경 속도는 2013년 페이스의 약 810배입니다 (하루 11,417 vs 14 논리적 라인, AI로 부풀려진 원시 LOC 보정).\\n40개 개인 저장소에서 측정 — AI 생산성 향상이 부풀림 보정 후에도 살아남는다는 구체적 증거입니다.\\n\\n\\\"AI 생산성이 진짜다\\\" 주장의 증거 앵커입니다. 방법론적 가드레일이 핵심 디테일입니다: AI가 부풀리는 원시 LOC가 아니라 논리적 라인을 셌습니다. Y Combinator CEO가 계산, 저장소 목록, 재현 스크립트를 공개적으로 게시했습니다 — 회의론자들이 요구해온 종류의 영수증입니다. 4월 중순까지의 YTD: 2013년 전체의 240배.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://github.com/garrytan/gstack\",\"date\":\"2026-04-18\",\"original\":\"I'm shipping more products than I ever have. In the last 60 days: 3 production services, 40+ shipped features, part-time, while running YC full-time. On logical code change — not raw LOC, which AI inflates — my 2026 run rate is ~810× my 2013 pace (11,417 vs 14 logical lines/day). Year-to-date (through April 18), 2026 has already produced 240× the entire 2013 year.\"}]},{\"id\":\"goals-shift-with-your-current-ideal\",\"label\":\"goals-shift-with-your-current-ideal\",\"claim_ko\":\"목표는 계속 바뀝니다.\\n지금 추구하는 이상이 곧 목표입니다.\",\"claim_en\":\"Goals keep shifting.\\nThe ideal you're chasing now is the real goal.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"learning\"],\"theses\":[\"grit-not-genius\"],\"confidentiality\":\"public\",\"surfaces\":[\"garden\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2020-03-01\",\"body_ko\":\"목표는 계속 바뀝니다.\\n지금 추구하는 이상이 곧 목표입니다.\\n\\n처음에는 투자은행이었고, 그 다음은 카페 사장이었고, 그 다음은 데이터 사이언티스트였고, 그 다음은 소프트웨어 엔지니어였습니다. 군 복무 중 어느 밤, 종이 한 장에 좋아하는 것들을 의식의 흐름대로 적어 내려갔습니다 — 커피, 분위기, 사람, 웃음, 행복, 음악, 수학, 컴퓨터. 거기에서 그때의 이상이 나왔고, 거기에 맞춰 목표가 바뀌었습니다. **목표라는 건 계속 바뀝니다.** 지금 추구하는 이상이 바로 그 목표입니다. 목표를 세우며 이뤄 내다 보면 결국 원하던 삶을 살고 있을 것입니다. 한 번의 목표 선택으로 인생이 결정되지 않습니다. **이상이 바뀌면 목표가 바뀌고, 목표가 바뀌면 삶이 따라옵니다.**\",\"body_en\":\"Goals keep shifting.\\nThe ideal you're chasing now is the real goal.\\n\\nFirst it was investment banking. Then it was opening a café. Then data science. Then software engineering. One night during army service, I sat in the base library with a piece of paper and wrote down everything I loved — coffee, atmosphere, people, laughter, happiness, music, math, computers. The ideal that emerged from that page became the goal. **Goals keep shifting.** Whatever ideal you're chasing *right now* is the goal. Pursue it, hit it, and you'll find yourself living the life you wanted. **A single goal doesn't define a life.** The ideal moves; the goal moves with it; the life follows.\",\"sources\":[{\"platform\":\"medium\",\"url\":\"https://medium.com/@alexsanghyeonahn/목표전환-2ad6a8463fdd\",\"date\":\"2020-03-01\",\"original\":\"내가 개발자가 되어야겠다고 생각했던 가장 큰 이유는 대학 졸업 후 미국에 남아 취업을 하기 위해서였다... 나는 수학을 전공으로 대학을 입학했다... 첫 한 학년을 마치고 군대에 입대하는 순간까지도 나는 무조건 투자은행 (Investment Banking) 에 취업을 해서 일을 해야겠다는 생각을 가지고 있었다.\\n\\n대학교 입학 후 처음으로 그 생각이 바뀌었던 순간은 군 복무 시절이었다... 어느날 하루는 밤에 종이 몇장과 펜 하나만을 들고 군 내 독서실에 들어가 내가 좋아하는 모든 것을들 의식에 흐름에 따라 종이에 써내려 갔다.\\n\\n\\\"커피, 칵테일, 와인, 분위기, 조명, 자연, 풀 냄새, 향기, 햇빛, 따듯함, 온기, 사람, 웃음, 친절, 행복, 사랑, 대화, 공감, 감정, 재즈, 공연, 콘서트, 음악, 질서, 수학, 체계, 컴퓨터, 인터넷…\\\"\\n\\n… 그래서 지금 나의 목표는 무엇일까? 분명한건 나는 내가 좋아하는 일을 계속 할 것이라는 점이다... 결국은 우리 모두가 행복해지자고 하는것이 바로 일 아닌가?\\n\\n아무래도 목표라는 건, 계속 바뀐다.\\n지금 내가 추구하는 이상이 바로 그 목표다.\\n목표를 세우며 이뤄내다보면 결국 내가 원하던 삶을 살고 있겠지.\"}]},{\"id\":\"good-meeting-yields-prompt\",\"label\":\"good-meeting-yields-prompt\",\"claim_ko\":\"이제 좋은 미팅은\\n좋은 프롬프트를 남깁니다.\",\"claim_en\":\"A good meeting now leaves behind\\na good prompt.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-03-06\",\"body_ko\":\"이제 좋은 미팅은\\n좋은 프롬프트를 남깁니다.\\n\\n몇 달 전까지만 해도 회사 미팅을 싫어했습니다. 너무 많은 설명이 필요했고, 너무 많은 사람을 설득해야 했고, 미팅은 다른 미팅을 낳았습니다. 그런데 어느 순간부터 미팅이 기대되기 시작했습니다. 이유는 단순합니다. 좋은 미팅 한 번에서 좋은 프롬프트 하나가 나오기 때문입니다. AI 미팅 노트를 항상 켜 두면 대화는 자동으로 프롬프트의 원료가 됩니다. 어제도 누군가와 짧게 아이디어 대화를 했고, 미팅이 끝나고 30분 만에 코드가 나왔고, 1시간 안에 ship 했습니다. 이게 앞으로의 미팅 구성입니다. operational한 미팅은 대부분 AI가 대체하고, 아이디어가 프롬프트로 바뀌는 미팅만 남습니다. 미팅이 일을 만드는 게 아니라, 미팅이 일을 트리거합니다.\",\"body_en\":\"A good meeting now leaves behind\\na good prompt.\\n\\nA few months ago I hated company meetings. Too much explanation, too many people to convince, and meetings reliably produced more meetings. Recently I started looking forward to them — and the reason was concrete. One good meeting now produces one good prompt. With an AI note-taker always on, the conversation is automatic raw material for the next prompt. Yesterday I had a short idea-conversation, had working code thirty minutes after the meeting, shipped it within the hour. That's the new shape of meetings. Operational meetings get absorbed by AI. What's left is the meetings where an idea becomes a prompt. Meetings stop producing more meetings. They start producing work.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DViPdvWFJiv\",\"date\":\"2026-03-06\",\"original\":\"왜 나는 갑자기 미팅이 기대될까\\n…\\n이제 나는 미팅에 들어갈 때 이렇게 생각한다. \\\"여기서 좋은 LLM 프롬프트가 나올 수도 있겠다.\\\"\\n어제도 누군가와 짧게 아이디어 이야기를 했다. 요즘은 항상 AI 미팅 노트를 켜두기 때문에 미팅이 끝나자마자 그 대화를 prompt로 바꿨다. 미팅 끝난지 30분 만에 코드가 나왔고, 1시간 안에 ship 했다.\\n이제 좋은 미팅은 \\\"좋은 프롬프트\\\" 를 남긴다.\\n앞으로는 operational 한 미팅은 대부분 AI가 대체하고 대화에서 나눈 아이디어가 프롬프트로 바뀌는 미팅들만 남을 것 같다.\"}]},{\"id\":\"gpts-collapsed-into-skills-as-shareable-routines\",\"label\":\"gpts-collapsed-into-skills-as-shareable-routines\",\"claim_ko\":\"GPTs는 스킬로 진화했습니다.\\n누군가의 워크플로우를 통째로 받아\\n내 작업에 끼워 쓸 수 있는 단위가 됐습니다.\",\"claim_en\":\"GPTs collapsed into Skills.\\nThe unit of automation is now a workflow you can download\\nand drop into your own work.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"agents\",\"productivity\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"GPTs는 스킬로 진화했습니다.\\n누군가의 워크플로우를 통째로 받아\\n내 작업에 끼워 쓸 수 있는 단위가 됐습니다.\\n\\nGPTs는 한 챗봇 안의 개인 비서였습니다. 스킬은 그 비서를 분해해서 — YouTube 댓글 분석, 일일 추이 점검, 웹 검색, 리포트 작성 같은 — 각각의 능력 단위로 만들고, 그 단위를 다른 사람과 주고받을 수 있게 만든 것입니다. 매트릭스의 칩을 다운로드 받으면 갑자기 태권도 유단자가 되는 그 장면. 스킬은 그 비유의 실물입니다.\",\"body_en\":\"GPTs collapsed into Skills. The unit of automation is now a workflow you can download and drop into your own work.\\n\\nGPTs were a personal assistant living inside a single chatbot. Skills broke the assistant apart — YouTube comment analysis, daily-trend checks, web search, report writing — into individual capability units, then made the units shareable across people. The scene from The Matrix where you download a chip and become a black belt in seconds? Skills are the real-world version of that scene.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"이제는 \\\"내 GPT는 내 스킬은 알아서 만들어서 내가 쓴다.\\\"라는 개념으로 가고 있기 때문에 이 GPT가 스킬로 발전했다고 저는 생각을 합니다.\\n…\\n누군가가 이메일 요약을 엄청나게 기깔나게 해주는 스킬을 만들어서 어딘가에 올렸으면 저희가 다운로드를 해서 똑같이 쓸 수 있는 거예요. 이게 GPTs 개념이랑 되게 비슷해요. 누군가가 출시한 거, 아니면 내가 만든 그 루틴, 그 워크플로우를 누군가가 올렸을 때 그거를 기억하고 있다가 엄청나게 복잡한 거라 할지라도 … 이거를 오토메이션 파이프라인이라고 하는데, Make라든지 n8n 이런 여러 가지 툴들이 있었는데 그거를 그냥 스킬로 다 묶어버렸다.\\n…\\n제가 생각했을 때 되게 좋은 비유 중에 하나가 매트릭스 보셨는지 모르겠는데 매트릭스에 칩 업로드 해가지고 다운로드 쫙 하면 태권도를 갑자기 유단자처럼 할 수 있잖아요. 그런 느낌이에요. 그런 느낌으로 이 스킬을 쓸 수 있다.\"}]},{\"id\":\"great-engineers-grow-others\",\"label\":\"great-engineers-grow-others\",\"claim_ko\":\"엄청난 개발자는 혼자 잘하는 사람이 아닙니다.\\n옆 사람을 성장시키는 사람입니다.\",\"claim_en\":\"A great engineer isn't one who excels alone.\\nA great engineer is one who lifts the people next to them.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2020-03-31\",\"body_ko\":\"엄청난 개발자는 혼자 잘하는 사람이 아닙니다.\\n옆 사람을 성장시키는 사람입니다.\\n\\n대학생 때 제가 상상했던 엄청난 개발자는 용병이었습니다 — 혼자 미친 듯이 코드를 짜고, 누구도 못 푸는 문제를 풀고, 영웅처럼 등장해서 영웅처럼 사라지는 사람. 페이스북에 들어와서 진짜 잘하는 시니어들을 보고 깨달은 것은 정반대였습니다. 그들은 관우·장비가 아니라 제갈공명이었습니다. 한 사람의 출력이 아니라 옆 사람들의 출력 곱하기 — 우선순위를 잡고, 미래를 먼저 보고, 다른 엔지니어를 성장시키는 것이 진짜 10배 엔지니어의 정의였습니다.\",\"body_en\":\"A great engineer isn't one who excels alone.\\nA great engineer is one who lifts the people next to them.\\n\\nIn college I pictured the great engineer as a mercenary — a lone wolf solving impossible problems, materializing for the heroic moment, vanishing afterward. The senior engineers I learned from at Meta were the opposite. Not Guan Yu or Zhang Fei (the heroic warriors of 삼국지). Zhuge Liang. The real definition of a \\\"10x engineer\\\" wasn't 10x personal output. It was multiplying the output of everyone in earshot — setting priorities, seeing the road ahead, growing other engineers. The leverage isn't in being the strongest soldier. It's in being the one who makes the army stronger.\",\"sources\":[{\"platform\":\"medium\",\"url\":\"https://medium.com/@alexsanghyeonahn/엄청난-개발자-되기-468c645bd45\",\"date\":\"2020-03-31\",\"original\":\"놀랍게도 그들이 생각하는 엄청난 개발자는 절대 내가 생각하던 용병이 아니였다. 오히려 커뮤니케이션에 능하고, 우선순위를 정확히 알며, 프로덕트나 프로젝트를 책임지고 미래를 먼저 내다보는, 또한 다른 엔지니어를 성장시킬 수 있는 그런 사람이 진정으로 대단한 개발자였던 것이다…\\n내가 생각하던 훌륭한 개발자는 삼국지에 비하면 뛰어난 장수, 관우나 장비를 생각했다면, 진정으로 뛰어난 개발자는 몇 사람의 스케일을 넘어 하나 또는 여러 국가의 리더로써 작전을 진두 지휘하는 제갈공명이 되었어야만 했던 것이다.\"},{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/C6nzmNGr_vt\",\"date\":\"2024-05-06\",\"original\":\"메타 스태프 엔지니어(E6)의 평균 연봉은 약 한화 10억원에 달합니다. 이렇게 높은 보상을 받는 이유를 크게 세 가지로 본다면:\\n2. 시니어 멘토링 - E6 레벨 엔지니어는 시니어 엔지니어(E5)를 멘토링할 수 있어야 합니다. 하지만, 이미 경력이 충분한 시니어를 멘토링을 하는것은 굉장히 어렵습니다. 수직적인 관계보다는, 실질적으로 부가적인 가치를 제공할 수 있는 사람이 되는 것이 중요합니다.\"}]},{\"id\":\"great-leaders-stay-cold-not-hot\",\"label\":\"great-leaders-stay-cold-not-hot\",\"claim_ko\":\"리더는 차가워지는 법을\\n배워야 효율적입니다.\",\"claim_en\":\"Leaders have to learn to be cold.\\nWarm doesn't scale.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\",\"meta-life\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-20\",\"body_ko\":\"리더는 차가워지는 법을\\n배워야 효율적입니다.\\n\\n리더의 자리는 생각보다 외롭고 차갑습니다. 팀원이 서운해해도 애써 모른 척해야 하고, 프로젝트가 꼬여도 감정보다 논리를 앞세워야 합니다. 비논리적이고 비상식적인 일이 생겨도 덤덤해야 합니다. **내가 감정에 흔들리면 모두가 다 같이 흔들리기 때문입니다.** 가끔은 인간이 아니라 기계가 된 기분이 듭니다. 모두에게 좋은 리더가 되고 싶었는데, 결국 **차가워지는 법을 배우고 있는** 제 모습이 낯섭니다. 조직에서 리더는 **차가워져야만 효율적일 수 있습니다**. 이게 맞는 것일까요? 이러다 제 스스로가 변하는 건 아닌가 싶습니다.\",\"body_en\":\"Leaders have to learn to be cold.\\nWarm doesn't scale.\\n\\nThe leader's seat is colder and lonelier than I expected. When a teammate is hurt, you have to *act* like you don't see it. When a project goes sideways, logic has to come first, emotion second. Even when something is irrational or unfair, you have to stay flat. **If I waver emotionally, everyone wavers with me.** Some days I feel less like a person and more like a machine. I wanted to be a leader everyone liked. Instead I'm learning to be *cold* — and the version of myself doing that is unfamiliar. **In an organization, a leader can only stay efficient by getting cold.** Is that right? Sometimes I wonder if I'm becoming someone different.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHagvn8xnH1\",\"date\":\"2025-03-20\",\"original\":\"리더의 자리는 생각보다 외롭고 차갑다.\\n\\n팀원이 서운해해도 애써 모른 척해야 하고,\\n프로젝트가 꼬여도 감정보다 논리를 앞세워야 한다.\\n비논리적이고 비상식적인일이 생겨도, 덤덤해야한다.\\n\\n내가 감정에 흔들리면 모두가 다같이 흔들리니까.\\n\\n근데, 가끔은 인간이 아니라 기계가 된 기분이 든다. \\n모두에게 좋은 리더이고 싶었는데, \\n결국 차가워지는 법을 배우고 있는 내 모습이 낯설다.\\n\\n조직에서 리더는 차가워져야만 효율적일 수 있다.\\n\\n이게 맞는 걸까?\\n\\n이러다 내 스스로가 변하는건 아닌가 싶다.\"}]},{\"id\":\"grit-beats-genius\",\"label\":\"grit-beats-genius\",\"claim_ko\":\"일 잘하는 사람은\\n타고나는 게 아니라 만들어집니다.\",\"claim_en\":\"Top performers aren't born.\\nThey are made.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"meta-life\"],\"theses\":[\"grit-not-genius\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-09\",\"body_ko\":\"일 잘하는 사람은\\n타고나는 게 아니라 만들어집니다.\\n\\n메타에서 수백 명의 뛰어난 인재들과 일해 보고 확신합니다. **\\\"일을 잘하는 데 천재일 필요는 없습니다.\\\"** 진짜 차이를 만드는 사람들의 세 가지 특징입니다. **첫째**, 하기 싫은 일을 가장 먼저 잡습니다. 어려운 일이 생기면 먼저 나서고, 심지어 그 일을 조금이나마 더 재미있게 만드는 사람 — 이게 진짜 리스펙입니다. **둘째**, 커뮤니케이션이 빠르고 솔직합니다. 멋진 말이 아니라 직설적이고 명확하게 말합니다. 덕분에 쓸데없는 오해나 시간 낭비가 없습니다. **셋째**, 완벽함보다 속도를 우선합니다. 50%라도 먼저 보여 주고 피드백을 통해 완성합니다 — **Done is better than said**입니다. 진짜 일 잘하는 사람은 똑똑함으로 타고나는 게 아니라 **만들어지는 사람**입니다.\",\"body_en\":\"Top performers aren't born.\\nThey are made.\\n\\nHundreds of brilliant people at Meta over seven years convinced me of this. **You don't have to be a genius to be a top performer.** The three habits that *actually* differentiate the high-performers I've worked with: **One**: they grab the work nobody wants — and somehow find a way to make it slightly more enjoyable while they do it. That's the kind of respect I have for them. **Two**: their communication is fast and blunt. Not eloquent, not polished — direct enough to occasionally be uncomfortable. The benefit is no wasted hours on misunderstanding. **Three**: speed over perfection. 50% is shown first; feedback completes it. **Done is better than said.** Top performers are *made*, not born.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DF15kuuxueL\",\"date\":\"2025-02-09\",\"original\":\"나는 메타에서 수백 명의 뛰어난 인재들과 일해봤다. 그리고 확신한다.\\n\\n\\\"일을 잘하는 데 천재일 필요는 없다.\\\"\\n\\n진짜 차이를 만드는 사람들의 특징:\\n\\n1. 하기 싫은 일을 가장 먼저 잡는다.\\n- 어려운 일이 생기면 먼저 나서고, 심지어 그 일을 조금이나마 더 *재밌게 만드는 사람*. 이게 진짜 리스펙임.\\n\\n2. 커뮤니케이션이 빠르고 솔직하다.\\n- 멋진 말이 아니라, 직설적이고 명확하게 말한다 (가끔 너무 솔직해서 당황스러움). 덕분에 쓸데없는 오해나 시간 낭비가 없다.\\n\\n3. 완벽함보다 속도를 우선한다.\\n- 50%라도 먼저 보여주고, 피드백을 통해 완성하는 사람. \\\"Done is better than said\\\"\\n\\n진짜 일 잘하는 사람은 똑똑함으로 타고나는 게 아니라 만들어진다.\"}]},{\"id\":\"happiness-is-an-attitude\",\"label\":\"happiness-is-an-attitude\",\"claim_ko\":\"행복은 쟁취하는 것이 아닙니다.\\n삶에 대한 태도입니다.\",\"claim_en\":\"Happiness isn't something you win.\\nIt's a stance toward life.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"grit-not-genius\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2020-09-17\",\"body_ko\":\"행복은 쟁취하는 것이 아닙니다.\\n삶에 대한 태도입니다.\\n\\n미국에서 자리를 잡고, 페이스북 스태프 엔지니어가 되고, 유튜브를 시작했습니다. 그래서 행복해졌느냐 — 그 등식은 성립하지 않았습니다. 행복은 무언가를 이뤄서 도달하는 종착지가 아니라, 매일 무언가에 감사하기로 선택하는 자세였습니다. 가족에게, 친구에게, 동료에게, 혹은 그 자리에 있는 자기 자신에게. 행복을 쟁취 가능한 목표로 두는 순간 그것은 항상 다음 분기의 일이 됩니다. 태도로 두면 오늘 가능합니다.\",\"body_en\":\"Happiness isn't something you win.\\nIt's a stance toward life.\\n\\nI made it to America, made Staff at Meta, started a YouTube channel — none of those finish lines made me happy. Happiness isn't a destination you reach by accomplishing something; it's a posture you choose, daily, of being grateful — to family, to friends, to colleagues, sometimes to yourself for showing up. The moment you frame happiness as a goal to win, it becomes always-next-quarter. As a stance, it's available today.\",\"sources\":[{\"platform\":\"medium\",\"url\":\"https://alexsanghyeonahn.medium.com/%EB%B6%80%EA%B7%80%EC%98%81%ED%99%94-37f99859ac6d\",\"date\":\"2020-09-17\",\"original\":\"내 인생 목표는 행복이다. 나는 삶에 대한 진리는 행복이라는 말을 믿는다. 행복은 사실 쟁취하는 것이 아니라, 삶에 대한 태도라는 것도 믿고. 우리는 삶을 살아가면서 감사함을 잃게 되는 일들이 많다. 일에 치여서, 사람에 치여서, 스스로에게 실망해서, 연인에게 상처받아서. 하지만 이 모든일들 속에서도 삶에 감사해야할 일들은 분명히 존재하고, 그 일들로 인해 우리는 행복에 도달할 수 있다고 믿는다.\"}]},{\"id\":\"harness-engineering-is-rules\",\"label\":\"harness-engineering-is-rules\",\"claim_ko\":\"Harness 엔지니어링은 규칙입니다 —\\n결과물의 양식 · 스타일 · 정체성을 프로젝트 단위로 미리 정해두는 일입니다.\",\"claim_en\":\"Harness engineering is rules — fixing the format, style, and identity of your outputs ahead of time, per project.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-19\",\"body_ko\":\"Harness 엔지니어링은 규칙입니다 —\\n결과물의 양식 · 스타일 · 정체성을 프로젝트 단위로 미리 정해두는 일입니다.\\n\\n\\\"보고서는 이런 스타일로 만들어줘\\\"처럼, 만들기 전에 규칙을 세워두는 일입니다. 매번 지시하는 대신 프로젝트가 따를 규칙을 한 번 정해두면 결과물이 일관되게 나옵니다.\",\"body_en\":\"Harness engineering is rules — fixing the format, style, and identity of your outputs ahead of time, per project.\\n\\nIt's setting the rule before you build — \\\"make reports in this style.\\\" Define the rule the project follows once, instead of instructing every time, and the outputs come out consistent.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"이 Harness Engineering이라는 건 뭐냐면 규칙이에요. 규칙과 양식, 그리고 정체성 같은 거. 프로젝트를 만들 때 어떠한 Rule을 가지고 만들 것인가. \\\"보고서는 이런 스타일로 해줘.\\\" 그게 조금 Harness Engineering이라고 하면 될 것 같고.\\nHarness는 규칙 이렇게 아시면 될 것 같고.\"}]},{\"id\":\"higgsfield-intro-video-workflow\",\"label\":\"higgsfield-intro-video-workflow\",\"claim_ko\":\"Higgsfield로 인트로 영상 두 가지를\\n각각 다른 연출로 만듭니다.\",\"claim_en\":\"Higgsfield can produce two intro videos\\nwith distinct cinematographic styles.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"creator-economy\"],\"theses\":[\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-11-09\",\"body_ko\":\"Higgsfield로 인트로 영상 두 가지를\\n각각 다른 연출로 만듭니다.\\n\\nHiggsfield AI로 인트로 영상 2개를 만들어 봤습니다. 유튜브 인트로로 써 볼 만한 수준입니다. **첫 번째**는 스탑모션 느낌으로, **두 번째**는 다이나믹한 카메라 무빙으로. 같은 도구로 정반대의 연출이 나옵니다. 인트로의 톤을 바꾸고 싶을 때마다 다시 시도해 볼 만합니다.\",\"body_en\":\"Higgsfield can produce two intro videos\\nwith distinct cinematographic styles.\\n\\nMade two intro videos with Higgsfield AI. Quality is YouTube-intro grade. **One** has a stop-motion feel; **two** uses dynamic camera moves. The same tool produces opposite directorial languages depending on how you brief it. Worth keeping in the rotation for any intro tone change.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DS1k5MhlAwv\",\"date\":\"2025-11-09\",\"original\":\"와.. 이런 것도 된다고?\\nHiggsfield AI로 인트로 영상 2개 만들어봤어.\\n이정도면 유튜브 인트로로 써볼만할 것 같은데 어때??\\n1번은 스탑모션 느낌\\n2번은 다이나믹한 카메라 무빙\"}]},{\"id\":\"higgsfield-mcp-fronts-every-image-video-model\",\"label\":\"higgsfield-mcp-fronts-every-image-video-model\",\"claim_ko\":\"Higgsfield는 모든 주요 AI 이미지·비디오 모델을 하나의 MCP/CLI 표면으로 노출합니다.\\nClaude나 Claude Code가 단일 채팅에서 크리에이티브 자산을 생성·편집·애니메이션할 수 있습니다.\",\"claim_en\":\"Higgsfield exposes every leading AI image and video model behind one MCP/CLI surface, letting Claude or Claude Code generate, edit, and animate creative assets from a single chat.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/xn6Z5PYyAIE\",\"published_at\":\"2026-05-04\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"creator-economy\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-04\",\"body_ko\":\"Higgsfield는 모든 주요 AI 이미지·비디오 모델을 하나의 MCP/CLI 표면으로 노출합니다.\\nClaude나 Claude Code가 단일 채팅에서 크리에이티브 자산을 생성·편집·애니메이션할 수 있습니다.\\n\\n크리에이티브 스택을 단일 채팅 표면으로 재구성합니다 — Claude는 인터페이스이고 Higgsfield는 모델 라우터입니다. Alex가 이미 인트로 영상에 써본 도구를 풀 에이전시 수준으로 일반화한 모습입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/xn6Z5PYyAIE\",\"date\":\"2026-05-04\",\"original\":\"So Higgsfield has access to all of the best AI image and video generation models. And Claude lets us talk to Higgsfield and build custom skills and agents and schedule all of these automations to run while we sleep.\"}]},{\"id\":\"html-replaces-office-docs\",\"label\":\"html-replaces-office-docs\",\"claim_ko\":\"PPT · 엑셀 · Docs는 사라지고\\nHTML이 캔버스가 됩니다.\",\"claim_en\":\"PPT, Excel, and Docs are on the way out.\\nHTML becomes the new canvas.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-02-26\",\"body_ko\":\"PPT · 엑셀 · Docs는 사라지고\\nHTML이 캔버스가 됩니다.\\n\\n클로드 코드 상위 1%만 알고 있는 사실 하나입니다. PPT, 엑셀, Docs는 곧 사라집니다. 대신 전부 **HTML**로 대체됩니다. 세 가지 이유입니다. **첫째**, 코드 작성 비용이 그 어느 때보다 싸졌습니다. **둘째**, HTML은 가장 뛰어난 캔버스입니다. **셋째**, 앞으로 모든 건 에이전트가 만들기 때문입니다. 써 본 사람은 이 말이 무슨 뜻인지 압니다. 앞으로는 더 말도 안 되는 일들이 곧 말이 될 것입니다.\",\"body_en\":\"PPT, Excel, and Docs are on the way out.\\nHTML becomes the new canvas.\\n\\nInside-baseball from heavy Claude Code users: PowerPoint, Excel, and Docs are about to disappear. **HTML replaces all three.** Three reasons. **One**: writing code is cheaper than at any point in history. **Two**: HTML is the most expressive canvas we have. **Three**: agents make everything from here forward, and agents prefer code. People who've used the new tooling already know what this means. The seemingly impossible is about to become the default.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DVXG0MrAVfH\",\"date\":\"2026-02-26\",\"original\":\"클로드코드 상위 1%만 알고 있는 사실:\\nPpt, 엑셀, docs는 모두 곧 없어질것이다.\\n그 대신 전부 다 HTML로 대체될 것이다.\\n\\n세 가지 이유 때문이다.\\n1. 코드 작성은 그 어느때보다도 cheap 하다\\n2. HTML 이야 말로 가장 뛰어난 캔버스이다\\n3. 앞으로 모든건 에이전트가 만들것이다\\n\\n써본 사람들은 이게 무슨말인지 알 것이라 생각한다.\\n다음 그림은 내가 손하나 까딱하지 않고 \\\"메세지\\\"로 작성했다.\\n앞으로눈 더 말도 안되는 일들이, 곧 말이 될 것이다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"앞으로 PPT, Excel, Document 이런 거 대부분 사라질 거라고 저는 믿거든요. HTML로 많이 바뀔 거예요. 저는 HTML이 가장 사용하기 좋은 캔버스라고 생각을 하는데.\\n이 슬라이드조차 PPT가 아니잖아요. 이거는 웹사이트에 들어가 있는 슬라이드인데.\"}]},{\"id\":\"human-craft-becomes-scarce\",\"label\":\"human-craft-becomes-scarce\",\"claim_ko\":\"AI 시대에 인간의 순수 창작은 희소가치가 됩니다.\",\"claim_en\":\"In an AI era, unmediated human creation becomes the scarce good.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"AI 시대에 인간의 순수 창작은\\n희소가치가 됩니다.\\n\\nAI가 만들어내는 콘텐츠는 점점 더 많아지고, 점점 더 능숙해집니다. 처리되고 가공되고 자동화된 콘텐츠가 시장을 채우면 채울수록, 그 사이에서 빛나는 것은 가공되지 않은 인간의 흔적입니다 — 라이브, 즉흥, 미완성, 손으로 만든 것. 희소한 것이 가치를 갖는다는 시장의 기본 원리는 AI 시대에도 그대로입니다. 다만 무엇이 희소한지가 바뀝니다.\",\"body_en\":\"In an AI era, unmediated human creation becomes the scarce good.\\n\\nAI-generated content keeps growing in volume and polish. As processed, mediated, automated output saturates every channel, what stands out is the unprocessed trace of an actual person — live, unscripted, unfinished, handmade. The market rule that scarcity prices itself doesn't pause for the AI era; only the definition of \\\"scarce\\\" rotates. The currency of distinction shifts from competence to authenticity.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH11-01\",\"date\":\"2024-05-01\",\"original\":\"인간의 순수 창작에 대한 수요 희소성은 곧 경쟁력이다. 말씀드렸죠? 언젠가 유튜브는 진짜 인공지능이 만든 컨텐츠들이 판을 치는 날들도 머지않아 올 거예요. 그럴 때 진짜로 빛나는 것은 순수 창작물 예를 들면 라이브, 유튜브 라이브가 더 귀해지는 시대 라이브 컨텐츠가 더 없어지고 막 이렇게 되게 프로세스된 컨텐츠가 많아진다면은 그런 것들에 대한 갈망이 생기겠죠?\"},{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/C708R16uhYf\",\"date\":\"2024-06-05\",\"original\":\"1. 인공지능이 대체 할 수 없는 사람이 될 것 - 그 어떤 미래에도 결국 \\\"사람\\\"을 완벽히 대체할 인공지능은 없다고 본다. 왜? 결국 서비스를 받는 고객이 사람이니까. 인간의 존엄성, 고유함, 비완벽함 자체가 서비스의 가치가 될 것이다. 그러한 인간만의 가치를 극대화 시킬 수 있는 사람은 반드시 경쟁력이 있을 것.\"}]},{\"id\":\"hyperframes-is-html-motion-graphics\",\"label\":\"hyperframes-is-html-motion-graphics\",\"claim_ko\":\"HyperFrames(github.com/heygen-com/hyperframes)는 HTML 기반 모션 그래픽 프레임워크이며, Claude로 영상을 만들 때 Remotion 대신 쓰는 프롬프트 친화적 대안입니다.\",\"claim_en\":\"HyperFrames (github.com/heygen-com/hyperframes) is an HTML-based motion-graphics framework positioned as the prompt-native alternative to Remotion for Claude-driven video work.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/Aw3BkmhYu4I\",\"published_at\":\"2026-04-22\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"creator-economy\",\"ai-foundations\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-22\",\"body_ko\":\"HyperFrames(github.com/heygen-com/hyperframes)는 HTML 기반 모션 그래픽 프레임워크이며, Claude로 영상을 만들 때 Remotion 대신 쓰는 프롬프트 친화적 대안입니다.\\n\\n도구 존재 + 포지셔닝(HTML 네이티브, Remotion 대안) 주장입니다. ai-tooling 그래프의 노드로 향후 참조에 유용합니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/Aw3BkmhYu4I\",\"date\":\"2026-04-22\",\"original\":\"Hyperframes vs Remotion 7:21 ... Hyperframes: https://github.com/heygen-com/hyperframes\"}]},{\"id\":\"image-generation-leaderboard-as-tool\",\"label\":\"image-generation-leaderboard-as-tool\",\"claim_ko\":\"어떤 이미지 모델이 가장 잘 만드는지\\n비교할 수 있는 사이트를 만들었습니다.\",\"claim_en\":\"I built a site that compares\\nwhich image model produces the best output.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-07-04\",\"body_ko\":\"어떤 이미지 모델이 가장 잘 만드는지\\n비교할 수 있는 사이트를 만들었습니다.\\n\\n이제 인공지능으로 이미지를 만드는 일 자체는 놀랍지 않습니다. 그런데 어떤 모델이 가장 잘 만드는지는 궁금하지 않으십니까? 그래서 한 번 만들어 봤습니다. [image-generations.com](https://image-generations.com/) — 이미지 모델 리더보드입니다.\",\"body_en\":\"I built a site that compares\\nwhich image model produces the best output.\\n\\nGenerating an image with AI is no longer the interesting part. Which model produces the *best* output — that's the question. So I built it: [image-generations.com](https://image-generations.com/) — an image-model leaderboard.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DMM1iMrOa3w\",\"date\":\"2025-07-04\",\"original\":\"이제 인공지능으로 이미지 만드는건 놀랍지도 않다.\\n그런데 누가, 어떤 모델이 얼마나 가장 잘 만드는지 궁금하지 않아?\\n그래서 그냥 한 번 만들어봤어!\\nhttps://image-generations.com/\"}]},{\"id\":\"image-style-transfer-via-prompt\",\"label\":\"image-style-transfer-via-prompt\",\"claim_ko\":\"실사 사진을 지브리 스타일로 바꾸는 일은\\n한 줄 프롬프트로 끝납니다.\",\"claim_en\":\"Turning a photograph into Ghibli style\\nis now a single-prompt workflow.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-25\",\"body_ko\":\"실사 사진을 지브리 스타일로 바꾸는 일은\\n한 줄 프롬프트로 끝납니다.\\n\\nChatGPT로 실사 사진을 지브리 애니 스타일로 바꾸는 워크플로우입니다. 지금 쓰레드에 실시간으로 4컷 만화, 애니 그림체 변환이 올라오고 있는데 감성이 폭발합니다. 시도하고 싶으시면 댓글에 달아둔 프롬프트를 복사 붙여넣기 하시면 됩니다. ChatGPT에 그대로 붙이면 끝납니다. 한 번 만들어 본 사람은 다음 작품을 바로 시도하게 됩니다.\",\"body_en\":\"Turning a photograph into Ghibli style\\nis now a single-prompt workflow.\\n\\nChatGPT can convert a live photograph into a Ghibli-style frame in one paste. Threads is filling up in real time with 4-panel comics and anime-style portraits — the aesthetic hit lands. To try it: copy the prompt from the comments and paste into ChatGPT. The minute you have one, you're already making the next.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHrtY9cSxwi\",\"date\":\"2025-03-25\",\"original\":\"ChatGPT로 실사 사진 → 지브리 애니처럼 바꾸는 꿀팁 알려줄게.\\n지금 쓰레드에 실시간으로 4컷 만화, 애니 그림체 변환 올라오고 있는데\\n진짜 감성 터진다…\\n혹시 나도 시도해보고 싶다면, 아래 댓글로 달아둔 프롬프트 복붙해서 써봐 👇\\nChatGPT에 그냥 붙여넣으면 끝.\\n만들고 나면 진짜 넋 놓고 보고 다음거 바로 시도하는중.\\n(샘플 사진은 BTS)\"}]},{\"id\":\"impact-beats-effort\",\"label\":\"impact-beats-effort\",\"claim_ko\":\"평가의 기준은 노력이 아니라\\n임팩트입니다.\",\"claim_en\":\"The currency of evaluation\\nis impact, not effort.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"grit-not-genius\",\"move-first-or-lose-the-game\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-23\",\"body_ko\":\"평가의 기준은 노력이 아니라\\n임팩트입니다.\\n\\n\\\"얼마나 열심히 했는가\\\"는 자신을 위로하는 지표입니다. 회사는 그렇게 평가하지 않습니다. 회사가 보는 것은 \\\"어떤 임팩트를 만들었는가\\\" — 데이터로 증명되는 결과입니다. 명확한 success metric 없이 굴러가는 프로젝트는 \\\"잘하고 있다\\\"는 감각만 남기고 실패합니다. 측정되지 않는 목표는 무의미하고, 실패조차 데이터로 활용될 수 있을 때 의미가 생깁니다. 그러니 시작은 단순합니다 — 내 일의 success metric을 먼저 정의합니다. 그 다음에 열심히 합니다.\",\"body_en\":\"The currency of evaluation\\nis impact, not effort.\\n\\n\\\"How hard I worked\\\" is a metric you carry around for yourself. It's not the metric the company uses. The company looks at \\\"what impact did this create\\\" — outcomes measurable in data. Projects that run without a clean success metric collect a vague sense of \\\"going well\\\" and then quietly fail. Unmeasured goals don't count, and failures only become useful when they're measured enough to learn from. So the sequence is simple — define the success metric of your work first. Then work hard.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGbq0tYyKkI\",\"date\":\"2025-02-23\",\"original\":\"성공하는 조직에 반드시 \\\"Success Metric\\\" 이 존재하는 이유:\\n…\\n2. 주관적 평가가 아니라 결과가 전부다. - \\\"얼마나 열심히 했는가\\\"보다 \\\"어떤 임팩트를 만들었는가\\\"가 평가 기준이다.\\n…\\n4. 실패조차 데이터로 활용된다. - 실패하더라도, 그 원인을 분석하고 개선할 수 있어야 한다.\"}]},{\"id\":\"inline-edits-and-drawn-comments-target-the-right-element\",\"label\":\"inline-edits-and-drawn-comments-target-the-right-element\",\"claim_ko\":\"캔버스에서 텍스트를 바로 고치거나 요소에 원을 그리고 메모를 답니다.\\nClaude Design은 정확히 그 요소를 인식하므로, 스크린샷으로 설명하는 루프가 사라집니다.\",\"claim_en\":\"Edit text directly on the canvas or circle the element and type a note — Claude Design sees exactly the element you mean, avoiding the screenshot-and-describe loop that bloats Claude Code sessions.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"published_at\":\"2026-04-29\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"prompt-engineering\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-29\",\"body_ko\":\"캔버스에서 텍스트를 바로 고치거나 요소에 원을 그리고 메모를 답니다.\\nClaude Design은 정확히 그 요소를 인식하므로, 스크린샷으로 설명하는 루프가 사라집니다.\\n\\nTweaks와 별개의 워크플로 프리미티브입니다 — 한도 문제가 아니라 모호성 문제를 풉니다. \\\"좋은 프롬프팅\\\"을 \\\"좋은 지목\\\"으로 재정의합니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"date\":\"2026-04-29\",\"original\":\"what we can do is we can add comments. I could basically just click on something... I can just kind of make a circle around this, and then I can type and just say, \\\"I don't like how this ends so abruptly. Add a transition overlay or gradient.\\\"... it gets the exact comments about the exact element that I was referring to. So, it's not going to get confused.\"}]},{\"id\":\"interior-redesign-via-nano-banana\",\"label\":\"interior-redesign-via-nano-banana\",\"claim_ko\":\"나노바나나 · Adobe · 4K 업스케일링으로\\n포토샵 없이 인테리어를 바꿉니다.\",\"claim_en\":\"With nano-banana, Adobe, and 4K upscaling,\\nyou can redesign a room without Photoshop.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-11-24\",\"body_ko\":\"나노바나나 · Adobe · 4K 업스케일링으로\\n포토샵 없이 인테리어를 바꿉니다.\\n\\n포토샵 없이 방 인테리어를 완벽하게 바꾸는 8단계 워크플로우입니다. **첫째**, 내 방 사진을 찍습니다. **둘째**, 원하는 가구 이미지를 검색합니다. **셋째**, Adobe Express로 누끼를 땁니다. **넷째**, 나노바나나에 \\\"내 사진에 이 가구로 바꿔 줘\\\" 라고 말합니다. **다섯째**, 나노바나나 프롬프트 Re-writer를 쓰면 퀄리티가 확 올라갑니다. **여섯째**, 마음에 들 때까지 하나씩 수정합니다 (여러 개 동시도 가능). **일곱째**, 4K 업스케일링으로 마무리합니다. **여덟째**, Veo로 영상까지 만들면 끝입니다. 디자이너의 3D 렌더링보다 결과가 사실적입니다.\",\"body_en\":\"With nano-banana, Adobe, and 4K upscaling,\\nyou can redesign a room without Photoshop.\\n\\nEight steps to redesign a room without Photoshop. **One**: photograph your room. **Two**: find images of the furniture you want. **Three**: clip them with Adobe Express. **Four**: tell nano-banana, \\\"replace these in my photo with this furniture.\\\" **Five**: run the nano-banana prompt Re-writer for sharper output. **Six**: iterate until satisfied (you can run variants in parallel). **Seven**: finish with 4K upscaling. **Eight**: send the result through Veo if you want video. The output is more photoreal than a designer's 3D render.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DRbyQxYEQp2\",\"date\":\"2025-11-24\",\"original\":\"나노바나나 써서 내 방 인테리어 포토샵 없이 완벽하게 바꾸는 방법:\\n\\n1. 내 방 사진 찍고\\n2. 원하는 가구 이미지 검색\\n3. Adobe Express 로 누끼 따기\\n4. 나노바나나한테 \\\"내 사진에 [가구] 이 걸로 바꿔줘\\\" 말하기\\n5. 나노바나나 프롬프트 Re-writer 쓰면 퀄리티 확 올라감\\n6. 맘에 들 때까지 하나씩 수정 반복 (여러게 동시에도 가능!)\\n7. 마지막엔 4K 업스케일링으로 마무리\\n8. 다 끝내고 나면 Veo 로 비디오 제작도 가능!\\n\\n디자이너가 3D 렌더링해주는 것보다 사실적이라 효과적이더라.\"}]},{\"id\":\"iterative-refinement-is-the-default\",\"label\":\"iterative-refinement-is-the-default\",\"claim_ko\":\"첫 답변은 초안입니다.\\n결과물은 돌려깎기로 만듭니다.\",\"claim_en\":\"The first answer is a draft.\\nThe output is shaped through iteration.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"prompt-engineering\",\"learning\"],\"theses\":[\"pillar-framework\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"첫 답변은 초안입니다.\\n결과물은 돌려깎기로 만듭니다.\\n\\nChatGPT의 첫 출력을 그대로 쓰는 사람과 두세 번 돌려깎고 쓰는 사람의 격차는 실력이 아니라 자세에서 나옵니다. 첫 답변을 \\\"결과물\\\"로 받아들이면 거기서 멈추고, \\\"초안\\\"으로 받아들이면 다음 프롬프트가 자동으로 따라옵니다 — \\\"이걸 더 명확하게 다시 써줘\\\", \\\"이 평가표 기준으로 점수를 매기고 다시 써줘\\\". 결국 ChatGPT의 출력 퀄리티는 모델이 결정하지 않습니다. 사용자가 몇 번 돌려깎느냐가 결정합니다.\",\"body_en\":\"The first answer is a draft.\\nThe output is shaped through iteration.\\n\\nThe gap between someone who ships ChatGPT's first response and someone who reaches a polished output isn't skill — it's stance. Treat the first answer as the deliverable and you stop. Treat it as a draft and the next prompt writes itself: \\\"rewrite this clearer,\\\" \\\"score this against the rubric and try again.\\\" The output quality isn't decided by the model. It's decided by how many passes the user is willing to take.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH06-01\",\"date\":\"2024-05-01\",\"original\":\"일종의 돌려깎기입니다. 모든 GPT도 돌려깎기를 통해서 조금 더 나은 결과를 얻을 수 있다고 말씀을 드렸죠.\\n…\\n이런 식으로 돌려 깎으면 될 것 같다는 생각이 듭니다.\"}]},{\"id\":\"kakao-update-shows-product-tension\",\"label\":\"kakao-update-shows-product-tension\",\"claim_ko\":\"카카오톡 업데이트는\\n메신저인지 소셜인지 비즈인지의 정체성 긴장을 드러냅니다.\",\"claim_en\":\"Kakao's update surfaces a real tension —\\nmessenger, social, or business platform?\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2025-09-26\",\"body_ko\":\"카카오톡 업데이트는\\n메신저인지 소셜인지 비즈인지의 정체성 긴장을 드러냅니다.\\n\\n인스타그램 7년차 개발자가 바라본 이번 카카오톡 업데이트입니다. **첫째**, 이러한 시도 자체가 놀랍습니다. 분명 욕먹을 것을 각오하고 업데이트했을 텐데, **한국 대기업의 리더십이 이런 결정을 내릴 수 있다는 것이 긍정적으로 놀랍습니다.** **둘째**, 빅테크에서는 나름 흔한 일입니다. 인스타그램도 8개월 전에 피드를 릴스 중심으로 바꿨다가 욕을 많이 먹고 금방 롤백했습니다. **셋째**, 카카오톡의 정체성을 돌아보는 계기가 될 것 같습니다. **카카오톡은 메신저인가, 소셜 네트워크인가, 비즈니스 툴인가?** 사람들 반응을 보니 확실히 지인/친구와의 소통 그 이상의 플랫폼인 것은 분명합니다(오픈채팅, 비즈니스 등). **넷째**, Topline Metric이 어떻게 나올지, 어떤 메트릭을 중점적으로 보고 있는지 상당히 궁금합니다. 이 정도 업데이트는 리더십이 밀어붙일 때도 있지만, 결국 **data-driven한 결정**을 내릴 텐데 그 방향성이 궁금합니다.\",\"body_en\":\"Kakao's update surfaces a real tension —\\nmessenger, social, or business platform?\\n\\nWhat I see in Kakao's latest update, as a 7-year Instagram engineer. **One**: the *attempt itself* is notable. They clearly knew this would draw criticism, and the fact that **Korean big-corp leadership made this call is genuinely surprising in a good way.** **Two**: in Big Tech this is routine. Instagram pushed a Reels-centric feed about 8 months ago, caught heavy criticism, and rolled it back fast. **Three**: this should prompt Kakao to reflect on its own identity. **Is KakaoTalk a messenger? A social network? A business platform?** The reaction makes one thing obvious — it's already more than friend-to-friend chat (open chat, business). **Four**: I'm very curious what the topline metric shapes up to be, and which metric the team is optimizing for. Updates this big sometimes get pushed by leadership conviction, but the resolution is **data-driven** — and *which* data is the open question.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DPDoDlmDtSD\",\"date\":\"2025-09-26\",\"original\":\"인스타그램 7년차 개발자가 바라본 이번 카카오톡 업데이트:\\n\\n1. 일단 이러한 시도 자체가 놀랍다. 분명 어느정도 욕먹을거 각오하고 업데이트 했을텐데데, 한국 대기업의 리더쉽이 이러한 결정을 내릴 수 있다는 것이 긍정적으로 놀랍다.\\n\\n2. 빅테크에서는 나름 흔한 일이다. 인스타그램도 한 8개월 전에 피드를 릴스 중심으로 바꿨다가 (너무 앞선 미래였나..) 욕 정말 많이 먹고 금방 롤백했다.\\n\\n3. 카카오톡의 정체성을 돌아보는 계기(?)가 될 것 같다. 카카오톡은 메신저인가, 소셜 네트워크인가, 아니면 비즈니스 툴인가? 사람들 반응을 보니 확실히 카카오톡은 지인/친구와의 소통 그 이상의 플랫폼인 것 은 확실하다 (오픈채팅, 비즈니스 등)\\n\\n4. Topline Metric 이 어떻게 나올지, 어떤 메트릭을 중점으로 보고 있는지 상당히 궁금하다. 이정도 업데이트는 리더쉽이 밀어부칠때도 있지만, 결국 data-driven 한 결정을 내릴텐데 그 방향성이 궁금하다.\\n\\n감히 예상해보건데..\"}]},{\"id\":\"koreans-three-blockers-in-silicon-valley\",\"label\":\"koreans-three-blockers-in-silicon-valley\",\"claim_ko\":\"실리콘밸리에서 한국인이 가장 어려워하는\\n세 가지가 있습니다.\",\"claim_en\":\"Three things keep Korean professionals\\nfrom rising in Silicon Valley.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-12\",\"body_ko\":\"실리콘밸리에서 한국인이 가장 어려워하는\\n세 가지가 있습니다.\\n\\n7년 동안 동료들을 지켜본 결론입니다. **첫째**, 상사의 지시를 거절하지 못합니다. 못할 일에 \\\"푸시백\\\"을 하지 못하면, 본인의 신뢰는 오히려 깎입니다. **둘째**, 일을 숙제처럼 합니다. 회사 일에는 100점이 필요한 순간보다 80점에서 빠르게 다음 칸으로 넘어가야 하는 순간이 훨씬 많습니다. 시키는 일만 잘 하면 영원히 시키는 사람이 됩니다. 스코프를 키우지 못하면 리더가 되지 못합니다. **셋째**, 자기 자신을 내세우지 못합니다. 미국 회사에서는 자신감 있게 자기 일을 보여주지 않으면 중요한 자리는 오지 않습니다. 겸손은 미덕이지만, 그것이 보임의 부재로 번역되면 손해는 본인이 봅니다. 셋 다 문화의 결과이지만, 셋 다 학습 가능한 행동입니다.\",\"body_en\":\"Three things keep Korean professionals\\nfrom rising in Silicon Valley.\\n\\nAfter seven years of watching colleagues, these are the patterns. **One**, they can't decline upward. Without the ability to push back on requests they can't deliver, the trust they're trying to protect erodes anyway. **Two**, they treat work like homework. American work has many more \\\"ship at 80%, move on\\\" moments than \\\"polish to 100%\\\" moments. Doing the assignment perfectly forever makes you the person who's given assignments forever. Scope doesn't grow; leadership doesn't follow. **Three**, they don't put themselves forward. In a US company the visible person gets the work, full stop. Modesty is admirable, but read as invisibility it costs the person who's modest. All three are cultural; all three are also learnable behaviors.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DEvmSXiSUOM\",\"date\":\"2025-01-12\",\"original\":\"한국인들이 실리콘밸리에서 성공하기 어려운 이유\\n내가 7년동안 여기서 일하면서 한국사람들이 가장 어려워하는 세가지를 찾았어:\\n1. 상사의 거절을 못한다. - 일을 하다보면 내가 할 수 없을 것 같은 일에 대해서는 잘 거절하고 \\\"push-back\\\" 하는게 중요해. 그런데 유교 문화가 몸에 베어서 그런지 그게 쉽지 않더라.\\n2. 일을 숙제처럼 한다. - 회사에서 일을 할때는 꼭 100점을 맞는게 중요하지 않을때가 많아. 하지만 보통 우리는 위에서 시키는 일을 숙제처럼 곧대로 \\\"잘\\\" 하길 원해. 그러다보면 결국 내 scope 을 늘려서 리더가 되기 어려워.\\n3. 자기 자신을 잘 못 내세운다. - 미국에서는 자신감을 가지고 내 자신을 내세우지 않으면 절대 중요한 일을 시켜주지 않아. 하지만 많은 아시아인 친구들이 자기 자신을 내세워하는걸 꺼려하고 잘 못해.\"}]},{\"id\":\"language-models-automate-thought\",\"label\":\"language-models-automate-thought\",\"claim_ko\":\"언어모델은 생각의 자동화입니다.\\n생각으로 하는 모든 일이 적용 영역입니다.\",\"claim_en\":\"A language model is the automation of thought.\\nIts surface is everything you do with thinking.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-foundations\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"언어모델은 생각의 자동화입니다.\\n생각으로 하는 모든 일이 적용 영역입니다.\\n\\nChatGPT가 무궁무진해 보이는 이유는 단순합니다 — 생각이 곧 언어이기 때문입니다. 브레인스토밍, 기획, 의사결정, 분석, 설득 — 모두 언어로 이루어집니다. 그래서 언어모델은 한 분야의 도구가 아니라, 생각이 들어가는 모든 작업의 자동화 레이어입니다. \\\"ChatGPT를 어디에 써야 할지 모르겠다\\\"는 질문은 사실 \\\"내 일에서 어디가 생각으로 이뤄지는지 모르겠다\\\"와 같은 질문입니다.\",\"body_en\":\"A language model is the automation of thought.\\nIts surface is everything you do with thinking.\\n\\nChatGPT looks \\\"infinite\\\" for one boring reason: thought is language. Brainstorming, planning, decision-making, analysis, persuasion — all of them happen in words. So a language model isn't a domain tool; it's an automation layer over every task that runs through thinking. \\\"I'm not sure where to use ChatGPT\\\" is functionally the same question as \\\"I'm not sure which parts of my work are made of thinking.\\\"\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH11-01\",\"date\":\"2024-05-01\",\"original\":\"ChatGPT의 포텐셜은 진짜 무궁무진하다… 이 언어모델이기 때문이에요. 이 언어모델이란 것은 결국은 이 생각을 자동화시킬 수 있다는 거거든요. 생각으로 하는 거의 모든 일에 적용이 가능하다 보니까 뭐 적용이 안 되는 부분이 없지요… 생각이 즉 언어거든요.\"}]},{\"id\":\"leader-must-be-replaceable\",\"label\":\"leader-must-be-replaceable\",\"claim_ko\":\"리더는 자신이 없어도\\n돌아가도록 만들어야 합니다.\",\"claim_en\":\"A leader has to engineer their own\\nreplaceability.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\",\"meta-life\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-26\",\"body_ko\":\"리더는 자신이 없어도\\n돌아가도록 만들어야 합니다.\\n\\n예전에는 휴가가 설레었는데 이제는 두렵습니다. 휴가를 써도 미팅은 사라지는 게 아니라 나중으로 밀립니다. 어떤 일은 저를 대신할 사람이 없다는 것을 이미 압니다. 대신할 사람이 잘 해낼지 걱정됩니다. 가끔 휴가 때 놓친 일이 두 배로 돌아오기도 합니다. 하지만 **이건 잘못된 것입니다.** 제가 성장하려면 **'내가 없어도' 회사가 잘 굴러가야 합니다.** 그러지 않다면 뭔가 잘못하고 있는 것입니다. **내가 bottleneck이 되지 말아야 합니다.** 가끔은 무작정 휴가를 써서 테스트를 해 보는 것도 나쁘지 않은 것 같습니다.\",\"body_en\":\"A leader has to engineer their own\\nreplaceability.\\n\\nTime off used to be exciting. Now it's stressful. Time off doesn't make meetings vanish — it pushes them later. Some work has no substitute for me, and I already know it. I worry whether my backup can carry it. Sometimes whatever I missed comes back doubled when I'm back. But **this is wrong.** For me to grow, *the company has to run fine without me.* If it doesn't, something's broken. **I cannot be the bottleneck.** Honestly, sometimes the right move is to take time off *specifically* to stress-test that — and see what the team does without me.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGhGNn-vpB4\",\"date\":\"2025-02-26\",\"original\":\"예전에는 휴가를 쓰는 일이 설레었는데, 이제는 두렵다.\\n\\n- 휴가를 써도 미팅이 사라지는 게 아니라 나중으로 밀린다.\\n- 어떤 일은 나를 대신할 사람이 없다는 걸 이미 안다.\\n- 나를 대신할 사람이 잘 해낼지 걱정된다.\\n- 가끔은 휴가때 내가 놓친 일이 두 배로 돌아올 때도 있다.\\n\\n하지만 이건 잘못된 거다. \\n내가 성장하려면, *내가 없어도* 회사가 잘 굴러가야 한다.\\n그러지 않다면, 뭔가 잘못하고 있는 거다. \\n\\n내가 bottleneck 이 되지 말아야한다.\\n\\n가끔은 무작정 휴가를 써서 테스트를 해보는것도 나쁘지 않은것 같기도?\"}]},{\"id\":\"leader-owns-team-mistakes\",\"label\":\"leader-owns-team-mistakes\",\"claim_ko\":\"팀원의 실수도\\n결국 리더의 책임입니다.\",\"claim_en\":\"Your team's mistakes\\nare ultimately your mistakes.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-26\",\"body_ko\":\"팀원의 실수도\\n결국 리더의 책임입니다.\\n\\n처음엔 이 말이 이해되지 않았습니다. \\\"내가 직접 잘못하지 않은 일이 어떻게 내 잘못인가?\\\" 메타에서 팀 리드를 하면서 알게 됐습니다. 첫째, 내가 제대로 가이드했다면 실수를 막을 수 있었습니다. 둘째, 내가 한 번 더 체크했으면 문제를 줄일 수 있었습니다. 셋째, 내가 더 좋은 환경을 만들었으면 팀이 더 잘 성장할 수 있었습니다. 결국 리더라면 팀 안의 모든 문제는 내가 해결해야 할 문제입니다. **남 탓을 하는 순간, 내 성장도 멈춥니다.** 진짜 리더는 문제를 소유하고 해결하는 사람입니다.\",\"body_en\":\"Your team's mistakes\\nare ultimately your mistakes.\\n\\nThat sentence took me a while to accept. *\\\"How is something I didn't do my fault?\\\"* Then I became a tech lead at Meta and the picture filled in. One: if I'd guided better, the mistake wouldn't have happened. Two: one extra review pass on my end would have caught it. Three: a better team environment would have made the same person less likely to slip. Four: if you're the leader, every problem inside the team is your problem to solve. **The moment you blame someone else, your growth stops.** A real leader owns the problem and fixes it.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGFoAzQxYbJ\",\"date\":\"2025-02-26\",\"original\":\"내 팀원의 실수도 결국 내 책임이다.\\n\\n처음엔 이 말이 이해 안 갔다.\\n\\\"내가 직접 잘못하지 않은 일도 과연 내 잘못일까?\\\"\\n\\n근데 메타에서 팀 리드를 하면서 깨달았다.\\n\\n1. 내가 제대로 가이드했다면 실수를 막을 수 있었다.\\n2. 내가 한번 더 체크했으면 문제를 줄일 수 있었다.\\n3. 내가 더 좋은 환경을 만들었으면 팀이 더 잘 성장할 수 있었다.\\n4. 결국 리더라면 모든 팀 내의 문제는 내가 해결해야할 문제다.\\n\\n남 탓하는 순간, 내 성장도 멈춘다.\\n진짜 리더는 문제를 소유하고 해결하는 사람이다.\\n\\n혹시 누군가를 탓하고 있다면, 되려 스스로에게 물어보자.\"}]},{\"id\":\"leaders-keep-moving-without-answers\",\"label\":\"leaders-keep-moving-without-answers\",\"claim_ko\":\"높은 자리는 답을 아는 사람이 아니라\\n모르는 채로 앞으로 가는 사람의 자리입니다.\",\"claim_en\":\"The higher seat doesn't go to whoever knows the answer.\\nIt goes to whoever moves forward without one.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\",\"meta-life\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-05\",\"body_ko\":\"높은 자리는 답을 아는 사람이 아니라\\n모르는 채로 앞으로 가는 사람의 자리입니다.\\n\\n메타에서 VP들과 1:1이 잡힐 때는 항상 마음이 떨립니다. 연봉이 수십억, 때로는 백억까지 되는 사람들이 저에게 30분을 투자했다는 것을 생각하면 그 시간이 얼마나 비싼지 알기에 나도 모르게 긴장됩니다. 하지만 몇 번을 겪고 나서 알게 된 사실이 있습니다. **그들도 결국 다 똑같은 사람입니다.** 그 위치까지 올라간 사실만으로도 대단하지만, 그렇다고 늘 정답을 아는 건 아니었습니다. 그들도 고민하고, 틀리고, 다시 고칩니다. 다만 한 가지가 달랐습니다. **불확실해도 절대 멈추지 않습니다.** 높은 자리로 간다는 것은 답을 많이 아는 사람이 아니라, 오히려 **모르는 상태에서조차 앞으로 가는 방법을 아는 사람**이 되는 것입니다. **AI 시대도 결국 같습니다.** 중요한 건 지식보다 **질문의 크기와 실행의 속도**입니다. 그리고 그게 반복되면 결국 **'보는 눈'**이 생깁니다.\",\"body_en\":\"The higher seat doesn't go to whoever knows the answer.\\nIt goes to whoever moves forward without one.\\n\\nI always get nervous when a 1:1 with a Meta VP shows up on my calendar. People earning multiple millions, sometimes ten million, blocking out 30 minutes — *that time is expensive,* and I feel it. But after enough of those meetings, here's what I learned. **They're all just people too.** Getting to that level is genuinely impressive — and yet, they don't always know the answer either. They hesitate, they get it wrong, they correct course. The single thing that's different: **they don't stop moving even when it's unclear.** Climbing means becoming **the person who knows how to move forward without an answer** — not the person who has all of them. **The AI era works the same way.** What matters isn't *knowledge*. It's **the size of the question you ask and the speed at which you execute.** Do that long enough and the \\\"eye\\\" — pattern recognition — eventually shows up.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DX80azdG6oT\",\"date\":\"2026-05-05\",\"original\":\"메타에서 VP들과 1:1이 잡힐때는 항상 마음이 떨린다.\\n연봉이 수십억, 아니 때로는 백억까지 되는 사람들이,\\n나에게 30분이라는 시간을 투자했다고 생각하면,\\n그 시간이 얼마나 \\\"비싼지\\\" 알기에 나도 모르게 긴장이 된다.\\n\\n하지만 몇번을 겪고나고 알게 된 사실이 있다.\\n\\n그들도 결국 다 똑같은 사람이다.\\n\\n물론 그 위치까지 올라간 사실만으로도 대단하지만\\n그렇다고 해서 그들이 늘 정답을 아는 건 아니었다.\\n그들도 고민하고, 틀리고, 다시 고친다.\\n\\n다만 한 가지가 달랐다.\\n불확실해도 절대 멈추지 않는다.\\n\\n높은 자리로 간다는 건\\n답을 많이 아는 사람이 아니라,\\n오히려 모르는 상태에서 조차 앞으로 가는 방법을 아는 사람이 되는 것.\\n\\nAI 시대도 결국 같다.\\n\\n중요한 건 지식보다\\n질문의 크기와 실행의 속도다.\\n그리고 그게 반복되면 결국 \\\"보는 눈\\\" 이 생긴다.\"}]},{\"id\":\"learning-has-an-order\",\"label\":\"learning-has-an-order\",\"claim_ko\":\"배움에는 순서가 있습니다.\\n믿음 → 목격 → 활용 → 행동.\",\"claim_en\":\"Learning has an order. Belief → Witness → Utilize → Act.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"learning\",\"ai-native\"],\"theses\":[\"pillar-framework\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2026-05-05\",\"body_ko\":\"배움에는 순서가 있습니다.\\n믿음 → 목격 → 활용 → 행동.\\n\\n순서를 어기면 다음 단계가 무너집니다. **믿음이 비면 목격이 안 되고, 목격이 비면 활용이 안 되고, 활용이 비면 행동은 흉내에 그칩니다.** 자가진단에서 가장 먼저 막힌 단계가 곧 출발점입니다.\",\"body_en\":\"Learning has an order. Belief → Witness → Utilize → Act.\\n\\nSkip a step and the next one collapses. Without belief there's no witnessing; without witnessing there's no utilization; without utilization, action is just mimicry. Whatever breaks first in your self-assessment — that's where to start.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"src/content/courses/ai-native/slides/ch00.json\",\"date\":\"2026-05-05\",\"original\":\"slide 2.7 (framework-map subtitle):\\n한 단계가 비면 다음 단계가 무너집니다.\\n믿음 없이 목격이 안 되고, 목격 없이 활용이 안 되고, 활용 없이 행동은 흉내에 그칩니다.\"},{\"platform\":\"lecture\",\"url\":\"src/content/courses/ai-native/slides/ch00.json\",\"date\":\"2026-05-05\",\"original\":\"slide 2.11 (takeaway):\\n배움에는 순서가 있습니다.\\n믿음 → 목격 → 활용 → 행동.\\ncontext: 5문항 중 한 줄이라도 막혔다면 바로 그 단계가 당신이 바꿔야 할 자리입니다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"믿음. 일단 세상이 바뀐 것을 받아들이고 AI가 거의 대부분의 일을 생각보다 잘한다라는 믿음을 전제로 우리가 많은 것들을 시도해 볼 거예요.\\n두 번째는 목격입니다. 오케이, 잘 되는 건 알겠는데 실제로 누군가가 써서 보여주지 않으면 그 믿음이라는 게 생기기가 되게 어렵잖아요.\\n세 번째는 활용입니다. 본 건 좋은데, 믿는데 한 번도 안 써봤다면 사실 하나도 의미가 없거든요.\\n마지막으로는 … 행동. 나의 생각과 나의 테이스트가 어느 정도 반영이 돼야 돼요. 그게 저는 진짜 진정한 AI Native라고 생각을 하는데.\"}]},{\"id\":\"llm-bookkeeping-is-where-knowledge-bases-die\",\"label\":\"llm-bookkeeping-is-where-knowledge-bases-die\",\"claim_ko\":\"개인 지식 베이스는 읽기 부담이 아니라 유지보수 부담 때문에 죽습니다.\\nLLM은 지치지 않고, 상호 참조를 잊지 않으며, 한 번에 15개 파일을 만질 수 있어서 위키가 비로소 지속 가능해집니다.\",\"claim_en\":\"Personal knowledge bases die from maintenance burden, not from reading burden. LLMs don't get bored, don't forget cross-references, and can touch fifteen files in one pass — making the wiki finally sustainable.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Andrej Karpathy\",\"author_handle\":\"@karpathy\",\"publication\":\"GitHub Gist\",\"url\":\"https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f\",\"published_at\":\"2026-04-01\"},\"path\":\"\",\"topics\":[\"memory-systems\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-01\",\"body_ko\":\"개인 지식 베이스는 읽기 부담이 아니라 유지보수 부담 때문에 죽습니다.\\nLLM은 지치지 않고, 상호 참조를 잊지 않으며, 한 번에 15개 파일을 만질 수 있어서 위키가 비로소 지속 가능해집니다.\\n\\n카르파시의 \\\"왜 작동하는가\\\" 성찰입니다. 모든 이전 개인 지식관리 시도의 실패 모드를 정확히 짚습니다(Memex, Roam, Obsidian 단독, Tana 등): 인간은 유지보수 비용이 가치보다 빠르게 커질 때 위키를 포기합니다. LLM은 유지보수를 비용으로 느끼지 않습니다. 한 번에 15개 파일을 만질 수 있다는 능력이 핵심 주장입니다 — 상호 참조 그래프를 열망이 아닌 실제로 유지 가능한 것으로 만드는 변수입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f\",\"date\":\"2026-04-01\",\"original\":\"The tedious part of maintaining a knowledge base is not the reading or the thinking — it's the bookkeeping. Humans abandon wikis because the maintenance burden grows faster than the value. LLMs don't get bored, don't forget to update a cross-reference, and can touch 15 files in one pass.\"}]},{\"id\":\"llm-index-files-beat-fancy-rag-at-small-scale\",\"label\":\"llm-index-files-beat-fancy-rag-at-small-scale\",\"claim_ko\":\"소규모(~100 문서 · ~40만 단어)에서는 LLM이 자동 유지하는 인덱스 파일과 짧은 요약이 정교한 RAG를 이깁니다.\\n명시적 인덱스 읽기가 벡터 검색을 능가하는 구간이 — 코퍼스가 훨씬 커지기 전까지 — 존재합니다.\",\"claim_en\":\"At small scale (~100 articles / ~400K words), an LLM auto-maintaining index files and brief summaries outperforms fancy RAG — explicit index-reading beats vector retrieval until the corpus grows much larger.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Andrej Karpathy\",\"author_handle\":\"@karpathy\",\"publication\":\"x.com\",\"url\":\"https://x.com/karpathy/status/2039805659525644595\",\"published_at\":\"2026-04-02\"},\"path\":\"\",\"topics\":[\"memory-systems\",\"ai-tooling\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-02\",\"body_ko\":\"소규모(~100 문서 · ~40만 단어)에서는 LLM이 자동 유지하는 인덱스 파일과 짧은 요약이 정교한 RAG를 이깁니다.\\n명시적 인덱스 읽기가 벡터 검색을 능가하는 구간이 — 코퍼스가 훨씬 커지기 전까지 — 존재합니다.\\n\\n카르파시가 직접 패턴을 굴려 보고 도달한 구체적 스코프 주장입니다(2026년 4월). \\\"확장하려면 RAG가 필요하다\\\"는 기본 가정 — 소규모에서는 틀렸습니다. LLM이 인덱스 파일과 짧은 요약을 직접 읽는 것만으로 대부분의 질의가 해결됩니다. 임베딩도 벡터 스토어도 필요 없습니다. 알렉스의 브레인(현재 143 thoughts)은 정확히 이 구간 안에 있습니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://x.com/karpathy/status/2039805659525644595\",\"date\":\"2026-04-02\",\"original\":\"I thought I had to reach for fancy RAG, but the LLM has been pretty good about auto-maintaining index files and brief summaries of all the documents and it reads all the important related data fairly easily at this ~small scale.\"}]},{\"id\":\"llm-token-throughput-shifting-from-code-to-knowledge\",\"label\":\"llm-token-throughput-shifting-from-code-to-knowledge\",\"claim_ko\":\"LLM 토큰 처리량이 코드 조작에서 지식 조작으로 옮겨가고 있습니다.\\n마크다운과 이미지로 구성된 지식 베이스가, 코드 편집보다 더 큰 비중의 LLM 사이클을 가져갑니다.\",\"claim_en\":\"LLM token throughput is shifting from manipulating code to manipulating knowledge. Markdown-and-image knowledge bases are taking a larger share of LLM cycles than code edits — knowledge has become the primary surface where leverage compounds.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Andrej Karpathy\",\"author_handle\":\"@karpathy\",\"publication\":\"x.com\",\"url\":\"https://x.com/karpathy/status/2039805659525644595\",\"published_at\":\"2026-04-02\"},\"path\":\"\",\"topics\":[\"memory-systems\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-02\",\"body_ko\":\"LLM 토큰 처리량이 코드 조작에서 지식 조작으로 옮겨가고 있습니다.\\n마크다운과 이미지로 구성된 지식 베이스가, 코드 편집보다 더 큰 비중의 LLM 사이클을 가져갑니다.\\n\\n카르파시의 개인 관측 성찰입니다(2026년 4월). 신호는 본인의 토큰이 어디로 가는지에 있습니다 — 코드보다 지식에 더 많이 갑니다. 두 달 뒤 같은 패턴을 \\\"LLM Wiki\\\" 기시트로 정식화하지만, 이 트윗은 그보다 먼저 — \\\"시대 자체가 바뀌고 있다\\\"는 더 느슨한 관측입니다. AI 네이티브의 생산성은 \\\"AI가 코딩을 도와준다\\\"에서 \\\"AI가 사고를 도와준다\\\"로 이동하고 있습니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://x.com/karpathy/status/2039805659525644595\",\"date\":\"2026-04-02\",\"original\":\"a large fraction of my recent token throughput is goin
