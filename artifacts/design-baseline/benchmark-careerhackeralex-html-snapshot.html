g less into manipulating code, and more into manipulating knowledge (stored as markdown and images). The latest LLMs are quite good at it.\"}]},{\"id\":\"llm-wiki-is-persistent-not-stateless-rag\",\"label\":\"llm-wiki-is-persistent-not-stateless-rag\",\"claim_ko\":\"LLM이 유지하는 개인 지식 베이스는 무상태 RAG와 다릅니다.\\nLLM이 영구적인 위키 — 추가되는 모든 소스와 함께 누적되는 구조화·상호 연결된 마크다운 모음 — 를 점진적으로 만들고 유지하므로, 매 질의마다 원본 청크에서 지식을 재도출하지 않습니다.\",\"claim_en\":\"LLM-maintained personal knowledge bases differ from stateless RAG: the LLM incrementally builds and maintains a persistent wiki — a structured, interlinked markdown collection that compounds with every source added — rather than re-deriving knowledge from raw chunks on every query.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Andrej Karpathy\",\"author_handle\":\"@karpathy\",\"publication\":\"GitHub Gist\",\"url\":\"https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f\",\"published_at\":\"2026-04-01\"},\"path\":\"\",\"topics\":[\"memory-systems\",\"ai-coding\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-01\",\"body_ko\":\"LLM이 유지하는 개인 지식 베이스는 무상태 RAG와 다릅니다.\\nLLM이 영구적인 위키 — 추가되는 모든 소스와 함께 누적되는 구조화·상호 연결된 마크다운 모음 — 를 점진적으로 만들고 유지하므로, 매 질의마다 원본 청크에서 지식을 재도출하지 않습니다.\\n\\n카르파시가 2026년 4월 \\\"LLM Wiki\\\" 기시트에서 정리한 패턴의 원조 진단입니다. 대조가 핵심입니다: NotebookLM / ChatGPT 파일 업로드 / 일반 RAG는 매 질의마다 답을 재도출하지만, 위키 패턴은 세션 간에 누적됩니다. 위키는 산출물이고, LLM은 그것의 관리자입니다. Anthropic/Claude Code의 기존 아키텍처(스키마로서의 CLAUDE.md)가 자연스럽게 들어맞습니다. 알렉스의 memory/ 트리는 이 패턴을 프로덕션에서 구현합니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f\",\"date\":\"2026-04-01\",\"original\":\"The LLM incrementally builds and maintains a persistent wiki — a structured, interlinked collection of markdown files that sits between you and the raw sources. When you add a new source, the LLM doesn't just index it for later retrieval. It reads it, extracts the key information, and integrates it into the existing wiki.\"}]},{\"id\":\"llm-wiki-schema-is-the-highest-leverage-artifact\",\"label\":\"llm-wiki-schema-is-the-highest-leverage-artifact\",\"claim_ko\":\"LLM이 유지하는 위키에서, 스키마 파일(CLAUDE.md / AGENTS.md)이 가장 레버리지가 큰 산출물입니다.\\nLLM을 범용 챗봇에서 세션 간 일관된 동작을 유지하는 규율 있는 위키 관리자로 바꾸는 단 하나의 구성 파일입니다.\",\"claim_en\":\"In an LLM-maintained wiki, the schema file (CLAUDE.md / AGENTS.md) is the highest-leverage artifact — the single configuration that turns the LLM from a generic chatbot into a disciplined wiki maintainer with consistent behavior across sessions.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Andrej Karpathy\",\"author_handle\":\"@karpathy\",\"publication\":\"GitHub Gist\",\"url\":\"https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f\",\"published_at\":\"2026-04-01\"},\"path\":\"\",\"topics\":[\"memory-systems\",\"ai-coding\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-01\",\"body_ko\":\"LLM이 유지하는 위키에서, 스키마 파일(CLAUDE.md / AGENTS.md)이 가장 레버리지가 큰 산출물입니다.\\nLLM을 범용 챗봇에서 세션 간 일관된 동작을 유지하는 규율 있는 위키 관리자로 바꾸는 단 하나의 구성 파일입니다.\\n\\n카르파시의 기시트에서 한 프로덕션 사용자의 댓글이 이 주장을 더 날카롭게 만들었습니다: \\\"CLAUDE.md 스키마는 시스템에서 가장 레버리지가 큰 산출물이다. 대부분의 사람들이 이것을 건너뛰고 왜 LLM이 세션마다 일관성 없게 행동하는지 의문을 가진다.\\\" 알렉스의 `memory/CLAUDE.md`는 이 작동 사례입니다 — 200줄 이상의 스키마가 모든 Claude Code 세션을 일회성 요약기가 아닌 규율 있는 메모리 관리자로 바꿉니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f\",\"date\":\"2026-04-01\",\"original\":\"The schema (e.g. CLAUDE.md for Claude Code or AGENTS.md for Codex) is the key configuration file — it's what makes the LLM a disciplined wiki maintainer rather than a generic chatbot.\"}]},{\"id\":\"logic-pushback-creates-leverage\",\"label\":\"logic-pushback-creates-leverage\",\"claim_ko\":\"묵묵히 일하면 실행자에 머무릅니다.\\n논리로 부딪혀야 영향력이 생깁니다.\",\"claim_en\":\"Heads-down execution keeps you an executor.\\nLogical pushback is what builds leverage.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"leadership\"],\"theses\":[\"bigtech-comp-is-a-system\",\"move-first-or-lose-the-game\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-01\",\"body_ko\":\"묵묵히 일하면 실행자에 머무릅니다.\\n논리로 부딪혀야 영향력이 생깁니다.\\n\\n오늘도 디렉터와 대판 붙었습니다. 논리를 쌓고, 데이터를 모으고, 케이스를 정리해 에스컬레이트하는 과정은 솔직히 힘듭니다. 그러나 실리콘밸리에서 'value add' 한다는 것은 결국 이걸 견딘다는 뜻입니다. **아무 말 없이 묵묵히 일하면 시키는 일만 하는 실행자에 그칩니다.** 철저하게 논리로 부딪혀야 내 아이디어가 반영되고, 영향력이 커지며, 그릇이 커지고, 리더십이 쌓입니다. 그 과정에서 생기는 수많은 노이즈를 적절히 수용하고 적절히 무시하는 능력도 같이 큽니다.\",\"body_en\":\"Heads-down execution keeps you an executor.\\nLogical pushback is what builds leverage.\\n\\nArgued with our director again today. Building the logic, gathering the data, structuring the case, escalating the position — it's exhausting. But this is what *value-add* actually looks like in Silicon Valley. **Quiet heads-down work makes you the person who executes assignments, full stop.** Rigorous logical pushback is how your ideas get adopted, how your influence grows, how your scope expands, how leadership accumulates. The cost is constant friction; the skill that comes with it is learning which signal to take in and which noise to ignore.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFhPYytxuTw\",\"date\":\"2025-02-01\",\"original\":\"오늘도 우리팀 1황 디렉터랑 머리 대고 대판 붙었다.\\n\\n솔직히 힘들었다.\\n일일이 논리 쌓고, 데이터 모으고, 케이스 정리해서 Escalate 하는 과정이.\\n\\n근데, 실리콘밸리에선 이걸 견뎌야 \\\"value add\\\"가 된다.\\n\\n오늘의 생각 노트:\\n- 아무 말 없이 묵묵히 일하면 시키는 일만 하는 '실행자'일 뿐. 내가 더하는 건 없다.\\n- 철저하게 논리로 부딪혀야 내 아이디어가 반영되고, 영향력이 커진다.\\n- 불편함을 감수해야 성장한다. 그릇이 커지고, 리더십이 쌓이고, 커리어가 올라간다.\\n- 그리고 그 과정에서 생기는 수많은 노이즈를 적절히 수용하고 적절히 무시해야 한다.\"}]},{\"id\":\"longform-success-six-rules\",\"label\":\"longform-success-six-rules\",\"claim_ko\":\"롱폼이 성공하는 비밀은\\n주제 · 썸네일 · 인트로 · 자연스러움 · 쉬움 · 나눔 여섯 가지입니다.\",\"claim_en\":\"Longform succeeds on six things:\\nsubject, thumbnail, intro, naturalness, simplicity, generosity.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"creator-economy\"],\"theses\":[\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-26\",\"body_ko\":\"롱폼이 성공하는 비밀은\\n주제 · 썸네일 · 인트로 · 자연스러움 · 쉬움 · 나눔 여섯 가지입니다.\\n\\n드디어 롱폼 성공의 비밀을 알아냈습니다. 여섯 가지만 기억하시면 됩니다. **첫째, 주제** — 일단 사람들이 궁금해해야 합니다. **둘째, 제목과 썸네일** — 보자마자 누르고 싶어야 합니다. **셋째, 인트로** — 무조건 30초 안에 'sell' 해야 합니다. **넷째, 내용** — 자연스럽게. 대본은 버리십시오. **다섯째, 쉽게** — 누구든지 알아들을 수 있게. **여섯째, 나눠라** — 시청자가 뭐라도 가져갈 수 있게.\",\"body_en\":\"Longform succeeds on six things:\\nsubject, thumbnail, intro, naturalness, simplicity, generosity.\\n\\nI finally cracked longform. Six things, that's the whole list. **One, subject** — make people *want* to know. **Two, title + thumbnail** — has to compel a click on sight. **Three, intro** — sell in the first 30 seconds, no exceptions. **Four, content** — make it natural; ditch the script. **Five, simplicity** — anyone should be able to follow. **Six, generosity** — every viewer should walk away with something.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFMxx44R6du\",\"date\":\"2025-01-26\",\"original\":\"드디어 롱폼 성공의 비밀을 알아냈다.\\n\\n딱 알려줄게 다음만 기억해:\\n1. 주제 - 일단 사람들이 궁금해 해야함\\n2. 제목 / 썸네일 - 딱 봐도 누르고 싶어야 함\\n3. 인트로 - 무조건 30초 안에 \\\"sell\\\" 해야함\\n4. 내용 - 자연스럽게. 대본x\\n5. 쉽게 - 누구든지 알아들을 수 있게\\n6. 나눠라 - 시청자들이 뭐라도 가져갈 수 있게\\n\\n이것만 지켜도 반드시 성공한다고 봐.\"}]},{\"id\":\"manage-up-via-warmth-facts-questions\",\"label\":\"manage-up-via-warmth-facts-questions\",\"claim_ko\":\"말 안 통하는 상사를 바꾸는 길은\\n호감·팩트·역질문 세 단계입니다.\",\"claim_en\":\"To shift a difficult boss, three moves —\\nbuild warmth first, speak in facts second, ask back third.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\",\"career-strategy\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2023-11-01\",\"body_ko\":\"말 안 통하는 상사를 바꾸는 길은\\n호감·팩트·역질문 세 단계입니다.\\n\\n말이 안 통하고 일도 못 하는 상사 때문에 사표를 만지작거리는 사람이 가장 많습니다. 저도 그런 상사를 겪었고, 솔직히 사표 직전까지 갔습니다. 하지만 다음 **세 단계**로 그 갈등을 풀었고, 지금은 그 사람과 친합니다.\\n\\n**1단계 — 호감부터 만듭니다.** \\\"이번 주말 뭐 하셨어요?\\\" 한 마디면 절반은 끝납니다. 적대적인 관계에서는 어떤 갈등도 풀리지 않습니다. 상대가 나에게 호감을 갖게 되는 것이 모든 협상의 시작입니다 — *설득의 심리학*(치알디니)도 그 점을 정확히 지적합니다. 싫은 사람일수록 먼저 다가가야 합니다. 내가 피하면 결국 나만 손해입니다.\\n\\n**2단계 — 감정 빼고 팩트로만 말합니다.** \\\"이건 안 되는 거 아닌가요?\\\" 대신 \\\"지난달 옵션 A를 했을 때 8주 딜레이가 있었으니 옵션 B가 더 효율적일 것으로 보입니다.\\\" 팩트는 상대를 비판하지 않고 **상황을 진단**합니다. 그래서 상대도 동의하기 쉽습니다.\\n\\n**3단계 — 역으로 질문해서 스스로 답하게 만듭니다.** 아무리 설명해도 안 통하면, \\\"혹시 제가 놓친 부분이 있을까요? 부장님은 왜 A라고 생각하세요?\\\"로 돌려세웁니다. 따지는 게 아니라 정말 궁금해서 묻는 것입니다. 그러면 상대가 스스로 답을 만들어 가거나, 내가 모르던 정보가 드러납니다.\\n\\n이 세 단계는 **적대자를 협력자로 바꾸는 일반 알고리즘**입니다. 메타 안에서나 밖에서나 동일하게 작동합니다.\",\"body_en\":\"$16\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=JNJ3WnHkPl8\",\"date\":\"2023-11-01\",\"original\":\"같이 일하기 너무나 힘든 상사 대처법 첫 번째 — 땡땡 님 이번 주말에 뭐 하셨어요라고 한마디만\\n던져본다. 이 멘트를 하시는 순간 이미 문제의 절반은 해결됐다고 봅니다. 일단 호의적인 관심을\\n가지라는 거죠. 그 어떤 갈등이지 상대방과의 문제를 풀려면 일단 소통을 해야 합니다. 그리고\\n원활한 소통을 하려면 절대 그 사람과 적대적인 관계를 만들면 안 됩니다.\\n\\n로버트 비 치알디니 설득의 심리학에 이런 말이 있어요. 우리는 좋아하는 사람에게 더 쉽게 영향을\\n받는다. 관심을 보이거나 공통점을 찾는 등의 제스처로 상대의 호감을 증가시킬 수 있다.\\n\\n두 번째 상사 대처법 — 대화할 때 내 감정을 모두 빼고 팩트로만 얘기해라. 팩트만 논리적\\n근거와 주장으로 마치 이제 3자가 얘기하듯 이야기하는 거예요. 마치 나는 없다는 듯이 이야기하는게\\n중요합니다. 내가 주장을 하는게 아니라 이 팩트가 이야기를 하는 거죠.\\n\\n세 번째 — 역으로 질문해라. 그래서 본인 스스로 말하게끔 해라. 상사와 대화를 할 때 아무리\\n설명해도 말이 통하지 않는다면 반대로 역으로 질문해 보세요. 본인 스스로가 답을 댈 때까지.\\n혹시 제가 놓친 부분이 있나요? 부장님께서는 왜라고 생각하세요? 정말 순수한 마음으로 물어보라는\\n거예요. 왜 그렇게 생각하는지에 대해서.\"}]},{\"id\":\"masterclass-doc-injects-other-peoples-expertise\",\"label\":\"masterclass-doc-injects-other-peoples-expertise\",\"claim_ko\":\"Deep Research로 작성한 \\\"마스터클래스\\\" 마크다운(예: advertising_masterclass.md)을 Claude Code 프로젝트에 두십시오.\\n모든 에이전트가 모델의 디폴트 대신 실제 도메인 지식을 참조하게 되어, LLM이 아니라 그 문서가 주제 전문가가 됩니다.\",\"claim_en\":\"Drop a Deep-Researched \\\"masterclass\\\" markdown (e.g. advertising_masterclass.md) into the Claude Code project so every agent references real domain expertise instead of LLM defaults — the doc, not the LLM, becomes the subject-matter expert.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/xn6Z5PYyAIE\",\"published_at\":\"2026-05-04\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-native\",\"prompt-engineering\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-04\",\"body_ko\":\"Deep Research로 작성한 \\\"마스터클래스\\\" 마크다운(예: advertising_masterclass.md)을 Claude Code 프로젝트에 두십시오.\\n모든 에이전트가 모델의 디폴트 대신 실제 도메인 지식을 참조하게 되어, LLM이 아니라 그 문서가 주제 전문가가 됩니다.\\n\\n에이전트 품질은 큐레이팅된 참조 문서로 확장됩니다 — 단순히 프롬프트를 잘 짜는 일이 아닙니다. Alex의 brain-as-SME 패턴과 직결됩니다: memory/ 트리 자체가 큐레이팅된 SME 문서 세트이고, thought가 그 원자입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/xn6Z5PYyAIE\",\"date\":\"2026-05-04\",\"original\":\"If you're not a master copywriter or advertiser, it might be really tough for you to build amazing tier one advertisement copy... what you can do with Claude is you can utilize other people's expertise and you can bring that in to make Claude code the subject matter expert here.\"}]},{\"id\":\"mcp-first-instinct-burns-the-context-window\",\"label\":\"mcp-first-instinct-burns-the-context-window\",\"claim_ko\":\"MCP가 보이면 일단 붙입니다 — 그게 함정입니다.\\nMCP가 매 세션마다 도구 카탈로그를 컨텍스트로 끌어오는 동안, CLI는 호출 순간에만 토큰을 씁니다.\",\"claim_en\":\"Reaching for MCP first is the trap. While MCP loads the tool catalog into context every session, a CLI spends tokens only when the agent calls it.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"synthesized\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"prompt-engineering\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-16\",\"body_ko\":\"MCP가 보이면 일단 붙입니다 — 그게 함정입니다.\\nMCP가 매 세션마다 도구 카탈로그를 컨텍스트로 끌어오는 동안, CLI는 호출 순간에만 토큰을 씁니다.\\n\\nNate Herk 측정 (2026-05) — 같은 작업에서 MCP가 토큰 35배, 신뢰도는 100%에서 72%로 떨어집니다.\\n\\n비개발자가 가장 먼저 듣는 단어가 MCP라는 것이 함정의 정체입니다. 튜토리얼이 MCP를 가르치기 때문에 — 정작 에이전트가 빠른 표면은 CLI입니다.\",\"body_en\":\"Reaching for MCP first is the trap. While MCP loads the tool catalog into context every session, a CLI spends tokens only when the agent calls it.\\n\\nNate Herk's measurement (2026-05) — same task, 35× more tokens with MCP and reliability drops from 100% to 72% as task complexity grows.\\n\\nNon-engineers hear MCP first because tutorials teach MCP. The surface that actually keeps the agent fast is the CLI.\",\"sources\":[]},{\"id\":\"meta-engineers-share-10x-tactics-daily\",\"label\":\"meta-engineers-share-10x-tactics-daily\",\"claim_ko\":\"메타 내부에서는 매일\\n최소 10명이 10배 생산성 방법을 공유합니다.\",\"claim_en\":\"Inside Meta, at least ten engineers a day\\npost their 10× productivity tactics.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[\"bigtech-comp-is-a-system\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2025-07-15\",\"body_ko\":\"메타 내부에서는 매일\\n최소 10명이 10배 생산성 방법을 공유합니다.\\n\\n메타에는 직원들을 위한 내부 쓰레드 같은 플랫폼이 있습니다. 거기에는 매일 최소 10명 이상의 개발자가 AI로 생산성을 10배 이상 늘리는 방법을 저마다 포스트합니다. **집단 지성이 매일 수많은 임팩트를 찾고 나누고 있다는 이야기입니다.** 모두가 곧바로 따라 하는 건 아니지만, 이 기세로만 가면 1년 뒤에 이 회사가 어떤 회사가 되어 있을지 궁금합니다.\",\"body_en\":\"Inside Meta, at least ten engineers a day\\npost their 10× productivity tactics.\\n\\nMeta runs an internal Threads-like platform for employees. Every day, at least ten engineers post their AI-driven productivity tactics — workflows that 10× their output. **Collective intelligence is *daily* surfacing and sharing concrete impact patterns.** Not everyone adopts every move, but if the pace holds, I'm genuinely curious what kind of company this is in twelve months.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DMYdnfgh589\",\"date\":\"2025-07-15\",\"original\":\"메타에는 직원들을 위한 쓰레드 같은게 있는데\\n거기엔 하루마다 최소 열명의 개발자가 AI로 생산성을 10배 이상 늘리는 방법을 저마다 포스트한다.\\n집단 지성이 매일같이 저마다 수많은 임팩을 찾고 나누고 있다는 이야기다.\\n물론 모두가 다 곧바로 따라하는건 아니지만\\n이 기세로만 간다면 1년뒤에는 대체 어떤 회사가 되버릴지 궁금하긴 하다.\"}]},{\"id\":\"meta-internal-runs-on-likes-too\",\"label\":\"meta-internal-runs-on-likes-too\",\"claim_ko\":\"메타 내부에서도\\n좋아요와 댓글로 존재감이 만들어집니다.\",\"claim_en\":\"Inside Meta too,\\nlikes and comments are how presence is built.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2025-01-28\",\"body_ko\":\"메타 내부에서도\\n좋아요와 댓글로 존재감이 만들어집니다.\\n\\n저는 메타 회사 안에서도 매일같이 좋아요를 받으려고 열심히 글을 씁니다. 재미있게도 **메타는 내부 직원만 사용하는 페이스북이 따로 있습니다.** 직원들은 자기 프로젝트에 대한 포스트를 올리고, 댓글을 달고, 남의 프로필에 들어가 팔로우도 합니다. 신기한 것은 **그 안에서도 좋아요가 나름 중요하다**는 점입니다. 내 프로젝트 글을 잘 써서 포스트하고, 잘나가는 다른 직원들에게 좋아요와 댓글을 받아야 **visibility**가 생깁니다. 그래야 다른 사람들도 관심을 갖고 더 많이 봅니다. 그래서 진짜 일 잘하는 사람은, 개발자이고 이과여도 **글을 깔끔하게 써서 좋아요와 댓글을 많이 받습니다**. '세일즈'도 중요한 능력입니다. 결국 쓰레드에 글 잘 쓰는 것도 능력입니다.\",\"body_en\":\"Inside Meta too,\\nlikes and comments are how presence is built.\\n\\nI post inside Meta's company Facebook daily — and yes, I write specifically to get likes there. **Meta runs an internal Facebook for employees only.** People post about their projects, comment, follow each other's profiles. The surprising part: **likes matter inside it too.** Posting well, getting likes and comments from the well-known engineers — that's how *visibility* gets built. From there, more people notice and engage. Which means the actually-best people, even the heads-down coders, **write cleanly enough to pull likes and comments.** Internal sales is a skill. Writing well on Threads is the same skill, just public-facing.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFXC_cwIsGb\",\"date\":\"2025-01-28\",\"original\":\"그거 알아? 나는 메타 회사 안에서도 매일같이 \\\"좋아요\\\"를 받으려고 열심히 글을 써.\\n\\n재미있게도 메타는 내부 직원들만 사용하는 \\\"페이스북\\\" 이 따로 있어.\\n\\n거기서 직원들은 자신의 프로젝트에 대한 포스트도 올리고 댓글도 달고, 남의 프로필 들어가서 팔로우도 하고 그래.\\n\\n근데 정말 신기하다고 생각하는건 거기서도 \\\"좋아요\\\" 가 나름 중요하다는거야.\\n\\n내 프로젝트에 대한 글을 잘써서 포스트하고, 잘나가는 다른 직원들에게 좋아요도 받고 댓글도 달려야 \\\"visibility\\\" 가 생겨. 그래야 다른 사람들도 관심을 가지고 더 많이 본다는거지.\\n\\n그래서 실제로 진짜 일 잘하는 사람은, 아무리 개발자고 이과여도 글을 깔끔하게 잘 써서 좋아요랑 댓글도 많이 받아. \\\"세일즈\\\"도 중요하다는거지거지.\\n\\n내가 하고 싶은 말은, 쓰레드에 글 잘쓰는것도 능력이야.\\n\\n여러분들도 능력자야. 우리 쫄지말고 줄기차게 같이 포스팅해보자.\\n\\n이 글도 좋아요 해줄거지?\"}]},{\"id\":\"meta-level-comp-is-real-and-public\",\"label\":\"meta-level-comp-is-real-and-public\",\"claim_ko\":\"메타 엔지니어 연봉은 레벨별로\\n공개되어 있고 실제 수치입니다.\",\"claim_en\":\"Meta engineer comp by level\\nis real, public, and verifiable.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2025-03-15\",\"body_ko\":\"메타 엔지니어 연봉은 레벨별로\\n공개되어 있고 실제 수치입니다.\\n\\n내가 우리 팀 엔지니어의 연봉이 20억인 걸 아는 이유입니다. 메타 엔지니어들의 실제 연봉 (출처: levels.fyi)입니다. **E3 (신입) — $188K (약 2.5억)**. **E4 (주니어) — $314K (약 4.2억)**. **E5 (시니어) — $484K (약 6.5억)**. **E6 (스태프) — $710K (약 9.5억)**. **E7 (시니어 스태프) — $1.6M (약 21.5억)**. **E8 (디렉터) — $2.45M (약 33억)**. **E9 (시니어 디렉터) — $3.51M (약 47억)**. 놀랍게도 이는 과장이나 거짓이 아닙니다. 회사가 이렇게까지 주는 이유는 **최고의 인재를 모으고 또 잡아 두기 위해서**입니다. 그리고 당연히 그 이상의 가치를 뽑아냅니다. 연봉도 높지만 그만큼 경쟁도 더 치열합니다. **버티는 자만이 살아남습니다.**\",\"body_en\":\"Meta engineer comp by level\\nis real, public, and verifiable.\\n\\nThe reason I know my teammate makes ~2M USD: it's public. The actual Meta engineer ladder (source: levels.fyi). **E3 (new grad) — $188K**. **E4 (junior) — $314K**. **E5 (senior) — $484K**. **E6 (staff) — $710K**. **E7 (senior staff) — $1.6M**. **E8 (director) — $2.45M**. **E9 (senior director) — $3.51M**. These numbers aren't hype — they're verifiable. The company pays this much for one reason: **to attract and retain top talent.** And, predictably, the company extracts more value than that out of those people. The comp is high; the competition is just as high. **Only the ones who outlast actually keep it.**\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHNgZhWxSMb\",\"date\":\"2025-03-15\",\"original\":\"내가 우리팀 엔지니어의 연봉이 20억인 걸 알고 있는 이유:\\n\\n지난번에 올린 글에 댓글이 쏟아졌다.\\n\\n\\\"도대체 연봉이 어떻게 그렇게 나오냐?\\\"\\n\\\"진짜로 그 정도 받는 거 맞냐? 네가 어떻게 아냐\\\"\\n\\n그래서 제대로 가져왔다.\\n다음이 Meta 엔지니어들의 실제 연봉이다.\\n\\nE3 (신입) – $188K (약 2.5억)\\nE4 (주니어) – $314K (약 4.2억)\\nE5 (시니어) – $484K (약 6.5억)\\nE6 (스태프) – $710K (약 9.5억)\\nE7 (시니어 스태프) – $1.6M (약 21.5억)\\nE8 (디렉터) – $2.45M (약 33억)\\nE9 (시니어 디렉터) – $3.51M (약 47억)\\n\\n놀랍게도, 이건 과장이나 거짓이 아니다.\\n \\n회사가 이렇게까지 주는 이유? 최고의 인재를 모으고, 또 잡아두기 위해서다.\\n그리고 당연하게도 그 이상의 가치를 뽑아낸다.\\n연봉도 높지만 그만큼 경쟁도 더 치열하다.\\n버티는 자만이 살아남는다.\\n\\n출처: levels.fyi\"}]},{\"id\":\"meta-rating-system-is-the-fire\",\"label\":\"meta-rating-system-is-the-fire\",\"claim_ko\":\"메타의 진짜 혁신은\\n인재를 갈아 넣는 인사 시스템입니다.\",\"claim_en\":\"Meta's real innovation\\nisn't Facebook or Threads — it's the HR fire.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-07\",\"body_ko\":\"메타의 진짜 혁신은\\n인재를 갈아 넣는 인사 시스템입니다.\\n\\n메타의 가장 큰 혁신은 페이스북도, 쓰레드도 아닙니다. **인재를 갈아 넣는 인사 시스템**입니다. 조금만 못 하면 짤릴 것 같고, 조금만 더 하면 승진할 것 같은 그 시스템. 그것이 사람을 아주 미치게 만듭니다. **'Meets All Expectations' — 기대치에 맞는 성적이라는 Rating을 받으면 놀랍게도 대부분은 자기가 망쳤다고 생각합니다.** 그래서 사람들이 스스로를 불태우며 회사를 성장시킵니다. 많이들 떠나지만, **남은 사람들은 더 강한 불꽃으로 변모됩니다.**\",\"body_en\":\"Meta's real innovation\\nisn't Facebook or Threads — it's the HR fire.\\n\\nMeta's biggest innovation isn't Facebook or Threads. It's **the HR machine that burns people for fuel.** A system where a little underperformance feels like firing-risk, and a little overperformance feels like a promotion away — that's the dial that drives everyone slightly insane. **The rating \\\"Meets All Expectations\\\" is interpreted by nearly everyone who gets it as \\\"I screwed up.\\\"** That's what makes people set themselves on fire growing the company. Many leave. The ones who stay become a hotter version of themselves.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFw5yhfo_FL\",\"date\":\"2025-02-07\",\"original\":\"메타의 가장 큰 혁신은 페이스북도, 쓰레드도 아니다. 바로,\\n\\n\\\"인재를 갈아넣는 인사 시스템이다\\\"\\n\\n조금만 못 하면 짤릴 것 같고,\\n조금만 더 하면 승진할 것 같은 그 시스템.\\n그게 사람을 아주 미치게 만든다.\\n\\n\\\"Meets All Expectations\\\", 즉, \\\"기대치에 맞는 성적\\\" 이라는 Rating 을 받으면,\\n놀랍게도 대부분은 자기가 망쳤다고 생각한다.\\n\\n그래서 사람들이 스스로를 불태우며 회사를 성장시킨다.\\n그리고 많이들 떠나지만, 남은 사람들은 더 강한 불꽃으로 변모된다.\\n\\n이 시스템, 어떻게 생각해?\"}]},{\"id\":\"meta-seniors-split-on-ai-displacement\",\"label\":\"meta-seniors-split-on-ai-displacement\",\"claim_ko\":\"메타 8년차 시니어가 직접 말합니다 —\\n개발자 자체는 사라지지 않습니다. 형태가 바뀝니다.\",\"claim_en\":\"Meta's 8-year senior engineer says it plainly —\\nthe developer role isn't disappearing. Its shape is changing.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\",\"meta-life\"],\"theses\":[\"solo-is-the-new-team-size\",\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-03-25\",\"body_ko\":\"메타 8년차 시니어가 직접 말합니다 —\\n개발자 자체는 사라지지 않습니다. 형태가 바뀝니다.\\n\\n2026년 3월 25일, 제 채널의 첫 게스트로 메타 동료이자 친구인 **제이**를 모셨습니다. 4년차 메타, 총 8년차 시니어 개발자. 그가 보고 있는 시점은 다음과 같습니다.\\n\\n**\\\"솔직히 괜찮지 않습니다.\\\"** 그가 2026년에 유튜브를 시작한 이유 자체가 이 불안 때문이라고 말했습니다. 코드를 쓰던 사람이 하루아침에 코드를 안 쓰는 사람이 되는 변화, 그게 너무 빠르게 체감된다는 것입니다.\\n\\n**팀 안에서 두 부류로 갈립니다.** AI를 잘 쓰는 사람은 *티를 냅니다* — 사내 발표, 내부 교육, 포스트. 20명 팀에서 한두 명이 AI 교육을 맡는 포지셔닝을 잡았고, 그들은 *\\\"AI 시대에 없어서는 안 될 사람\\\"*으로 자리를 굳혔습니다. 반대편은 평가 척도가 잘못 잡혀 있습니다 — AI **사용량 자체**를 척도로 보는 함정에 빠져 있고, 정작 중요한 임팩트 측정 — *얼마나 빨리, 얼마나 많이, 얼마나 돈을 아꼈는가* — 가 아직 정착되지 않았습니다.\\n\\n**제이의 결론**: 개발자라는 직업은 사라지지 않습니다. AI를 잘 쓰는 개발자와 못 쓰는 개발자로 갈리고, 못 쓰는 쪽은 대체됩니다. 그게 시니어 본인의 시점에서 보는 그림입니다.\\n\\n이 대화는 **메타 시니어 코호트가 *내부에서* 이 변화를 어떻게 읽고 있는지**를 보여 주는 episodic record입니다. 외부에서 추측한 게 아니라 본인이 직접 말한 내용입니다.\",\"body_en\":\"$17\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=1ODlirmAk5o\",\"date\":\"2026-03-25\",\"original\":\"[제이 — 메타 4년차, 총 8년차 시니어 개발자]\\n\\n솔직히 말해서 괜찮지 않다고 생각합니다. 왜냐면 제가 2026년에 유튜브를 시작하게 된 이유 중에\\n하나도 사실 지금 이 개발자로서의 입지가 아주 불안하다라고 저는 솔직히 생각하거든요.\\n왜냐면 이게 너무 변화가 빨라요. 하루하루 새로운 게 나오고. 근데 제가 코드를 쓰고 있는\\n사람인데 코드를 이제 안 쓰는 사람이 하루 아침에 돼 버리니까 그 변화가 너무 쉽게 체감이\\n되더라고요. 아 내가 하고 있는 일의 성격이 바뀌고 있다는 걸 느껴 버리니까.\\n\\n개발자라는 직업이 뭐 사라진다라기보다는 좀 형태가 바뀌고 있다라고 저는 느끼고 있습니다.\\n\\nAI를 잘 쓰는 사람과 못 쓰는 사람의 느낌이 확 느낀 거는 일단 잘 쓰는 사람은 어 좀 티를\\n많이 내는 거 같습니다. 예를 들어 회사 그런 내부 활동도 많이 하거나 그런 포스트도 많이 올리고\\n그런 교육도 많이 해요. 팀원들 사이에서 교육을 하는 사람이 딱 정해져 있거든요. 한 명에서\\n두 명 정도. 저 예를 들어 20명의 팀을 제가 지금 20명의 팀 안에 있는데 한두 명만 AI에\\n대해서 좀 교육을 하는 추세가 됩니다. 그 두 사람은 되게 어떻게 보면 신뢰할 수 있고 그 두\\n사람은 뭔가 AI에 있어서 이 시대에 있어서 없어서는 안 될 팀원으로 되게 잘 자리를 잡은 거죠.\\n\\nAI를 써서 제가 느낀 거는 임팩트를 잘 내고 있나가 사실 제일 중요한 척도인데 잘못 가고 있는\\n척도 중에 하나가 AI를 얼마나 많이 쓰냐를 또 사람들이 많이 보더라고요... 결국엔 이걸 사용해서\\n얼마나 더 빨리 얼마나 더 많이 얼마나 또 많은 돈을 세이브를 하느냐 그거를 봐야 되는데.\\n\\n[알렉스]\\n개발자가 사라질 것 같진 않지만 AI를 잘 쓰지 못하는 개발자들은 대체가 될 거다라고 생각합니다.\"}]},{\"id\":\"million-token-context-reads-800-pages-at-once\",\"label\":\"million-token-context-reads-800-pages-at-once\",\"claim_ko\":\"100만 토큰 컨텍스트는\\n책 800페이지를 한 번에 읽고 이해하는 양입니다.\",\"claim_en\":\"A one-million-token context window is enough to read and understand 800 pages of a book in a single pass.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-19\",\"body_ko\":\"100만 토큰 컨텍스트는\\n책 800페이지를 한 번에 읽고 이해하는 양입니다.\\n\\n나온 지 1년도 안 된 크기입니다. 예전에는 보고서 하나, 영상 자막 하나도 너무 길어 거절당했지만, 이제는 그 정도는 문제도 되지 않습니다.\",\"body_en\":\"A one-million-token context window is enough to read and understand 800 pages of a book in a single pass.\\n\\nIt's a size that's less than a year old. Reports and video captions used to get rejected for being too long; now that's not even a problem.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"토큰 1밀리언이라는 게 되게 중요해요. 이 1밀리언 토큰이라는 거는 나온 지 1년도 안 됐어요. 이 1밀리언이라는 토큰은 대충 환산해 보면 책 800페이지를 넣을 수 있다고 해요. 한 번에 이해할 수 있다는 거거든요.\\n옛날에는 이게 너무 작아서 보고서 하나 넣으면 벌써 처리를 못했어요. 저는 YouTube를 하니까 영상 자막 처리를 할 때 그거를 던지면 너무 길어서 리젝트를 많이 했거든요. 근데 이제는 문제도 아닙니다.\"}]},{\"id\":\"nano-banana-prompt-gpt-public\",\"label\":\"nano-banana-prompt-gpt-public\",\"claim_ko\":\"커리어해커 나노바나나 프롬프트 GPT를\\n공개합니다.\",\"claim_en\":\"Open-sourcing the Career Hacker\\nnano-banana prompt GPT.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-11-19\",\"body_ko\":\"커리어해커 나노바나나 프롬프트 GPT를\\n공개합니다.\\n\\n지난 인테리어 변경 워크플로우에서 사용한 나노바나나 프롬프트 GPT를 공유합니다. 한 줄짜리 의도를 넣으면 나노바나나가 잘 알아듣는 프롬프트로 다시 써 줍니다. 왠만한 작업은 이 GPT 하나로 처리됩니다.\",\"body_en\":\"Open-sourcing the Career Hacker\\nnano-banana prompt GPT.\\n\\nSharing the prompt-rewriter Custom GPT used in the recent interior-redesign workflow. Type a one-line intent; it rewrites it into a prompt nano-banana actually understands. Handles most use cases.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DReT9DUEUES\",\"date\":\"2025-11-19\",\"original\":\"최근에 올린 \\\"나노바나나로 내 방 인테리어 포토샵 없이 바꾸는 방법\\\" 에 썼던 나노바나나 프롬프트 GPT 공유합니다 👉\\n커리어해커 나노바나나 프롬프트 GPT: https://bit.ly/3M43BxG\\n이거 써서 프롬프트 만들면 왠만한건 다해주니까 꼭 써보고 후기 남겨주세요!!\"}]},{\"id\":\"new-team-impact-via-1on1-chain\",\"label\":\"new-team-impact-via-1on1-chain\",\"claim_ko\":\"새 팀에서 빠르게 임팩트를 내려면\\n사람을 따라 1on1을 이어 갑니다.\",\"claim_en\":\"The fastest way to land in a new team\\nis to chain 1-on-1s until the names repeat.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\",\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-16\",\"body_ko\":\"새 팀에서 빠르게 임팩트를 내려면\\n사람을 따라 1on1을 이어 갑니다.\\n\\n메타 CTO Boz가 가르쳐 준 빠른 적응법입니다. 팀원 한 명에게 30분 미팅을 요청합니다. 25분은 \\\"이 팀에서 내가 알아야 할 모든 것\\\"을 듣고, 모르는 게 나오면 그 자리에서 묻습니다. 3분은 \\\"팀이 가장 크게 겪고 있는 문제가 무엇인가\\\"를 묻습니다. 마지막 2분은 \\\"다음에 누구와 이야기해야 하나\\\"를 묻습니다. 그 이름을 받아 같은 미팅을 다시 합니다. 새로운 이름이 더 나오지 않을 때까지 반복합니다. 한 사이클이 끝나면 팀의 진짜 문제 지도와 영향력 있는 사람들의 지도가 동시에 손에 들어옵니다. 그런데 이보다 더 중요한 효과가 있습니다 — 듣고 배우고 실천하는 그 태도 자체가 팀원들에게 가장 빠르게 신뢰를 만듭니다.\",\"body_en\":\"The fastest way to land in a new team\\nis to chain 1-on-1s until the names repeat.\\n\\nThis is the onboarding method Meta CTO Boz teaches. Find one team member and ask for thirty minutes. Twenty-five minutes: \\\"tell me everything I need to know,\\\" ask immediately when something doesn't make sense. Three minutes: \\\"what's the team's biggest problem right now?\\\" Last two minutes: \\\"who else should I talk to?\\\" Take that name and run the same meeting. Repeat until no new names come up. By the time the chain closes you have two maps at once: the team's real problem set, and the team's real influence network. The bonus effect is the real one — the act of listening, learning, and following up is itself the fastest way to build trust with the team.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHRt3A7yJTW\",\"date\":\"2025-03-16\",\"original\":\"실리콘밸리에서 새로운 팀에 들어가자마자 \\\"Rockstar\\\" 가 되는 법.\\nMeta 의 CTO 인 Boz 는 빠르게 적응하고 임팩트를 내는 방법을 이렇게 정리했다.\\n1. 팀원 한 명을 찾아 30분 미팅을 요청한다.\\n - 25분 동안 \\\"내가 알아야 할 모든 것\\\"을 듣고, 이해 안 되면 꼭 질문한다.\\n - 3분 동안 \\\"팀이 겪는 가장 큰 문제\\\"를 묻는다.\\n - 마지막 2분 동안 \\\"누구랑 추가로 이야기해야 하는지\\\"를 듣는다.\\n2. 들은 이름을 따라 위 과정을 반복한다. 새로운 이름이 안 나올 때까지.\\n…\\n가장 중요한 건 *이 질문을 던지는 과정 자체* 다. 듣고 배우고 실천하는 태도가 팀원들에게 신뢰를 만든다.\"}]},{\"id\":\"next-level-needs-industry-impact\",\"label\":\"next-level-needs-industry-impact\",\"claim_ko\":\"다음 레벨로 가려면\\n회사가 아니라 업계 전체에 임팩트를 내야 합니다.\",\"claim_en\":\"The next level isn't company-shaped.\\nIt's industry-shaped.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\",\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-13\",\"body_ko\":\"다음 레벨로 가려면\\n회사가 아니라 업계 전체에 임팩트를 내야 합니다.\\n\\n**\\\"업계를 뒤흔드는 사람이 되어야 한다.\\\"** 제가 메타에서 다음 레벨(E7)로 올라가려면 **'업계 전체에 영향을 미치는 사람'**이 되어야 한다고 명시되어 있습니다. 즉, 회사 내부에서 잘하는 것을 넘어 **업계 판도를 바꿀 정도의 임팩트(industry-wide impact)**를 내야 합니다. 그래서 저는 매일 컴포트 존을 벗어나 새로운 도전을 합니다. 익숙한 것만 하면 성장할 수 없습니다. 새로운 문제를 풀고, 새로운 가치를 만들어야 합니다. **반드시 '불편한 일'에 도전해야 합니다.** 당신은 컴포트 존에 살고 있습니까, 아니면 벗어나고자 하는 사람입니까?\",\"body_en\":\"The next level isn't company-shaped.\\nIt's industry-shaped.\\n\\n**\\\"Shake the industry.\\\"** That's literally the requirement for me to go from staff to senior staff (E7) at Meta — you must become *someone who influences the industry as a whole*. Internal company excellence isn't enough. The mandate is **industry-wide impact** — moving the needle on the field, not just the team. Which is why I leave the comfort zone every day, deliberately. **You don't grow staying in what's already familiar.** You grow by solving problems no one's solved and creating value no one's created. The only path: **commit to the uncomfortable thing.** Are you in your comfort zone, or trying to leave it?\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGAULo0xiYl\",\"date\":\"2025-02-13\",\"original\":\"\\\"업계를 뒤흔드는 사람이 되어야 한다\\\"\\n\\n내가 메타에서 다음 레벨(E7)로 올라가려면,\\n\\\"업계 전체에 영향을 미치는 사람\\\" 이 되어야 한다고 명시되어있다.\\n\\n즉, 회사 내부에서 잘하는 걸 넘어서,\\n업계 판도를 바꿀 정도의 임팩트 (industry-wide impact) 를 내야 한다는 것. \\n\\n그걸 위해 나는 매일 \\\"comfort zone\\\" 을 벗어나,\\n새로운 도전을 하려고 노력하고 있다.\\n\\n익숙한 것만 하면 성장할 수 없다. \\n새로운 문제를 풀고, 새로운 가치를 만들어야 한다. \\n\\n반드시 내가 \\\"불편한 일\\\"을 도전해야만 한다.\\n\\n당신은 comfort-zone 에 살고 있는가?\\n아니면 벗어나고자 하는가?\"}]},{\"id\":\"one-day-build-becomes-deal-signal\",\"label\":\"one-day-build-becomes-deal-signal\",\"claim_ko\":\"단 하루 만에 만든 앱이\\n수십억짜리 사업 아이디어가 됩니다.\",\"claim_en\":\"A one-day build can land\\nin acquisition-offer territory.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"solo-builder\"],\"theses\":[\"move-first-or-lose-the-game\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-04-22\",\"body_ko\":\"단 하루 만에 만든 앱이\\n수십억짜리 사업 아이디어가 됩니다.\\n\\n오로지 바이브 코딩만으로 만들었습니다. 코딩 한 줄 없이, 말만으로. 웹사이트 링크 하나를 넣으면 자동으로 초고퀄 광고 소재를 뽑아 주는 앱이었습니다. 진짜 조금만 더 파면 인수 제안이 올 만한 수준이었습니다. 지금까지 만든 것 중 반응이 가장 좋았습니다. 아드레날린이 너무 올라서 잠도 오지 않을 정도였습니다.\",\"body_en\":\"A one-day build can land\\nin acquisition-offer territory.\\n\\nI built it purely with vibe coding. No code written; just conversation. The app takes a website link and produces premium ad creative for it. Push it a little further and it's in acquisition-offer territory. Best response anything I've built has gotten. Adrenaline running so hot I can't sleep.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DJEXaI6x41U\",\"date\":\"2025-04-22\",\"original\":\"단 하루만에 만든 앱이 수십억짜리 사업 아이디어가 됐다.\\n오로지 \\\"바이브 코딩\\\"으로만 만들었다. 코딩 없이 말만해서.\\n웹사이트 링크 하나 넣으면, 자동으로 초고퀄 광고 소재를을 뽑아주는 앱.\\n이거 진짜 조금만 더 파면 인수 제안 올 정도다.\\n지금까지 만든 것 중 가장 반응이 좋다.\\n지금 아드레날린이 너무 올라서 잠도 안온다.\"}]},{\"id\":\"one-engineer-can-be-worth-100b\",\"label\":\"one-engineer-can-be-worth-100b\",\"claim_ko\":\"메타가 100명에 1조를 쓴 이유는\\n한 사람의 임팩트가 그 정도이기 때문입니다.\",\"claim_en\":\"Meta paid $1B per hire for a hundred people.\\nThat's now the impact ceiling of one human.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-07-12\",\"body_ko\":\"메타가 100명에 1조를 쓴 이유는\\n한 사람의 임팩트가 그 정도이기 때문입니다.\\n\\n메타가 최근 단 100명을 고용하는 데 최소 1조 원을 썼다고 합니다. 한 사람당 100억 이상을 준 셈입니다. 실제로는 한 명에 천억 가까이까지 갔습니다. 개인적으로 저는 **훌륭한 투자**라고 봅니다. 지금 이 순간, 충분한 리소스가 주어졌다고 볼 때, 단 한 명이 낼 수 있는 임팩트는 자그마치 그 정도이기 때문입니다.\",\"body_en\":\"Meta paid $1B per hire for a hundred people.\\nThat's now the impact ceiling of one human.\\n\\nMeta reportedly spent over $1 trillion to hire 100 people — roughly $1 billion each, sometimes more. I think it's a great investment. Given sufficient resources today, one human's impact ceiling is genuinely that high.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DMW7D43OAu3\",\"date\":\"2025-07-12\",\"original\":\"메타에서는 최근에 단 100명을 고용하는데 최소 1조원 이상을 썼다고 한다.\\n한 사람당 100억 이상을 주고 고용한 셈이다. (사실은 더 썼다. 한명당 천억까지도)\\n개인적으로 나는 훌륭한 투자라고 본다.\\n지금 이 순간, 충분한 리소스가 주어졌다고 볼때\\n단 한명이 낼 수 있는 임팩트는 자그마치 그정도다.\"}]},{\"id\":\"one-hour-mv-anyone-can-make\",\"label\":\"one-hour-mv-anyone-can-make\",\"claim_ko\":\"흑백요리사 패러디 뮤직비디오를\\n1시간 만에 만들었습니다.\",\"claim_en\":\"I built a 흑백요리사 parody music video\\nin one hour.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"creator-economy\"],\"theses\":[\"move-first-or-lose-the-game\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-12-01\",\"body_ko\":\"흑백요리사 패러디 뮤직비디오를\\n1시간 만에 만들었습니다.\\n\\n자꾸 머릿속에 재생되는 흑백요리사2 소스왕 뮤직비디오를 1시간 만에 처음부터 끝까지 AI로 만들었습니다. 만들면서도 계속 혼자 웃었습니다. 이제 이런 중독성 있는 영상, 정말 누구나 만들 수 있습니다.\",\"body_en\":\"I built a 흑백요리사 parody music video\\nin one hour.\\n\\nThe 흑백요리사 *Sauce King* parody MV that keeps playing in my head — built end-to-end with AI in one hour. Couldn't stop laughing while making it. Anyone can ship this kind of viral-shape content now.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DTFLBQ6ijkQ\",\"date\":\"2025-12-01\",\"original\":\"자꾸 머릿속에 재생되는 흑백요리사2 소스왕 뮤직비디오...\\n한시간만에 처음부터 끝까지 AI로 만든 영상인데 만들면서도 계속 혼자 터졌네요.\\n이제 이런 중독성 있는 영상, 정말 그 누구나 만들 수 있습니다!\"}]},{\"id\":\"one-image-becomes-million-dollar-ad\",\"label\":\"one-image-becomes-million-dollar-ad\",\"claim_ko\":\"상품 이미지 하나에 광고 프롬프트만 붙이면\\n1억짜리 광고 소재가 나옵니다.\",\"claim_en\":\"One product photo plus an ad-grammar prompt\\nproduces a million-dollar-equivalent ad creative.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"creator-economy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-28\",\"body_ko\":\"상품 이미지 하나에 광고 프롬프트만 붙이면\\n1억짜리 광고 소재가 나옵니다.\\n\\n저는 인스타그램 광고팀에서 일하는 엔지니어입니다. 지난 7년 동안 어떻게 하면 좋은 광고 상품을 만들까 고민해 왔습니다. 이런 말씀을 드려도 되는지 모르겠지만, 솔직히 그냥 한 번만 ChatGPT에 상품 이미지를 하나 넣고 광고 그래머 프롬프트를 써 보시기를 추천드립니다. 당장 내일 우리 팀한테 이거 만들어야 한다고 말해야 할 듯합니다.\",\"body_en\":\"One product photo plus an ad-grammar prompt\\nproduces a million-dollar-equivalent ad creative.\\n\\nI'm an engineer on the Instagram Ads team. Seven years thinking about what makes a great ad. I'll say something I'm not sure I should say: just put a product photo into ChatGPT, paste the ad-grammar prompt below, and watch what comes out. I might have to tell my team about this tomorrow.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHu8c6NRrJh\",\"date\":\"2025-03-28\",\"original\":\"ChatGPT 써서 이미지 하나로 \\\"1억짜리\\\" 광고 소재 만드는법:\\n나는 인스타그램 광고팀에서 일하는 엔지니어다.\\n지난 7년동안 어떻게하면 \\\"좋은 광고 상품\\\" 을 만들까 고민해왔다.\\n이런말해도 되는지 모르겠는데, 솔직히 그냥 한번만 chatgpt 에다가 상품 이미지 하나 넣고 chatgpt 에 아래 적어둔 프롬프트 써보길 추천한다..\\n당장 내일 우리팀한테 이거 만들어야 한다고 말해야할듯..\"}]},{\"id\":\"one-year-out-now-feels-scarier-than-ten\",\"label\":\"one-year-out-now-feels-scarier-than-ten\",\"claim_ko\":\"이제는 인공지능의 10년 뒤가 아니라\\n1년 뒤가 두렵습니다.\",\"claim_en\":\"Ten years out of AI used to feel scary.\\nOne year out feels scarier now.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[\"grit-not-genius\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-22\",\"body_ko\":\"이제는 인공지능의 10년 뒤가 아니라\\n1년 뒤가 두렵습니다.\\n\\n요즘은 인공지능 업데이트를 따라가기도 힘듭니다. 거의 일주일마다 새로운 소식이 쏟아집니다. 올해 들어 가속화는 확실하게 더 거세졌습니다. AGI, 초지능이 어떤 모습일지, 어떻게 세상을 바꿔 놓을지는 모르겠지만, 다가오고 있다는 사실은 느껴집니다. 어쩌면 우리가 상상했던 '그 시절의 초지능'은 이미 왔는지도 모릅니다. 실리콘밸리의 시니어 엔지니어는 왠만하면 대체되기 어렵다는 통념이 얼마나 오래갈지 알 수 없습니다. 결국 유연하게, 담대하게, 새로운 도전을 계속 이어 가는 수밖에 없습니다. **지금 멈추면 반드시 도태됩니다.**\",\"body_en\":\"Ten years out of AI used to feel scary.\\nOne year out feels scarier now.\\n\\nI can barely keep up with the AI updates. Roughly weekly, something staggering drops. The acceleration this year is clearly steeper than last. I don't know what AGI or superintelligence will look like, or how it'll restructure the world — but the arrival is felt. Maybe what we used to call superintelligence is *already here*. The assumption that senior Silicon Valley engineers are hard to replace — I don't know how long that one holds either. The only path is to stay flexible, stay bold, keep moving. **If you stop now, you fall behind. Period.**\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHDJJMVRaBx\",\"date\":\"2025-03-22\",\"original\":\"이제는 인공지능의 10년 뒤가 아닌 1년 뒤가 두렵다.\\n\\n요즘은 수많은 인공지능 업데이트를 따라가기도 힘들다. 다시금 거의 일주일마다 새로운 미친 소식들이 쏟아지고 있다. 올해 들어 인공지능 가속화가 더욱 크게, 거세게 진행되고 있다는것은 확실하다. AGI, 초지능이 어떤 모습일지, 어떻게 이 세상을 바꿔놓을지는 모르겠지만, 다가오고 있다는건 느껴진다.\\n\\n아니, 어쩌면 \\\"우리가 생각했던 그 시절 초지능\\\"은 이미 왔는지도 모른다.\\n\\n적어도 실리콘밸리의 시니어 엔지니어는 왠만하면 대체되기 어려울 것 같다는 생각도 과연 얼마나 오래갈지 모르겠다. 그냥 새로운, 수많은 도전을 계속해나갈 수 밖에 없다. 유연하게, 담대하게.\\n\\n지금 멈춘다면, 우리는 반드시 도태된다.\"}]},{\"id\":\"orchestration-beats-expertise\",\"label\":\"orchestration-beats-expertise\",\"claim_ko\":\"전문가가 아니어도\\n전문가를 모아 문제를 풀 수 있습니다.\",\"claim_en\":\"You don't have to be the expert.\\nYou can assemble experts and solve the problem.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-24\",\"body_ko\":\"전문가가 아니어도\\n전문가를 모아 문제를 풀 수 있습니다.\\n\\n이게 실리콘밸리에서 가장 크게 배운 메타-스킬입니다. 어떤 문제든 6단계로 해결합니다. **첫째**, 그 문제를 가장 잘 아는 전문가들을 모십니다. **둘째**, 같이 근본 원인을 파악합니다. **셋째**, 가능한 모든 해결책을 나열합니다. **넷째**, ROI가 가장 좋은 옵션을 선택합니다. **다섯째**, 실행하고 데이터로 평가합니다. **여섯째**, 결과를 보고 다음 스텝을 정합니다. 회사 문제, 인생 문제, 연애 문제까지 — 같은 6단계입니다. 본인이 전문가일 필요가 없습니다. 본인이 해야 할 일은 옳은 사람을 모으는 일과 의사결정의 책임을 지는 일입니다. 그 어떤 문제에도 겁먹지 않아도 되는 이유입니다.\",\"body_en\":\"You don't have to be the expert.\\nYou can assemble experts and solve the problem.\\n\\nThis is the biggest meta-skill I learned in Silicon Valley. Any problem follows the same six steps. **One**, gather the people who know the problem best. **Two**, find the root cause together. **Three**, enumerate every plausible solution. **Four**, pick the one with the best ROI. **Five**, run it and measure with data. **Six**, look at the result, decide the next step. Company problems, life problems, relationship problems — the steps don't change. You don't need to be the expert. Your job is to assemble the right people and own the decision. That's why no problem should feel out-of-reach.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGb07FXS0zU\",\"date\":\"2025-02-24\",\"original\":\"실리콘밸리에서 배운 전문가가 아니여도 이 세상 모든 문제를 해결하는 방법:\\n1. 문제를 잘 알고 있는 전문가들을 모셔라 (Gather the right experts)\\n2. 전문가들과 같이 문제의 원인을 제대로 파악하라 (Identify the root cause)\\n3. 가능한 모든 해결책을 나열하라 (Brainstorm all possible solutions)\\n4. 가장 적은 비용으로 가장 큰 효과를 내는 옵션을 선택하라 (prioritize based on ROI)\\n5. 실행하고, 데이터로 평가하라 (Implement \u0026 measure success)\\n6. 효과를 보고, 다음 스텝을 정해라 (Iterations \u0026 follow-up)\\n…\\n이 방식을 쓰면 회사 문제, 인생 문제, 연애 문제까지 내가 전문가가 아니여도 다 해결 할 수 있다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"Agent는 이 모든 도구를 되게 자연스럽게 활용하는 AI라고 보시면 될 것 같아요. 그러니까 AI가 임무를 수행할 수 있는데, 그 임무를 수행하는 과정에 있어서 이 모든 도구들을 종합적으로 활용을 한다. … Agent는 태스크를 분해해서 도구를 호출한다. 여러 가지 태스크를 서브 태스크로 나눠서 툴링을 쓴다.\"}]},{\"id\":\"output-filing-loop-makes-queries-compound-the-brain\",\"label\":\"output-filing-loop-makes-queries-compound-the-brain\",\"claim_ko\":\"질의로 만든 결과물을 다시 브레인에 'filing'해 넣으십시오.\\n비교 분석, 종합, 발견한 연결 — 챗 히스토리로 흘려보내지 말고 브레인의 새 페이지로 편입시키면, 탐색이 곧 브레인의 성장이 됩니다.\",\"claim_en\":\"Always file query outputs back into the brain. Comparisons, analyses, connections you discovered while exploring — don't let them dissolve into chat history. Filing them back as new pages turns every exploration into brain growth.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Andrej Karpathy\",\"author_handle\":\"@karpathy\",\"publication\":\"x.com\",\"url\":\"https://x.com/karpathy/status/2039805659525644595\",\"published_at\":\"2026-04-02\"},\"path\":\"\",\"topics\":[\"memory-systems\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-02\",\"body_ko\":\"질의로 만든 결과물을 다시 브레인에 'filing'해 넣으십시오.\\n비교 분석, 종합, 발견한 연결 — 챗 히스토리로 흘려보내지 말고 브레인의 새 페이지로 편입시키면, 탐색이 곧 브레인의 성장이 됩니다.\\n\\n카르파시가 묘사한 누적 루프입니다(2026년 4월). 대부분의 LLM 워크플로우는 출력을 일회용으로 다룹니다 — 물어보고, 읽고, 잊습니다. 다시 편입(filing-back)하는 동작이 그 흐름을 뒤집습니다: 출력이 위키의 새 페이지가 되고, 그 페이지가 다음 질의의 검색 대상이 됩니다. 브레인은 단순히 흡수한 것을 담는 게 아니라 — 탐색하며 발견한 것까지 담습니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://x.com/karpathy/status/2039805659525644595\",\"date\":\"2026-04-02\",\"original\":\"Often, I end up 'filing' the outputs back into the wiki to enhance it for further queries. So my own explorations and queries always 'add up' in the knowledge base.\"}]},{\"id\":\"parallel-and-sub-agents-replace-sequential-coding\",\"label\":\"parallel-and-sub-agents-replace-sequential-coding\",\"claim_ko\":\"Superpowers는 작업마다 새 서브 에이전트를 띄우고 리뷰까지 묶는 서브 에이전트 개발과, 독립적인 문제를 자동 병렬화하는 패럴렐 에이전트 디스패치를 포함합니다.\\nClaude Code를 단일 스레드 코더에서 에이전트 함대로 바꿉니다.\",\"claim_en\":\"Superpowers includes sub-agent-driven development (fresh sub-agent per task with reviews) and parallel-agent dispatch (auto-spawning agents when problems are independent) — turning Claude Code from a single-thread coder into an agent fleet.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/4XqVR6xI6Kw\",\"published_at\":\"2026-04-12\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"ai-tooling\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-12\",\"body_ko\":\"Superpowers는 작업마다 새 서브 에이전트를 띄우고 리뷰까지 묶는 서브 에이전트 개발과, 독립적인 문제를 자동 병렬화하는 패럴렐 에이전트 디스패치를 포함합니다.\\nClaude Code를 단일 스레드 코더에서 에이전트 함대로 바꿉니다.\\n\\nAlex가 그대로 복사해 쓸 수 있는 구체 에이전트 오케스트레이션 패턴입니다. \\\"스레드가 아니라 함대\\\"라는 프레임은 Claude Code를 아직 단일 에이전트로 여기는 비개발자에게 펀치 라인입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/4XqVR6xI6Kw\",\"date\":\"2026-04-12\",\"original\":\"We have sub agent-driven development, which is really cool. It basically dispatches fresh sub agents for each task. And they have reviews. And then there's another one called dispatching parallel agents. When superpowers realizes that you have independent problems that don't have to happen sequentially, it just spins up parallel agents to work on each of those.\"}]},{\"id\":\"peer-feedback-cycle-takes-50-reviews\",\"label\":\"peer-feedback-cycle-takes-50-reviews\",\"claim_ko\":\"메타 연말 피드백은\\n50명 가까운 동료를 평가해야 끝납니다.\",\"claim_en\":\"Meta year-end peer review\\nmeans writing feedback for ~50 colleagues.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-08\",\"body_ko\":\"메타 연말 피드백은\\n50명 가까운 동료를 평가해야 끝납니다.\\n\\n실리콘밸리 개발자의 삶 — 연말 피드백 사이클입니다. 연말과 연초가 되면 같이 일했던 거의 모든 사람에게 피드백을 받고, 동시에 작성해 줘야 합니다. 그 사람과의 협업에서 어떤 부분을 잘했는지, 어떤 부분에 개선점이 보이는지, 한 해를 돌아보며 아주 자세히 작성해야 합니다. **올해는 못해도 50~60명과 같이 일한 것 같습니다.** 내일까지 써야 하는 peer feedback이 거의 스무 개 남았습니다. 다 쓰고 잘 수 있을지 모르겠습니다.\",\"body_en\":\"Meta year-end peer review\\nmeans writing feedback for ~50 colleagues.\\n\\nA snapshot of Silicon Valley engineering life — the year-end peer cycle. Around new-year, you get feedback from nearly everyone you worked with, *and* write theirs in return. You document what they did well, what their growth areas are, and what the year looked like from your collaboration angle — in detail. **This year I worked with around 50–60 people.** And I still have nearly 20 peer reviews to finish by tomorrow. Not sure if I'll sleep tonight.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DEizAG5yvHO\",\"date\":\"2025-01-08\",\"original\":\"실리콘밸리 개발자의 삶 - 연말 피드백\\n\\n연말/연초가 되면 같이 일했던 거의 모든 사람에게 피드백을 받고 마찬가지로 작성해줘야 한다.\\n\\n그 사람과의 협업에서 어떤 부분을 잘 했는지, 어떤 부분이 개선점이 보이는지, 한 해를 돌아보며 아주 자세히 작성해야한다.\\n\\n올해는 못해도 한 5~60 명이랑 같이 일한 것 같은데, 내일까지 써야하는 peer feedback (동료 피드백) 이 거의 한 스무개가 남았다..\\n\\n이거 다 쓰고 잘 수 있겠지?ㅠㅠ\"}]},{\"id\":\"persist-chrome-profile-to-automate-logged-in-sessions\",\"label\":\"persist-chrome-profile-to-automate-logged-in-sessions\",\"claim_ko\":\"로그인이 필요한 서비스를 자동화하려면 영구적인 Chrome 유저 데이터 디렉터리로 Playwright를 띄우십시오.\\n처음 한 번 수동 로그인하면 저장된 세션이 이후 모든 에이전트 실행에서 인증을 건너뛰게 해 줍니다 — Skool처럼 자동화에 적대적인 플랫폼에서도 동작합니다.\",\"claim_en\":\"To automate logged-in apps, launch Playwright against a persistent Chrome user-data directory — log in once manually, and the saved session lets every future agent run skip auth, even on automation-hostile platforms like Skool.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/J-6pnl5DQg8\",\"published_at\":\"2026-04-25\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"solo-builder\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-25\",\"body_ko\":\"로그인이 필요한 서비스를 자동화하려면 영구적인 Chrome 유저 데이터 디렉터리로 Playwright를 띄우십시오.\\n처음 한 번 수동 로그인하면 저장된 세션이 이후 모든 에이전트 실행에서 인증을 건너뛰게 해 줍니다 — Skool처럼 자동화에 적대적인 플랫폼에서도 동작합니다.\\n\\n영상에서 가장 덜 공유되는 기법입니다. 영속 프로필 패턴은 잘 가르쳐지지 않습니다 — LinkedIn · Threads · 카카오톡 채널 자동화에 곧장 옮겨 갈 수 있는 지식 점프입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/J-6pnl5DQg8\",\"date\":\"2026-04-25\",\"original\":\"We could do persistent browser profile, meaning it can launch a browser using my existing Chrome user data, which already has me logged into school… now you have these Playwright CLI automations that can do things in your browser, and it can save your cookies. So basically you stay logged in.\"}]},{\"id\":\"persona-context-amplifies-output\",\"label\":\"persona-context-amplifies-output\",\"claim_ko\":\"프롬프트는 여섯 가지 연출 요소로\\n품질을 한 단계 높입니다.\",\"claim_en\":\"Six staging elements take a prompt's output\\nfrom default to deliberate.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"prompt-engineering\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"garden\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"프롬프트는 여섯 가지 연출 요소로\\n품질을 한 단계 높입니다.\\n\\n프롬프트는 **여섯 가지 연출 요소**를 의식적으로 조합할 때 결과의 품질이 한 단계 올라갑니다. **첫째**, 인물(persona/role) — \\\"너는 ChatGPT 전문 강사야.\\\" **둘째**, 배경(context) — \\\"직장인들을 대상으로 합니다.\\\" **셋째**, 임무(task) — \\\"강의 슬라이드를 만들어 주세요.\\\" **넷째**, 형식(format) — \\\"슬라이드 20개.\\\" **다섯째**, 예시(example) — \\\"롤플레잉·퓨샷·제로샷·체인오프thoughts·인격화 같은 기법을 다뤄 주세요.\\\" **여섯째**, 스타일(style/tone) — \\\"프로페셔널하게 한국어로.\\\" 이 여섯이 모두 들어가면 답변은 *정확하게 원하는 결과*가 나옵니다. 빠지면 일반적인 큰 틀 — 원리·활용·사례·가이드라인 — 만 나옵니다.\",\"body_en\":\"Six staging elements take a prompt's output\\nfrom default to deliberate.\\n\\nPrompts go from generic to deliberate when you consciously stage **six elements**. **One**: persona/role — *\\\"You're a ChatGPT instructor.\\\"* **Two**: context/background — *\\\"The audience is working professionals.\\\"* **Three**: task/instruction — *\\\"Build me a lecture deck.\\\"* **Four**: format — *\\\"20 slides.\\\"* **Five**: example — *\\\"Cover role-play, few-shot, zero-shot, chain-of-thoughts, personalization.\\\"* **Six**: style/tone — *\\\"Professional Korean.\\\"* Hit all six and the model produces *exactly* what you wanted. Skip them and you get the generic frame — principles, use cases, examples, guidelines.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH04-02\",\"date\":\"2024-05-01\",\"original\":\"연출 요소 6가지: 인물(persona/role), 배경(context/background), 임무(task/instruction), 형식(format), 예시(example), 스타일(style/tone). 이 6가지를 가지고 ChatGPT의 기본 대화를 설정할 수 있다.\\n\\n예시: \\\"너는 ChatGPT 전문 강사이고 나는 커리어해커 알렉스다. 이제부터 모든 직장인들을 위한 ChatGPT 강의를 만드는 걸 도와주고, 특별히 프롬프트 엔지니어링 기법에 관한 강의를 만들어줘. 예를 들면 롤플레잉, 퓨샷, 제로샷, 체인오프thoughts, 인격화와 같은 거를 통해서 강의 슬라이드 20개를 만들어줘. 프로페셔널하게 한국어로.\\\"\\n\\n→ 톤(프로페셔널), 형식(슬라이드 20개), 배경(직장인 대상), 임무(강의 만들기), 인물(전문 강사 role-play), 예시(제로샷/퓨샷/CoT) 모두 포함.\\n\\nvs. \\\"프롬프트 엔지니어링 기법에 관한 ChatGPT 강의 만들어줘\\\"만 했을 때는 일반적인 큰 틀(원리, 활용방법, 사례, 가이드라인) 만 나옴.\"}]},{\"id\":\"personal-brand-is-the-asset\",\"label\":\"personal-brand-is-the-asset\",\"claim_ko\":\"AI 시대의 가장 큰 자산은\\n자신만의 브랜드입니다.\",\"claim_en\":\"In an AI era, your largest asset is your own brand.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"ai-native\"],\"theses\":[\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-30\",\"body_ko\":\"AI 시대의 가장 큰 자산은\\n자신만의 브랜드입니다.\\n\\n회사 명함, 직책, 학력 — 다 가공하기 쉬운 것들입니다. AI는 그 가공의 비용을 거의 0으로 만들고 있습니다. 그래서 남는 것은 가공할 수 없는 것 — 누가 어떤 관점을 일관되게 갖고 있고, 누가 일관된 결과물을 내며, 누구의 이름이 특정 영역에서 떠오르는가. 그것이 자기 브랜드입니다. 회사가 사라져도, 직책이 사라져도, 시장이 바뀌어도 — 브랜드는 따라옵니다. AI 시대에 가장 양도 불가능한 자산은 그것 하나입니다.\",\"body_en\":\"In an AI era, your largest asset is your own brand.\\n\\nCompany name, title, alma mater — all of these are easy to manufacture, and AI is collapsing the cost of manufacturing further. What remains is the un-manufacturable: who holds a consistent point of view, who ships consistent output, whose name surfaces inside a specific domain. That's the brand. The company can disappear, the title can disappear, the market can rotate — the brand follows you. In the AI era, the only fully non-transferable asset is the one with your name on it.\",\"sources\":[{\"platform\":\"blog\",\"url\":\"blog:essay:나의-삶과-커리어에-대한-인터뷰-커리어해커-알렉스-회고록-어린-시절-유학-존스홉킨스-대학교-전공-몰로코-인턴쉽-페이스북-리더-ChatGPT-미래\",\"date\":\"2024-05-30\",\"original\":\"자신만의 브랜드를 만들어가라, 그것이 곧 가장 큰 자산이 될 것이라고…\\n어느 하나의 정체성에 갇혀있지 않는 것, 그것이 내가 추구하는 바이다. 개발자이자 동시에 크리에이터이고, 문제를 해결하는 사람이자 동시에 새로운 질문을 던지는 사람이 되고자 한다.\"}]},{\"id\":\"personal-brand-needs-efficiency\",\"label\":\"personal-brand-needs-efficiency\",\"claim_ko\":\"퍼스널 브랜딩의 본질은\\n효율성입니다.\",\"claim_en\":\"The essence of personal branding\\nis efficiency.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\",\"creator-economy\"],\"theses\":[\"personal-brand-is-the-moat\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-10-15\",\"body_ko\":\"퍼스널 브랜딩의 본질은\\n효율성입니다.\\n\\n실리콘밸리 빅테크에서 8년간 엔지니어이자 유튜버로 활동하면서 배운 점들을 정리합니다. 결론은 **퍼스널 브랜딩이 중요하다**는 건데, 사실 별것 아닙니다. 그저 어떻게 하면 그냥 열심히만 사는 게 아니라 효율적으로 사는지의 문제입니다. **회사에서는 실력만큼 명성과 관계가 중요합니다.** 그런데 회사에서 아무리 날아다녀 봤자 그 회사를 나오면 아무도 모릅니다. 퍼스널 브랜딩 어려운 일 아니고, 그냥 일단 시작만 하면 됩니다. 복리 효과를 누려야 나중에 모든 일이 더 쉬워집니다. 그래서 브랜딩이 필요합니다. 결국 초점은 효율성입니다. 어떻게 하면 최소한의 시간과 노력으로 최대한의 아웃풋을 낼 수 있는가.\",\"body_en\":\"The essence of personal branding\\nis efficiency.\\n\\nWhat I learned in eight years as both a Big Tech engineer and a YouTuber. The headline: **personal branding matters.** But it isn't mysterious. The whole game is *efficiency* — how to live not just hard, but well-leveraged. At a company, reputation and relationships matter as much as skill. But no matter how brilliant you are inside one company, the day you leave, the brand resets to zero. Personal branding isn't hard. The hard part is starting. You want the compound effect to be on your side; that's why you brand. The whole optimization is *how to produce the most output from the least time and effort.*\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DPGPEG4jtTl\",\"date\":\"2025-10-15\",\"original\":\"실리콘밸리 빅테크에서 8년간 엔지니어이자 유튜버로 활동하면서 배운점들을 한 장으로 정리해봤다.\\n결론은 \\\"퍼스널 브랜딩\\\" 중요하다 라는건데,\\n사실 별거 없고 어떻게 하면 그냥 열심히만 사는게 아니라 \\\"효율적\\\"으로 사는지다.\\n\\n- 회사에서는 실력만큼 명성이나 관계가 중요하다.\\n- 회사에서 아무리 날라다녀봤자 그 회사 나오면 아무도 모른다.\\n- 퍼스널 브랜딩 어려운거 아니고 그냥 일단 \\\"시작\\\" 만 하면 된다.\\n- 복리 효과를 누려야 나중에 모든일이 더 쉬운데, 그래서 브랜딩이 필요하다.\\n\\n결국 초점은 \\\"효율성\\\" 이다.\\n어떻게하면 최소한의 시간과 노력으로, 최대한의 \\\"아웃풋\\\"을 낼 수 있는가.\"}]},{\"id\":\"phone-only-build-shows-tool-ceiling\",\"label\":\"phone-only-build-shows-tool-ceiling\",\"claim_ko\":\"이제는 휴가지에서 핸드폰만으로\\n앱 하나를 더 만듭니다.\",\"claim_en\":\"On vacation, with just a phone,\\nyou ship one more app.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"solo-builder\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-04-30\",\"body_ko\":\"이제는 휴가지에서 핸드폰만으로\\n앱 하나를 더 만듭니다.\\n\\n저번에 바이브 코딩으로 하루 만에 만든 앱이 회사 내부에서 이슈가 돼 공개할 수 없게 됐습니다. 그 일을 계기로 **매주 하나씩 앱을 만들어보자** 마음먹었습니다. 그래서 휴가 동안 또 하나 만들었습니다. 거짓말 보태지 않고 코딩 한 줄 없이, 핸드폰만으로 전부 만들었습니다. 솔직히 안 믿어지실 수도 있습니다. 하지만 사실입니다.\",\"body_en\":\"On vacation, with just a phone,\\nyou ship one more app.\\n\\nThe vibe-coded app I built in a day got too visible inside the company — I can't open-source it. So I told myself: build one app a week, period. On vacation now and I just shipped another one. No exaggeration: zero lines of code, entire build on my phone. I know it sounds fake. It isn't.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DJuwqClswkA\",\"date\":\"2025-04-30\",\"original\":\"며칠전에 내가 바이브 코딩으로 하루만에 만든 앱이 우리 회사 내부에서 너무 크게 이슈(?)가 되서 안타깝게도 공개를 할 수가 없게 됬어.\\n다만 이번 일을 계기로 그냥 매주 하나씩 앱을 미친듯이 만들어봐야겠다는 생각이 들었어.\\n그래서 휴가 쓴 김에 바로 하나 더 만들어봤는데, 어때?\\n거짓말 안하고 코딩 1줄도 안쓰고 전부다 핸드폰으로 만들었어. 솔직히 안믿을것 같긴 해. 하지만 사실이야.\\n아직 미완성이지만 써보고 싶은 사람 댓글 달아줘봐!!\"}]},{\"id\":\"playwright-cli-plus-claude-code-automates-any-browser-task\",\"label\":\"playwright-cli-plus-claude-code-automates-any-browser-task\",\"claim_ko\":\"Claude Code에 Playwright CLI 권한을 주면 브라우저 안에서 거의 모든 일을 자동화할 수 있습니다 — QA 테스트, 스크래핑, 로그인 세션, 스케줄 에이전트 루프까지.\",\"claim_en\":\"When you give Claude Code access to Playwright CLI, it can automate almost anything in a browser — QA testing, scraping, logged-in workflows, scheduled agentic loops.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/J-6pnl5DQg8\",\"published_at\":\"2026-04-25\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-25\",\"body_ko\":\"Claude Code에 Playwright CLI 권한을 주면 브라우저 안에서 거의 모든 일을 자동화할 수 있습니다 — QA 테스트, 스크래핑, 로그인 세션, 스케줄 에이전트 루프까지.\\n\\n핵심 프레임 — 도구와 도달 범위를 정초합니다. \\\"Playwright CLI가 있고 Claude Code와 짝을 이룬다\\\"는 향후 강의·후속 thought들의 canonical 앵커입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/J-6pnl5DQg8\",\"date\":\"2026-04-25\",\"original\":\"So, when you give a tool as powerful as Claude code, access to literally control a browser, if you think about it, you can actually automate anything. Whether that's stress testing an app, downloading reports, or even playing a game.\"}]},{\"id\":\"post-not-meet-to-save-time\",\"label\":\"post-not-meet-to-save-time\",\"claim_ko\":\"회의를 줄이려면\\n주기적으로 글을 쓰고 모두를 태그합니다.\",\"claim_en\":\"To kill meetings,\\nwrite an update and tag everyone instead.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\",\"meta-life\"],\"theses\":[\"bigtech-comp-is-a-system\",\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-25\",\"body_ko\":\"회의를 줄이려면\\n주기적으로 글을 쓰고 모두를 태그합니다.\\n\\n실리콘밸리 빅테크에서 일하면서 제일 아까운 시간은 **\\\"똑같은 말을 계속 반복하는 시간\\\"**입니다. 그래서 저는 한 달이나 일주일 주기로 다음을 합니다. **첫째**, 내가 뭘 하고 있는지 정리해서 포스트를 씁니다. **둘째**, 같이 일하는 사람들 전부를 태그합니다. **셋째**, 불필요한 1:1을 모두 캔슬합니다. 그러면 시간을 잡아먹는 미팅이 대폭 줄어들고, 굳이 반복해서 설명할 필요 없이 모두가 알아서 확인합니다. 가끔은 1:1을 전부 캔슬하고 **\\\"포스트 읽어 보고 필요하면 다시 잡아 주세요\\\"**라고 부탁하기도 합니다. 회의가 많아 지친다면 한 번 시도해 보십시오. 효과는 확실합니다.\",\"body_en\":\"To kill meetings,\\nwrite an update and tag everyone instead.\\n\\nThe most wasted hour in Big Tech is **the one where you repeat the same status update for the fifth time.** So on a weekly or monthly cadence I do this. **One**: write a post summarizing what I'm working on. **Two**: tag everyone collaborating with me. **Three**: cancel every 1:1 that was scheduled just for status sync. Meetings drop hard, and people self-serve the update rather than asking me to re-deliver it. Sometimes I cancel *all* 1:1s in a week and say *\\\"read the post and rebook only if you still need something.\\\"* If meetings are wearing you out, try this. The effect is real.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGfKTxXus-O\",\"date\":\"2025-02-25\",\"original\":\"실리콘밸리 빅테크에서 일하면서 제일 아까운 시간이 뭔지 알아?\\n\\n바로, \\\"똑같은 말을 계속 반복하는 시간\\\" 이야.\\n\\n그래서 나는 한 달이나 1주일 주기로\\n\\n✍️ 내가 뭘 하고 있는지 정리해서 포스트 쓰고,\\n📌 같이 일하는 사람들 전부 태그해,\\n❌ 그리고 불필요한 1:1은 모두 캔슬시켜.\\n\\n그럼 시간 잡아먹는 미팅들을 대폭 줄일 수 있고,\\n굳이 반복해서 시간들여 설명할 필요 없이 다들 알아서 확인하더라.\\n\\n가끔은 1:1 전부 다 캔슬하고,\\n\\\"포스트 읽어보고 필요하면 다시 잡아줘\\\" 라고 부탁하기도 해.\\n\\n회의 많아서 지친다면 한 번 해봐.\\n효과는 확실해.\"}]},{\"id\":\"project-is-context-separation\",\"label\":\"project-is-context-separation\",\"claim_ko\":\"프로젝트는 맥락을 분리하는 장치입니다 —\\n한 채팅에 모든 일을 섞으면 컨텍스트가 꼬여 엉뚱한 결과가 나옵니다.\",\"claim_en\":\"A project is a context-separation device — pile everything into one chat and the context tangles, so you ask for B and get A.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-19\",\"body_ko\":\"프로젝트는 맥락을 분리하는 장치입니다 —\\n한 채팅에 모든 일을 섞으면 컨텍스트가 꼬여 엉뚱한 결과가 나옵니다.\\n\\n서로 다른 일을 한 대화에 몰아넣으면 에이전트가 맥락을 분간하지 못합니다. 프로젝트 단위로 맥락을 갈라두는 것이 카페와 SaaS를 따로 굴리는 이유입니다.\",\"body_en\":\"A project is a context-separation device — pile everything into one chat and the context tangles, so you ask for B and get A.\\n\\nCram unrelated work into one conversation and the agent can't tell the contexts apart. Splitting context by project is exactly why the cafe and the SaaS run separately.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"이 프로젝트라는 거는 결국 맥락을 분리하는 정도로 사용돼요. 여기서 채팅을 계속하면 좀 꼬이잖아요. 그 Context가 분간이 안 되거든요. 나는 Project B를 하고 싶었는데 Project A가 될 수 있는, 그러한 문제가 생기기 때문에.\"}]},{\"id\":\"prompting-forces-reasoning\",\"label\":\"prompting-forces-reasoning\",\"claim_ko\":\"프롬프트 엔지니어링은 추론을 강제하는 기술입니다.\",\"claim_en\":\"Prompt engineering is the craft of forcing the model to reason.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"prompt-engineering\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"프롬프트 엔지니어링은\\n추론을 강제하는 기술입니다.\\n\\n언어 모델은 기본적으로 한 번에 답을 던지는 기계입니다. 그런데 한 줄 — \\\"Let's think step by step.\\\" — 을 추가하면 그 기계가 갑자기 한 단계씩 추론하기 시작합니다. 이게 프롬프트 엔지니어링의 정체입니다. 모델이 본래 하지 않는 사고 과정을 언어로 유도해서 강제하는 기술 — 더 좋은 질문이 아니라, 더 좋은 사고를 끌어내는 도구입니다.\",\"body_en\":\"Prompt engineering is the craft of forcing the model to reason.\\n\\nA language model defaults to one-shot answers. Add the line \\\"Let's think step by step\\\" and the same model starts working through the problem one step at a time. That's the actual job of prompt engineering: not \\\"ask better questions,\\\" but **induce reasoning the model wouldn't perform on its own**. The leverage isn't in the question; it's in the cognitive scaffolding the prompt installs.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH04-01\",\"date\":\"2024-05-01\",\"original\":\"Let's think step by step. 혹은 하나씩 차근차근 생각해봐. 이거 하나로 정말 많이 바뀌었거든요… 언어로 논리를 정리하는 효과가 나타나면서 어려운 문제들을 큰 문제들을 단계적으로 생각을 하면서 푸면서 오답이 나올 확률을 기하급수적으로 줄였다… 한마디로 표현을 하자면은 프롬프트 엔지니어링으로 좀 추론을 강제했다 라고도 말씀드릴 수가 있을 것 같거든요.\"}]},{\"id\":\"prompting-is-the-foundation\",\"label\":\"prompting-is-the-foundation\",\"claim_ko\":\"대화형 AI 서비스의 초석은 프롬프트 엔지니어링입니다.\",\"claim_en\":\"Every conversational-AI product is built on prompt engineering as its foundation.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"prompt-engineering\",\"ai-foundations\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"대화형 AI 서비스의 초석은\\n프롬프트 엔지니어링입니다.\\n\\nChatGPT 위에 만든 챗봇, 에이전트, 자동화 — 그 서비스의 성능, 안정성, 안전성은 거의 전적으로 시스템 프롬프트와 지시 설계에서 결정됩니다. 모델 파인튜닝은 그 위에 올리는 것이고, 프롬프트가 무너지면 모델이 아무리 좋아도 서비스가 무너집니다. 셰브런 챗봇이 차를 1달러에 팔겠다고 답변한 사건은 프롬프트 설계의 실수이지, 모델의 한계가 아닙니다.\",\"body_en\":\"Every conversational-AI product is built on prompt engineering as its foundation.\\n\\nBuild a chatbot, an agent, or any automation on top of ChatGPT and the product's performance, stability, and safety live almost entirely in the system prompt and instruction design. Fine-tuning rides on top; if the prompt layer fails, no model upgrade saves the product. The Chevrolet chatbot that agreed to sell a car for $1 wasn't a model failure — it was a prompt-engineering failure.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH04-01\",\"date\":\"2024-05-01\",\"original\":\"대화형 인공지능에 좀 성능을 극대화하고 안정성을 도모하고 활용도를 높이고 자연스러움을 추가하고 그리고 사용자 경험을 증진시키기 위한 모든 곳에 이 프롬프트 엔지니어링 기술이 사용됩니다. 왜냐면 결국 이 서비스가 구축되는 가장 중요한 기반이 프롬프트 엔지니어링이자 지시문이거든요.\"}]},{\"id\":\"prompting-is-the-only-skill\",\"label\":\"prompting-is-the-only-skill\",\"claim_ko\":\"프롬프트 엔지니어링은 ChatGPT 사용자가 가질 수 있는\\n유일한 실력입니다.\",\"claim_en\":\"For a ChatGPT user, prompting is the only skill that exists.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"prompt-engineering\",\"learning\"],\"theses\":[\"pillar-framework\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"프롬프트 엔지니어링은 ChatGPT 사용자가 가질 수 있는\\n유일한 실력입니다.\\n\\nChatGPT는 언어 모델 위에 만든 대화 서비스입니다. 사용자가 이 서비스에 접근할 수 있는 유일한 통로는 프롬프트입니다. 그러므로 사용자 입장에서 \\\"ChatGPT를 잘 쓴다\\\"는 정의는 한 가지로 좁혀집니다 — 프롬프트를 잘 쓴다. GPTs 설계나 API 활용은 그 다음 층의 이야기이고, 프롬프트가 안 되면 그 위층은 시작도 못 합니다.\",\"body_en\":\"For a ChatGPT user, prompting is the only skill that exists.\\n\\nChatGPT is a chat surface sitting on a language model. The user's only interface is the prompt, which means \\\"good at ChatGPT\\\" collapses into one definition: good at prompting. GPTs construction, API workflows, custom agents — those live on the layer above, and none of them load if the prompting layer is broken.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH04-01\",\"date\":\"2024-05-01\",\"original\":\"이 프롬프트 엔지니어링이 ChatGPT 사용자의 유일한 기술이자 실력이다 라고 말씀을 드렸는데… 언어를 다루는 기술이 없으면 사실 제대로 구사하기가 어려워요. 그리고 그 언어를 다루는 기술만이 유일한 실력이 될 수 밖에 없어요. 왜냐면 채팅밖에 할 수가 없으니까.\"}]},{\"id\":\"pull-team-members-off-bad-projects\",\"label\":\"pull-team-members-off-bad-projects\",\"claim_ko\":\"팀원이 잘못된 자리에 있으면\\n주저없이 빼야 합니다.\",\"claim_en\":\"When a team member is stuck in the wrong project,\\npull them out — fast.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-26\",\"body_ko\":\"팀원이 잘못된 자리에 있으면\\n주저없이 빼야 합니다.\\n\\n오늘도 팀원에게 \\\"넌 이 프로젝트 빠져\\\" 라고 말했습니다. 리더로서 스케일하려고 팀원에게 일을 맡겼는데, 그 친구가 그 프로젝트에서 value-add를 하지 못하고 시간과 재능만 낭비하고 있다면, 질질 끌면 안 됩니다. 빠르게 판단해야 합니다. 코딩을 해야 하는데 미팅만 늘어나고, 다른 사람들의 참견이 너무 많아 효율이 안 나는 상황이라면 — 당장 빼와서 다른 프로젝트에 넣어주고, 내가 그 복잡한 자리에 비집고 들어가 교통정리를 해줘야 합니다. **귀찮고 어려운 일은 리더의 몫입니다.**\",\"body_en\":\"When a team member is stuck in the wrong project,\\npull them out — fast.\\n\\nI told someone today, \\\"You're off this project.\\\" Sometimes you have to. You delegated to scale yourself. But if the person you delegated to isn't producing value-add, and is instead burning their time and talent — you can't drag your feet. The move is fast. The signal: they should be coding, but the calendar is full of meetings, and too many outside voices are blocking effective work. Pull them. Put them on something they can ship. Take their seat in the mess yourself and untangle the traffic. **The uncomfortable, tedious part of the job is the leader's job.**\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGmvyt2xsFt\",\"date\":\"2025-02-26\",\"original\":\"오늘도 팀원에게 \\\"넌 이 프로젝트 빠져\\\" 라고 말했다.\\n\\n가끔은 이렇게 말할 필요가 있다.\\n\\n리더로서 스케일하기 위해 팀원에게 일을 맡겼지만,\\n그 친구가 그 프로젝트에서 value-add 를 하고 있지 못하고\\n오히려 시간과 재능을 낭비하고 있다면?\\n\\n질질 끌지 말고 빠르게 판단해야 한다.\\n\\n코딩을 해야하는데 미팅만 늘어나고 엔지니어링을 못 하고 있고,\\n다른 사람들의 참견이 너무 많아 효율적으로 일하고 있지 못한다면?\\n\\n당장 빼와서 다른 프로젝트에 넣어주고,\\n내가 그 복잡하고 비효율적인 상황을 비집고 들어가 교통정리를 해줘야한다.\\n\\n귀찮고 어려운 일은 리더의 몫이다.\"}]},{\"id\":\"purpose-precedes-prompting\",\"label\":\"purpose-precedes-prompting\",\"claim_ko\":\"ChatGPT를 제대로 쓰려면\\n프롬프트 전에 목적부터 명확히 합니다.\",\"claim_en\":\"Using ChatGPT well starts before the prompt —\\nit starts with knowing your purpose.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"prompt-engineering\",\"learning\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"garden\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"ChatGPT를 제대로 쓰려면\\n프롬프트 전에 목적부터 명확히 합니다.\\n\\nChatGPT를 제대로 사용하려면 세 단계입니다. **첫째, 나의 목적을 정확하게 압니다.** 둘째, 대화를 의도적으로 연출하면서 질문을 제대로 설계해서 말을 걸어 갑니다. 셋째, 도출한 결과를 대화를 통해 반복적으로 돌려 깎습니다. 가장 중요한 것은 **첫째 단계** — ChatGPT를 사용하기 전에 **내가 무엇을 원하는지 정확히 아는 것**입니다. 이는 사람 사이의 대화와도 같습니다. 대화가 유의미하게 흘러가려면 우리가 그 대화에서 무엇을 얻고자 하는지 잘 알아야 합니다. ChatGPT도 똑같습니다. 질문을 잘 설계하기 전에, **목적이 정확해야 질문이 정확해집니다.** 프롬프트 엔지니어링은 거기서 시작합니다.\",\"body_en\":\"Using ChatGPT well starts before the prompt —\\nit starts with knowing your purpose.\\n\\nThree stages to using ChatGPT well. **One: know your purpose precisely.** Two: deliberately shape the dialogue — design the questions, don't just type them. Three: refine the result iteratively through more conversation. Stage one is the load-bearing one. **Before you even type the prompt, know exactly what you want out of it.** This is the same as any human conversation. For dialogue to go anywhere meaningful, you have to know what you're trying to get out of it. ChatGPT is no different. **Purpose precedes prompt design, which precedes refinement.** Skip stage one and stages two and three collapse.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH03-03\",\"date\":\"2024-05-01\",\"original\":\"ChatGPT를 여러분들께서 제대로 사용하시려면 첫 번째로는 나의 목적을 정확하게 알고, 두 번째로는 대화를 의도적으로 연출하면서 혹은 질문들을 제대로 설계를 해서 말을 걸어감으로써, 세 번째 도출한 결과를 대화를 통해서 반복적으로 돌려깎는다 라고 말씀드릴 수 있을 것 같아요.\\n\\n일단 ChatGPT를 사용하시기 전에 앞서서 내가 어떤 것을 원하는지 정확하게 아는 것이 되게 중요하다는 말씀을 드리고 싶어요. 이거는 사실 대화라는 것과도 되게 일맥상통하는 것인데 우리가 누군가와 대화를 했을 때 그 대화가 유의미하게 흘러가기 위해서는 우리가 이 대화를 통해서 얻고자 하는 것이 무엇인지 잘 아는 게 되게 중요하죠. ChatGPT도 똑같아요.\\n\\n우리는 대화를 통해서 원하는 답을 도출해내기 위해서 이 도구를 쓰는 건데 그렇기 위해서는 질문을 어떻게 설계하고 어떤 식으로 질문하느냐 정말 중요하다라는 말과도 같은 맥락일 수가 있겠죠.\"}]},{\"id\":\"questions-fuel-growth\",\"label\":\"questions-fuel-growth\",\"claim_ko\":\"질문이 사라진 사람은\\n성장도 사라집니다.\",\"claim_en\":\"Without questions there is no growth —\\nfor a person or for a society.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"learning\"],\"theses\":[\"pillar-framework\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-07-14\",\"body_ko\":\"질문이 사라진 사람은\\n성장도 사라집니다.\\n\\n한국에서 중학교에 들어갔을 때, 수학 시간에 자신 있게 답을 했다가 친구들의 놀림을 받았고, 그 뒤로는 어떤 질문도 어떤 답변도 사람들 앞에서 하지 않게 되었습니다. 그 사이 수업은 점점 못 따라갔고, 자기 생각에 대한 자신도 점점 없어졌습니다. 한국 교육의 부작용이 한 인간의 성장 곡선을 어떻게 꺾는지 본인이 직접 겪었습니다. 회사도 똑같습니다. 몰라도 모른다고 말하기 어렵고, 질문하기는 무섭습니다. 그렇게 사는 사람에게 성장은 없습니다. 다행히 지금은 질문할 곳이 하나 더 생겼습니다 — ChatGPT는 눈치를 안 봅니다. 바보 같은 질문도, 같은 질문도, 백 번을 해도 답을 돌려줍니다. 도구가 바꾼 것은 정답의 출처가 아니라 질문하는 사람의 심리적 비용입니다.\",\"body_en\":\"Without questions there is no growth —\\nfor a person or for a society.\\n\\nIn my first year of middle school in Korea, I answered a math question confidently, got teased for it, and never spoke up in class again. The class material got harder; my confidence in my own thinking got smaller. I learned firsthand how Korean education's social cost on questions bends a person's growth curve down. Companies have the same problem. Admitting you don't know is hard. Asking is harder. Without those moves, growth doesn't compound. The change conversational AI brought wasn't a new source of answers — it was a near-zero psychological cost on questions. ChatGPT doesn't judge. You can ask the same dumb question a hundred times. Whatever was suppressing the inner asker can be re-trained in front of a model that doesn't care.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/C9a9Xp8yi7S\",\"date\":\"2024-07-14\",\"original\":\"\\\"질문이 사라진 사회는 발전 가능성이 없다\\\"\\n내가 한국에서 중학교를 막 들어갔을 때, 수학 시간에 선생님의 질문에 자신있게 답을 했다가 친구들에게 놀림을 받고서는 다시는 그 어떤 질문이던 대답이던 남들앞에서는 하지 않게 되었던 일이 생각이 난다.\\n…\\n회사도 똑같다. 몰라도 모른다고 말하기 어렵고 질문하기가 무섭다. 하지만 그런 나에게 성장은 없다.\\n그나마 요즘은 바보같은 질문들도 chatgpt 에게 눈치 안보고 시도때도 없이 할 수 있어서 참 다행인듯\"}]},{\"id\":\"real-content-cannot-be-copied\",\"label\":\"real-content-cannot-be-copied\",\"claim_ko\":\"남이 따라 할 수 있는 콘텐츠는\\n내 콘텐츠가 아닙니다.\",\"claim_en\":\"Content that can be copied\\nwasn't really yours to begin with.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-23\",\"body_ko\":\"남이 따라 할 수 있는 콘텐츠는\\n내 콘텐츠가 아닙니다.\\n\\n내 유튜브 채널을 그대로 카피한 채널이 생겼습니다. 콘텐츠, 썸네일, 제목, 인트로, 폰트, 멘트까지 거의 똑같이 만든 영상을 보고 처음에는 상실감, 다음에는 묘한 뿌듯함, 결국에는 응원하는 마음이 왔습니다. 깨달은 것은 한 가지입니다 — 남이 그대로 따라 할 수 있었다는 것은, 그 콘텐츠가 본질적으로 내 것이 아니었다는 뜻입니다. 형식과 패키지는 따라잡혔지만, 따라잡히지 않는 것이 따로 있습니다. 진짜 \\\"내\\\" 콘텐츠는 남들이 따라할 수도 없는 그것입니다 — 본인이 살아온 시간, 만난 사람들, 직접 데여본 실수, 끝까지 풀어 본 의문. 그것이 콘텐츠의 진짜 단위입니다.\",\"body_en\":\"Content that can be copied\\nwasn't really yours to begin with.\\n\\nA YouTube channel cloned mine — same content, thumbnails, titles, intro, fonts, even the catchphrases. First reaction was loss. Second was an odd flicker of pride. Third — sincerely — was rooting for them. The realization that stuck: anything that could be copied that closely was, by definition, not the load-bearing part of \\\"my\\\" content. The packaging got duplicated. What doesn't duplicate is the upstream — the years I lived, the people I met, the specific mistakes I made, the questions I followed to the end. That upstream is the actual unit of content. Everything downstream is just packaging.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFKN3_cRYMu\",\"date\":\"2025-01-23\",\"original\":\"내 체널을 그대로 카피한 유튜브 채널이 생겼다.\\n친구의 제보로 알게 되었는데, 콘텐츠, 썸네일, 제목, 인트로, 폰트, 멘트까지 거의 똑같이 만든 영상을보고 적지 않게 놀랐다. 심지어 그 채널은 몇달만에 3만 구독자가 넘어가는중.\\n…\\n어차피 나도 누군가를 벤치마킹 한거고, 진짜 \\\"내\\\" 콘텐츠는 남들이 따라할 수도 없는게 진짜다.\"}]},{\"id\":\"resume-replaced-by-vibe-coding\",\"label\":\"resume-replaced-by-vibe-coding\",\"claim_ko\":\"7년 만에 이력서를 고치는 대신\\nReplit으로 새로 만들었습니다.\",\"claim_en\":\"Instead of editing my résumé after seven years,\\nI rebuilt it on Replit.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"career-strategy\"],\"theses\":[\"move-first-or-lose-the-game\",\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2025-09-20\",\"body_ko\":\"7년 만에 이력서를 고치는 대신\\nReplit으로 새로 만들었습니다.\\n\\nOpenAI 리크루터에게 연락이 왔습니다. 새로 만드는 OpenAI Jobs Platform 팀에 지원하지 않겠냐는 메일이었습니다. 앞으로 직업군이 크게 변할 것을 생각하면 OpenAI가 이런 방향으로 가는 것은 맞아 보입니다. 궁금해서 콜을 잡았는데, 알고 보니 이력서를 고친 지가 7년이 넘었더군요. 고치려니 귀찮아서 그냥 Replit으로 새로 만들었습니다. 생각보다 너무 잘해서 놀랐습니다. 한국어 버전과 영어 버전을 한 번에 만들어 줍니다. 앞으로 누가 이력서를 고쳐야 한다면, 바이브 코딩으로 새로 만들어 보시라 권하지 않을까 싶습니다.\",\"body_en\":\"Instead of editing my résumé after seven years,\\nI rebuilt it on Replit.\\n\\nAn OpenAI recruiter reached out — would I want to interview for their new Jobs Platform team. Given how violently job categories are about to shift, OpenAI's bet here looks correct. I took the call out of curiosity and realized I hadn't touched my résumé in seven years. Updating felt tedious, so I just rebuilt it on Replit. Way better than expected. It even produced KO and EN versions in one shot. Next time someone asks me how to update their résumé, I'll probably tell them to vibe-code a new one.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DQR-V9lD0Nk\",\"date\":\"2025-09-20\",\"original\":\"OpenAI 리크루터에게 연락이 왔다.\\n새로운 OpenAI Jobs Platform 팀에 지원하지 않겠냐는 이메일이였다.\\nOpenAI는 앞으로 AI역량을 가진 인재와 기업을 연결하는 플랫폼을 만들 생각인 듯 하다.\\n앞으로 직업군이 엄청나게 변화할걸 생각하면, 맞는 방향인것 같다는 생각은 든다.\\n궁금하기도 해서 콜을 잡았는데 레쥬메를 고친지가 벌써 7년이 넘은걸 깨달았다.\\n고치려다보니 귀찮아서 그냥 Replit 으로 새로 만들어봤다.\\n생각보다 너무 잘해서 놀람.. 심지어 한/영 버젼도 한번에 해주고..\\n앞으로 누가 이력서를 고쳐야한다 한다면 바이브 코딩으로 해보라 추천하지 않을까 싶다.\"}]},{\"id\":\"reverse-engineer-skills-from-winning-prompts\",\"label\":\"reverse-engineer-skills-from-winning-prompts\",\"claim_ko\":\"에이전트가 마음에 드는 결과를 뽑으면 그 프롬프트를 그대로 Claude Code에 붙여넣고 \\\".claude/skills/에 스킬로 만들어 달라\\\"고 시키십시오.\\n다음 호출부터는 그 레시피를 재사용해 다시 프롬프트를 짜지 않아도 결과가 브랜드를 유지합니다.\",\"claim_en\":\"When an agent produces a generation you love, copy that exact prompt back into Claude Code and tell it \\\"turn this into a skill in .claude/skills/\\\" — the next invocation reuses the recipe and outputs stay on brand without re-prompting.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/xn6Z5PYyAIE\",\"published_at\":\"2026-05-04\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"prompt-engineering\",\"creator-economy\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-04\",\"body_ko\":\"에이전트가 마음에 드는 결과를 뽑으면 그 프롬프트를 그대로 Claude Code에 붙여넣고 \\\".claude/skills/에 스킬로 만들어 달라\\\"고 시키십시오.\\n다음 호출부터는 그 레시피를 재사용해 다시 프롬프트를 짜지 않아도 결과가 브랜드를 유지합니다.\\n\\nAlex의 기존 skills thought들이 \\\"skill이 무엇인지\\\"를 설명한다면, 이건 \\\"어떻게 만드는지\\\"를 채워줍니다. 블로그 초안·소셜 포스트·코드 리뷰 — 한 번이라도 잘 나온 프롬프트가 있는 모든 영역에 일반화됩니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/xn6Z5PYyAIE\",\"date\":\"2026-05-04\",\"original\":\"I'm going to reverse engineer a skill from this prompt... \\\"turn this into a skill that lives locally inside of this project in the .claude/skills so that anytime I ask for a hypermotion style video, you will utilize this.\\\"\"}]},{\"id\":\"role-boundaries-collapse-designers-build-engineers-design\",\"label\":\"role-boundaries-collapse-designers-build-engineers-design\",\"claim_ko\":\"AI 네이티브 시대에는\\n디자이너가 개발을 하고, 개발자가 디자인을 합니다.\",\"claim_en\":\"In the AI-native era,\\ndesigners ship code and engineers design.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"
