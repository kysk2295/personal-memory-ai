다. 100x 빌더에 감까지 좋아지면 500x가 됩니다. 단 3명이서 10만 명을 위한 프로덕트를 만들고 있는 게 그 증거입니다. 앞으로는 이 두 타입의 능력자만 살아남습니다.\",\"body_en\":\"Every role splits into one of two kinds:\\nbuilder or reviewer.\\n\\nAI made it easy to make anything. *Making it faster, making it better* — still hard. The leaders of the next decade are 100× builders. But even 100× builders hit walls. What they hit is taste — *the ability to see what's not there yet.* That's where reviewers earn their seat: people who look at the build and see the next move that nobody else can see. When a builder and a reviewer pair up, you get 500×, not 200×. I'm living it right now: three people, a product serving a hundred thousand. Going forward, these are the only two roles left.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DVxw1iBFVc-\",\"date\":\"2026-02-25\",\"original\":\"앞으로 모든 직군은 \\\"빌더\\\" 와 \\\"리뷰어\\\" 로 나뉜다.\\n\\n인공지능으로 뭐든 만들기 쉬워졌지만,\\n그래도 더 빠르게, 더 잘 만들긴 여전히 어렵다.\\n앞으로는 100x 빌더들이 주도하게 된다.\\n\\n하지만 빌더들이 막히는 순간들이 있다.\\n\\\"감\\\"이다. \\\"보이지 않는 것을 보는 능력.\\\"\\n다 만들고 보여줬더니, 그 다음이 보이는 사람들.\\n\\n지금은 그 둘이 만났을때 엄청난 시너지가 발생한다.\\n100x 인데 감까지 좋아지면 500x 효과가 나온다.\\n\\n실제로 경험중이다.\\n단 3명이서 10만명을 위한 프로덕트를 만들고 있다.\\n\\n앞으로는 이 두 타입의 능력자들만 남게 될 것이다.\"}]},{\"id\":\"builder-mindset-taste-speed-are-the-three-traits\",\"label\":\"builder-mindset-taste-speed-are-the-three-traits\",\"claim_ko\":\"지금 시대에 성공할 인재는\\n빌더 마인드 · 감각 · 속도 세 가지를 갖춥니다.\",\"claim_en\":\"The people who win this era have three traits:\\nbuilder mindset, taste, and speed.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-02-20\",\"body_ko\":\"지금 시대에 성공할 인재는\\n빌더 마인드 · 감각 · 속도 세 가지를 갖춥니다.\\n\\n세 가지가 갖춰진 사람은 이 시대에 반드시 성공합니다. **첫째, 빌더 마인드셋.** 일단 써 보고 되게 만들어 봅니다. **둘째, 감각.** 사람들이 뭘 좋아하는지 압니다. **셋째, 속도.** 가장 빠르게 실행에 옮깁니다. 이제 \\\"전문가\\\"의 벽은 무너졌습니다. 위 셋을 잘 하는 사람은 자기 분야가 무엇이든 성공합니다. 우리가 가장 조심해야 할 것은 **귀찮음**과 **두려움**입니다.\",\"body_en\":\"The people who win this era have three traits:\\nbuilder mindset, taste, and speed.\\n\\nThree traits. People who have all three win this era, regardless of domain. **One, builder mindset.** Just try it. Make it work. **Two, taste.** Read what people actually like. **Three, speed.** Be first to execute. The wall around *\\\"specialists\\\"* is gone. Anyone with these three wins; the rest doesn't matter. The only two real enemies are *laziness* and *fear.*\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DVNwMfJFYYh\",\"date\":\"2026-02-20\",\"original\":\"지금 이 시대에 가장 성공할 인재상은 다음과 같다.\\n\\n1. 빌더 마인드셋. 일단 써보고 되게 만들어본다\\n2. 감각, 센스. 사람들이 뭘 좋아하는지 안다.\\n3. 스피드. 가장 빠르게 실행에 옮긴다.\\n\\n이제는 \\\"전문가\\\" 의 벽은 무너졌다.\\n위의 셋을 잘 하는 사람은 반드시 성공한다.\\n\\n우리가 가장 조심해야할 것은 \\\"귀찮음\\\"과 \\\"두려움\\\" 이다.\"}]},{\"id\":\"character-design-via-ai-in-ten-min\",\"label\":\"character-design-via-ai-in-ten-min\",\"claim_ko\":\"디자인을 몰라도 10분이면\\n자기 캐릭터 하나를 뽑을 수 있습니다.\",\"claim_en\":\"You don't need design skills.\\nTen minutes is enough to produce a character.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-04-08\",\"body_ko\":\"디자인을 몰라도 10분이면\\n자기 캐릭터 하나를 뽑을 수 있습니다.\\n\\nAI로 10분 만에 자기만의 캐릭터를 만들 수 있습니다. 디자인, 일러스트레이션, 3D 렌더링 — 하나도 몰라도 됩니다. 진짜 문제는 다른 데에 있습니다. **어떻게 해야 찰떡같은 캐릭터가 나오는가** — 그게 핵심입니다. 답은 프롬프트의 결입니다. 어떤 단어, 어떤 순서, 어떤 톤으로 묘사하느냐가 결과를 결정합니다.\",\"body_en\":\"You don't need design skills.\\nTen minutes is enough to produce a character.\\n\\nAI gets you a character of your own in ten minutes. No design, no illustration, no 3D rendering background needed. The real problem isn't the skill — *it's getting a character that actually fits.* That comes down to the *texture* of the prompt: which words, in what order, in what register.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DIdU65VRghU\",\"date\":\"2025-04-08\",\"original\":\"AI으로 10분만에 나만의 캐릭터 만들기.\\n예전부터 해보고 싶은건데. 이젠 할만할 것 같아 해봤다.\\n디자인? 일러스트레이션? 3D rendering? 하나도 몰라도 된다.\\n진짜 문제는… 어떻게 해야 *찰떡같은 캐릭터*가 나오는가.\\n비법이 궁금하다면? 댓글에서 꿀팁 풀어볼게 👇\"}]},{\"id\":\"charisma-beats-execution-in-ai-era\",\"label\":\"charisma-beats-execution-in-ai-era\",\"claim_ko\":\"이제 실무는 덜 중요합니다.\\n그 사람의 매력이 더 중요합니다.\",\"claim_en\":\"Hands-on execution matters less now.\\nThe operator's charisma matters more.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"creator-economy\",\"career-strategy\"],\"theses\":[\"move-first-or-lose-the-game\",\"personal-brand-is-the-moat\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-10-17\",\"body_ko\":\"이제 실무는 덜 중요합니다.\\n그 사람의 매력이 더 중요합니다.\\n\\nAI가 만드는 결과물은 결국 비슷합니다. 그렇다면 중요한 것은 무엇입니까? **누가** 만들었고, **왜** 만들었는가입니다. 같은 출력물이라도 발화자가 누구냐, 무슨 의도였느냐에 따라 시장이 반응하는 방식이 다릅니다. AI 시대에는 실무 능력보다 그 사람의 매력 — 어떤 관점, 어떤 정체성, 어떤 의도로 시장에 서느냐 — 가 차이를 만듭니다.\",\"body_en\":\"Hands-on execution matters less now.\\nThe operator's charisma matters more.\\n\\nThe outputs AI produces converge. If everyone's deliverable looks similar, what splits them? *Who* and *why.* The same artifact from a different operator, with a different intent, lands differently in the market. In the AI era, charisma — your stance, your identity, your reason — does the work that hands-on execution used to do.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DPKFaGmknDD\",\"date\":\"2025-10-17\",\"original\":\"이제 실무는 덜 중요합니다, 오히려 \\\"그 사람의 매력\\\" 이 중요합니다.\\nAI가 만드는 결과물들은 결국 다 비슷하거든요.\\n중요한건 \\\"누가\\\", \\\"왜\\\" 했는가.\\n\\\"퍼스널브랜딩\\\"에 관한 제 경험과 생각을 세미나 준비하면서 웹사이트로 만들어봤어요.\"}]},{\"id\":\"chatbot-era-ended-agent-era-began\",\"label\":\"chatbot-era-ended-agent-era-began\",\"claim_ko\":\"2024년의 챗봇 시대는 끝났습니다.\\n지금은 도구를 묶어 임무를 끝내는 에이전트의 시대입니다.\",\"claim_en\":\"The chatbot era of 2024 is over.\\nWe're in the agent era now — bundle the tools and finish the job.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"agents\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"2024년의 챗봇 시대는 끝났습니다.\\n지금은 도구를 묶어 임무를 끝내는 에이전트의 시대입니다.\\n\\nChatGPT가 처음 나왔을 때, 사람들이 본 것은 채팅창이었습니다. 질문을 던지고 답을 받는 인터페이스. 2026년의 같은 도구는 더 이상 채팅창이 아닙니다. 이미지를 만들고, 영상을 만들고, 리서치를 하고, 브라우저를 제어하고, 코드를 짭니다. 그리고 이 모든 것을 하나의 지시로 묶어내는 게 에이전트입니다. 챗봇은 한 번의 질문이고, 에이전트는 한 번의 미션입니다.\",\"body_en\":\"The chatbot era of 2024 is over. We're in the agent era now — bundle the tools and finish the job.\\n\\nWhen ChatGPT first shipped, what people saw was a chat window: ask a question, get an answer. The same tool in 2026 isn't a chat window anymore. It generates images, makes videos, runs research, drives a browser, writes code. An agent is what bundles all of that under a single instruction. A chatbot is one question. An agent is one mission.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"2024년에 ChatGPT가 나왔을 때 너무나 놀라웠지만 지금 우리가 알고 있는 이 AI 도구들은 결코 챗봇이 아니다. 이미지 기능이 있고, 비디오 기능이 있고, 리서치 기능이 있고, 보이스 기능이 있고 그 외에도 할 수 있는 기능들이 너무너무 많아요. 디자인부터 시작해서 코드부터 시작해서 컴퓨터 조작, 브라우저 조작까지.\\n…\\n그래서 지금의 트렌드는 도구가 아니라 이거를 묶어내고 몇 시간 동안 수행할 수 있는 Agent에 초점이 맞춰져 있다라는 것을 말씀드리고 싶었습니다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"이제는 대화를 해서 그치는 게 아니라 목표를 짚어두면 스스로 혼자서 계속해서 성과를 만들어내고. 목표를 던지면 Claude가 일하고 우리가 필요할 때만 직접적으로 들어가서 매니지먼트를 한다.\"}]},{\"id\":\"chatbot-explains-cowork-executes\",\"label\":\"chatbot-explains-cowork-executes\",\"claim_ko\":\"챗봇은 설명까지, 코워크는 실행까지입니다 —\\n코워크는 실제로 컴퓨터를 작동해 폴더를 읽고 파일을 분석하고 새 보고서를 만듭니다.\",\"claim_en\":\"A chatbot explains; CoWork executes — it actually operates your computer, reading folders, analyzing files, and producing new reports.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2026-05-19\",\"body_ko\":\"챗봇은 설명까지, 코워크는 실행까지입니다 —\\n코워크는 실제로 컴퓨터를 작동해 폴더를 읽고 파일을 분석하고 새 보고서를 만듭니다.\\n\\n설명을 듣는 것과 일이 끝나 있는 것은 다릅니다. 에이전트는 더 이상 대화창에 머무르지 않고 내 워크플로우 안으로 들어와 일하는 방식 자체를 바꿉니다.\",\"body_en\":\"A chatbot explains; CoWork executes — it actually operates your computer, reading folders, analyzing files, and producing new reports.\\n\\nBeing told how is not the same as the work being done. The agent no longer stays in the chat window; it steps into your workflow and changes how the work itself gets done.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"챗봇은 설명까지, 코워크는 실행까지. 실제로 컴퓨터 작동을 하면서 폴더를 읽고 파일들을 분석하고 새로운 파일과 보고서를 만들어 낼 수 있다.\\n…\\n이제는 Agent가 챗봇으로 끝나는 게 아니라 실제로 내 Workflow에 직접적으로 들어오게 되었다. 그리고 내 일하는 방식을 완전히 바꿀 수 있는 포텐셜을 가지고 있다.\"}]},{\"id\":\"cheap-questions-beat-expensive-retries\",\"label\":\"cheap-questions-beat-expensive-retries\",\"claim_ko\":\"앞에서 묻는 토큰은 쌉니다.\\n뒤에서 다시 짜는 토큰이 비쌉니다.\",\"claim_en\":\"Tokens spent asking up front are cheap. Tokens spent redoing the work are expensive.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"synthesized\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-coding\",\"productivity\",\"leadership\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-16\",\"body_ko\":\"앞에서 묻는 토큰은 쌉니다.\\n뒤에서 다시 짜는 토큰이 비쌉니다.\\n\\nSuperpowers 플러그인 12회 측정 — 명확화 단계를 강제하면 중·복잡 작업에서 토큰 14% 감소, 비용 9% 절감.\\n\\n좋은 1:1 미팅의 경제학과 동일합니다. 잘 짜인 한 시간이 잘못 짜인 한 분기를 막습니다. AI 도구가 그 차이를 처음으로 측정 가능하게 만들었을 뿐입니다.\",\"body_en\":\"Tokens spent asking up front are cheap. Tokens spent redoing the work are expensive.\\n\\nTwelve Superpowers plugin runs measured this — forcing a clarify phase cut tokens 14% and cost 9% on medium and complex tasks.\\n\\nThe same economics that run a good 1-on-1 meeting. One well-structured hour prevents one badly-structured quarter. AI tooling just made the difference measurable for the first time.\",\"sources\":[]},{\"id\":\"clarification-cost-prevents-retry-cost\",\"label\":\"clarification-cost-prevents-retry-cost\",\"claim_ko\":\"잘 훈련된 AI 코딩 플러그인이 비용을 줄이는 진짜 이유는 단계가 적어서가 아니라 비싼 재시도와 되돌리기를 막기 때문입니다.\\n앞에서 질문에 토큰을 쓰는 편이 네 번 다시 돌리는 것보다 쌉니다.\",\"claim_en\":\"The real cost saving from a disciplined AI coding plugin is not fewer steps but preventing expensive retries and backtracking — spending tokens on questions upfront beats burning four revisions later.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/4XqVR6xI6Kw\",\"published_at\":\"2026-04-12\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"productivity\",\"prompt-engineering\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-12\",\"body_ko\":\"잘 훈련된 AI 코딩 플러그인이 비용을 줄이는 진짜 이유는 단계가 적어서가 아니라 비싼 재시도와 되돌리기를 막기 때문입니다.\\n앞에서 질문에 토큰을 쓰는 편이 네 번 다시 돌리는 것보다 쌉니다.\\n\\nSuperpowers 너머로 확장되는 재사용 가능한 경제 원칙입니다 — 모든 에이전트 워크플로에 적용됩니다. \\\"재시도 방지\\\" 프레임이 AI 도구 비용 분석의 올바른 렌즈입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/4XqVR6xI6Kw\",\"date\":\"2026-04-12\",\"original\":\"Most people probably think that using a skill like this has a massive token overhead, but it's actually not that way. The value isn't in the extra steps, it's in preventing expensive retries and backtracking.\"}]},{\"id\":\"claude-code-as-virtual-engineering-team\",\"label\":\"claude-code-as-virtual-engineering-team\",\"claim_ko\":\"23개의 슬래시 명령어 전문가 — CEO, 디자이너, 엔지니어링 매니저, 리뷰어, QA, 보안 책임자, 릴리스 엔지니어 — 가 단일 Claude Code 세션을 가상의 엔지니어링 팀으로 바꿉니다.\",\"claim_en\":\"Twenty-three slash-command specialists — CEO, designer, eng manager, reviewer, QA, security officer, release engineer — turn one Claude Code session into a virtual engineering team.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Garry Tan\",\"author_handle\":\"@garrytan\",\"publication\":\"GitHub (gstack README)\",\"url\":\"https://github.com/garrytan/gstack\",\"published_at\":\"2026-01-01\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-01-01\",\"body_ko\":\"23개의 슬래시 명령어 전문가 — CEO, 디자이너, 엔지니어링 매니저, 리뷰어, QA, 보안 책임자, 릴리스 엔지니어 — 가 단일 Claude Code 세션을 가상의 엔지니어링 팀으로 바꿉니다.\\n\\ngstack의 핵심 메커닉입니다. 각 역할은 슬래시 명령어(`/office-hours`, `/plan-ceo-review`, `/review`, `/qa`, `/cso`, `/ship` 등)입니다 — 조합 가능하고, MIT 라이선스, 마크다운입니다. 구조적 통찰은 이것입니다: AI 생산성은 더 똑똑한 모델에서 나오지 않습니다. 모델 주변의 역할들을 규율 있게 오케스트레이션하는 데서 나옵니다. 알렉스의 프로젝트는 이미 gstack을 씁니다 — `/browse`, `/review`, `/qa`가 모두 이 스택에서 왔습니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://github.com/garrytan/gstack\",\"date\":\"2026-01-01\",\"original\":\"gstack turns Claude Code into a virtual engineering team — a CEO who rethinks the product, an eng manager who locks architecture, a designer who catches AI slop, a reviewer who finds production bugs, a QA lead who opens a real browser, a security officer who runs OWASP + STRIDE audits, and a release engineer who ships the PR. Twenty-three specialists and eight power tools.\"}]},{\"id\":\"claude-code-flips-master-and-tool\",\"label\":\"claude-code-flips-master-and-tool\",\"claim_ko\":\"클로드 코드를 쓰기 시작한 뒤로\\n누가 누구 일을 시키는지도 모르겠습니다.\",\"claim_en\":\"Since I started using Claude Code,\\nI can't tell anymore who's directing whom.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-12-04\",\"body_ko\":\"클로드 코드를 쓰기 시작한 뒤로\\n누가 누구 일을 시키는지도 모르겠습니다.\\n\\n아이러니하게도 클로드 코드를 쓰기 시작하고 나서 잠을 못 잡니다. 하루 사용 가능한 토큰을 전부 다 쓰기 전까지는 잠이 오지 않습니다. 너무 빠르고 너무 잘합니다. 그러다 보니 끝날 때까지 계속 만들어야만 할 것 같은 기분이 듭니다. 이제는 **누가 누구 일을 시키는지도 모르겠습니다.**\",\"body_en\":\"Since I started using Claude Code,\\nI can't tell anymore who's directing whom.\\n\\nIt's ironic — Claude Code is supposed to save me time, and yet I can't sleep. Until I burn through the day's token budget, I can't put it down. It's so fast and so good that I feel compelled to keep building until the run ends. I genuinely can't tell anymore *who's giving whom the work.*\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DTaHmfwFFur\",\"date\":\"2025-12-04\",\"original\":\"오히려 Claude Code를 쓰기 시작하고 잠을 못잔다.\\n아이러니하게도 이제는 하루 사용 가능한 토큰을\\n전부 다 쓰기 전까지는 잠을 잘 수가 없다.\\n너무 빠르고 너무 잘하는데, 그러다보니 계속해서\\n끝날때까지 만들어야만 할 것 만 같다.\\n이제 누가 누구 일을 시키는지도 모르겠다.\"}]},{\"id\":\"claude-code-is-an-agentic-os\",\"label\":\"claude-code-is-an-agentic-os\",\"claim_ko\":\"Claude Code는 코딩 도구가 아니라\\n에이전트가 사는 운영체제입니다.\",\"claim_en\":\"Claude Code isn't a coding tool.\\nIt's the OS agents run on.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-01-13\",\"body_ko\":\"Claude Code는 코딩 도구가 아니라\\n에이전트가 사는 운영체제입니다.\\n\\nClaude Code를 단순한 코딩 도구로 보면 잘못 보고 있습니다. 핵심은 다음 다섯 가지입니다. **첫째**, CLI 기반의 자율 코딩 에이전트입니다. **둘째**, **컨텍스트 매니지먼트** — 컨텍스트 윈도우를 의식하고 관리하는 메커니즘이 내장되어 있습니다. **셋째**, **독립된 메모리** — 세션 간에 살아남는 메모리 레이어를 갖추고 있습니다. **넷째**, **서브에이전트 시스템** — 단일 에이전트가 아니라 에이전트들이 협업하는 구조입니다. **다섯째**, **Skills · Plugins · Hooks**가 전부 통합되어 한 곳에서 보입니다. 이 다섯이 모이는 순간 Claude Code는 더 이상 Cursor 같은 '편집기 + LLM'이 아니라 **에이전트가 실행되는 플랫폼**, 즉 **운영체제**가 됩니다. 그래서 Cursor를 완전히 넘어선 것입니다.\",\"body_en\":\"Claude Code isn't a coding tool.\\nIt's the OS agents run on.\\n\\nTreating Claude Code as just a coding tool misses what it actually is. The five things that matter: **One** — it's a CLI-based autonomous coding agent. **Two** — **context management**, with explicit mechanics for tracking and managing the context window. **Three** — **independent memory**, a layer that survives across sessions. **Four** — **a sub-agent system**: not one agent, but a coordination structure for multiple agents. **Five** — **Skills, plugins, hooks** are unified surfaces inside the same environment. The moment those five compose, Claude Code stops being an editor-plus-LLM (like Cursor) and becomes the **platform agents execute on** — an **operating system** for AI work. That's how it leapfrogged Cursor.\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=r54WCz3XQlw\",\"date\":\"2026-01-13\",\"original\":\"클로드 코드의 충격적 성능 같이 알아봅시다 — 라이브로 30분 정도 채워 보도록 하겠습니다.\\n\\n이게 왜 퍼큘러 하냐? 이 컨텍스트 매니지먼트, 그러니까 이제 보통이 그 컨텍스트 윈도우를 벗어난다... 컨텍스트 매니지먼트들을 잘했고, 이 독립된 메모리 — 요게 조금 큰 부분이에요. 에이전트 시스템, 특히 이 서브에이전트 시스템에 큰 장을 열었다고 해야 되나.\\n\\n뭐 컨텍스트, 뭐 이런 거 했을 때는 이제 내가 컨텍스트가 뭐였더라? 아, 이거는 이제 내가 컨텍스트를 얼마나 치고 있는지 뭐 이런 거를 비주얼라이제이션 — Skills, Plugins, Hooks 같은 거를 다 통합해서 보여 주거든요.\"}]},{\"id\":\"claude-code-orchestrates-video-pipeline\",\"label\":\"claude-code-orchestrates-video-pipeline\",\"claim_ko\":\"Claude Code 영상 파이프라인은 모션 그래픽은 HyperFrames, 트리밍은 video-use에 맡기고 Claude Desktop이 각 단계를 라우팅하는 지휘자가 됩니다.\",\"claim_en\":\"A Claude Code video pipeline uses HyperFrames for motion graphics and video-use for trimming, with Claude Desktop as the orchestrator that routes each step.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/Aw3BkmhYu4I\",\"published_at\":\"2026-04-22\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-22\",\"body_ko\":\"Claude Code 영상 파이프라인은 모션 그래픽은 HyperFrames, 트리밍은 video-use에 맡기고 Claude Desktop이 각 단계를 라우팅하는 지휘자가 됩니다.\\n\\n재사용 가능한 워크플로 형태입니다 — 파이프라인 = 지휘자 + 전문 도구 둘. 오디오·슬라이드·디자인 등 다른 크리에이티브 작업에도 그대로 옮길 수 있는 패턴입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/Aw3BkmhYu4I\",\"date\":\"2026-04-22\",\"original\":\"edit videos end to end using Claude Code as the orchestrator, with HyperFrames handling motion graphics and video-use handling the trimming\"}]},{\"id\":\"claude-code-qa-loop-test-find-bugs-fix-self\",\"label\":\"claude-code-qa-loop-test-find-bugs-fix-self\",\"claim_ko\":\"Claude Code가 앱을 만들게 한 뒤, headed Playwright 브라우저로 직접 테스트하게 하고, 단계마다 스크린샷을 찍고, 발견한 버그를 보고하고, 코드를 고치고, 통과할 때까지 다시 돌리는 — 완전 무인 QA 루프입니다.\",\"claim_en\":\"Have Claude Code build an app, then drive a headed Playwright browser to test it, screenshot every step, surface the bugs it finds, patch the code, and re-run until the test passes — completely hands-off QA.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/J-6pnl5DQg8\",\"published_at\":\"2026-04-25\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"ai-tooling\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-25\",\"body_ko\":\"Claude Code가 앱을 만들게 한 뒤, headed Playwright 브라우저로 직접 테스트하게 하고, 단계마다 스크린샷을 찍고, 발견한 버그를 보고하고, 코드를 고치고, 통과할 때까지 다시 돌리는 — 완전 무인 QA 루프입니다.\\n\\nCareerHackerAlex 레포에 즉시 적용됩니다(/qa 스킬이 이미 사용 중). ChatGPT로 만든 자기 사이트를 QA할 줄 모르는 한국 비개발자 청중에게도 큰 지식 점프입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/J-6pnl5DQg8\",\"date\":\"2026-04-25\",\"original\":\"the fact that you can automate QA by having multiple different headed browsers or even headless browsers spin up and you can say, \\\"Hey, you test for X, you test for Y, you test for Z.\\\" and just have them running and fixing and running and fixing is a complete game-changer.\"}]},{\"id\":\"claude-code-wins-via-velocity-and-community\",\"label\":\"claude-code-wins-via-velocity-and-community\",\"claim_ko\":\"클로드 코드는 속도와 커뮤니티,\\n비개발자까지의 침투로 시장을 잡습니다.\",\"claim_en\":\"Claude Code wins the market\\non velocity, community, and non-engineer reach.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-12-09\",\"body_ko\":\"클로드 코드는 속도와 커뮤니티,\\n비개발자까지의 침투로 시장을 잡습니다.\\n\\n클로드 코드가 AI 시장을 잡아먹을 이유 여섯 가지입니다. **첫째**, 그 누구보다 빠르게 프로덕트를 만듭니다. 순도 100% AI 제작. **둘째**, 팀 개발자들이 SNS에서 자주 소통합니다. 피드백 반영 속도가 빠릅니다. **셋째**, 개발자들만 쓰던 터미널을 비개발자도 쓰게 만들었습니다. **넷째**, 그 사실을 깨닫자마자 Cowork이라는 앱을 만들어 터미널을 앱으로 옮겼습니다. **다섯째**, 사용자 커뮤니티를 통해 에이전트 만드는 일을 쉽게 만들었습니다. **여섯째**, 1황 @boris_cherny — 실력자이자 소통왕이자 리더입니다. 클로드 코드가 현재이자 미래입니다.\",\"body_en\":\"Claude Code wins the market\\non velocity, community, and non-engineer reach.\\n\\nSix reasons Claude Code is going to take the market. **One**: the team ships product faster than anyone, 100% AI-built. **Two**: the engineers are loud on social — feedback round-trip is fast. **Three**: they made the *terminal* — a developer-only artifact — usable by non-developers. **Four**: when that became obvious, they immediately built Cowork to bring the terminal into an app. **Five**: through the user community, building AI agents became low-friction. **Six**: their lead, Boris Cherny — operator, communicator, leader, all three. Claude Code is the present and the future.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DTcSxq8FKyb\",\"date\":\"2025-12-09\",\"original\":\"클로드 코드가 AI 시장 다 잡아먹을것 같은 이유 6가지:\\n1. 클로드 코드 팀은 그 누구보다 빠르게 프로덕트를 만든다. (순도 100% AI 제작)\\n2. 클로드 코드 팀 개발자들은 SNS에서 소통이 매우 잦다. (피드백 반영이 매우 높음)\\n3. 클로드 코드 팀은 비개발자들 조차도 개발자들만 쓰던 \\\"터미널\\\"을 쓰게 만들었다.\\n4. 클로드 코드 팀은 (3)을 깨닫고 즉시 Cowork이라는 툴을 만들었다. (터미널-\u003e앱)\\n5. 클로드 코드 팀은 \\\"사용자 커뮤니티\\\"를 통해 AI 에이전트 만드는걸 쉽게 만들었다.\\n6. 클로드 코드 1황 @boris_cherny 이분은 엄청난 실력자이자 소통왕이자 리더이다.\\n클로드 코드가 현재고 미래다.\\n(우리 회사 직원들은 잠시만 눈 감아주세요..)\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"이 Claude Code가 잘된 이유 중에 하나가 되게 이 오픈 커뮤니티가 잘 형성이 되어 있다고 생각을 하거든요.\"}]},{\"id\":\"claude-codes-real-power-is-skills-not-claude-md\",\"label\":\"claude-codes-real-power-is-skills-not-claude-md\",\"claim_ko\":\"Claude Code의 진짜 힘은 CLAUDE.md가 아니라 스킬 시스템에서 나옵니다.\\n필요한 순간에만 스킬 파일을 불러오는 점진적 노출 방식이, 모든 컨텍스트를 항상 로드되는 단일 파일에 몰아넣는 방식을 이깁니다.\",\"claim_en\":\"Claude Code's real power isn't CLAUDE.md — it's the skills system. Progressive disclosure (loading skill files on demand) wins over front-loading every rule into one always-loaded context file.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"실밸개발자\",\"author_handle\":\"@sv.developer\",\"publication\":\"YouTube\",\"url\":\"https://www.youtube.com/watch?v=vxEvo2BLM6A\",\"published_at\":\"2026-03-22\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"memory-systems\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-03-22\",\"body_ko\":\"Claude Code의 진짜 힘은 CLAUDE.md가 아니라 스킬 시스템에서 나옵니다.\\n필요한 순간에만 스킬 파일을 불러오는 점진적 노출 방식이, 모든 컨텍스트를 항상 로드되는 단일 파일에 몰아넣는 방식을 이깁니다.\\n\\nCLAUDE.md 담론의 한가운데에서 실밸개발자가 던지는 반전 주장입니다. 근거는 단순합니다 — 컨텍스트 윈도우가 한정되어 있기 때문입니다. CLAUDE.md는 매 세션 100% 로드되지만, 스킬은 호출될 때만 로드됩니다. 그래서 같은 컨텍스트 예산으로 더 많은 전문 지식을 굴릴 수 있는 구조는 스킬입니다. Karpathy의 \\\"스키마가 가장 큰 레버리지\\\"를 정정합니다: 스키마는 필요 조건이고, 점진적 노출 시스템(스킬)이 실제 레버리지입니다.\",\"body_en\":\"Claude Code's real power isn't CLAUDE.md — it's the skills system. Progressive disclosure (loading skill files on demand) wins over front-loading every rule into one always-loaded context file.\\n\\nA counter-positioning move at the center of the CLAUDE.md discourse. The reason is simple: the context window is finite. CLAUDE.md loads 100% every session; skills load only when invoked. So the structure that fits the most expertise into the same context budget is skills, not CLAUDE.md. A refinement of Karpathy's \\\"schema is the highest-leverage artifact\\\" — the schema is necessary, but the progressive-disclosure system (skills) is the actual leverage.\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=vxEvo2BLM6A\",\"date\":\"2026-03-22\",\"original\":\"솔직히 말하면 클로드 코드의 진짜 힘은 CLAUDE.md가 아니라 이 스킬 시스템에서 나옵니다. 이유는 AI한테 정보를 줄 수 있는 공간 즉 컨텍스트 윈도우가 한정되어 있기 때문입니다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"이 스킬이 사실 어떻게 보면 Claude가 가지고 있는 가장 큰 강점 중 하나라고 생각을 하는데, 예를 들면 이런 거예요. 누군가가 이메일 요약을 엄청나게 기깔나게 해주는 스킬을 만들어서 어딘가에 올렸으면 저희가 다운로드를 해서 똑같이 쓸 수 있는 거예요.\"}]},{\"id\":\"claude-design-handoff-to-claude-code-then-vercel\",\"label\":\"claude-design-handoff-to-claude-code-then-vercel\",\"claim_ko\":\"Claude Design 사이트가 마음에 들면 hand-off 명령이나 zip 익스포트로 Claude Code에 넘기고, Claude Code가 GitHub 푸시와 Vercel 배포를 처리합니다.\\n무거운 코드 작업이 디자인 한도를 갉아먹지 않습니다.\",\"claim_en\":\"Once the Claude Design site looks right, hand it off to Claude Code via the hand-off command or zip export, let Claude Code push to GitHub and deploy to Vercel — keeps heavy code work out of the design quota.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"published_at\":\"2026-04-29\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"ai-tooling\",\"solo-builder\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-29\",\"body_ko\":\"Claude Design 사이트가 마음에 들면 hand-off 명령이나 zip 익스포트로 Claude Code에 넘기고, Claude Code가 GitHub 푸시와 Vercel 배포를 처리합니다.\\n무거운 코드 작업이 디자인 한도를 갉아먹지 않습니다.\\n\\n강의의 출하 척추입니다. \\\"디자인 → 코드 → 배포를 완전히 AI에 위임하는 파이프라인\\\"의 구체 사례 — 비개발자 대상 solo-builder 데모의 정석입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"date\":\"2026-04-29\",\"original\":\"we want to get this into Claude code so we can push it into a GitHub repository and so that we can push that GitHub repository to Vercel... You could also just hit hand off to Claude code, which would give you a command. You would copy this, give it to Claude code, and then it would be able to pull everything in.\"}]},{\"id\":\"claude-design-is-a-separate-anthropic-app-with-its-own-quota\",\"label\":\"claude-design-is-a-separate-anthropic-app-with-its-own-quota\",\"claim_ko\":\"Claude Design은 Claude 챗·Claude Code와 별개의 Anthropic 앱입니다.\\n웹사이트·슬라이드·프로토타입 전용이며 세션 한도도 주 단위로 따로 리셋됩니다.\",\"claim_en\":\"Claude Design is a separate Anthropic app from Claude chat and Claude Code, purpose-built for websites, slide decks, and prototypes — with its own weekly-resetting session quota.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"published_at\":\"2026-04-29\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-29\",\"body_ko\":\"Claude Design은 Claude 챗·Claude Code와 별개의 Anthropic 앱입니다.\\n웹사이트·슬라이드·프로토타입 전용이며 세션 한도도 주 단위로 따로 리셋됩니다.\\n\\n도구의 존재와 포지셔닝을 정초합니다 — 후속 워크플로 클레임들이 성립하려면 필요한 맥락입니다. 별도 한도라는 디테일이 세션 한도 절약 테마의 핵심입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"date\":\"2026-04-29\",\"original\":\"Claude Design. This is going to be super fun. What is it? It is basically a separate product. So, it's almost like you've got your Claude chat, you've got co-work, you've got Claude Code. This is a different app within sort of the Anthropic ecosystem called Claude Design, and it's specifically made for people to work on designing things, whether that is websites or slide decks or, you know, prototypes.\"}]},{\"id\":\"claude-design-tweaks-panel-saves-session-tokens\",\"label\":\"claude-design-tweaks-panel-saves-session-tokens\",\"claim_ko\":\"Claude Design의 Tweaks 패널(슬라이더·드롭다운·프리셋)로 시각 변형을 돌립니다.\\n토글 한 번이 프롬프트 한 번 아낀 셈입니다.\",\"claim_en\":\"Use Claude Design's Tweaks panel (sliders, dropdowns, presets) for visual variations instead of chat prompts — every tweak you toggle is a prompt you didn't burn from your session limit.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"published_at\":\"2026-04-29\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"productivity\",\"prompt-engineering\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-29\",\"body_ko\":\"Claude Design의 Tweaks 패널(슬라이더·드롭다운·프리셋)로 시각 변형을 돌립니다.\\n토글 한 번이 프롬프트 한 번 아낀 셈입니다.\\n\\n강의에서 가장 날카로운 해킹입니다 — 채팅 대신 UI 어포던스로 한도를 늘리는 방식입니다. 구조화된 컨트롤이 있는 모든 AI 도구에 적용 가능합니다. 비용을 의식한 AI 사용을 가르치는 Alex 청중에게 유용성이 큽니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"date\":\"2026-04-29\",\"original\":\"actually making tweaks and then saving those changes is going to save you more time and also more of your session limit than if you're just having a conversation back and forth with Claude... if you were doing this in Claude code and you had all these tweaks that you wanted to play with, this is basically like, \\\"Hey, I wonder what it would look like if the background was blue.\\\" And then you would have to go submit the prompt...\"}]},{\"id\":\"claude-is-three-surfaces-one-product\",\"label\":\"claude-is-three-surfaces-one-product\",\"claim_ko\":\"Claude는 모델 하나가 아니라\\n채팅 · CoWork · Claude Code 세 표면이 하나로 묶인 제품입니다.\",\"claim_en\":\"Claude isn't a single model — it's three surfaces fused into one product: chat, CoWork, and Claude Code.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-19\",\"body_ko\":\"Claude는 모델 하나가 아니라\\n채팅 · CoWork · Claude Code 세 표면이 하나로 묶인 제품입니다.\\n\\n웹 채팅으로 시작해 데스크톱으로 내려와 로컬 파일을 읽고, 터미널과 연동해 코드를 짜고 배포까지 합니다. 셋은 따로 노는 도구가 아니라 같은 한 제품의 세 표면입니다.\",\"body_en\":\"Claude isn't a single model — it's three surfaces fused into one product: chat, CoWork, and Claude Code.\\n\\nIt started as web chat, came down to the desktop to read local files, and wired into the terminal to write and deploy code. The three aren't separate tools; they're three faces of one product.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"제가 Claude라고 말했을 때는 이 세 가지의 피처들, 혹은 앱이라고 해야 되나? 이것들이 하나로 뭉쳐진 것을 이야기하거든요.\\n…\\n웹사이트에서 채팅을 하는 게 1번, 이제는 데스크톱으로 넘어와서 로컬 파일들을 읽고 분석을 할 수도 있고, 터미널로 연동을 해서 코드를 작성해서 프로젝트를 띄우고 디플로이를 하고. 인터넷에서도 작동하고 내 컴퓨터에서도 작동하고, 직접적으로 디플로이도 할 수 있는 하나의 앱으로 들어왔다.\"}]},{\"id\":\"claude-md-grows-from-mistakes-fix-it-in-the-moment\",\"label\":\"claude-md-grows-from-mistakes-fix-it-in-the-moment\",\"claim_ko\":\"CLAUDE.md를 처음부터 완벽하게 쓰려고 하지 마십시오.\\n클로드가 실수하는 그 순간에 바로 CLAUDE.md에 반영하라고 시키는 것이 가장 ROI 높은 운영 방식입니다.\",\"claim_en\":\"Don't write a perfect CLAUDE.md upfront. The highest-ROI discipline is to fix Claude's mistakes in CLAUDE.md the moment they happen — let the file grow from the mistakes you'd otherwise repeat.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"실밸개발자\",\"author_handle\":\"@sv.developer\",\"publication\":\"YouTube\",\"url\":\"https://www.youtube.com/watch?v=IyOgsIFUUcY\",\"published_at\":\"2026-05-11\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"memory-systems\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-11\",\"body_ko\":\"CLAUDE.md를 처음부터 완벽하게 쓰려고 하지 마십시오.\\n클로드가 실수하는 그 순간에 바로 CLAUDE.md에 반영하라고 시키는 것이 가장 ROI 높은 운영 방식입니다.\\n\\n실밸개발자가 영상에서 가장 강조한 단 하나의 규칙입니다. 핵심 가정: CLAUDE.md는 한 번에 완벽하게 쓸 수 없다 — 어떤 실수가 일어날지 미리 모르기 때문입니다. 그래서 \\\"처음부터 잘 쓰는\\\" 전략보다 \\\"실수가 나는 순간 즉시 가드레일을 추가하는\\\" 전략이 일주일만 돌려도 프로젝트에 딱 맞는 CLAUDE.md를 만듭니다.\",\"body_en\":\"Don't write a perfect CLAUDE.md upfront. The highest-ROI discipline is to fix Claude's mistakes in CLAUDE.md the moment they happen — let the file grow from the mistakes you'd otherwise repeat.\\n\\nThe single rule 실밸개발자 emphasizes hardest in the video. The premise: a CLAUDE.md cannot be written perfectly upfront — you don't know which mistakes will happen. So instead of \\\"author it well,\\\" the discipline is \\\"add a guardrail the instant a mistake fires.\\\" A week of this workflow produces a CLAUDE.md shaped exactly to your project.\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=IyOgsIFUUcY\",\"date\":\"2026-05-11\",\"original\":\"클로드가 실수를 했을 때 그 자리에서 바로 말하고 이 실수는 다시 안하게 클로 MD에 반영해 줘라고 무조건 말하세요. 이게 제일 하이 ROI 아이템입니다. 그 이유는 클로 MD는 절대 한 번에 완벽하게 쓸 수가 없습니다.\"}]},{\"id\":\"claude-md-holds-rules-and-references-not-detail\",\"label\":\"claude-md-holds-rules-and-references-not-detail\",\"claim_ko\":\"CLAUDE.md는 규칙과 참조 링크만 담고, 상세 내용은 별도 파일로 분리하십시오.\\nAPI 스펙·DB 스키마·아키텍처 문서를 매 세션 로드하는 것은 토큰 낭비이며, 참조로 필요할 때만 불러오는 것이 효율적입니다.\",\"claim_en\":\"CLAUDE.md should hold rules and references only — push API specs, DB schemas, and architecture details into separate files. Loading them every session is a tax; reference them on demand instead.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"실밸개발자\",\"author_handle\":\"@sv.developer\",\"publication\":\"YouTube\",\"url\":\"https://www.youtube.com/watch?v=vxEvo2BLM6A\",\"published_at\":\"2026-03-22\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"memory-systems\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-03-22\",\"body_ko\":\"CLAUDE.md는 규칙과 참조 링크만 담고, 상세 내용은 별도 파일로 분리하십시오.\\nAPI 스펙·DB 스키마·아키텍처 문서를 매 세션 로드하는 것은 토큰 낭비이며, 참조로 필요할 때만 불러오는 것이 효율적입니다.\\n\\nCLAUDE.md가 매 세션 자동 로드된다는 사실에서 출발한 운영 규칙입니다. API 엔드포인트 50개, DB 테이블 40개를 다 담고 있으면 매번 수천 토큰이 낭비됩니다 — 정작 그 세션에 필요한 정보는 5%도 안 되는데. 해법은 CLAUDE.md에 참조(`docs/api.md`, `docs/db-schema.md`)만 두고, 클로드가 필요한 순간에만 그 파일을 로드하게 만드는 것입니다.\",\"body_en\":\"CLAUDE.md should hold rules and references only — push API specs, DB schemas, and architecture details into separate files. Loading them every session is a tax; reference them on demand instead.\\n\\nA discipline that follows from one fact: CLAUDE.md auto-loads every session. Cramming 50 API endpoints + 40 DB tables into it burns thousands of tokens each time, when less than 5% of that content is relevant to the current task. The fix: CLAUDE.md carries references (`docs/api.md`, `docs/db-schema.md`) only, and Claude loads each detail file on demand when the task actually needs it.\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=vxEvo2BLM6A\",\"date\":\"2026-03-22\",\"original\":\"핵심은 CLAUDE.md에는 규칙과 참조만 두고 상세 내용은 별도 파일로 분리하는 겁니다. 나쁜 예: CLAUDE.md가 API 엔드포인트 50개를 모두 갖고 있는 것. 좋은 예: CLAUDE.md는 참조만 보여줍니다.\"}]},{\"id\":\"claude-md-is-a-guardrail-not-a-readme\",\"label\":\"claude-md-is-a-guardrail-not-a-readme\",\"claim_ko\":\"CLAUDE.md는 README가 아닙니다.\\n사람에게 프로젝트를 소개하는 문서가 아니라, 클로드 코드가 같은 실수를 반복하지 않게 만드는 가드레일입니다.\",\"claim_en\":\"CLAUDE.md is not a README — it's a guardrail that stops Claude from repeating mistakes. The audience is the AI, not a human onboarding to the project.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"실밸개발자\",\"author_handle\":\"@sv.developer\",\"publication\":\"YouTube\",\"url\":\"https://www.youtube.com/watch?v=IyOgsIFUUcY\",\"published_at\":\"2026-05-11\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"memory-systems\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-11\",\"body_ko\":\"CLAUDE.md는 README가 아닙니다.\\n사람에게 프로젝트를 소개하는 문서가 아니라, 클로드 코드가 같은 실수를 반복하지 않게 만드는 가드레일입니다.\\n\\n실밸개발자가 2026년 5월에 정리한 CLAUDE.md의 정체성 명제입니다. 한 문장에 두 가지 무게가 실려 있습니다: (1) 독자가 인간이 아니라 클로드라는 점, (2) 목적이 \\\"소개\\\"가 아니라 \\\"재발 방지\\\"라는 점. Karpathy가 \\\"스키마가 가장 큰 레버리지\\\"라고 말한 데서 한 단계 더 들어가 — 스키마의 형식이 곧 README가 아닌 인스트럭션이라는 사실을 못 박습니다.\",\"body_en\":\"CLAUDE.md is not a README — it's a guardrail that stops Claude from repeating mistakes. The audience is the AI, not a human onboarding to the project.\\n\\n실밸개발자's framing of CLAUDE.md's identity (May 2026 video). Two beats in one sentence: (1) the audience is Claude, not a human; (2) the purpose is mistake-prevention, not project-intro. Goes one step deeper than Karpathy's \\\"schema is the highest-leverage artifact\\\" by nailing the format: instruction set, not README.\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=IyOgsIFUUcY\",\"date\":\"2026-05-11\",\"original\":\"CLAUDE.md는 README가 아닙니다. 사람한테 프로젝트를 소개하는 문서가 아니라 클로드 코드가 같은 실수를 반복하지 않게 만드는 가드레일입니다. 인간이 읽는 리드미가 아니라 클로드가 같은 실수를 안 하게 하는 인스트럭션입니다.\"}]},{\"id\":\"claude-md-never-write-what-the-code-itself-shows\",\"label\":\"claude-md-never-write-what-the-code-itself-shows\",\"claim_ko\":\"코드를 읽으면 알 수 있는 사실은 절대 CLAUDE.md에 쓰지 마십시오.\\n클로드는 코드를 읽을 수 있으므로, 코드로 드러나지 않는 함정과 규칙만 CLAUDE.md에 남깁니다.\",\"claim_en\":\"Never write in CLAUDE.md anything Claude can infer from reading the code itself. Claude reads code — write only the traps and rules that the code can't reveal.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"실밸개발자\",\"author_handle\":\"@sv.developer\",\"publication\":\"YouTube\",\"url\":\"https://www.youtube.com/watch?v=IyOgsIFUUcY\",\"published_at\":\"2026-05-11\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"memory-systems\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-11\",\"body_ko\":\"코드를 읽으면 알 수 있는 사실은 절대 CLAUDE.md에 쓰지 마십시오.\\n클로드는 코드를 읽을 수 있으므로, 코드로 드러나지 않는 함정과 규칙만 CLAUDE.md에 남깁니다.\\n\\n좋은 CLAUDE.md와 나쁜 CLAUDE.md를 가르는 기준입니다. 나쁜 예: \\\"React를 사용한다\\\", \\\"src 폴더에 컴포넌트가 있다\\\", \\\"TypeScript로 작성되었다\\\" — 클로드가 코드를 직접 읽으면 알 수 있는 정보입니다. 좋은 예: 코드 어디에도 적혀 있지 않은 도메인 함정, 팀 컨벤션, 재현되는 실수 패턴 — 코드에서 추출 불가능한 정보만 가드레일로 남깁니다.\",\"body_en\":\"Never write in CLAUDE.md anything Claude can infer from reading the code itself. Claude reads code — write only the traps and rules that the code can't reveal.\\n\\nThe boundary that separates a good CLAUDE.md from a bad one. Bad: \\\"we use React,\\\" \\\"components live in src/,\\\" \\\"written in TypeScript\\\" — Claude derives all of this by reading the code. Good: domain traps, team conventions, recurring mistake patterns — guardrails for what the code can't tell Claude on its own.\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=IyOgsIFUUcY\",\"date\":\"2026-05-11\",\"original\":\"코드로 알 수 있는 것들은 절대 쓰면 안 됩니다. 크로드 코드는 코드를 읽을 수가 있습니다. 그래서 코드를 봐서도 알 수 없는 그런 함정이나 그런 규칙 그런 것들을 쓰는게 좋은 클로델 MD를 나쁜 클로델 MD 구분 짓는 기준입니다.\"}]},{\"id\":\"claude-skills-multiply-ai-leverage\",\"label\":\"claude-skills-multiply-ai-leverage\",\"claim_ko\":\"Skills는 정해진 양식을 깨고\\n명령 한 줄로 결과물을 생성합니다.\",\"claim_en\":\"Skills break the static-template world —\\none command, output materialized.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-03-10\",\"body_ko\":\"Skills는 정해진 양식을 깨고\\n명령 한 줄로 결과물을 생성합니다.\\n\\n지금까지 우리가 만들던 PPT, 구글 닥, 엑셀, 데이터 분석 자료, 보고서, 인포그래픽, 대시보드 — 이 모든 것을 **Claude Skills**는 명령 한 줄로 만들어 냅니다. 사람보다 더 잘, 더 예쁘게. 이 변화의 본질은 단순한 자동화가 아닙니다. **그동안의 도구들은 코딩 못 하는 사람을 위해 정형화된 틀**이었습니다 — 구글 닥, 슬라이드, 엑셀, 노션. 결국 모든 소프트웨어는 코드로 만들어졌는데, 모두가 개발자가 아니니 그 위에 GUI 틀을 씌운 것뿐입니다. 이제는 **누구나 명령어 하나로 코드를 쓰는 시대**입니다. **고정된 틀이 사라지고, 명령 즉시 코드가 실행되어 그 자리에서 결과물이 만들어집니다.** Skills는 그 전환의 첫 번째 인터페이스입니다.\",\"body_en\":\"Skills break the static-template world —\\none command, output materialized.\\n\\nEverything we used to assemble — slide decks, Google Docs, Excel sheets, dashboards, reports, infographics — Claude Skills now generates in a single command. Better than a person could. More polished. The interesting part isn't just automation. **The tools we've used were template-shaped because non-coders couldn't write code.** All software is built on code, but since most people can't write it, GUIs (Docs, Slides, Excel, Notion) wrapped templates around the code. Now everyone *can* write code — via natural language. **Static templates die. The command-to-code-to-output loop materializes the artifact in real time.** Skills are the first interface of that shift.\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=XbgPynBDPm4\",\"date\":\"2026-03-10\",\"original\":\"그동안 우리가 만들었던 PPT, 뭐 구글닥, 엑셀 자료, 뭐 데이터 분석 자료 아니면 보고드 같은 거 있잖아요. 이제는 다 클로드 코드가 딸깍하면 만들어 줄 수 있거든요. 그 누구보다 더 잘 그리고 예쁘게.\\n\\n그동안 우리가 써 왔던 뭐 구글 닥, 뭐 구글 엑셀, 뭐 아니면 슬라이드. 이 모든 것들은 사람들을 위해 만들어졌거든요. 그 이유는 모든 사람들이 코딩을 할 수 없기 때문이에요. 결국 모든 소프트웨어는 코딩으로 만들어진 건데 모두가 개발자가 아니니까 이렇게 정형화된 틀을 만들어서 웹사이트로 보여주거나 앱으로 보여 주거나 이래 왔단 말이에요.\\n\\n근데 이제는 누구나 프로그래머가 될 수 있는 시대예요. 그 누구도 명령어 하나면은 코드를 쓸 수 있고, 실제로 이제는 어떻게 일이 바뀌고 있냐면 명령어로 그 즉시 코드를 실행을 해서 웹사이트로 보여주는 시각 자료를 만드는 겁니다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"매트릭스 영화의 네오가 데이터를 꽂아서 합기도 8단이 되듯, 사람들이 공유한 Skill을 다운로드해서 나도 내일 바로 전문가가 될 수 있게끔.\\n실제로 Anthropic에서는 전문가들의 Skillset을 모아둔 Plugin들을 많이 공개를 했거든요 — PPT를 만드는 법, 변호사 대리인, 상담사 같은 Skill들.\"}]},{\"id\":\"claude-wins-on-velocity\",\"label\":\"claude-wins-on-velocity\",\"claim_ko\":\"Claude가 AI 시장을 점령합니다.\\n이기는 변수는 속도입니다.\",\"claim_en\":\"Claude wins the AI market.\\nThe variable that decides it is speed.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-foundations\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-01-13\",\"body_ko\":\"Claude가 AI 시장을 점령합니다.\\n이기는 변수는 속도입니다.\\n\\n이유 여섯 가지를 적었습니다 — 제품 출시 속도, 사용자 피드백 반영 속도, 비개발자에게 터미널을 가르친 결정, Cowork 런치, 에이전트 빌딩의 커뮤니티화. 모두 같은 변수의 다른 표현입니다 — **속도**. AI 시장에서 우위를 가르는 것은 모델 성능이 아니라, 모델 위에서 얼마나 빨리 사용자가 만지는 제품을 만들어내고, 그 제품이 사용자 피드백을 얼마나 빨리 받아내며, 그 피드백을 얼마나 빨리 다음 제품에 반영하느냐입니다. Claude는 이 사이클을 가장 짧게 돌립니다.\",\"body_en\":\"Claude wins the AI market.\\nThe variable that decides it is speed.\\n\\nSix reasons in the original post — product velocity, feedback responsiveness, the bet on teaching non-developers to use a terminal, the Cowork launch, community-driven agent tooling. All of them are the same variable expressed differently: **speed**. The AI market isn't decided by raw model capability; it's decided by how fast a company turns models into products users touch, how fast those products absorb user feedback, and how fast that feedback rolls into the next release. Claude runs this loop tighter than anyone else.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DTcQ2ovlJfm\",\"date\":\"2026-01-13\",\"original\":\"6 reasons why I think Claude is going to dominate this AI market.\\n1. Claude builds products faster than anyone else (\\\"AI-speed\\\")\\n2. Claude developers actively listen to their users (instant feedback loop)\\n3. Claude has made non-developers learn about \\\"Terminals\\\"\\n4. Claude realized (3) and just launched \\\"Cowork\\\"\\n5. Claude made building agents easy through making it community-driven\\n6. @boris_cherny is actually AI\"}]},{\"id\":\"clean-code-shows-five-signals\",\"label\":\"clean-code-shows-five-signals\",\"claim_ko\":\"잘하는 개발자의 코드는\\n이름·작은 PR·테스트·무코멘트·깔끔한 제목으로 드러납니다.\",\"claim_en\":\"Good engineers' code shows up as\\nnames, small PRs, tests, no comments, clean titles.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\",\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-21\",\"body_ko\":\"잘하는 개발자의 코드는\\n이름·작은 PR·테스트·무코멘트·깔끔한 제목으로 드러납니다.\\n\\n실리콘밸리에서 '개발 잘한다' 소문난 사람들의 공통점 다섯 가지입니다. **첫째**, 코드가 읽기 쉽습니다. 변수 이름, 함수 이름만 봐도 이해됩니다. 쓸데없는 복잡함 없이 직관적입니다. **둘째**, 짧고 확실한 변경입니다 — small diff. 한 번에 대공사를 하지 않습니다. 작은 수정으로 꾸준히 개선합니다. **셋째**, 테스트로 말합니다. \\\"이거 확실히 되나?\\\"라고 묻기도 전에 이미 테스트가 증명합니다. **넷째**, 코멘트가 없습니다. 너무 깔끔해서 물어보거나 질문할 것도 없습니다. **다섯째**, PR 제목부터 깔끔합니다. 제목만 봐도 뭘 하려는지 한눈에 보입니다. **엄청난 알고리즘을 쓰는 천재여야 코딩을 잘하는 것이 아닙니다.** 누구나 쉽고 혼선 없이 이해하고 따라할 수 있는 것이 좋은 코드입니다. 쓰레드 잘 쓰는 것과 같습니다.\",\"body_en\":\"Good engineers' code shows up as\\nnames, small PRs, tests, no comments, clean titles.\\n\\nFive things that consistently mark the engineers Silicon Valley calls *good*. **One**: the code is readable. Variable and function names alone tell you what's happening. No unnecessary complexity. **Two**: small diffs. They don't ship cathedral rebuilds — they ship small, steady improvements. **Three**: tests speak first. Before anyone can ask *does this actually work,* the test already proved it. **Four**: no comments. The code is clean enough that there's nothing to comment on. **Five**: PR titles are sharp. One glance tells you what the PR is doing. **You don't need to be an algorithm-genius to be a good engineer.** Good code is whatever any teammate can read and extend without confusion. The same skill, frankly, as writing well on Threads.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGU4ARsxWnr\",\"date\":\"2025-02-21\",\"original\":\"실리콘밸리에서 \\\"개발 잘한다\\\" 소문난 사람들 공통점 5가지:\\n\\n1. 코드가 읽기 쉽다.\\n- 변수 이름, 함수 이름만 봐도 이해됨. \\n- 쓸데없는 복잡함 없이 직관적. \\n\\n2. 짧고 확실한 변경 (small diff).\\n- 한 번에 대공사 안 함.\\n- 작은 수정으로 꾸준히 개선. \\n\\n3. 테스트로 말한다.\\n- \\\"이거 확실히 되나?\\\" 묻기도 전에 이미 테스트가 증명함. \\n\\n4. 코멘트가 없다.\\n- 너무 깔끔해서 물어보거나 질문할 것도 없다.\\n\\n5. PR 제목부터 깔끔하다.\\n- 제목만 봐도 뭘 하려는지 한눈에 알겠음.\\n\\n엄청난 알고리즘을 쓰는 \\\"천재\\\" 여야 코딩을 잘하는게 아님.\\n누구나 쉽고 혼선없이 이해하고 따라할 수 있는 게 좋은 코드다.\\n\\n쓰레드 잘 쓰는거랑 똑같은 것 같기도!?\"}]},{\"id\":\"clear-writing-leads-with-tldr\",\"label\":\"clear-writing-leads-with-tldr\",\"claim_ko\":\"잘 읽히는 글은 TL;DR로 시작해서\\n절반으로 줄인 글입니다.\",\"claim_en\":\"Writing that gets read\\nopens with a TL;DR and gets cut in half.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"move-first-or-lose-the-game\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-19\",\"body_ko\":\"잘 읽히는 글은 TL;DR로 시작해서\\n절반으로 줄인 글입니다.\\n\\n메타에서 7년 동안 수백 개의 문서를 쓰면서 한 가지를 배웠습니다 — 문서에도 공식이 있습니다. **첫째**, TL;DR을 맨 위에 씁니다. 긴 문서는 아무도 끝까지 읽지 않습니다. 3줄 요약이 없으면 중요한 내용도 묻힙니다. **둘째**, \\\"내가 뭘 원하는지\\\"를 명확히 합니다. 정보만 나열한 문서는 아무도 움직이지 못합니다. **셋째**, 스토리텔링을 넣습니다. 데이터와 그래프가 아니라, 사람들이 알고 싶어 하는 순서로 적재적소에 넣습니다. **넷째**, 절반으로 줄입니다. 2배 줄이면 2배 더 읽힙니다. 정말 중요하지 않으면 뺍니다.\",\"body_en\":\"Writing that gets read\\nopens with a TL;DR and gets cut in half.\\n\\nAfter seven years writing hundreds of docs at Meta, the pattern is the same every time. **One**, TL;DR at the top. No three-line summary, no one reads to the part that matters. **Two**, state what you want from the reader. Information without ask is information ignored. **Three**, narrative beats lists. Data and charts are fine, but the order should track what the reader needs to know next, not what you happen to have. **Four**, cut to half. Halving the length doubles the readership. If it isn't load-bearing, delete it.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGPsMSoRud-\",\"date\":\"2025-02-19\",\"original\":\"메타에서 7년 동안 일하면서 수백 개의 Google Docs 를 써보고 느낀점:\\n\\\"문서 작성에도 성공하는 공식이 있다는 것\\\"\\n…\\n1. 반드시 TL;DR 을 맨 위에 써라. - 긴 문서는 아무도 안 읽는다. 3줄 요약이 없으면, 중요한 내용도 묻힌다.\\n2. \\\"내가 뭘 원하는지\\\"를 명확히 해라. - 정보만 나열하면 아무 의미 없다. 이 문서를 보고 사람들이 뭘 해야 하는지 분명해야 한다.\\n3. 스토리텔링을 넣어라. - 데이터, 그래프? 다 좋다. 근데 가장 중요한 건, 사람들이 알고 싶어 하는 내용을 적재적소에 넣는 것.\\n4. 최대한 짧게 써라. - 2배 줄이면 2배 더 읽힌다. 정말 중요하지 않으면 빼라.\"}]},{\"id\":\"cli-beats-mcp-and-api-for-agents\",\"label\":\"cli-beats-mcp-and-api-for-agents\",\"claim_ko\":\"에이전트에게는 CLI가 MCP와 API보다 낫습니다.\\nCLI는 짧게 정제된 출력만 돌려주고 인증을 한 번만 잡으며 도구 카탈로그를 컨텍스트 창에 노출하지 않습니다 — Nate Herk 벤치마크에서 MCP는 같은 작업에 약 35배 많은 토큰을 쓰고 작업 난이도가 오르자 신뢰도가 100%에서 72%로 떨어졌습니다.\",\"claim_en\":\"CLIs beat MCPs and APIs for AI agents: a CLI returns short pre-formatted output, holds authentication once, and keeps tool catalogs out of the context window — versus MCP's per-session tool-spec tax that raised tokens about 35× and dropped reliability to 72% as tasks grew harder in Nate Herk's benchmark.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/YHk45NEpspE\",\"published_at\":\"2026-05-08\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"prompt-engineering\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-25\",\"body_ko\":\"에이전트에게는 CLI가 MCP와 API보다 낫습니다.\\nCLI는 짧게 정제된 출력만 돌려주고 인증을 한 번만 잡으며 도구 카탈로그를 컨텍스트 창에 노출하지 않습니다 — Nate Herk 벤치마크에서 MCP는 같은 작업에 약 35배 많은 토큰을 쓰고 작업 난이도가 오르자 신뢰도가 100%에서 72%로 떨어졌습니다.\\n\\n같은 화자(Nate Herk)가 세 개의 다른 도구 맥락 — Printing Press, Higgsfield, Playwright CLI — 에서 각각 다른 증거(공개 벤치마크 35배·72% 신뢰도, 기능 동등성 비교, /context 슬래시 명령 데모로 Chrome DevTools MCP가 세션을 갉아먹는 모습)로 같은 결론에 도달합니다. 에이전트가 외부 도구로 손을 뻗을 때 — CLI 표면을 우선합니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/YHk45NEpspE\",\"date\":\"2026-05-08\",\"original\":\"MCP used 35 times more tokens than the CLI on the same task. And reliability drops from 100% with the CLI to 72% with MCP as tasks get harder... APIs are built for code, MCP is built for tools, and CLIs are built for agents.\"},{\"platform\":\"web_article\",\"url\":\"https://youtu.be/xn6Z5PYyAIE\",\"date\":\"2026-05-04\",\"original\":\"Functionally they can do pretty much the same things, but the MCP has all those tools. So, from a token perspective, it's actually more expensive to use an MCP. And the CLI is just better for agents. It's going to be faster. It's going to be more efficient.\"},{\"platform\":\"web_article\",\"url\":\"https://youtu.be/J-6pnl5DQg8\",\"date\":\"2026-04-25\",\"original\":\"if I do slash context in here, you can see that the Chrome dev tools MCP takes up so many tokens because there's so many different tools and each tool has a description. So, that's how I was like, \\\"Hmm, maybe I don't want to use the MCP server. Let me just go ahead and try this Playwright CLI.\\\"\"}]},{\"id\":\"cli-mirror-keeps-bulk-data-out-of-context-window\",\"label\":\"cli-mirror-keeps-bulk-data-out-of-context-window\",\"claim_ko\":\"CLI를 쓰면 에이전트가 큰 데이터를 가져와도 컨텍스트가 더러워지지 않습니다.\\n13만 2천 토큰짜리 원본 응답은 CLI의 로컬 미러(예: SQLite)가 흡수하고 모델에는 약 2천 토큰 요약만 돌려보내, 벌크 데이터가 세션에 닿지 않습니다.\",\"claim_en\":\"A CLI lets an agent fetch large datasets without polluting context: the CLI's local mirror (e.g. SQLite) absorbs the 132K-token raw response and returns only a ~2K-token summary to the model, so bulk data never lands in the session.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/YHk45NEpspE\",\"published_at\":\"2026-05-08\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"memory-systems\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-08\",\"body_ko\":\"CLI를 쓰면 에이전트가 큰 데이터를 가져와도 컨텍스트가 더러워지지 않습니다.\\n13만 2천 토큰짜리 원본 응답은 CLI의 로컬 미러(예: SQLite)가 흡수하고 모델에는 약 2천 토큰 요약만 돌려보내, 벌크 데이터가 세션에 닿지 않습니다.\\n\\n\\\"CLI \u003e MCP\\\" 주장의 메커니즘입니다 — \\\"요약만 보여주고 페이로드는 로컬에 묶어둔다\\\"는 패턴은 RAG 스니펫·강의 memory_refs·brain 리트리벌과 같은 논리로 확장됩니다. 에이전트는 다이제스트만 보고, CLI가 원본을 로컬에 잡아둡니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/YHk45NEpspE\",\"date\":\"2026-05-08\",\"original\":\"I sent about 260 tokens to school. It sent me back about 132,000 tokens, but what's important is that none of that hit my context window because we were basically able to point all of that routing through the CLI so that none of it actually pollutes your session or your context.\"}]},{\"id\":\"cli-wrappers-ship-via-git-repo-for-team-reuse\",\"label\":\"cli-wrappers-ship-via-git-repo-for-team-reuse\",\"claim_ko\":\"팀 단위로 만든 에이전트용 CLI는 코드처럼 배포합니다.\\nCLI와 스킬 래퍼를 비공개 깃허브 레포에 올리면 팀원이 클론한 뒤 각자 자기 API 키만 끼워 쓰는 식 — 한 사람의 역공학이 팀 전체의 도구가 됩니다.\",\"claim_en\":\"Custom agent CLIs ship across a team like code: push the CLI plus its skill wrapper to a private GitHub repo, teammates clone it, and each swaps in their own API key — turning one builder's reverse-engineering into the whole team's tool.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/YHk45NEpspE\",\"published_at\":\"2026-05-08\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"solo-builder\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-08\",\"body_ko\":\"팀 단위로 만든 에이전트용 CLI는 코드처럼 배포합니다.\\nCLI와 스킬 래퍼를 비공개 깃허브 레포에 올리면 팀원이 클론한 뒤 각자 자기 API 키만 끼워 쓰는 식 — 한 사람의 역공학이 팀 전체의 도구가 됩니다.\\n\\n비개발자 운영자가 사내에서 AI 워크플로를 공유할 때 필요하지만 잘 다뤄지지 않는 배포 패턴입니다. \\\"스킬 만들기\\\"가 아니라 \\\"스킬 배포하기\\\"입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/YHk45NEpspE\",\"date\":\"2026-05-08\",\"original\":\"this tally one that I just built, I have been able to push this to a private repo and now I can just invite some of my team to actually like be a contributor to this. So they can clone it and then they can use the tally CLI as well and maybe just swap out their own API key in their file.\"}]},{\"id\":\"code-managers-replace-code-writers\",\"label\":\"code-managers-replace-code-writers\",\"claim_ko\":\"코드를 짜는 개발자는 줄어들고\\n코드를 관리하는 개발자가 강해집니다.\",\"claim_en\":\"Code writers shrink.\\nCode managers get stronger.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-01\",\"body_ko\":\"코드를 짜는 개발자는 줄어들고\\n코드를 관리하는 개발자가 강해집니다.\\n\\n\\\"AI 시대, 개발자는 끝났나요?\\\" 많은 사람이 걱정하지만 답은 간단합니다. **코드를 짜는 개발자는 줄어들지만, 코드를 관리하는 개발자는 더 강해질 것입니다.** 세 가지 능력자가 살아남습니다. 첫째, AI를 활용해 10배 빠르게 개발하는 사람. 둘째, AI가 만든 코드의 퀄리티를 판단할 수 있는 사람. 셋째, 문제 해결 능력이 뛰어난 사람. 이제 중요한 건 코딩이 아니라 문제 해결력입니다. AI와 경쟁하지 말고 함께 성장해야 합니다.\",\"body_en\":\"Code writers shrink.\\nCode managers get stronger.\\n\\n*\\\"Are developers done in the AI era?\\\"* People worry. The answer is straightforward. **Code writers shrink. Code managers grow stronger.** Three kinds of engineer survive. **One**: people who 10× their development speed with AI. **Two**: people who can judge the quality of AI-written code. **Three**: people whose problem-solving stays sharp. Coding is no longer the asset — problem-solving is. Stop competing with AI; grow with it.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFhWMLTxBz3\",\"date\":\"2025-02-01\",\"original\":\"\\\"AI 시대, 개발자들은 끝났나요?\\\"\\n\\n많은 사람들이 걱정하지만, 정답은 간단해.\\n\\\"코드를 짜는 개발자\\\"는 줄어들지만,\\n\\\"코드를 관리하는 개발자\\\"는 더 강해질 거야.\\n\\n✅ AI를 활용해 10배 빠르게 개발하는 사람\\n✅ AI가 만든 코드의 퀄리티를 판단할 수 있는 사람\\n✅ 문제 해결 능력이 뛰어난 사람\\n\\n이제 중요한 건, 코딩이 아니라 \\\"문제 해결력\\\"이야.\\nAI랑 경쟁할 게 아니라, 같이 성장해야 해.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"개발자의 고용이 급감하기 시작했습니다. 그리고 특히 신입 개발자들에 대한 고용이 많이 줄었는데요. 이 말은 이 industry 자체가 많이 변화하고 있다는 의미도 있어요. 옛날에는 개발자가 너무 귀했어요. 개발자를 대체할 수 있는 인력이나 기술이 없으니까. 하지만 이제 어느 정도의 개발 인력은 대체가 가능해짐으로써 이 회사들이 고용을 안 하게 되는 건데 이거는 반대로 얘기하면 누구나 개발자가 될 수 있다.\"}]},{\"id\":\"coding-becomes-orchestration\",\"label\":\"coding-becomes-orchestration\",\"claim_ko\":\"코딩은 더 이상 직접 짜는 일이 아닙니다.\\nAI를 조율하는 일이 됩니다.\",\"claim_en\":\"Coding is no longer about writing code yourself.\\nIt becomes orchestrating AI.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"youtube-desc-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-01-10\",\"body_ko\":\"코딩은 더 이상 직접 짜는 일이 아닙니다.\\nAI를 조율하는 일이 됩니다.\\n\\n엔지니어링 직군이 사라지지는 않습니다. 다만 우리가 \\\"코딩\\\"이라고 부르던 일의 정의가 바뀝니다. 자판을 두드려 함수를 짜는 것이 아니라, 여러 개의 AI 에이전트를 같은 방향으로 묶어 결과물을 만들어내는 것이 됩니다. \\\"Coding\\\"이 \\\"AI Orchestration\\\"으로 카테고리가 옮겨간다는 뜻입니다. 가장 먼저 이 변화를 받아들이는 개발자가 가장 멀리 갑니다. 거부 → 분노 → 의심으로 시간을 보낸 사람은 결국 늪에 빠집니다.\",\"body_en\":\"Coding is no longer about writing code yourself.\\nIt becomes orchestrating AI.\\n\\nThe engineering profession isn't going away. But what we used to call \\\"coding\\\" is shifting categories. The work isn't typing functions anymore — it's pointing several AI agents at the same goal and holding the line on the result. Coding becomes orchestration. The engineers who accept the category-shift first get the farthest. The ones who spend their time in denial → anger → doubt end up stuck in the swamp.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DTUrjxHlL_-\",\"date\":\"2026-01-10\",\"original\":\"지금 실리콘밸리 개발자는 모두 비상에 걸렸다. Meta에서 8년차 개발자로 일해온 나 역시 마찬가지다.\\nAI가 너무 빠른속도로 발전하면서, 그리고 너무 잘하게 되면서 \\\"현타\\\" 가 터져나오고 있다. 특히 네임드전드 개발자들 사이에서.\\n…\\n나는 \\\"엔지니어링\\\" 이라는 직군이 사라질것이라고 생각하지는 않는다. 다만 우리에게 친숙한 \\\"Coding\\\" 이라는 개념은 \\\"AI Coordinations / Orchestrations\\\" 의 개념으로 반드시 바뀔것이라고 생각한다.\\n…\\n처음에는 거부하고, 화내고, 의심하지만 결국 수용하지 않는다면 \\\"늪\\\" 에 빠질 것이다.\"}]},{\"id\":\"coding-is-now-an-rpg\",\"label\":\"coding-is-now-an-rpg\",\"claim_ko\":\"코딩은 이제 RPG 게임입니다.\\n캐릭터 다섯 명을 동시에 굴립니다.\",\"claim_en\":\"Coding is now an RPG.\\nYou run five characters at once.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"solo-builder\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-12-28\",\"body_ko\":\"코딩은 이제 RPG 게임입니다.\\n캐릭터 다섯 명을 동시에 굴립니다.\\n\\nReplit으로 환경 만들고, Claude Code로 에이전트 다섯 개를 동시에 돌려서 몇 시간 만에 프로젝트 하나를 끝냈습니다. 한 캐릭터는 Static DB를 만들고, 한 캐릭터는 프론트엔드를, 한 캐릭터는 백엔드를, 한 캐릭터는 유닛 테스트를, 한 캐릭터는 토큰 사용량을 모니터링했습니다. 개발자가 한 명이 아니라 다섯 명이 동시에 일하는 느낌이었습니다 — 다만 그 다섯 명을 모두 한 사람이 지휘합니다. 코딩의 기본 단위가 \\\"내가 짠다\\\" 에서 \\\"내가 운영한다\\\" 로 바뀐 순간입니다.\",\"body_en\":\"Coding is now an RPG.\\nYou run five characters at once.\\n\\nSet up the environment in Replit, fire up Claude Code, spawn five agents in parallel, and a project that used to take a week wraps in hours. One agent builds the Static DB. One iterates on the frontend. One updates the backend. One writes the unit tests. One watches token usage and plugin installs. It feels like running five high-level characters simultaneously — except all five report to one player. The basic unit of coding has shifted from \\\"I write\\\" to \\\"I command.\\\"\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DSy6IeSFP-i\",\"date\":\"2025-12-28\",\"original\":\"이제는 코딩이 RPG 게임같다는 느낌을 받는다.\\nReplit 으로 간단한 환경설정 설치 후에, Claude Code로 에이전트 5개를 동시에 돌려서 몇시간만에 프로젝트 하나를 그냥 끝내버렸다.\\n…\\n하나는 Context 로 쓰일 Static DB를 만들고, 하나는 프론트엔드를 계속 고치고, 하나는 백엔드를 업데이트하고, 하나는 유닛 테스트를 계속해서 쓰고, 그리고 다른 하나는 콘솔로 토큰 사용량…\\n한 시간 동안 고급 캐릭터 5개를 동시에 돌리면서 게임하는 느낌이였다.\"}]},{\"id\":\"communication-cost-is-now-too-high\",\"label\":\"communication-cost-is-now-too-high\",\"claim_ko\":\"사람끼리 소통하며 일하는 것은\\n이제 너무 비싼 비용입니다.\",\"claim_en\":\"Human-to-human coordination\\nhas become too expensive to default to.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-02-02\",\"body_ko\":\"사람끼리 소통하며 일하는 것은\\n이제 너무 비싼 비용입니다.\\n\\n저는 스태프 엔지니어로 일주일에 30시간씩 미팅을 하던 시절이 있었습니다. 그런데 AI 덕분에 유능한 한 사람이 거대 팀의 몫을 해내기 시작했습니다. 오히려 사람이 많을수록 프로젝트가 더 어려워지는 역설이 보입니다. 사람 사이의 맥락 전달 비용이 너무 크기 때문입니다. 앞으로는 '주간 팀 싱크'가 아니라 '1인 프로젝트'가 리더십과 직접 소통하는 시대가 옵니다. 우리는 관리자가 아니라, 질문하고 바로 만들어내는 크리에이터가 되어야 합니다.\",\"body_en\":\"Human-to-human coordination\\nhas become too expensive to default to.\\n\\nThere was a stretch where I logged thirty hours a week in meetings as a Staff Engineer. AI flipped that math. One capable person now produces what large teams used to ship — and you see the paradox that *more* humans on a project makes it *harder*, because the cost of routing context between people now dominates. The next era isn't \\\"weekly team sync.\\\" It's a single operator with leadership-level access who ships directly. Stop trying to be a good manager. Start being someone who asks the right question and builds the answer the same afternoon.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DUP82aelbnY\",\"date\":\"2026-02-02\",\"original\":\"실리콘밸리 빅테크 8년차, AI-native로 일하며 깨달은 것들.\\n\\n\\\"사람끼리 소통하며 일하는 것, 이제는 너무 비싼 비용이다.\\\"\\n\\n나는 스태프 엔지니어로 일주일에 30시간씩 미팅을 하던 때가 있었다.\\n하지만 이제는 AI 덕분에 유능한 개인 한 명이 거대 팀의 몫을 해낸다.\\n오히려 사람이 많을수록 프로젝트가 더 \\\"어려워\\\"지는 역설을 본다.\\n\\n앞으로는 '주간 팀 싱크' 대신,\\n'1인 프로젝트'가 리더십과 직접 소통하는 시대가 올 것 같다.\\n이미 사람 간의 맥락(Context) 전달 비용이 너무 크기 때문이다.\\n\\n이제 우리는 관리자가 아니라,\\n질문하고 바로 만들어내는 '크리에이터'가 되어야 한다.\"}]},{\"id\":\"compensation-grows-via-company-manager-grit\",\"label\":\"compensation-grows-via-company-manager-grit\",\"claim_ko\":\"고연봉은 천재성이 아니라\\n회사·매니저·끈기의 합입니다.\",\"claim_en\":\"High compensation isn't genius.\\nIt's the right company, the right manager, and staying.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-10\",\"body_ko\":\"고연봉은 천재성이 아니라\\n회사·매니저·끈기의 합입니다.\\n\\n저는 메타에서 연봉 10억 이상을 받습니다. 솔직히 말하면 천재라서가 아닙니다. 세 가지가 곱해진 결과입니다. **첫째**, 돈을 잘 벌고 성장하는 회사에 들어갔습니다. 메타는 지난 6년 동안 매출이 거의 두 배, 기업가치는 세 배가 되었습니다. 회사 자체의 복리가 본인 연봉의 복리가 됩니다. **둘째**, 가장 잘 나가는 팀의 매니저를 따라 들어갔습니다. 처음에는 워라밸 때문에 광고팀을 피하고 싶었지만, 그 매니저의 카리스마에 합류했고, 그 사람은 지금 디렉터입니다. 매니저는 동료가 아니라 베팅 대상입니다. **셋째**, 끝까지 버텼습니다. 6~7년 동안 나간 동료가 훨씬 많고, 번아웃도 수십 번 왔지만 남았습니다. 그랬더니 고인물이 되어 있었습니다. 셋 다 천재성이 아닙니다. 셋 다 판단과 끈기입니다.\",\"body_en\":\"High compensation isn't genius.\\nIt's the right company, the right manager, and staying.\\n\\nI make $1M+ at Meta. I'll say the obvious thing — it isn't because I'm a genius. It's the product of three bets. **One**, the company. Meta's revenue almost doubled in six years; market cap tripled. The company's compounding curve becomes your compensation curve. **Two**, the manager. I originally wanted to avoid the ads team for work-life-balance reasons, but I joined for one specific manager's charisma — and that manager is now a Director. A manager isn't a peer, they're a bet. **Three**, staying. Many more colleagues left than stayed in those seven years, and I burned out repeatedly, but I stayed. By the time I looked up, I was the senior person in the room. None of the three is genius. All three are judgment and grit.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DEoG5uOSIvQ\",\"date\":\"2025-01-10\",\"original\":\"내가 연봉이 10억이 넘는 개발자 된 비결.\\n진짜 나도 아직까지 믿기지가 않는데, 사실 딱히 대단한건 없어.\\n…\\n1. 돈 잘벌고 성장하는 회사에 들어갔다. - 메타는 지난 6년동안 연매출이 거의 두배가 늘고 (연매출 160조), 기업가치는 세배가 늘었어 (기업 가치 1700조).\\n2. 가장 잘나가는 팀의 매니저를 따라 들어갔다. - 나는 처음에 광고팀은 무조건 피하고 싶었어 (워라밸 최악..), 그런데 그 때 인스타그램 광고팀의 매니저를 만났는데 그 사람의 카리스마에 반해서 들어갔어. 그 친구는 지금 디렉터야 (연봉 20억+).\\n3. 끝까지 버텼다 - 팀을 들어오고서 6~7년동안 중간에 나간 사람들이 사실 아주 많았어. 나도 수십번의 번아웃을 경험하고 정말 때려치고 싶은 순간들이 너무나도 많았지만 끝까지 참고 버텼어. 그랬더니 고인물이 어느새 됬더라.\"}]},{\"id\":\"compensation-is-not-the-driver\",\"label\":\"compensation-is-not-the-driver\",\"claim_ko\":\"실리콘밸리의 리더들은\\n돈이 아니라 자기 증명을 위해 일합니다.\",\"claim_en\":\"Silicon Valley's seniors don't work for the money.\\nThey work to prove their own worth.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"grit-not-genius\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2025-03-13\",\"body_ko\":\"실리콘밸리의 리더들은\\n돈이 아니라 자기 증명을 위해 일합니다.\\n\\n우리 팀에 연봉 20억이 넘는 엔지니어가 있습니다. 그런데 아직도 매일같이 죽어라 일합니다. 왜 그렇게까지 열심히 사는지 물어봤더니, **\\\"그냥 그렇게 사는 법밖에 몰라서\\\"** 라는 답이 돌아왔습니다. 돈이 아니라, 더 나은 엔지니어가 되고, 더 큰 리더가 되기 위해서 일한다고 했습니다. 여기 실리콘밸리 리더들은 대부분 그렇게 삽니다. 연봉이 중요한 게 아니라 내 값어치를 스스로 증명해 내는 게 더 중요합니다. 저 또한 한 끼 벌이로 시작했지만, 어느새 일하는 목적이 살기 위함이 아니라 증명하기 위함으로 옮겨갔습니다. 다만 한 가지 확실한 건, 아무리 벌고 올라가도 그 끝은 없다는 사실입니다.\",\"body_en\":\"Silicon Valley's seniors don't work for the money.\\nThey work to prove their own worth.\\n\\nThere's an engineer on my team making over two million a year. He still grinds every day. When I asked why, he said, *\\\"because it's the only way I know how to live.\\\"* Not for the paycheck — for the next, better engineer he could be. The senior leaders here mostly run the same way. Comp isn't the variable; the variable is whether you can prove your worth to yourself. I started here just trying to make rent. Somewhere along the line the goal shifted from *staying alive* to *proving I'm worth being here.* One caveat: there's no end-state. The goal never gets satisfied.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHIGtMmxP1V\",\"date\":\"2025-03-13\",\"original\":\"우리 팀에는 연봉 20억이 넘는 엔지니어가 있다. 근데 아직도 매일같이 죽어라 일한다.\\n그래서 물어봤다. \\\"대체 왜 이렇게까지 열심히 살아?\\\"\\n근데 뭐라 그랬는 줄 알아? \\\"그냥 그렇게 사는 법밖에 몰라서.\\\"\\n돈 때문이 아니라더라. 그냥 성장하기 위해서라더라.\\n더 나은 엔지니어가 되고, 더 큰 리더가 되기 위해서.\\n근데 웃긴 건, 여기서는 대부분 다들 그렇게 산다. 적어도 \\\"리더\\\"들은.\\n연봉이 중요한 게 아니라, 내 값어치가 얼마나 되는지 스스로 증명해 내는 게 더 중요하더라.\\n나 또한 그렇다. 처음에는 그저 하루 밥 세끼 벌어먹고자 했지만,\\n어느새 나의 목적은 살기 위함이 아닌, 증명하기 위함이다.\\n그러나 한가지 확실한 건, 아무리 벌고, 아무리 올라가도 절대 그 끝은 없다는 거다.\"}]},{\"id\":\"competition-moved-from-model-to-harness\",\"label\":\"competition-moved-from-model-to-harness\",\"claim_ko\":\"이제 경쟁은 모델 퀄리티가 아니라\\n모델을 감싸는 harness에서 갈립니다 — 모델이 두뇌라면 harness는 손과 발과 몸입니다.\",\"claim_en\":\"The contest is no longer model quality — it's the harness around the model. If the model is the brain, the harness is the hands, feet, and body.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-19\",\"body_ko\":\"이제 경쟁은 모델 퀄리티가 아니라\\n모델을 감싸는 harness에서 갈립니다 — 모델이 두뇌라면 harness는 손과 발과 몸입니다.\\n\\nGPT냐 Sonnet이냐를 비교하던 시절은 지났습니다. 같은 두뇌라도 어떤 몸에 얹느냐에 따라 실제로 해낼 수 있는 일이 달라집니다.\",\"body_en\":\"The contest is no longer model quality — it's the harness around the model. If the model is the brain, the harness is the hands, feet, and body.\\n\\nThe era of comparing GPT versus Sonnet is over. The same brain does wildly different work depending on the body you bolt it onto.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"옛날에는 모델 퀄리티에 신경을 많이 썼어요. GPT-4o다, 아니면 Claude Sonnet 4.5다, 이런 것들을 가지고 비교 분석을 많이 했는데, 이제는 이 모델만 쓰는 게 아니라 모델을 사용할 수 있는 환경을 만들어서 이 환경 자체가 주는 영향력이 훨씬 더 커져서.\\n모델을 두뇌라고 하면, 그 두뇌를 잘 활용할 수 있게끔 손과 발을, 몸뚱아리를 잘 만들어 줘서 실제로 할 수 있는 일들이 더 많아졌다.\"}]},{\"id\":\"context-engineering-replaces-prompt-engineering\",\"label\":\"context-engineering-replaces-prompt-engineering\",\"claim_ko\":\"프롬프트 엔지니어링은 끝났습니다.\\n이제는 컨텍스트 엔지니어링입니다.\",\"claim_en\":\"Prompt engineering is over.\\nThe real weapon now is context engineering.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"prompt-engineering\",\"ai-foundations\",\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-07-08\",\"body_ko\":\"프롬프트 엔지니어링은 끝났습니다.\\n이제는 컨텍스트 엔지니어링입니다.\\n\\n대부분의 AI 툴이 에이전트(agentic) 플로우로 바뀐 지금, 프롬프트보다 컨텍스트가 더 중요해졌습니다. 이제는 **\\\"얼만큼 잘 시키는가\\\"** 가 핵심이 아니라, **\\\"얼만큼 중요한 정보를 제공하는가\\\"** 가 핵심입니다. 에이전트는 한 줄 명령으로 움직이지 않습니다. 무엇을 알고 있어야 하는지, 어떤 제약 안에서 움직여야 하는지를 미리 깔아 두는 것 — 그게 컨텍스트 엔지니어링입니다.\",\"body_en\":\"Prompt engineering is over.\\nThe real weapon now is context engineering.\\n\\nMost AI tools have moved to agentic flows. The unit of work isn't a clever prompt anymore — it's the context window the agent operates inside. The question shifted from *\\\"how well do I phrase the instruction\\\"* to *\\\"how much of the relevant world have I given the agent before it starts.\\\"* Agents don't follow one-line orders well. They follow well-prepared environments. That preparation — what to know, what's off-limits, what the success criteria look like — is context engineering.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DMHw5f6Of65\",\"date\":\"2025-07-08\",\"original\":\"이제 Prompt Engineering은 끝났다. 진짜 무기는 Context Engineering 이다.\\n\\n대부분의 AI툴들이 agentic flow로 바뀐 지금,\\n이제는 프롬프트보다 컨텍스트가 더 중요하다.\\n\\n이제는 \\\"얼만큼 잘 시키는가\\\" 가 중요한게 아닌,\\n\\\"얼마나 중요한 정보를 제공하는가\\\" 가 핵심이다.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"Prompt가 옛날에 되게 중요하다고 했잖아요. 그보다 더 중요한 건 이 맥락을 어떻게 주는가가 핵심이라고 생각을 해요. 옛날에는 Prompt를 길게 썼지만 이제는 폴더를 주면 되는 거거든요.\"}]},{\"id\":\"conversational-ai-fits-education\",\"label\":\"conversational-ai-fits-education\",\"claim_ko\":\"대화형 AI가 가장 먼저 자리잡는 분야는\\n교육과 콘텐츠입니다.\",\"claim_en\":\"The first domain conversational AI fully captures\\nis education and content.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-foundations\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-07-17\",\"body_ko\":\"대화형 AI가 가장 먼저 자리잡는 분야는\\n교육과 콘텐츠입니다.\\n\\n대화는 본래 교육의 기본 단위입니다. 질문하고, 답을 듣고, 다시 질문하는 루프 — 그것이 학습입니다. 대화형 AI는 그 루프의 한쪽 끝을 무한히 인내심 있게 만들어줍니다. 모르는 것을 모른다고 말해도 비웃지 않고, 같은 질문을 백 번 해도 새 답을 돌려줍니다. 그래서 교육과 콘텐츠가 가장 먼저 무너지는 영역이 됩니다 — Karpathy의 Eureka Labs는 그 흐름의 한 신호일 뿐입니다. 무너진다는 말은 사라진다는 뜻이 아닙니다. 형태가 다시 짜인다는 뜻입니다.\",\"body_en\":\"The first domain conversational AI fully captures\\nis education and content.\\n\\nConversation is the native unit of education. Question, answer, follow-up — that loop *is* learning. Conversational AI makes one side of that loop infinitely patient. You can admit ignorance without judgment and ask the same question a hundred times and get a fresh answer each time. That's why education and content collapse first — Karpathy's Eureka Labs is one signal in that current, not the cause of it. \\\"Collapse\\\" doesn't mean the field disappears. It means the form is re-cut from scratch.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/C9iho0_S118\",\"date\":\"2024-07-17\",\"original\":\"인공지능이 대학 및 교육기관을 대체할 수 있을까?\\n바로 어제, Andrej Karpathy 라는 레전드급 인사 (전 OpenAI 공동설립자, 테슬라 자율주행 AI 총괄 이사), 가 AI가 중점으로 가르치는 \\\"교육기관\\\" 을 설립하겠다고 발표했다 (Eureka Labs)\\n개인적으로도 대화형 인공지능이 가장 접목하기 좋은 분야가 교육과 콘텐츠 쪽이라고 생각했는데, 특히 안드레이는 본인 스스로가 너무 훌륭한 \\\"교육자\\\"인 것 같다고 느껴서 더욱 기대가 된다.\"}]},{\"id\":\"cowork-brings-agents-to-non-developers\",\"label\":\"cowork-brings-agents-to-non-developers\",\"claim_ko\":\"Claude CoWork는 비개발자도 터미널 없이\\n에이전트를 부려 컴퓨터를 직접 작동시키게 만든 데스크톱 앱입니다.\",\"claim_en\":\"Claude CoWork is the desktop app that lets non-developers run agents — operating the computer directly, no terminal required.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-19\",\"body_ko\":\"Claude CoWork는 비개발자도 터미널 없이\\n에이전트를 부려 컴퓨터를 직접 작동시키게 만든 데스크톱 앱입니다.\\n\\n승인 게이트가 있어 파일을 함부로 지우지 않고, 무료 티어로도 쓸 수 있으며, macOS와 Windows 모두에서 돌아갑니다. 개발자만의 영역이던 에이전트 실행이 비개발자의 책상으로 내려온 것입니다.\",\"body_en\":\"Claude CoWork is the desktop app that lets non-developers run agents — operating the computer directly, no terminal required.\\n\\nAn approval gate keeps it from deleting files recklessly, a free tier lets you start, and it runs on both macOS and Windows. Agent execution — once a developer-only domain — has come down to the non-developer's desk.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"CoWork라고 하는, 비개발자분들을 위해서 잘 만들어진, 비개발자분들도 쉽게 이 LLM 모델을 쓸 수 있도록 만들어진 앱.\\n…\\n그리고 물론 이 승인 게이트가 있기 때문에 마음대로 막 지우고 없애지는 않을 거고요.\\n…\\n이게 공짜로도 티어가 어느 정도 사용이 가능하거든요. 그리고 이게 Windows로도 출시가 됐어요.\"}]},{\"id\":\"cross-reference-five-agents-to-self-validate\",\"label\":\"cross-reference-five-agents-to-self-validate\",\"claim_ko\":\"리서치는 한 에이전트에 맡기지 않습니다.\\n다섯 개를 동시에 돌리고,\\n결과를 서로 교차 검증시켜 한 장으로 합칩니다.\",\"claim_en\":\"Don't trust one agent for research.\\nRun five in parallel, then have them cross-validate each other\\ninto a single artifact.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"productivity\",\"agents\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"리서치는 한 에이전트에 맡기지 않습니다.\\n다섯 개를 동시에 돌리고,\\n결과를 서로 교차 검증시켜 한 장으로 합칩니다.\\n\\n한 모델의 답은 그 모델의 편향입니다. ChatGPT의 Deep Research, Gemini의 NotebookLM, Claude의 웹 검색 — 같은 질문을 던지면 각자 다른 데이터를, 다른 신뢰도로, 다른 포맷으로 줍니다. 다섯 개를 동시에 굴리고, 다섯 개의 결과를 한 모델에게 다시 던지면서 \\\"교차 검증을 해서 한 장의 시안으로 합쳐달라\\\"고 부탁하면, 단일 에이전트의 한계가 사라집니다. 이렇게 만든 결과물은 단일 모델 결과보다 거의 항상 더 신뢰할 만하고, 더 입체적입니다.\",\"body_en\":\"Don't trust one agent for research. Run five in parallel, then have them cross-validate each other into a single artifact.\\n\\nOne model's answer is one model's bias. ChatGPT's Deep Research, Gemini's NotebookLM, Claude's web search — feed all of them the same question and they return different data, with different confidence, in different formats. Run five in parallel, then hand the five results back to one of them with the instruction \\\"cross-reference these and synthesize the best version\\\" — and the single-agent ceiling disappears. The output is almost always more trustworthy and more dimensional than any single model's reply.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"저는 보통 이런 것도 되게 많이 해요. Agent를 하나만 쓰는 게 아니라 리서치를 5개 돌린 다음에 그 5개 애들한테 똑같이 던져보는 거예요.\\n\\\"리서치 5개 왔는데 네가 크로스 레퍼런스를 해서 자체적으로 크로스 검증을 한 다음에 가장 좋은 시안을 만들어놔.\\\"라고 보통 하기 때문에 나중에 이 ChatGPT가 리서치를 준 것도 넣어가지고 계속해서 보완해서 더 좋은 리서치 시안으로 만들어 나가지 않을까 생각을 합니다.\"}]},{\"id\":\"cto-1on1-signals-ai-native-shift\",\"label\":\"cto-1on1-signals-ai-native-shift\",\"claim_ko\":\"메타 CTO와 1:1을 잡을 정도로\\nAI 네이티브 전환이 산업 전체를 흔듭니다.\",\"claim_en\":\"When a Meta CTO 1:1 lands on my calendar,\\nthe AI-native shift is already industry-wide.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-03-15\",\"body_ko\":\"메타 CTO와 1:1을 잡을 정도로\\nAI 네이티브 전환이 산업 전체를 흔듭니다.\\n\\n최근에 메타 CTO와 직접 1:1 면담을 할 기회가 있었습니다. 8년을 메타에서 일하면서 상상도 못 해 본 일입니다. 제게 무슨 일이 일어나고 있는지 미처 알기도 전에, 지금 엄청난 기회들이 생겨나고 있습니다. 지난 3개월 동안, 저는 지난 8년보다 더 큰 변화를 맞이했습니다. AI는 지나가는 해프닝이 아닙니다. 산업 전체를 바꿀 겁니다. 반드시. 본업만으로도 정신이 없는 와중에 'AI 네이티브' 강의를 출고하기로 한 이유입니다. **지금은 누군가에게는 위기가 되지만, 누군가에게는 기회가 됩니다.**\",\"body_en\":\"When a Meta CTO 1:1 lands on my calendar,\\nthe AI-native shift is already industry-wide.\\n\\nI just had a 1:1 with Meta's CTO. Eight years at this company and I couldn't have imagined this meeting. Before I've even understood what's happening, the opportunities are stacking. **The last three months brought more change than the prior eight years.** AI isn't a passing event. It will reshape the industry — period. That's why I'm shipping an AI-native course in the middle of my day job. For some people right now this is a crisis. For others it's the moment.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DXv4AK6Cq-z\",\"date\":\"2026-03-15\",\"original\":\"최근에 메타 CTO와 직접 1:1 면담을 할 기회가 있었습니다.\\n제가 8년동안 메타에서 개발자로 일하면서 상상도 못해봤던 일입니다.\\n\\n제게 무슨 일들이 일어나고 있는지 미처 알기도 전에,\\n지금 엄청난 기회들이 생겨나고 있습니다.\\n\\n지난 3개월간 동
