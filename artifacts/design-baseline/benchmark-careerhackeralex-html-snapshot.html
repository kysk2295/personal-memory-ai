path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"AI 네이티브 시대에는\\n디자이너가 개발을 하고, 개발자가 디자인을 합니다.\\n\\n직군의 벽은 사라지는 게 아니라 옅어집니다. 실리콘밸리에서는 이미 디자이너가 직접 코드를 짜고, 엔지니어가 직접 디자인을 합니다. AI가 양쪽의 진입장벽을 동시에 낮춰 줬기 때문이고, 이제는 한쪽만 잘하는 사람보다 양쪽을 다 쥐는 사람이 더 빠르게 움직입니다.\",\"body_en\":\"In the AI-native era, designers ship code and engineers design.\\n\\nRole boundaries don't disappear; they thin out. In Silicon Valley, designers are already shipping code directly, and engineers are designing directly. AI dropped the entry cost on both sides simultaneously — and the person who holds both moves faster than the person who only holds one.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"만약에 내가 새로운 회사에 들어간다. 디자이너로 들어간다. 그렇다고 해서 개발을 못할 리가 없다고 생각을 해요.\\n못하지 않을 이유가 실제로 Silicon Valley에서도 요즘 디자이너들이 개발해요. 그리고 개발자들이 디자인합니다.\\n여러분들도 그런 사람이 되게끔 제가 만들어 드릴 거예요. AI를 운영체제로서, 어떻게 보면 컴퓨터로서. 컴퓨터 잘 쓰는 사람은 여러 가지 다 하잖아요.\"}]},{\"id\":\"routines-flip-the-time-unit-from-day-to-week\",\"label\":\"routines-flip-the-time-unit-from-day-to-week\",\"claim_ko\":\"혼자 하루를 굴리는 시대는 끝났습니다.\\n에이전트가 일주일을 굴립니다.\",\"claim_en\":\"The era of running your own day is over. The agent runs your week.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"synthesized\",\"external_source\":null,\"path\":\"\",\"topics\":[\"solo-builder\",\"productivity\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-16\",\"body_ko\":\"혼자 하루를 굴리는 시대는 끝났습니다.\\n에이전트가 일주일을 굴립니다.\\n\\n스킬 + 시트 + 루틴 — 일요일 50개 기획, 월요일 30개 생성. 운영자는 자고 일어나면 테스트 가능한 100개 광고가 준비되어 있습니다.\\n\\n생산성의 단위가 하루에서 주로 옮겨갑니다. 일주일을 짜는 사람이 하루를 짜는 사람을 이깁니다.\",\"body_en\":\"The era of running your own day is over. The agent runs your week.\\n\\nSkills, a sheet, routines — Sunday plan 50, Monday generate 30. The operator wakes up to 100 test-ready ads.\\n\\nThe unit of productivity moves from the day to the week. Whoever schedules the week outpaces whoever schedules the day.\",\"sources\":[]},{\"id\":\"saaspocalypse-collapses-paid-software\",\"label\":\"saaspocalypse-collapses-paid-software\",\"claim_ko\":\"Claude가 강력해질수록\\nPPT · 포토샵 · 영상편집 같은 유료 소프트웨어를 따로 돈 주고 쓸 이유가 사라집니다.\",\"claim_en\":\"As Claude gets stronger, the reasons to pay for separate software — slides, Photoshop, video editors — disappear.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"rag-eligible\"],\"earliest_date\":\"2026-05-19\",\"body_ko\":\"Claude가 강력해질수록\\nPPT · 포토샵 · 영상편집 같은 유료 소프트웨어를 따로 돈 주고 쓸 이유가 사라집니다.\\n\\n이미 \\\"SaaSpocalypse\\\"라는 말까지 나왔습니다. 한 앱이 하던 일을 다 해내기 시작하면, 그 일만 하던 소프트웨어의 자리가 줄어듭니다.\",\"body_en\":\"As Claude gets stronger, the reasons to pay for separate software — slides, Photoshop, video editors — disappear.\\n\\nPeople already coined a word for it: the \\\"SaaSpocalypse.\\\" Once one app starts doing everything, the single-purpose tools lose their seat.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch02:transcript\",\"date\":\"2026-05-19\",\"original\":\"SaaSpocalypse라는 말도 태어났는데, 최근에 Claude가 너무 강력해지고 할 수 있는 것들이 너무 많아져서 이제 소프트웨어를 쓰는 게 다 없어질 것이라는 이야기까지 나오거든요.\\n예를 들면 PPT를 돈 주고 한다든지, Adobe Photoshop을 한다든지, 비디오 에디팅 소프트웨어를 한다든지, 그런 것들이 많이 없어질 수 있다는 예측까지 나오고 있는데.\"}]},{\"id\":\"scheduled-claude-code-agent-runs-browser-scripts-autonomously\",\"label\":\"scheduled-claude-code-agent-runs-browser-scripts-autonomously\",\"claim_ko\":\"Playwright 스크립트가 잘 돌면 Claude Code 스킬로 굳히고 데스크톱 앱에서 스케줄을 거십시오.\\n정해진 시간에 도는 그 실행 자체가 에이전트라서, 재시도하고, 코스를 수정하고, 모르는 UI를 만나면 새 서브 스크립트까지 직접 만듭니다.\",\"claim_en\":\"Once a Playwright script works, codify it as a Claude Code skill and schedule it from the desktop app — the scheduled run is itself an agent that retries, course-corrects, and writes new sub-scripts as it encounters unknown UI.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/J-6pnl5DQg8\",\"published_at\":\"2026-04-25\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"solo-builder\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-25\",\"body_ko\":\"Playwright 스크립트가 잘 돌면 Claude Code 스킬로 굳히고 데스크톱 앱에서 스케줄을 거십시오.\\n정해진 시간에 도는 그 실행 자체가 에이전트라서, 재시도하고, 코스를 수정하고, 모르는 UI를 만나면 새 서브 스크립트까지 직접 만듭니다.\\n\\n도구 세트를 스스로 키워가는 살아있는 개인 에이전트입니다. Alex의 \\\"brain은 기억하고, 에이전트는 일하고, 사람은 결정한다\\\" 명제와 직결됩니다 — 일꾼은 에이전트이지 사람이 아닙니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/J-6pnl5DQg8\",\"date\":\"2026-04-25\",\"original\":\"I like to use the desktop app for my scheduled tasks because I get the more agentic ability. Because when these scheduled runs actually run, it's an agent literally like you see in Cloud Code walking through what's going on… as it goes through this agentic loop, it starts creating new tools.\"}]},{\"id\":\"senior-must-out-ship-junior-now\",\"label\":\"senior-must-out-ship-junior-now\",\"claim_ko\":\"이제는 시니어도 주니어보다\\n더 많이, 더 빠르게 만들어야 합니다.\",\"claim_en\":\"Even seniors must out-ship juniors now —\\nadaptation is the new bar.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-07-09\",\"body_ko\":\"이제는 시니어도 주니어보다\\n더 많이, 더 빠르게 만들어야 합니다.\\n\\n메타에서는 개발자 레벨이 오를수록 코딩량이 급격히 줄어듭니다. 보통 E6라면 연간 PR 100개를 넘기기 힘든 수준입니다. 그런데 저는 지난 한 달 만에 100개를 냈습니다. 코딩을 원래 좋아하기도 했지만, AI 덕분에 하루 종일 미팅을 다 하면서도 가능했습니다. **새로운 시대가 열리고 있습니다.** 주니어도 긴장해야 하지만, 시니어와 스태프 엔지니어도 긴장하고 적응해야 합니다. 앞으로는 혼자서 전부 다 할 수 있어야만 합니다.\",\"body_en\":\"Even seniors must out-ship juniors now —\\nadaptation is the new bar.\\n\\nAt Meta, the higher your level, the less you code. An E6 historically caps somewhere under 100 PRs *per year*. I shipped 100 in one month. I happen to like coding, but the reason this works is AI — I can ship a full month of code while doing a full day of meetings. **A new era is opening.** Juniors should be alert, sure. Seniors and staff engineers should be more alert. The bar shifted: you have to be able to do everything yourself.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DMR7eS3O0v0\",\"date\":\"2025-07-09\",\"original\":\"메타에서는 개발자 레벨이 오를수록 코딩량이 급격히 줄어든다.\\n보통 E6라면 연간 PR 100개를 넘기기 힘든 수준이다.\\n하지만 나는 지난 한 달 만에 100개를 냈다.\\n원래 코딩을 좋아하긴 했지만, AI 덕분에 하루 종일 미팅을 다 하면서도 가능했다.\\n새로운 시대가 열리고 있다.\\n주니어도 긴장해야 하지만, 시니어와 스태프 개발자들도 긴장하고 적응해야 한다.\\n앞으로는 혼자서 전부 다 할 수 있어야만 한다.\"}]},{\"id\":\"sheet-plus-skills-plus-routines-runs-overnight-creative-ops\",\"label\":\"sheet-plus-skills-plus-routines-runs-overnight-creative-ops\",\"claim_ko\":\"1인 크리에이티브 운영 루프는 Claude Code 위에서 끝까지 돌아갑니다.\\nGWS CLI로 모든 생성을 구글 시트(프롬프트·잡 ID·상태)에 기록하고, 잘 나온 결과는 스킬로 굳히고, 루틴(\\\"일요일 50개 기획, 월요일 30개 생성\\\")으로 스케줄링하면 운영자는 자고 일어나 테스트 가능한 광고 묶음을 받습니다.\",\"claim_en\":\"A solo creative-ops loop runs end-to-end on Claude Code: log every generation to a Google Sheet via the GWS CLI (prompt, job ID, status), codify winners as skills, then schedule routines (\\\"Sunday plan 50, Monday generate 30\\\") so the operator wakes up to a batch of ready-to-test ads.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/xn6Z5PYyAIE\",\"published_at\":\"2026-05-04\"},\"path\":\"\",\"topics\":[\"solo-builder\",\"ai-native\",\"creator-economy\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-04\",\"body_ko\":\"1인 크리에이티브 운영 루프는 Claude Code 위에서 끝까지 돌아갑니다.\\nGWS CLI로 모든 생성을 구글 시트(프롬프트·잡 ID·상태)에 기록하고, 잘 나온 결과는 스킬로 굳히고, 루틴(\\\"일요일 50개 기획, 월요일 30개 생성\\\")으로 스케줄링하면 운영자는 자고 일어나 테스트 가능한 광고 묶음을 받습니다.\\n\\n시트-DB + 스킬 + 루틴 + 이미지·비디오 모델로 조립된 풀 파이프라인입니다. 광고를 넘어 썸네일·숏폼·블로그 변형·강의 슬라이드 등 대량 크리에이티브 루프에 일반화됩니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/xn6Z5PYyAIE\",\"date\":\"2026-05-04\",\"original\":\"In a routine, what we could do is we could build a new one that basically says, \\\"Okay, every Sunday, I want you to look at this Google sheet and... ideate and... add on top of the sheet 50 new generations.\\\" So, 50 new every single week... we'd wake up on Monday morning with all of these completed with URLs and with job IDs.\"}]},{\"id\":\"shipping-beats-persuasion\",\"label\":\"shipping-beats-persuasion\",\"claim_ko\":\"남들이 외면할 때는\\n설득하지 말고 일단 만들어 보여줍니다.\",\"claim_en\":\"When the room ignores your idea,\\nstop persuading. Ship it and let the result speak.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"move-first-or-lose-the-game\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-08-23\",\"body_ko\":\"남들이 외면할 때는\\n설득하지 말고 일단 만들어 보여줍니다.\\n\\n메타에서 아무도 관심 없던 프로젝트를 혼자 끝까지 붙잡고 완성한 적이 있습니다. 처음엔 아이디어를 아무리 얘기하고 코드 리뷰를 부탁해도 본 척 만 척이었습니다. 그런데 완성시켜 보여주니 다들 똑같이 물었습니다. **\\\"이걸 어떻게 만든 거야?\\\"** 때로는 남들이 외면해도 내가 옳다고 믿는 것을 혼자라도 해내야 합니다. 설득의 비용보다 실행의 비용이 더 쌀 때가 있습니다.\",\"body_en\":\"When the room ignores your idea,\\nstop persuading. Ship it and let the result speak.\\n\\nI once carried a project at Meta that nobody wanted. Every time I floated the idea or asked for code review, eyes glazed over. Then I finished it. The same people who'd dismissed it walked up and asked, *\\\"how did you build this?\\\"* The lesson: there are moments when the room cannot be persuaded in advance, and the demo is the only argument that lands. Shipping is sometimes cheaper than convincing.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DNsBUISXF_S\",\"date\":\"2025-08-23\",\"original\":\"메타에서 아무도 관심 없던 프로젝트를\\n그래도 끝까지 혼자 붙잡고 완성시켰다.\\n\\n처음엔 아무리 아이디어를 얘기하고\\n코드 리뷰를 부탁해도 본척만척이었는데,\\n완성시키고 보여주니 다들 물었다.\\n\\n\\\"이걸 어떻게 만든 거야?\\\"\\n\\n때로는,\\n남들이 외면해도 내가 옳다고 믿는 걸\\n혼자서라도 해내야 한다.\\n\\n가끔은 설득보다는 실행이 답이다.\"}]},{\"id\":\"silicon-valley-feels-shift-first\",\"label\":\"silicon-valley-feels-shift-first\",\"claim_ko\":\"실리콘밸리에 부는 격한 바람은\\n언젠가 한국에도 반드시 도달합니다.\",\"claim_en\":\"Whatever wind hits Silicon Valley first\\nalways reaches the rest of the world.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-02-15\",\"body_ko\":\"실리콘밸리에 부는 격한 바람은\\n언젠가 한국에도 반드시 도달합니다.\\n\\n실리콘밸리는 변화를 가장 먼저 체감하는 곳입니다. 지금 다시 한번 격한 바람이 불기 시작했습니다. 분명히 끝이 아닌 시작입니다. **조직, 직군, 트렌드가 바뀌는 것이 아니라, 사람이 일로 가치를 증명하는 방식 자체가 바뀌고 있습니다.** 이곳에서의 수만 명 레이오프는, 세상 어딘가에는 더 큰 파장이 온다는 뜻입니다. 한국까지 도달하는 데 몇 달이 걸릴 수도 있고, 몇 년이 걸릴 수도 있습니다. 그래도 결국 옵니다. 자칫 눈덩이처럼 커져서. AI를 잘 쓰는 사람에게는 기회가 되고, 그렇지 않은 사람에게는 두려운 변화가 됩니다. 이 격한 바람이, 언젠가 모두에게 순풍이 되기를 바랍니다.\",\"body_en\":\"Whatever wind hits Silicon Valley first\\nalways reaches the rest of the world.\\n\\nSilicon Valley feels every shift first. The wind picked up again — clearly a beginning, not an end. **It's not org charts or job titles or trends that are changing. It's the very method by which a person proves value through work.** The tens of thousands laid off here are a signal that elsewhere, the wave will be bigger. Korea may get it in months or years. It arrives either way — sometimes as a snowball that grew on the way. AI-fluent people see opportunity. The rest see fear. May this hard wind eventually become a tailwind for everyone.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DV5PsJmlBbT\",\"date\":\"2026-02-15\",\"original\":\"실리콘밸리는 항상 변화를 가장 먼저 체감하는 곳이다.\\n그리고 지금 다시 한 번 격한 바람이 불기 시작했다.\\n분명히 끝이 아닌 \\\"시작\\\"이다.\\n\\n조직이나 직군, 트렌드가 바뀌는 게 아니라,\\n사람이 일로 가치를 증명하는 방식 자체가 바뀌고 있다.\\n\\n여기서의 수만 명의 레이오프는,\\n세상 어딘가에선 그보다 훨씬 큰 파장이 온다는 뜻이다.\\n한국까지 도달하는 데 몇 달이 걸릴 수도, 몇 년이 걸릴 수도 있다.\\n그래도 결국은 온다. 자칫하면 눈덩이처럼 커져서.\\n\\nAI를 잘 쓰는 사람에겐 기회가 될 것이고,\\n그렇지 않은 사람에겐 두려운 변화가 될 수 있다.\\n\\n하루하루의 변화가 놀라우면서도 무섭다.\\n\\n이 격한 바람이, 언젠가 모두에게 순풍이 되길.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"실리콘 밸리는 세상에서 가장 똑똑한 사람들, 그리고 가장 기술적으로 진보된 기업들이 모여서 활동을 하는, 기업을 운영하는 그런 곳이라고 볼 수 있어요. 그러한 곳에서 판이 다시 짜이고 있다는 건 이 변화가 실제로 큰 영향을 끼치고 있고, 이 영향이 여기서 그치는 것이 아니라 나중에 전 세계로 눈덩이처럼 굴러서 퍼져나갈 것을 의미합니다.\"}]},{\"id\":\"skillify-every-automation-flow\",\"label\":\"skillify-every-automation-flow\",\"claim_ko\":\"흩어진 도구를 갈아타지 마십시오 — 모든 자동화 흐름은 Claude Code Skill 하나로 묶입니다.\\n복잡한 스킬일수록 필요한 MCP를 그 안에서 호출하면 그만입니다.\",\"claim_en\":\"Stop bouncing between scattered tools — every automation flow today collapses into a single Claude Code Skill.\\nThe more complex the skill, the more MCPs it calls from inside.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\",\"ai-native\",\"productivity\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-17\",\"body_ko\":\"흩어진 도구를 갈아타지 마십시오 — 모든 자동화 흐름은 Claude Code Skill 하나로 묶입니다.\\n복잡한 스킬일수록 필요한 MCP를 그 안에서 호출하면 그만입니다.\\n\\n요즘 가장 자주 받는 질문은 \\\"리서치는 Genspark, 글은 GPT, 자동화는 n8n, 검색은 Perplexity로 따로 돌리는데 어떻게 합쳐야 하나요?\\\"입니다. 합치는 게 아닙니다 — 도구를 갈아타는 단계 자체를 지우는 겁니다. 그 워크플로가 무엇이든 Claude Code 안에서 Skill 하나로 정의하면, 진입점은 명령어 한 줄로 줄어듭니다. 그 스킬이 복잡해진다는 건 문제가 아닙니다. 복잡할수록 안에서 더 많은 MCP를, 더 많은 서브 에이전트를, 더 많은 외부 CLI를 부르면 됩니다. 외부에서 보이는 인터페이스는 여전히 스킬 하나입니다.\\n\\n이게 비개발자에게 특히 중요한 이유는 — 자동화의 병목은 도구 개수가 아니라 도구 사이를 옮겨 다니는 사람의 손이기 때문입니다. 그 손을 지우는 게 Skill입니다.\",\"body_en\":\"Stop bouncing between scattered tools — every automation flow today collapses into a single Claude Code Skill.\\nThe more complex the skill, the more MCPs it calls from inside.\\n\\nThe question I keep getting: \\\"I do research in Genspark, writing in GPT, automation in n8n, search in Perplexity — how do I stitch them together?\\\" You don't stitch them. You erase the step of switching tools at all. Whatever the workflow is, define it once as a Skill inside Claude Code and the entry point shrinks to a single command. The skill getting complex isn't a problem — that's where the MCPs, sub-agents, and external CLIs live, hidden behind one entry point.\\n\\nThis matters for non-engineers especially, because the bottleneck in everyday automation isn't the number of tools — it's the human hand that has to move between them. The Skill is what erases that hand.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"Make라든지 n8n 이런 여러 가지 툴들이 있었는데 그거를 그냥 스킬로 다 묶어버렸다. 그러니까 스킬을 직역하자면 능력이라고 해야 되나? 내가 가지고 있는 스킬, '나는 이런 것들을 할 수 있어요.'\"}]},{\"id\":\"skills-are-reusable-work-systems-prompts-are-one-shot\",\"label\":\"skills-are-reusable-work-systems-prompts-are-one-shot\",\"claim_ko\":\"프롬프트는 한 번의 지시이고, 스킬은 재사용 가능한 업무 시스템입니다.\\n반복 작업을 스킬로 묶어야 하는 세 가지 이유: 자동화, 결과물 품질의 일관성, 팀 간 공유 가능성.\",\"claim_en\":\"Prompts are one-shot instructions; skills are reusable work systems. Wrap repeated work in a skill for three reasons: automation, consistent output quality across runs, and shareability with the team.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"실밸개발자\",\"author_handle\":\"@sv.developer\",\"publication\":\"YouTube\",\"url\":\"https://www.youtube.com/watch?v=vxEvo2BLM6A\",\"published_at\":\"2026-03-22\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"memory-systems\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-03-22\",\"body_ko\":\"프롬프트는 한 번의 지시이고, 스킬은 재사용 가능한 업무 시스템입니다.\\n반복 작업을 스킬로 묶어야 하는 세 가지 이유: 자동화, 결과물 품질의 일관성, 팀 간 공유 가능성.\\n\\n프롬프트와 스킬을 가르는 정의 명제입니다. 프롬프트는 일회성(매번 다시 짜야 하는 지시), 스킬은 시스템(한 번 만들면 누가 실행하든 같은 기준으로 결과가 나오는 자동화)입니다. 가장 큰 효과는 셋째 — 팀 단위 공유. 잘 만든 스킬 하나가 한 사람의 노하우를 팀 전체의 기본 동작으로 끌어올립니다.\",\"body_en\":\"Prompts are one-shot instructions; skills are reusable work systems. Wrap repeated work in a skill for three reasons: automation, consistent output quality across runs, and shareability with the team.\\n\\nThe definitional split between prompts and skills. A prompt is one-shot (you re-write it every time); a skill is a system (write it once, anyone executing it gets the same result by the same standard). The biggest payoff is the third — team sharing. One well-built skill turns one person's know-how into the team's default behavior.\",\"sources\":[{\"platform\":\"youtube\",\"url\":\"https://www.youtube.com/watch?v=vxEvo2BLM6A\",\"date\":\"2026-03-22\",\"original\":\"프롬트가 한번 지시라면 스킬은 재사용 가능한 업무 시스템입니다. 스킬을 써야 하는 세 가지 이유: 반복 작업 자동화, 결과물 품질 일정, 팀끼리 공유 가능.\"}]},{\"id\":\"solo-builder-now-outpaces-traditional-team\",\"label\":\"solo-builder-now-outpaces-traditional-team\",\"claim_ko\":\"올바른 AI 도구를 갖춘 한 사람이 이제 전통적인 엔지니어링 팀보다 더 빠르게 출시합니다.\\nPeter Steinberger는 OpenClaw(GitHub 별 247K개)를 AI 에이전트만으로 사실상 혼자 만들었습니다.\",\"claim_en\":\"A single builder with the right AI tooling now ships faster than a traditional engineering team — Peter Steinberger built OpenClaw (247K GitHub stars) essentially solo with AI agents.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Garry Tan\",\"author_handle\":\"@garrytan\",\"publication\":\"GitHub (gstack README)\",\"url\":\"https://github.com/garrytan/gstack\",\"published_at\":\"2026-01-01\"},\"path\":\"\",\"topics\":[\"ai-native\",\"ai-coding\",\"productivity\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-01-01\",\"body_ko\":\"올바른 AI 도구를 갖춘 한 사람이 이제 전통적인 엔지니어링 팀보다 더 빠르게 출시합니다.\\nPeter Steinberger는 OpenClaw(GitHub 별 247K개)를 AI 에이전트만으로 사실상 혼자 만들었습니다.\\n\\nGarry Tan이 gstack README에서 제시하는 개막 명제입니다. 증인이 핵심 디테일입니다: 벤더의 슬라이드도, 예측도 아닙니다 — 사실상 혼자 AI 에이전트로 만든 출시된 산출물(OpenClaw, 별 247K개)입니다. Y Combinator CEO가 이 사례를 인용한다는 것 자체가 신호입니다 — 그는 수천 개 스타트업을 보고 이 사례를 골랐습니다. 알렉스의 `ai-is-the-team` 클러스터를 다른 증인이 평행하게 입증합니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://github.com/garrytan/gstack\",\"date\":\"2026-01-01\",\"original\":\"How does one person ship like a team of twenty? Peter Steinberger built OpenClaw — 247K GitHub stars — essentially solo with AI agents. The revolution is here. A single builder with the right tooling can move faster than a traditional team.\"},{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"1인 기업가들이 유니콘 기업들을 만들어 나가고 있다는 사실입니다. 이 유니콘 기업이라는 건 1조 이상의 기업 가치를 가진 기업을 만드는 것을 이야기해요. … Peter Levels … Maor Shlomo … Alex Finn … 각각마다 Solopreneur로서 여러 가지 기업 창출, 매출, 그리고 두각을 보여주고 있는 그런 AI Native인 사람들.\"}]},{\"id\":\"solopreneur-roster-2026-builds-without-employees\",\"label\":\"solopreneur-roster-2026-builds-without-employees\",\"claim_ko\":\"1인 유니콘 시대가 시작됐습니다.\\nPieter Levels는 직원 0명으로 연 매출 약 42억(3M 달러)을 만들고,\\nMaor Shlomo는 Base44를 6개월 만에 Wix에 8천만 달러로 매각했고,\\nAlex Finn은 Creator Buddy로 2주 만에 ARR 약 4.2억(300K 달러)을 찍었습니다.\",\"claim_en\":\"The one-person unicorn era has arrived.\\nPieter Levels runs ~$3M/yr solo across his stack, Maor Shlomo sold Base44 to Wix for $80M in six months, and Alex Finn hit ~$300K ARR on Creator Buddy in two weeks.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"solo-builder\"],\"theses\":[\"solo-is-the-new-team-size\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-06-18\",\"body_ko\":\"1인 유니콘 시대가 시작됐습니다.\\nPieter Levels는 직원 0명으로 연 매출 약 42억(3M 달러)을 만들고,\\nMaor Shlomo는 Base44를 6개월 만에 Wix에 8천만 달러로 매각했고,\\nAlex Finn은 Creator Buddy로 2주 만에 ARR 약 4.2억(300K 달러)을 찍었습니다.\\n\\n세 사람 모두 직원이 없습니다. 도구만 있고, AI 군단만 있고, 본인 한 명입니다. Pieter Levels는 Photo AI를 비롯한 여러 서비스를 1인으로 운영하며 포트폴리오 전체에서 연 3M 달러를 만들어 내고 있습니다. Maor Shlomo의 Base44는 출시 6개월 만에 Wix가 8천만 달러 일시급으로 인수했고, 인수 9개월 뒤에는 ARR 1억 달러를 찍었습니다 — SaaS 인수 역사에서 1년 안에 payback이 도는 거의 유일한 사례입니다. Alex Finn의 Creator Buddy는 출시 15분 만에 10만 달러, 2시간 만에 20만 달러, 2주 만에 30만 달러 ARR을 만들어 냈습니다.\",\"body_en\":\"The one-person unicorn era has arrived. Pieter Levels runs ~$3M/yr solo across his stack, Maor Shlomo sold Base44 to Wix for $80M in six months, and Alex Finn hit ~$300K ARR on Creator Buddy in two weeks.\\n\\nAll three have zero employees. They have tools, an AI fleet, and themselves. Pieter Levels operates Photo AI alongside the rest of his portfolio and clears ~$3M/year solo. Shlomo's Base44 was acquired by Wix six months after launch for $80M cash; nine months post-acquisition Base44 reached $100M ARR — one of the rare SaaS M\u0026A deals that pays back inside a year. Finn's Creator Buddy hit $100K in the first 15 minutes after launch, $200K within two hours, and $300K ARR by the end of week two.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"1인 기업가들이 유니콘 기업들을 만들어 나가고 있다는 사실입니다. 이 유니콘 기업이라는 건 1조 이상의 기업 가치를 가진 기업을 만드는 것을 이야기해요. … 첫 번째로는 이 Peter Levels, 두 번째로는 이 Marl Schulmoer, 그리고 세 번째로는 Alex Finn. 각각마다 Solopreneur로서 여러 가지 기업 창출, 매출, 그리고 두각을 보여주고 있는 그런 AI Native인 사람들. 이 Peter Levels라고 하는 사람은 1인 개발자로서 여러 가지 AI 도구들을 섭렵을 해서 계속해서 서비스를 런칭을 시키면서 그 서비스를 통해서 Revenue를 만들어 내고 있어요. 그래서 연매출이 한 42억까지 스스로 만들어 내는 그런 쾌거를 이뤘고요. 두 번째 Marl Schulmoer라고 하는 사람은 이 Base44라는 서비스를 만들어서 Wix라는 회사에 1천억 이상의 기업 가치를 받고 매각을 할 수가 있었습니다. 이렇게 큰 매출을 단 6개월 만에 낼 수 있었다는 게 정말 놀라운 사실이고요. 그리고 세 번째로는 Alex Finn이라는 크리에이터인데요. 어떠한 서비스를 만들어서 2주 만에 4.2억의 ARR, Annual Recurring Revenue를 찍은 놀라운 사례들도 저희가 볼 수가 있었습니다. 이들이 가진 공통점은 하나가 있습니다. 바로 직원이 한 명도 없다는 거예요.\"},{\"platform\":\"web_article\",\"url\":\"https://www.fast-saas.com/blog/pieter-levels-success-story/\",\"date\":\"2026-05-18\",\"original\":\"Pieter Levels (handle: levelsio), solo founder, ~$3M/year total revenue across his portfolio with zero employees. Photo AI is the largest single revenue source (~$1.6M ARR / $138K MRR as of November 2025).\"},{\"platform\":\"web_article\",\"url\":\"https://techcrunch.com/2025/06/18/6-month-old-solo-owned-vibe-coder-base44-sells-to-wix-for-80m-cash/\",\"date\":\"2025-06-18\",\"original\":\"Maor Shlomo (31, Israeli, solo founder), sold Base44 — a 6-month-old AI app-builder — to Wix for $80M cash in June 2025. Additional earn-outs up to ~$90M tied to performance milestones through 2029. Base44 reached $100M ARR ~9 months after acquisition.\"},{\"platform\":\"web_article\",\"url\":\"https://www.linkedin.com/posts/alex-finn-1848684a_i-built-and-launched-my-own-1-person-ai-startup-activity-7300618115220996097-M5Jz\",\"date\":\"2026-05-18\",\"original\":\"Alex Finn, solo founder, Creator Buddy (AI content-coaching tool). $300K ARR in two weeks, 500 paying subscribers. $100K within the first 15 minutes of launch, $200K within 2 hours. No code written by hand; built without a team.\"}]},{\"id\":\"staff-engineer-day-is-not-coding\",\"label\":\"staff-engineer-day-is-not-coding\",\"claim_ko\":\"스태프 엔지니어 하루의 1% 미만이\\n코딩입니다.\",\"claim_en\":\"Less than 1% of a staff engineer's day\\nis coding.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\",\"leadership\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-15\",\"body_ko\":\"스태프 엔지니어 하루의 1% 미만이\\n코딩입니다.\\n\\n실리콘밸리 스태프 엔지니어의 하루 일과입니다. **50%는 미팅** — 누가 어떤 일을 어떻게 얼마만큼 할 것인지 얼라인합니다. **20%는 1:1** — 멘토십, 멘토링, 파트너십입니다. **20%는 구글 닥** — PRD와 Engineering Plan을 작성하고 수정합니다. **10%는 메시지와 DM** — 하루에 새 메시지가 50건 넘게 옵니다. **5%는 커피챗과 점심**, **4%는 한숨 돌리기**, 그리고 **1% 미만이 코딩**입니다. 레벨이 올라갈수록 신기하게도 개발자는 코딩 시간이 줄어듭니다. 그 이유는 개발하는 시간보다 **어떤 문제를 어떻게 풀 것인지 고민하는 시간이 ROI 차원에서 훨씬 더 효율적**이기 때문입니다.\",\"body_en\":\"Less than 1% of a staff engineer's day\\nis coding.\\n\\nThe actual breakdown of my staff-engineer day at Meta. **50% meetings** — aligning who does what, how, and how much. **20% 1:1s** — mentorship, partnering. **20% Google Docs** — drafting and revising PRDs + engineering plans. **10% messages/DMs** — 50+ new threads/day. **5% coffee chats + lunch.** **4% catching my breath.** **\u003c1% coding.** Counter to most assumptions, *coding hours fall as level rises*. The reason: time spent deciding *which problem to solve and how* has a far higher ROI than time spent solving it.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DE1tGEQRgD9\",\"date\":\"2025-01-15\",\"original\":\"실리콘밸리 스태프 엔지니어의 하루 일과:\\n\\n50% - 미팅 (하루종일 누가 어떤일을 어떻게 얼만큼 할 것인가 alignment 하기)\\n20% - 1:1 (멘토쉽, 멘토링, 파트너쉽)\\n20% - 구글닥 (PRD, Engineering Plan 작성 / 수정)\\n10% - 메세지 / DM (하루에 새로운 메세지 50+ 여건)\\n5% - 커피챗 / 점심\\n4% - 한숨돌리기 (좀 쉬자..)\\n\u003c 1% - 코딩\\n\\n레벨이 올라가면 올라갈수록 신기하게도 개발자는 코딩 시간이 줄어든다는 사실 알고 있나요? 그 이유는 개발 하는 시간보다 어떤 문제를 어떻게 풀 것인지 고민하는 시간이 ROI 차원에서 훨씬 더 효율적이기 때문입니다.\\n\\n혹시 나랑 비슷한 사람 손!?\"}]},{\"id\":\"superpowers-12-run-experiment-cheaper-on-medium-complex\",\"label\":\"superpowers-12-run-experiment-cheaper-on-medium-complex\",\"claim_ko\":\"Nate Herk가 12회 실행(Claude Code Opus 4.6 · Superpowers 사용 6회 / 미사용 6회 · 사람 개입 없음)으로 비교한 결과는 비용 약 -9%, 총 토큰 약 -14%, 변동성 2-3배 축소였습니다.\\n단순 작업은 8% 오버헤드를 냈고, 중·복잡 작업에서 더 저렴해졌습니다.\",\"claim_en\":\"Nate Herk's 12-run experiment (Claude Code, Opus 4.6, 6 with Superpowers / 6 without, zero human-in-loop) found roughly minus-9% cost, minus-14% total tokens, and 2-3× tighter variance with the plugin — simple tasks paid an 8% overhead, medium and complex tasks netted cheaper.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/4XqVR6xI6Kw\",\"published_at\":\"2026-04-12\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-12\",\"body_ko\":\"Nate Herk가 12회 실행(Claude Code Opus 4.6 · Superpowers 사용 6회 / 미사용 6회 · 사람 개입 없음)으로 비교한 결과는 비용 약 -9%, 총 토큰 약 -14%, 변동성 2-3배 축소였습니다.\\n단순 작업은 8% 오버헤드를 냈고, 중·복잡 작업에서 더 저렴해졌습니다.\\n\\nAlex가 그대로 인용할 수 있는 구체 수치입니다. N=12 소표본이라는 한계는 클레임 안에 \\\"approximately / directional\\\" 톤으로 보존되어 있습니다 — Nate 본인의 프레임과 같습니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/4XqVR6xI6Kw\",\"date\":\"2026-04-12\",\"original\":\"Overall, we found that we got about a 9% cost savings, about 14% fewer total tokens... The without superpowers runs had two to three times the variance in token usage, while the with superpowers runs were much tighter... for simple tasks, just go ahead and skip it. The 8% overhead doesn't really do much.\"}]},{\"id\":\"superpowers-disciplines-claude-code-into-five-phases\",\"label\":\"superpowers-disciplines-claude-code-into-five-phases\",\"claim_ko\":\"Jesse Vincent(obra)의 Superpowers 플러그인은 Claude Code의 모든 요청을 다섯 단계 — 명확화 · 설계 · 계획 · 구현 · 검증 — 로 강제해 잘 훈련된 개발자처럼 일하게 만듭니다.\",\"claim_en\":\"The Superpowers plugin (by Jesse Vincent / obra) turns Claude Code into a disciplined developer by forcing every request through five phases — clarify, design, plan, code, verify — before any line of code gets written.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/4XqVR6xI6Kw\",\"published_at\":\"2026-04-12\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-coding\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-12\",\"body_ko\":\"Jesse Vincent(obra)의 Superpowers 플러그인은 Claude Code의 모든 요청을 다섯 단계 — 명확화 · 설계 · 계획 · 구현 · 검증 — 로 강제해 잘 훈련된 개발자처럼 일하게 만듭니다.\\n\\nAlex가 오늘 바로 깔아서 쓰고 청중에게도 권할 수 있는 설치 가능한 산출물입니다. 다섯 단계 형태는 기존 skill thought들이 아직 다루지 않은 구체 운영 패턴입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/4XqVR6xI6Kw\",\"date\":\"2026-04-12\",\"original\":\"Superpowers is a free open source plugin by Jesse Vincent that installs a set of skills into your cloud code. So instead of letting cloud code just start coding when you ask it to build something, it goes through a super super disciplined set of phases... clarify, design, plan, code, and then verify.\"}]},{\"id\":\"surviving-teams-share-three-traits\",\"label\":\"surviving-teams-share-three-traits\",\"claim_ko\":\"구조조정에서 살아남는 팀은\\n세 가지를 가지고 있습니다.\",\"claim_en\":\"The teams that survive every reorg share three traits.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\",\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-21\",\"body_ko\":\"구조조정에서 살아남는 팀은\\n세 가지를 가지고 있습니다.\\n\\n메타에서는 6개월마다 전사적 구조조정이 돕니다. 7년째 우리 팀은 단 한 번도 바뀌지 않았습니다. 이유 세 가지 — **첫째**, 리더가 IC에서 시작해 임원까지 올라간 사람입니다. 사업의 본질을 알기 때문에 정치 게임을 하지 않습니다. **둘째**, 성공 지표가 명확합니다. 그것도 절대 매출이 아니라 자기 자신과 비교하는 상대 매출 — 7년 동안 한 번도 목표를 못 친 적이 없습니다. **셋째**, 단기 매출만 좇지 않습니다. 매 분기를 달성하면서 동시에 다음 사업의 파이프라인을 채워둡니다. 이 셋이 함께 있을 때만 팀은 reorg의 칼끝에서 매번 비껴섭니다.\",\"body_en\":\"The teams that survive every reorg share three traits.\\n\\nMeta runs company-wide reorgs roughly every six months. My team has gone seven years untouched. Three reasons. **One**, the leaders started as ICs and climbed to VP/Director — they know the substance of the business and don't have to play politics to defend their patch. **Two**, the success metric is clean: relative revenue against ourselves, not absolute, hit every single quarter for seven years. **Three**, we never optimize only for short-term numbers. Every quarter we deliver hits the target *and* fills the pipeline for the next bet. The three together make the team un-removable. Any one of them in isolation isn't enough.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFErEessxnN\",\"date\":\"2025-01-21\",\"original\":\"6개월마다 구조조정하는 회사에서 7년째 단 한번도 우리팀은 바뀌지 않은 이유…\\n1. 확실한 리더쉽의 건재 — 우리 조직의 리더들은 대부분두 가장 낮은 IC (실무자) 부터 시작해서 임원 (VP, Director) 까지 올라간 사람들이야많아.\\n2. 확실한 성공 지표 — 우리팀의 성공 지표는 매출이야. 심지어 절대적인 매출이 아닌, 상대적 매출…\\n3. 체계적인 전략 — 우리는 단기적인 매출만 보지 않아. 지금 당장의 목표를 달성하되, 항상 장기적인 pipeline 을 구축해서 미래 사업을 대비해.\"},{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGbq0tYyKkI\",\"date\":\"2025-02-23\",\"original\":\"성공하는 조직에 반드시 \\\"Success Metric\\\" 이 존재하는 이유:\\n1. 명확한 성공 지표 없이 진행되는 프로젝트는 실패 확률이 높다.  - \\\"잘하고 있다\\\"는 감각이 아니라, 데이터가 증명해야 한다.\\n3. 측정되지 않는 목표는 무의미하다. - 매출, 사용자 수, 고객 만족도 등 측정 가능한 지표를 설정해야 한다.\\n5. 개인의 Success Metric이 조직의 목표와 연결되어야 한다.\"}]},{\"id\":\"teach-your-visual-style-once-reuse-everywhere\",\"label\":\"teach-your-visual-style-once-reuse-everywhere\",\"claim_ko\":\"모션 그래픽을 프롬프트하기 전에 — 색 · 타이포 · 템포 — 자신의 비주얼 스타일을 한 번 가르치면, 이후 모든 클립이 그 스타일을 상속받아 매번 다시 설명할 필요가 없어집니다.\",\"claim_en\":\"Before prompting motion graphics, teach the agent your visual style once — color, typography, pacing — so every subsequent clip inherits it instead of being re-described each time.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/Aw3BkmhYu4I\",\"published_at\":\"2026-04-22\"},\"path\":\"\",\"topics\":[\"prompt-engineering\",\"ai-tooling\",\"creator-economy\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-22\",\"body_ko\":\"모션 그래픽을 프롬프트하기 전에 — 색 · 타이포 · 템포 — 자신의 비주얼 스타일을 한 번 가르치면, 이후 모든 클립이 그 스타일을 상속받아 매번 다시 설명할 필요가 없어집니다.\\n\\n재사용 가능한 절차적 통찰입니다 — 스타일 컨텍스트에 앞에서 투자한 뒤 이후엔 경제적으로 프롬프트합니다. 영상 너머의 모든 크리에이티브 AI 워크플로에 일반화됩니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/Aw3BkmhYu4I\",\"date\":\"2026-04-22\",\"original\":\"Teaching Your Style 9:45 ... Prompting the Motion Graphics 14:37\"}]},{\"id\":\"ten-traits-of-billion-won-engineers\",\"label\":\"ten-traits-of-billion-won-engineers\",\"claim_ko\":\"연봉 10억 엔지니어는\\n방향을 잘 잡고 끝까지 밀어붙이는 사람입니다.\",\"claim_en\":\"The billion-won engineer\\npicks the right direction and pushes it all the way through.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\",\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\",\"grit-not-genius\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-02\",\"body_ko\":\"연봉 10억 엔지니어는\\n방향을 잘 잡고 끝까지 밀어붙이는 사람입니다.\\n\\n실리콘밸리에서 연봉 10억을 넘는 사람들의 공통점 열 가지를 정리합니다. **첫째**, 돈 되는 문제를 풉니다 — 회사에 직접 수천억을 벌어 줍니다. **둘째**, 항상 중요한 프로젝트에 있습니다 — 브랜딩을 워낙 잘해 두었습니다. **셋째**, 끝까지 버팁니다 — 남아 있는 사람이 결국 이깁니다. **넷째**, 협상을 잘합니다 — 자기 가치를 헐값에 팔지 않습니다. **다섯째**, 감정 소모를 하지 않습니다 — 정치 싸움보다 결과에 집중합니다. **여섯째**, 멘탈이 강합니다 — 위기에서도 최선의 선택을 합니다. **일곱째**, 쳐낼 것은 과감히 쳐냅니다 — 비효율적인 일에 시간을 쓰지 않습니다. **여덟째**, 인맥이 좋습니다 — 실력도 중요하지만, 기회는 결국 사람이 줍니다. **아홉째**, 실제 비즈니스를 이해합니다 — 실제로 어떻게 돌아가는지 70%는 알고 있습니다. **열째**, 하나만 파지 않습니다 — 그 말은, 어떤 프로젝트도 해낼 수 있다는 뜻입니다. 결국 연봉 10억이 넘는 사람은 방향을 잘 잡고 끝까지 밀어붙이는 사람입니다. **다 해내는 사람**입니다.\",\"body_en\":\"$18\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFkAI0exe2j\",\"date\":\"2025-02-02\",\"original\":\"실리콘밸리에서 연봉 10억 넘는 사람들의 공통점 10가지:\\n\\n1. 돈 되는 문제를 푼다. 회사에 직접 수천억을 벌어준다.\\n2. 항상 중요한 프로젝트에 있다. 브랜딩을 워낙 잘해놨다.\\n3. 끝까지 버틴다. 남아있는 사람이 결국 이긴다.\\n4. 협상을 잘한다. 자기 가치를 헐값에 팔지 않는다.\\n5. 감정 소모 안 한다. 정치 싸움보다 결과에 집중한다.\\n6. 멘탈이 강하다. 위기에서도 최선의 선택을 한다.\\n7. 쳐낼 건 과감히 쳐낸다. 비효율적인 일엔 시간 쓰지 않는다.\\n8. 인맥이 좋다. 실력도 중요하지만, 기회는 결국 사람이 준다.\\n9. 실제 비즈니스를 이해한다. 실제로 어떻게 돌아가는지 70%는 알고 있다.\\n10. 하나만 파지 않는다. 그 말은, 어떤 프로젝트도 해낼 수 있다.\\n\\n연봉 10억이 넘는 사람은 방향을 잘 정하고, 끝까지 밀어붙인다.\\n결국, 다 해내는 사람이다.\\n\\n당신은 몇가지나 채웠는가?\"}]},{\"id\":\"tenure-compounds-leverage\",\"label\":\"tenure-compounds-leverage\",\"claim_ko\":\"한 팀에 오래 머무는 것이\\n복리로 쌓이는 레버리지입니다.\",\"claim_en\":\"Staying with one team for years\\nis leverage that compounds.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\"],\"confidentiality\":\"public\",\"surfaces\":[\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-09-25\",\"body_ko\":\"한 팀에 오래 머무는 것이\\n복리로 쌓이는 레버리지입니다.\\n\\n이직이 기본값처럼 권장되는 시대지만, 한 팀에 오래 머무는 사람만이 가질 수 있는 자산이 따로 있습니다. 도메인 지식과 관계의 복리입니다. 처음 들어왔을 때 10명이던 팀이 300명으로 자라는 동안, 그 자리에 남은 사람은 새로 합류한 20년차 베테랑도 따라잡기 어려운 두 가지를 동시에 쥐게 됩니다 — 사업의 맥락과, 의사결정자들과의 신뢰. 그 신뢰는 자유로 환원됩니다. 아니다 싶은 일은 당당하게 거절할 수 있고, 피드백은 꼬아 듣지 않고 받을 수 있고, 팀 밖의 일도 명분 있게 찾아 나설 수 있습니다. 신뢰는 무기입니다. 그걸 활용하는 것도 결국 능력입니다.\",\"body_en\":\"Staying with one team for years\\nis leverage that compounds.\\n\\nJob-hopping is the default-encouraged story right now, but there's a specific asset only long tenure produces: compounded domain knowledge and compounded relationships. While my Instagram Ads team grew from 10 to 300 people, staying in place built two things even a 20-year veteran joining cold can't replicate quickly — the substance of the business, and trust with the people who make decisions. That trust converts to freedom: I can decline things confidently, take feedback at face value instead of decoding it, and reach for work outside my immediate scope with cover. Trust is a weapon. Using it well is itself a skill.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DPAh-b_kWK3\",\"date\":\"2025-09-25\",\"original\":\"메타에서 한 팀에서만 7년을 있었다고 말하면, 그간 왜 한번도 다른 팀이나 회사를 알아보지 않았냐고 물어보는 사람들이 많다. 사실 그 이유는 매우 간단하다:\\n나에게 더 좋은 팀이나 회사가 사실상 없기 때문이다.\\n…\\n내가 들어왔을때 10명이였던 인스타그램 광고팀은 지금 300명을 넘어섰다. 놀랍게도 그 10명 대부분이 아직까지도 팀에 남아있다. 내 첫 매니저는 이미 시니어 디렉터를 달았고, 우리 VP도 나를 안다.\\n…\\n나는 설령 20년차 엔지니어가 들어와도 쌓기 어려운 domain knowledge 와 relationship 을 가지고 있다는 뜻이다.\\n…\\n\\\"신뢰\\\"는 아주 강력한 무기다. 그걸 잘 활용하는 것도 결국 능력이다.\"}]},{\"id\":\"the-sme-is-the-markdown-not-the-model\",\"label\":\"the-sme-is-the-markdown-not-the-model\",\"claim_ko\":\"전문가는 LLM이 아닙니다.\\n옆에 둔 마크다운입니다.\",\"claim_en\":\"The expert isn't the LLM. It's the markdown sitting next to it.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"synthesized\",\"external_source\":null,\"path\":\"\",\"topics\":[\"memory-systems\",\"ai-tooling\",\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-16\",\"body_ko\":\"전문가는 LLM이 아닙니다.\\n옆에 둔 마크다운입니다.\\n\\nKarpathy의 LLM Wiki, brain의 thoughts/ 트리, Nate Herk의 advertising_masterclass.md — 이름만 다를 뿐 같은 아키텍처입니다. 큐레이팅된 마크다운이 옆에 있어야 모델이 비로소 도메인 전문가로 동작합니다.\\n\\nLLM은 무엇이든 압니다. 그래서 아무것도 모릅니다. 도메인은 모델이 아니라 마크다운이 결정합니다.\",\"body_en\":\"The expert isn't the LLM. It's the markdown sitting next to it.\\n\\nKarpathy's LLM Wiki, this brain's thoughts/ tree, Nate Herk's advertising_masterclass.md — three names for one architecture. A curated markdown sitting next to the model is what turns it into a domain specialist.\\n\\nAn LLM knows everything. Which is why it knows nothing in particular. The domain is decided by the markdown, not the model.\",\"sources\":[]},{\"id\":\"thirty-min-1on1-via-four-steps\",\"label\":\"thirty-min-1on1-via-four-steps\",\"claim_ko\":\"30분 1on1은 네 단계로 끝납니다 —\\n지난 일·아젠다·피드백·도움 요청.\",\"claim_en\":\"A 30-min 1:1 runs four steps —\\nrecap, agenda, ask for feedback, ask for help.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\",\"meta-life\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-25\",\"body_ko\":\"30분 1on1은 네 단계로 끝납니다 —\\n지난 일·아젠다·피드백·도움 요청.\\n\\n메타에선 **30분짜리 1:1 미팅을 어떻게 하는지가 가장 중요합니다.** 대부분의 의사 결정이 1:1 대화에서 이루어지기 때문입니다. 해야 할 일은 많은데 비해 시간은 없으니, 얼마나 효율적이고 빠르게 얼라인먼트를 이루는지가 관건입니다. 수많은 시행착오 끝에 찾은 가장 효율적인 방법입니다. **첫째**, 지난 미팅 이후 해 온 일을 bullet point로 정리해서 보여 줍니다. **둘째**, 오늘 미팅의 agenda를 정리해서 말합니다. **셋째**, 상대방에게 내가 피드백이 필요한 부분을 묻습니다. **넷째**, 상대방에게 내가 어떻게 도와줄 수 있는지 물어봅니다. 이 네 가지만 하면 핵심은 모두 짚고 **30분 안에 끝납니다**. 30분은 생각보다 짧고 아주 소중합니다. 1분 1초를 전략적으로 쓰고 싶다면 위와 같이 해 보는 것을 추천합니다.\",\"body_en\":\"A 30-min 1:1 runs four steps —\\nrecap, agenda, ask for feedback, ask for help.\\n\\nAt Meta, **how you run a 30-minute 1:1 is one of the highest-leverage skills you can have.** Most real decisions happen in 1:1 conversations. There's far more to do than there is time, so the question is: how fast can you reach alignment? After a lot of trial and error, here's the most efficient pattern I've found. **One**: walk through what you've done since the last 1:1 as a bullet-list. **Two**: state today's agenda. **Three**: ask them where you need feedback. **Four**: ask them how you can help *them*. Four steps, every core point covered, **30 minutes done.** Thirty minutes is shorter than you think and worth more than you think. If you want to spend every minute strategically, run it like this.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHniyqdRiIj\",\"date\":\"2025-03-25\",\"original\":\"메타에선 30분짜리 1:1 미팅을 어떻게 하는지가 가장 중요하다.\\n\\n대부분의 의사결정은 1:1 대화에서 이루어지기 때문이다. 해야할 일은 많은데 비해 시간은 없기에, 얼마나 효율적이고 빠르게 alignment 를 이루는지가 관건이다.\\n\\n수많은 시행착오 끝에, 내가 찾은 가장 효율적인 방법은 이거다:\\n\\n1. 지난 미팅 이후 해온 일을 bullet point로 정리해서 보여준다\\n2. 오늘 미팅의 agenda 를 정리해서 말한다\\n3. 상대방에게 내가 피드백이 필요한 부분을 묻는다\\n4. 상대방에게 내가 어떻게 도와줄 수 있는지 물어본다\\n\\n이 4가지만 하면, 핵심은 다 짚고 30분 안에 끝난다.\\n\\n30분은 생각보다 짧고, 아주 소중하다. \\n1분 1초를 전략적으로 쓰고 싶다면, 위와 같이 해보는걸 추천한다.\\n\\n혹시 여러분들만의 1:1 미팅 꿀팁이 있다면? 댓글로 공유해주세요!\"}]},{\"id\":\"three-survival-moves-from-teen-hardship\",\"label\":\"three-survival-moves-from-teen-hardship\",\"claim_ko\":\"15살에 혼자 미국에서 배운 세 가지가\\n실리콘밸리에서 저를 살렸습니다.\",\"claim_en\":\"Three things I learned at 15 alone in the US\\nare what kept me alive in Silicon Valley.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"career-strategy\"],\"theses\":[\"grit-not-genius\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-05\",\"body_ko\":\"15살에 혼자 미국에서 배운 세 가지가\\n실리콘밸리에서 저를 살렸습니다.\\n\\n저는 미국에서 15살부터 혼자 살았습니다. 한국에서 나고 자라다가 갑자기 혼자 미국으로 가게 되어 혼란스러웠습니다. 처음에는 영어도 잘 안 되고, 아는 사람도 없고, 너무 힘들었습니다. 그때 배운 것들이 결국 실리콘밸리에서 살아남는 데 가장 큰 힘이 되었습니다. **첫째**, **\\\"무조건 나대야 산다.\\\"** 한국에서는 남들보다 튀면 안 된다고 배웠는데, 미국에서는 가만히 있으면 그냥 잊혀집니다. **둘째**, **\\\"긍정의 힘으로 버텨야 한다.\\\"** 모든 게 낯설고 힘들어도 결국 *'잘될 거야'*라고 믿고 버티는 사람이 끝까지 잘하더라고요. **셋째**, **\\\"네트워크는 필수다.\\\"** 혼자만의 힘으로 되는 건 없습니다. 결국 기회는 사람이 만들어 줍니다. 그때는 너무 힘들었지만, 지금 돌이켜보면 그 덕분에 더 강인한 사람이 되었습니다.\",\"body_en\":\"Three things I learned at 15 alone in the US\\nare what kept me alive in Silicon Valley.\\n\\nI've lived in the US alone since I was 15. Going from a Korean upbringing to American solitude overnight was confusing. English barely worked. I didn't know anyone. It was rough. But what I learned then is what eventually let me survive Silicon Valley. **One**: **\\\"You have to stick out to survive.\\\"** In Korea I was taught not to stand out. In the US, if you stay quiet, you just disappear. **Two**: **\\\"Survive on optimism.\\\"** When everything is unfamiliar and hard, the ones who *believe it'll work out* are the ones who last. **Three**: **\\\"Network is mandatory.\\\"** Nothing happens alone. Opportunity is delivered through *people.* You have to go together. It was hard at the time. Looking back, it's what made me harder.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFrF8WHPh7n\",\"date\":\"2025-02-05\",\"original\":\"나는 미국에서 15살부터 혼자 살았어.\\n\\n한국에서 나고 자라다가 갑자기 혼자 미국으로 가게 되서 혼란스러웠는데\\n처음엔 영어도 잘 안 되고, 아는 사람도 없고, 너무 힘들었어.\\n\\n근데 그때 배운 것들이 내가 실리콘밸리에서 살아남는 데 가장 큰 힘이 됐어\\n\\n1. \\\"무조건 나대야 산다.\\\" \\n- 한국에서는 남들보다 튀면 안 된다고 배웠는데, 미국에선 가만히 있으면 그냥 잊혀진다. \\n\\n2. \\\"긍정의 힘으로 버텨야 한다.\\\" \\n- 모든 게 낯설고 힘들어도 결국 '잘될 거야' 라고 믿고 버티는 사람이 끝까지 잘하더라.\\n\\n3. \\\"네트워크는 필수다.\\\" \\n- 혼자만의 힘으로 되는 건 없다. 결국 기회는 '사람'이 만들어준다. 같이 가야한다.\\n\\n그때는 너무 힘들었지만, 지금 돌이켜보면 그 덕분에 더 강인한 사람이 됐어.\\n\\n혹시 지금 힘든 시간을 보내고 있다면, 위에 세가지를 한번 기억해봐\\n그 시간이 지나면, 스친이 너도 지금보다 훨씬 더 단단해져 있을 거야.\"}]},{\"id\":\"three-ways-ai-makes-you-stand-out\",\"label\":\"three-ways-ai-makes-you-stand-out\",\"claim_ko\":\"AI 시대 경쟁력은\\nMVP · 개인 에이전트 · 반응형 웹 세 가지로 키웁니다.\",\"claim_en\":\"Three moves to compound your edge in the AI era:\\nMVP, personal agent, responsive web.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-10-21\",\"body_ko\":\"AI 시대 경쟁력은\\nMVP · 개인 에이전트 · 반응형 웹 세 가지로 키웁니다.\\n\\nAI로 지금 당장 경쟁력을 높이는 세 가지 방법입니다. **첫째**, 남들이 사업 아이템이 있다고 말로 자랑할 때, 저는 MVP 서비스를 만들어 자랑합니다. **둘째**, 남들이 만드는 에이전트를 기다리는 대신, 제 에이전트를 직접 만들어 씁니다. 예를 들어 구글 캘린더에 운동 일정을 추가해 주는 PT 에이전트 같은 것입니다. **셋째**, 남들이 PPT와 리포트를 작성할 때, 저는 반응형 웹을 만들어 발표합니다. 이 셋을 매주 하나씩만 시도해도 경쟁력은 다른 차원이 됩니다.\",\"body_en\":\"Three moves to compound your edge in the AI era:\\nMVP, personal agent, responsive web.\\n\\nThree concrete moves to compound your edge right now. **One**: when others talk about their startup idea, you ship the MVP and let it argue for you. **Two**: stop waiting for someone else's agent — build the one *you* need. (A personal PT agent that drops workouts into your Google Calendar is the kind of small one I mean.) **Three**: when others ship a PPT and a written report, you ship a responsive web demo. Do these three on rotation. Edge compounds.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DPlNjhPAE9H\",\"date\":\"2025-10-21\",\"original\":\"AI로 지금 당장 내 경쟁력을 높일 수 있는 방법 3가지:\\n\\n1. 남들이 사업아이템 있다고 말로 자랑할때 나는 MVP 서비스를 만들어 자랑한다\\n2. 남들이 만드는 에이전트 기다리기보다 내 에이전트 내가 남들어 쓴다 (예를 들면 구글 캘린더에 운동 일정 추가해주는 PT 에이전트)\\n3. 남들은 ppt 만들고 리포트 작성할때 나는 반응형 웹 만들어 발표한다\\n\\n어떻게 하냐고? 다음 영상 보면 누구든지 따라할 수 있어!! 👇\"}]},{\"id\":\"thumbnail-agent-saves-creator-hours\",\"label\":\"thumbnail-agent-saves-creator-hours\",\"claim_ko\":\"한 줄 입력으로 최고의 썸네일을 뽑는 에이전트가\\n올해의 가장 큰 시간 절감입니다.\",\"claim_en\":\"A one-line agent that ships your best thumbnail\\nwas this year's single biggest hour-saver.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"creator-economy\"],\"theses\":[\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-12-04\",\"body_ko\":\"한 줄 입력으로 최고의 썸네일을 뽑는 에이전트가\\n올해의 가장 큰 시간 절감입니다.\\n\\n올해 만든 서비스 중에 가장 마음에 드는 것이 바로 **유튜브 썸네일 자동 제작 에이전트**입니다. 딱 한 줄만 치면 AI 에이전트들이 알아서 최고의 썸네일을 만들어 줍니다. 이걸로 정말 엄청난 기회비용과 시간을 절약하고 있습니다. 유튜버라면 다 아실 겁니다.\",\"body_en\":\"A one-line agent that ships your best thumbnail\\nwas this year's single biggest hour-saver.\\n\\nThe service I built this year that I'm most attached to: a **YouTube thumbnail agent.** One line in, agents produce the best version. Massive opportunity-cost and hour savings. If you're a YouTuber, you know exactly what I mean.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DTe5BIbFI27\",\"date\":\"2025-12-04\",\"original\":\"올해 내가 만든 서비스중에 가장 맘에 드는 서비스는 바로\\n\\\"유튜브 썸네일 자동 제작\\\" 에이전트다.\\n그냥 딱 1줄만 치면 AI 에이전트들이 알아서 최고의 썸네일을 만들어준다.\\n이걸로 정말 엄청난 기회비용과 시간을 아끼고 있다. (유튜버라면 다 알거다..)\\n아직 출시 생각은 없는데, 써보고 싶은사람들 한번 댓글 달아주면 고민해볼게!!\"}]},{\"id\":\"top-engineer-shows-three-disciplines\",\"label\":\"top-engineer-shows-three-disciplines\",\"claim_ko\":\"일 잘하는 사람은\\n옵션 정리·결과 증명·거절의 세 가지가 빠릅니다.\",\"claim_en\":\"The high-performer moves fast on three disciplines:\\nmap the options, prove results, say no.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\",\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\",\"grit-not-genius\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-05\",\"body_ko\":\"일 잘하는 사람은\\n옵션 정리·결과 증명·거절의 세 가지가 빠릅니다.\\n\\n실리콘밸리에서 수천억을 벌어 주는 팀에서 일해 보면 '일 잘하는 사람'이 딱 보입니다. 공통점 세 가지입니다. **첫째**, \\\"우리 이제 어떡하지?\\\"가 없습니다. 고민하기 전에 이미 모든 가능한 옵션을 정리하고 \\\"이렇게 하겠습니다\\\"라고 말합니다. **둘째**, 결과로 말합니다. \\\"주말에도 일했다, 프로젝트 다섯 개를 했다\\\" 대신 \\\"올해 광고 클릭률을 두 배 올렸다\\\"라고 말합니다. **프로세스보다 임팩트**입니다. **셋째**, No라고 할 줄 압니다. 시간 낭비하는 일에는 단호합니다. \\\"이건 ROI가 낮아 하지 않겠습니다\\\"라는 말을 할 줄 알아야 합니다. 결국 일 잘하는 사람은 **말보다 행동이 빠르고, 결과로 증명**합니다.\",\"body_en\":\"The high-performer moves fast on three disciplines:\\nmap the options, prove results, say no.\\n\\nI work on a team in Silicon Valley that earns the company hundreds of billions. From that vantage point the high-performers are obvious. Three traits show up in all of them. **One**: they don't ask \\\"what do we do now?\\\" — they walk in with the option set already mapped and say \\\"here's the move.\\\" **Two**: they speak in results. Not \\\"I worked weekends, I shipped five projects\\\" — but \\\"ad CTR is up 2× this year.\\\" **Impact beats process.** **Three**: they know how to say no. They're decisive about time-wasters. They can say *\\\"this has poor ROI, I'm not doing it\\\"* without flinching. The pattern: **action faster than talk, and proof in results.**\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFrWyiuRaa1\",\"date\":\"2025-02-05\",\"original\":\"나는 실리콘밸리에서 수천억을 벌어주는 팀에서 일한다.\\n그리고 여기선 '일 잘하는 사람'이 딱 보면 보인다.\\n\\n그들의 공통점 3가지:\\n\\n1. \\\"우리 이제 어떡하지?\\\" 가 없다.\\n- 고민하기 전에 이미 모든 가능한 옵션을 정리하고 \\\"이렇게 할게요\\\"라고 말한다.\\n\\n2. 결과로 말한다.\\n- \\\"나 주말에도 일했어, 나 프로젝트 5개나 했어\\\" 대신 \\\"올해 광고 클릭률 2배 올렸어.\\\"\\n- '프로세스'보다 '임팩트'가 중요하다.\\n\\n3. No 라고 할 줄 안다.\\n- 시간 낭비하는 일엔 단호하다.\\n- \\\"이건 ROI가 낮아서 안 하겠습니다.\\\" 이런 말 할 줄 알아야 한다.\\n\\n결국, 일 잘하는 사람은 말보다 행동이 빠르고, 결과로 증명한다.\\n\\n스친이들은 1, 2, 3 중 어떤 일잘러야?\\n일잘러 스친이들 전부 알려줘!\"}]},{\"id\":\"top-performer-now-equals-100-people\",\"label\":\"top-performer-now-equals-100-people\",\"claim_ko\":\"이제는 한 사람이\\n100인분 이상의 아웃풋을 냅니다.\",\"claim_en\":\"One operator now produces\\nthe output of a hundred.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-07-04\",\"body_ko\":\"이제는 한 사람이\\n100인분 이상의 아웃풋을 냅니다.\\n\\n이제는 확신합니다. 한 사람이 100인분 이상의 아웃풋을 낼 수 있다는 사실을. **실력자와 비실력자의 갭은 시간이 지나면 더 벌어질 것입니다.** 그런 세상을 매일같이 맞이하고 있다는 걸 느낍니다. AI 시대의 productivity는 평균값이 올라가는 게 아니라, 분산이 커지는 방식으로 작동합니다.\",\"body_en\":\"One operator now produces\\nthe output of a hundred.\\n\\nI'm certain now. One operator can produce 100× the output. **The gap between the skilled and the unskilled is going to widen, not narrow.** That's the world I'm watching unfold day by day. Productivity in the AI era doesn't lift the average — it stretches the distribution.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DMMuf63urbs\",\"date\":\"2025-07-04\",\"original\":\"이제는 확신한다. 한 사람이 100인분 이상의 아웃풋을 낼 수 있다는걸\\n실력자와 비실력자의 갭은 시간이 지나면 더 벌어질것이다\\n우리는 그런 세상을 맞이하고 있다는걸 매일같이 느낀다.\"}]},{\"id\":\"top-teams-still-lose-people\",\"label\":\"top-teams-still-lose-people\",\"claim_ko\":\"최고의 팀도\\n사람을 잃습니다.\",\"claim_en\":\"Even the top teams\\nstill lose people.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\",\"meta-life\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-12\",\"body_ko\":\"최고의 팀도\\n사람을 잃습니다.\\n\\n우리 팀은 메타에서 가장 잘 나간다는 소문이 있습니다. 하지만 오늘도 한 명이 팀을 떠나겠다고 했습니다. **올해만 벌써 네 명째**입니다. 솔직히 이해는 갑니다. 야근도 많고, 일 자체도 어렵고, 기대치는 높고, 압박도 심합니다. 그러다 보면 지치고, 당연히 다른 길이 더 좋아 보일 수도 있습니다. 꾸역꾸역 버티는 게 맞을까요, 아니면 자신과 더 맞는 곳을 찾아 떠나는 게 맞을까요. **언제 떠나는 게 정답인지 아직도 모르겠습니다.** 그저 모두가 행복하고 원하는 걸 얻길 바라며, 제가 할 수 있는 최선을 다해 도울 뿐입니다. 그래도 떠나는 팀원의 뒷모습을 바라볼 때는 언제나 씁쓸합니다.\",\"body_en\":\"Even the top teams\\nstill lose people.\\n\\nMy team has a reputation as one of the best at Meta. And today another person told me they're leaving — **the fourth this year.** Honestly, I get it. The hours are long, the work is hard, the bar is high, the pressure is heavy. You burn out, and another path looks better. Is the right move to stay and grind? Or to find the place that fits you better? **I still don't know the right answer to when you should leave.** What I can do is hope everyone gets what they want — and help where I can. Watching a teammate walk out still hurts every single time.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DHFxDMGRPav\",\"date\":\"2025-03-12\",\"original\":\"우리 팀은 메타에서 가장 잘 나간다는 소문이 있다. \\n\\n하지만 오늘도 한 명이 팀을 떠나겠다고 했다. \\n올해만 벌써 4명째다.\\n\\n솔직히 이해는 간다.\\n야근도 많고, 일 자체도 어렵고, 기대치는 높고, 압박도 심하다. \\n그러다 보면 지치고, 당연히 다른 길이 더 좋아 보일 수도 있다.\\n\\n꾸역꾸역 버티는 게 맞는 걸까, \\n아니면 나와 더 맞는 곳을 찾아 떠나는 게 맞을까. \\n언제 떠나는 게 정답인지 아직도 모르겠다. \\n\\n그저 모두가 행복하고, 원하는 걸 얻길 바라며 \\n내가 할 수 있는 최선을 다해 도울 뿐.\\n\\n그래도 떠나는 팀원의 뒷모습을 바라볼땐 언제나 씁쓸하다.\"}]},{\"id\":\"trust-is-the-base-of-work\",\"label\":\"trust-is-the-base-of-work\",\"claim_ko\":\"일에서 신뢰보다\\n중요한 것은 없습니다.\",\"claim_en\":\"Nothing at work matters\\nmore than trust.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"leadership\",\"career-strategy\"],\"theses\":[\"leadership-is-cold-judgment\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-03-07\",\"body_ko\":\"일에서 신뢰보다\\n중요한 것은 없습니다.\\n\\n일에서 신뢰보다 중요한 것은 없습니다. 하지만 신뢰는 쉽게 쌓이는 것이 아닙니다. 누군가에게 과거의 아픔이나 상처가 많을수록 신뢰를 쌓기는 더 어려워집니다. **모든 말과 행동, 약속과 책임, 몸짓 손짓 하나하나가 중요합니다.** 자기 자신을 완전히 내려놓는 일 또한 중요합니다 — **vulnerability**입니다. 한 번 깊게 쌓인 신뢰는 공든 탑처럼 단단하고 강력합니다. 상대방이 더 관대해지고, 원만해지고, 너그러워지며, 이해되고 공감할 수 있게 만들어 줍니다. **아무리 어려운 상황도 되려 쉽게 풀립니다.** 솔직하기만 하면 됩니다. 일에서 신뢰보다 중요한 것은 없습니다.\",\"body_en\":\"Nothing at work matters\\nmore than trust.\\n\\nNothing at work matters more than trust. But trust isn't built easily. The more past wounds a person carries, the harder it is to build. **Every word, every action, every commitment and accountability, every gesture — they all count.** Letting yourself fully drop your guard matters too — **vulnerability** is part of the work. Once trust is built deep, it's a tower built by labor: solid, durable. It makes the other person more generous, more patient, more understanding, more forgiving. **Even hard situations untangle more easily.** Just be honest. Nothing at work matters more than trust.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DG6kjnSSSQ_\",\"date\":\"2025-03-07\",\"original\":\"일에서 신뢰보다 중요한 것은 없다. 하지만 \\\"신뢰\\\" 라는것은 쉽게 쌓여지는 것이 아니다. 누군가에게 과거의 아픔이나 상처가 많을수록 신뢰를 쌓는 것은 더욱 더 어렵다. 모든 말과 행동, 약속과 책임, 몸짓 손짓 하나하나가 중요하다. 자기 자신을 완전히 내려놓는일 또한 중요하다 (vulnerability).\\n\\n하지만 한번 깊게 쌓인 신뢰는 공든 탑처럼 단단하고 강력하다. 상대방에서 더 관대해지고, 원만해지고, 너그러워지고, 이해되고, 공감될 수 있게 만들어준다. 아무리 어려운 상황도 되려 쉽게 풀어진다. 솔직하기만 하면 된다.\\n\\n일에서 신뢰보다 중요한 것은 없다.\"}]},{\"id\":\"understanding-precedes-mastery\",\"label\":\"understanding-precedes-mastery\",\"claim_ko\":\"기술의 배경을 알아야\\n제대로 쓸 수 있습니다.\",\"claim_en\":\"Understanding the technology comes before mastering it.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"learning\"],\"theses\":[\"pillar-framework\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"기술의 배경을 알아야\\n제대로 쓸 수 있습니다.\\n\\nChatGPT를 쓰다 보면 답답해지는 순간이 옵니다. 그 답답함을 푸는 길은 더 좋은 프롬프트가 아니라, 도구가 어디서 왔고 무엇을 풀기 위해 만들어졌는지를 이해하는 것입니다. 배경 없는 숙련은 임시방편이고, 배경 있는 숙련만이 다음 도구로 옮겨 갑니다.\",\"body_en\":\"Understanding the technology comes before mastering it.\\n\\nThe frustration that hits every ChatGPT user eventually doesn't yield to better prompts — it yields to context. Knowing what a tool is for, where it came from, and what it actually computes is what turns trial-and-error into judgment. Skill without context expires the moment the substrate changes; skill with context migrates.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH02-01\",\"date\":\"2024-05-01\",\"original\":\"기술의 배경을 알아야 제대로 쓸 수 있다라는 생각을 가지고 있기 때문이에요.\\n…\\n도구가 만들어진 배경과 원리를 이해하면 더 잘 사용할 수 있는 그런 사람이 되겠죠.\"}]},{\"id\":\"unlearn-before-you-relearn\",\"label\":\"unlearn-before-you-relearn\",\"claim_ko\":\"AI 네이티브가 되려면\\n그동안 쌓아온 지식부터 한 번 내려놓아야 합니다.\",\"claim_en\":\"To become AI-native, you first have to put down\\nthe knowledge you spent years stacking up.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"learning\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"AI 네이티브가 되려면\\n그동안 쌓아온 지식부터 한 번 내려놓아야 합니다.\\n\\n지식이 많다는 것이 때로는 함정입니다. 한 분야에서 20년, 30년을 쌓은 사람일수록 AI의 아웃풋을 의심하기가 더 쉽습니다. 그 의심은 합리적이지만, AI 네이티브로 건너가는 길목에서는 바로 그 의심이 발목을 잡습니다. 편견을 한 번 내려놓고, 새로 나온 도구를 바닥부터 다시 익혀야 다음 단계가 열립니다.\",\"body_en\":\"To become AI-native, you first have to put down the knowledge you spent years stacking up.\\n\\nDeep expertise is, paradoxically, the trap. The longer you've worked in a field, the easier it is to dismiss an AI output as \\\"not good enough.\\\" That dismissal is usually defensible — and it's also the thing standing between you and the next stage. Set the prior expertise aside, pick the new tool up from the floor, and learn it the way a beginner would.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch00:transcript\",\"date\":\"2026-05-18\",\"original\":\"우리가 그동안 배워왔던 것들을 사실 전부 다 다시 배워야 한다고 미리 말씀을 드리고 싶었어요.\\n왜냐하면 우리가 지식이 많다는 거는 어떻게 또 보면 함정이 될 수도 있거든요.\\n…\\n내가 만약에 2, 30년 전문가로서, 개발자로서 활동을 했다면 AI가 만들어내는 아웃풋에 신뢰가 쉽게 가지는 않겠죠. … 내가 배워오지 않은 것들이고, 내가 그동안 배워온 것들이 나의 그런 생각의 틀을 이만큼 잡고 있기 때문에 그 앞으로 뚫고 나가기가 되게 어려운데 AI Native가 되려면 새로 다시 배워야 된다. 새로운 도구가 나왔으면 그 도구에 대한 편견을 조금 깨고 처음부터 바닥부터 어떻게 하면 이 도구를 잘 활용할 수 있지? 편견을 버리고 시작하는 게 되게 중요하다.\"}]},{\"id\":\"usage-frequency-is-the-differentiator\",\"label\":\"usage-frequency-is-the-differentiator\",\"claim_ko\":\"AI 전문가가 될 필요 없습니다.\\n사용 빈도가 차별화를 만듭니다.\",\"claim_en\":\"You don't need to be an AI expert.\\nFrequency of use is what creates the differential.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"learning\",\"ai-native\"],\"theses\":[\"pillar-framework\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2024-05-01\",\"body_ko\":\"AI 전문가가 될 필요 없습니다.\\n사용 빈도가 차별화를 만듭니다.\\n\\n실리콘밸리에는 정말 뛰어난 동료들이 많습니다. 그런데 그들이 저를 \\\"AI 전문가\\\"로 인정하는 이유는 제가 AI를 더 깊이 공부했기 때문이 아닙니다 — 더 많이 써봤기 때문입니다. 더 많은 도메인에 적용해 봤고, 더 많은 도구를 결제해서 써봤고, 일상 속에서 끼고 살면서 습관으로 만들었기 때문입니다. AI 시대의 차별성은 학위나 자격증에서 나오지 않습니다. **빈도와 일상화**에서 나옵니다.\",\"body_en\":\"You don't need to be an AI expert.\\nFrequency of use is what creates the differential.\\n\\nI have brilliant colleagues in Silicon Valley. The reason they call me an \\\"AI expert\\\" isn't that I studied AI more deeply than they did — it's that I use it more. More domains. More paid services. More embedding it into daily habit until reaching for it became reflex. In the AI era, the differential doesn't come from credentials. It comes from **frequency and habit**.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lecture:chatgpt-2024:CH11-01\",\"date\":\"2024-05-01\",\"original\":\"그들은 저를 인공지능 전문가라고 어느 정도 쳐줘요… 제가 인공지능을 전문적으로 공부를 하지는 않았어요… 결국 그들과 제가 조금 다르다고 생각을 하는 거는 사용의 빈도라고 생각합니다.\\n…\\n인공지능 전문가 될 필요 없고 일단 많이 쓰고 습득하고 습관으로 익히고 활용을 하다 보면은 숙련도가 올라가서 차별성이 나온다.\"},{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DGZuBGXRnuR\",\"date\":\"2025-02-23\",\"original\":\"시간이 곧 돈이라면, ChatGPT는 단언컨데 현존하는 최고의 투자 상품이다.\\n문제는, 쓰더라도 대부분이 제대로 \\\"뽑아먹고\\\" 있지 못하다는것. 핵심은 \\\"일단 무조건 써먹어보겠다\\\" 라는 마인드.\\n…\\nAI는 쓰는 만큼 내 것이 된다. 쓰면 쓸 수록 더 잘 써질수 밖에 없다.\"},{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/C708R16uhYf\",\"date\":\"2024-06-05\",\"original\":\"2. 인공지능의 활용을 극대화시키는 사람이 될 것 - 인공지능은 범용 솔루션이기 보다는 도구이다. 이 도구를, 자원을 \\\"어떻게 활용하는가\\\" 가 관건인데, 더 창의적으로, 감성적으로, 효과적으로 문제 풀기에 활용하는 사람은 반드시 경쟁력이 있을 것.\"}]},{\"id\":\"vibe-coding-beats-junior-engineer\",\"label\":\"vibe-coding-beats-junior-engineer\",\"claim_ko\":\"바이브 코딩은 이미\\n실리콘밸리 신입 개발자 수준을 넘어섭니다.\",\"claim_en\":\"Vibe coding already produces work\\nat a Silicon Valley junior engineer's level — or above.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"solo-builder\"],\"theses\":[\"move-first-or-lose-the-game\",\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-05-21\",\"body_ko\":\"바이브 코딩은 이미\\n실리콘밸리 신입 개발자 수준을 넘어섭니다.\\n\\n요즘 실리콘밸리에서는 디자이너나 기획자도 먼저 코딩을 합니다. 개발을 1도 모른다고 해도, **바이브 코딩**으로 다 만들 수 있기 때문입니다. 아이디어만 있으면 개발자에게 부탁하지 않고도 왠만한 것은 직접 만듭니다. 오히려 안 쓰는 게 손해입니다. 바이브 코딩이 지금 당장 완벽한 건 아닙니다. 한계도 많습니다. 하지만 8년 차 실리콘밸리 개발자로서 말씀드리면, 왠만한 신입 실리콘밸리 개발자 수준은 이미 나옵니다. 어떤 경우엔 더 잘할지도 모릅니다.\",\"body_en\":\"Vibe coding already produces work\\nat a Silicon Valley junior engineer's level — or above.\\n\\nIn the Valley right now, designers and PMs code first — and most of them don't know a single line. They use vibe coding. With an idea, they can build most things without asking an engineer. Not using it now is the cost. Vibe coding isn't perfect; the limits are real. But as an eight-year Silicon Valley engineer, I'll say it straight: the output is already at the level of a junior SV engineer. In some cases, above.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DK1X5zGu13V\",\"date\":\"2025-05-21\",\"original\":\"요즘 실리콘밸리에선 디자이너나 기획자도 먼저 코딩을 한다. 개발을 1도 몰라도 말이다.\\n바로 \\\"바이브 코딩\\\"으로.\\n아이디어만 있으면 개발자들에게 굳이 부탁하지 않아도 왠만하면 다 만들 수 있는데 오히려 안쓰는 것이 손해다.\\n물론 바이브 코딩이 지금 당장 완벽한 것은 아니다. 한계도 많다.\\n하지만 8년차 실리콘밸리 개발자로써 말하자면, 왠만한 신입 실리콘밸리 개발자 만큼은 한다고 본다. (혹은 더 잘할지도..)\"}]},{\"id\":\"vibe-coding-defined-by-karpathy\",\"label\":\"vibe-coding-defined-by-karpathy\",\"claim_ko\":\"\\\"바이브 코딩\\\"이라는 새로운 코딩 방식이 있습니다. 바이브에 완전히 몸을 맡기고, 지수 곡선을 받아들이며, 코드가 존재한다는 사실조차 잊는 방식입니다.\",\"claim_en\":\"There's a new kind of coding I call \\\"vibe coding\\\", where you fully give in to the vibes, embrace exponentials, and forget that the code even exists.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Andrej Karpathy\",\"author_handle\":\"@karpathy\",\"publication\":\"x.com\",\"url\":\"https://x.com/karpathy/status/1886192184808149383?lang=en\",\"published_at\":\"2025-02-02\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2025-02-02\",\"body_ko\":\"\\\"바이브 코딩\\\"이라는 새로운 코딩 방식이 있습니다. 바이브에 완전히 몸을 맡기고, 지수 곡선을 받아들이며, 코드가 존재한다는 사실조차 잊는 방식입니다.\\n\\n카르파시가 2025년 2월에 만든 \\\"바이브 코딩\\\"의 원조 정의입니다. 한 문장에 세 가지 무게가 실려 있습니다: (1) 실천에 이름을 붙이고 (\\\"바이브 코딩\\\"), (2) 태도를 정의하고 (\\\"바이브에 몸을 맡긴다\\\"), (3) 결과를 명시합니다 (\\\"코드의 존재조차 잊는다\\\"). 2025-2026년 AI 네이티브 코딩 담론이 인용하는 용어의 출처이며, 알렉스의 바이브 코딩 클러스터는 모두 여기에서 파생됩니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://x.com/karpathy/status/1886192184808149383?lang=en\",\"date\":\"2025-02-02\",\"original\":\"There's a new kind of coding I call \\\"vibe coding\\\", where you fully give in to the vibes, embrace exponentials, and forget that the code even exists.\"}]},{\"id\":\"vibe-coding-grew-into-agentic-coding\",\"label\":\"vibe-coding-grew-into-agentic-coding\",\"claim_ko\":\"바이브 코딩은 사라진 것이 아닙니다.\\\\n1년 만에 에이전트 코딩으로 자랐습니다.\",\"claim_en\":\"Vibe coding didn't fade — it grew into agentic coding in a year.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"synthesized\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-coding\",\"ai-native\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-05-15\",\"body_ko\":\"바이브 코딩은 사라진 것이 아닙니다.\\n1년 만에 에이전트 코딩으로 자랐습니다.\\n\\n2025년 2월, Andrej Karpathy가 \\\"바이브 코딩\\\"이라는 단어를 만들었습니다. \\\"Accept All\\\" · diff 무시 · 에러 복사·붙여넣기 — 그가 묘사한 동작은 1년 안에 에이전트 코딩의 기본값이 됐습니다.\\n\\n바이브 코딩은 사라지지 않았습니다. 이름이 더 점잖아진 것뿐입니다.\",\"body_en\":\"Vibe coding didn't fade — it grew into agentic coding in a year.\\n\\nIn Feb 2025, Andrej Karpathy coined \\\"vibe coding.\\\" Accept All. Skip the diffs. Paste the errors back. The moves he described became the defaults of agentic coding within a year.\\n\\nVibe coding didn't disappear. It just got a more respectable name.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"2024년에는 이메일을 검토하고 고쳐줬어요. ChatGPT한테 질문을 하면 답변을 해줬고, 그 답변에 대한 추가 질문을 하면 또 이렇게 연결을 해주는 채팅봇 같은 익스피리언스를 만들어줬는데 … 지금 현시점에는 이 챗봇이 엄청나게 진화를 했거든요. 이제는 … 내가 그동안 받았던 모든 이메일을 검토하고 제 스타일과 톤에 맞춰서 제가 시키지도 않았는데도 답장을 할 수 있는 수준으로 왔다.\"}]},{\"id\":\"vibe-coding-is-already-the-baseline\",\"label\":\"vibe-coding-is-already-the-baseline\",\"claim_ko\":\"바이브 코딩을 매일 안 쓰는 사람은\\n반드시 뒤처집니다.\",\"claim_en\":\"If you're not using vibe coding daily,\\nyou're already falling behind.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"ai-native\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-06-12\",\"body_ko\":\"바이브 코딩을 매일 안 쓰는 사람은\\n반드시 뒤처집니다.\\n\\n바이브 코딩에 대해 소신 발언 하나 하겠습니다. 한계가 있다, 유지보수가 안 된다, 비싸다 — 말은 많습니다. 다 맞는 말입니다. 그런데 **지금 매일같이 써 보지 않는 사람은 반드시 뒤처집니다.** 특히 개발자라면 더 빠르게 도태됩니다. 코딩이라는 일이 급격하게 변하고 있고, 프로덕트 개발도, 사업 개발도 하루 단위로 바뀝니다. 이제는 진짜 보여주기 싸움입니다. 내가 직접 만들어 보여주지 않으면 누구도 설득하기 어렵습니다. 하루 이틀이면 이 정도 퀄리티의 서비스가 나오는데, 안 하겠다면 — 더 이상 설득할 자신이 없습니다.\",\"body_en\":\"If you're not using vibe coding daily,\\nyou're already falling behind.\\n\\nQuick unpopular take. People will tell you vibe coding has limits, doesn't maintain well, is expensive — all fair. But: **if you're not using it daily, right now, you're already losing ground.** Engineers especially. The job called *\\\"coding\\\"* is changing fast, and product development — even *business* development — is shifting day over day. The competition has become a *show-me* competition. If you can't build your idea with your own hands and show it, persuading anyone now is harder than it used to be. When two days of vibe coding ship this quality of product and someone still won't try it, I'm out of arguments.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DL9YdKoxHDd\",\"date\":\"2025-06-12\",\"original\":\"바이브코딩에 대한 소신발언 하나 할게.\\n바이브코딩은 한계가 있다, 유지보수 못한다, 비싸다, 등등 말이 많은데\\n이걸 지금 매일같이 써보지 않는 사람은 반드시 뒤처진다.\\n특히 개발자라면 더욱 더 도태될 것이다.\\n코딩이라는 \\\"일\\\"은 급격하게 변화하고 있고,\\n심지어 프로덕트 개발, 아니, 사업 개발에 대한 일들도 하루씩 변화하고 있다.\\n이제는 진짜로 보여주기 싸움이다.\\n내가 내 손으로 내 아이디어를 직접 만들어 보여주지 않는다면\\n이제는 그 누구 하나라도 설득하기 어려울거다.\\n이제 하루 이틀이면 이정도 퀄리티 서비스가 나오는데도 안하겠다면,\\n나는 더 이상 설득할 자신이 없다.\"}]},{\"id\":\"vibe-coding-is-the-korea-opportunity\",\"label\":\"vibe-coding-is-the-korea-opportunity\",\"claim_ko\":\"바이브 코딩으로 1년 안에\\n1조 가치의 한국 유니콘을 만들 수 있다고 봅니다.\",\"claim_en\":\"I believe vibe coding can yield\\na Korean unicorn within twelve months.\",\"memory_type\":\"reflective\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"solo-builder\"],\"theses\":[\"pillar-belief\",\"solo-is-the-new-team-size\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-04-18\",\"body_ko\":\"바이브 코딩으로 1년 안에\\n1조 가치의 한국 유니콘을 만들 수 있다고 봅니다.\\n\\n이번 유튜브 영상만큼 설렜던 적이 없습니다. 저는 바이브 코딩으로 1년 안에 1조 가치의 유니콘 기업이 나올 수 있다고 봅니다. 감히 이 도구로 대한민국을 일으킬 자신이 있습니다. 2주 동안 매일같이 앱을 만들면서 확실하게 깨달았습니다. **지금이 우리 모두가 앱을 만들 가장 적합한 시기입니다.** 이번에 올리는 유튜브 영상이 그 첫걸음이 되기를 진심으로 바랍니다.\",\"body_en\":\"I believe vibe coding can yield\\na Korean unicorn within twelve months.\\n\\nI've never been this fired up about a YouTube video. I believe vibe coding can produce a unicorn — Korean, twelve months — and I'm willing to say it publicly. Two weeks of building an app every day made it clear. **This is the most opportune moment most of us will ever get to build apps.** I hope this video is the first step.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DJD800VRH4Y\",\"date\":\"2025-04-18\",\"original\":\"이번 유튜브 영상만큼 설렜던 적이 없다.\\n나는 이걸로 1년안에 1조 가치의 유니콘 기업도 만들수 있겠다고 생각한다.\\n나는 감히 이 \\\"바이브 코딩\\\"으로 대한민국을 일으킬 자신이 있다.\\n2주일동안 매일같이 앱을 만들어보면서 확실하게 깨달았다.\\n지금이 바로 우리 모두가 앱을 만들 가장 적합한 시기다.\\n이번에 올리는 유튜브 영상이 그 첫걸음이 되기를 진심으로 바란다.\"}]},{\"id\":\"vibe-coding-runs-on-too-good-llms\",\"label\":\"vibe-coding-runs-on-too-good-llms\",\"claim_ko\":\"바이브 코딩이 가능한 이유는 LLM(예: Cursor Composer + Sonnet)이 지나치게 좋아지고 있기 때문입니다.\",\"claim_en\":\"Vibe coding is possible because the LLMs (e.g. Cursor Composer w Sonnet) are getting too good.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Andrej Karpathy\",\"author_handle\":\"@karpathy\",\"publication\":\"x.com\",\"url\":\"https://x.com/karpathy/status/1886192184808149383?lang=en\",\"published_at\":\"2025-02-02\"},\"path\":\"\",\"topics\":[\"ai-coding\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2025-02-02\",\"body_ko\":\"바이브 코딩이 가능한 이유는 LLM(예: Cursor Composer + Sonnet)이 지나치게 좋아지고 있기 때문입니다.\\n\\n메커니즘에 대한 주장입니다. 카르파시가 구체적 도구 이름(Cursor Composer, Sonnet, SuperWhisper)을 명시하면서 주장을 검증 가능하게 만듭니다. \\\"지나치게 좋다(too good)\\\"라는 표현이 핵심입니다: \\\"충분히 좋다(good enough)\\\" 즉 효용 임계점이 아니라, 이미 임계점을 넘었다는 의미입니다. 원문은 \\\"It's possible because...\\\"로 시작하지만, §11.2의 자기 완결 원칙에 따라 지시 대상을 명시했습니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://x.com/karpathy/status/1886192184808149383?lang=en\",\"date\":\"2025-02-02\",\"original\":\"It's possible because the LLMs (e.g. Cursor Composer w Sonnet) are getting too good. Also I just talk to Composer with SuperWhisper so I barely even touch the keyboard.\"}]},{\"id\":\"vibe-coding-workflow-accept-all-no-diffs\",\"label\":\"vibe-coding-workflow-accept-all-no-diffs\",\"claim_ko\":\"바이브 코딩에서는 diff를 읽지 않고 모두 수락하며, 에러 메시지는 그대로 LLM에 붙여넣고, 고쳐지지 않는 버그는 임의의 요청으로 우회하여 결국 사라지게 만듭니다.\",\"claim_en\":\"In vibe coding, you Accept All without reading diffs, copy-paste error messages back to the LLM without comment, and work around unfixable bugs with random asks until they disappear.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Andrej Karpathy\",\"author_handle\":\"@karpathy\",\"publication\":\"x.com\",\"url\":\"https://x.com/karpathy/status/1886192184808149383?lang=en\",\"published_at\":\"2025-02-02\"},\"path\":\"\",\"topics\":[\"ai-coding\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2025-02-02\",\"body_ko\":\"바이브 코딩에서는 diff를 읽지 않고 모두 수락하며, 에러 메시지는 그대로 LLM에 붙여넣고, 고쳐지지 않는 버그는 임의의 요청으로 우회하여 결국 사라지게 만듭니다.\\n\\n카르파시가 직접 실행하는 바이브 코딩 워크플로우입니다. 세 가지 절차적 동작이 핵심입니다: diff를 읽지 않고 모두 수락, 에러 메시지를 무주석으로 복사-붙여넣기, 고쳐지지 않는 버그는 임의 요청으로 우회. 원문은 1인칭 단편 나열이지만 §11.2 자기 완결 원칙에 따라 절차적 주장으로 재구성했습니다. \\\"디버깅\\\" 대신 \\\"증상이 사라질 때까지 변경 요청\\\"이 이 워크플로우의 운영 원리입니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://x.com/karpathy/status/1886192184808149383?lang=en\",\"date\":\"2025-02-02\",\"original\":\"I \\\"Accept All\\\" always, I don't read the diffs anymore. When I get error messages I just copy paste them in with no comment, usually that fixes it. The code grows beyond my usual comprehension, I'd have to really read through it for a while. Sometimes the LLMs can't fix a bug so I just work around it or ask for random changes until it goes away.\"}]},{\"id\":\"video-editing-collapses-into-natural-language\",\"label\":\"video-editing-collapses-into-natural-language\",\"claim_ko\":\"영상 편집은 자연어로 무너집니다.\\n원본을 넣고 원하는 컷을 말로 설명하면 Claude Code가 트리밍 · 모션 그래픽 · 렌더까지 끝에서 끝으로 지휘합니다.\",\"claim_en\":\"Video editing collapses into natural language: drop in raw footage, describe the cut, and Claude Code orchestrates the trim, motion graphics, and render end to end.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/Aw3BkmhYu4I\",\"published_at\":\"2026-04-22\"},\"path\":\"\",\"topics\":[\"ai-tooling\",\"creator-economy\",\"ai-native\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-22\",\"body_ko\":\"영상 편집은 자연어로 무너집니다.\\n원본을 넣고 원하는 컷을 말로 설명하면 Claude Code가 트리밍 · 모션 그래픽 · 렌더까지 끝에서 끝으로 지휘합니다.\\n\\n핵심 명제를 잡습니다 — 완성된 파이프라인으로서의 자연어 편집입니다. 특정 도구를 넘어 \\\"사람은 감각 필터, AI는 실행자\\\"인 모든 크리에이티브 생산 영역에 일반화됩니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/Aw3BkmhYu4I\",\"date\":\"2026-04-22\",\"original\":\"In this video I'm showing you how to edit videos end to end using Claude Code as the orchestrator, with HyperFrames handling motion graphics and video-use handling the trimming. You drop in a raw video, tell it what you want in natural language, and it cuts the filler words, syncs animations to your exact timestamps, and renders the final video.\"}]},{\"id\":\"visibility-beats-effort\",\"label\":\"visibility-beats-effort\",\"claim_ko\":\"잘하는 것보다\\n잘 보여 주는 것이 더 중요한 순간이 있습니다.\",\"claim_en\":\"Sometimes the win goes to whoever\\nshows the work, not whoever does it best.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"meta-life\",\"career-strategy\"],\"theses\":[\"grit-not-genius\",\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-02-04\",\"body_ko\":\"잘하는 것보다\\n잘 보여 주는 것이 더 중요한 순간이 있습니다.\\n\\n실리콘밸리 메타에서 연봉 10억을 넘는 개발자들을 보면서 깨달은 것입니다. **일만 잘하는 것보다 '잘 보여지는 것(visibility)'이 때로는 더 중요합니다.** 실리콘밸리에서 진짜 성공하는 사람들은 코딩과 자기 일만 열심히 하는 게 아닙니다. **자신의 가치를 제대로 보여 줄 줄 아는 사람들**입니다. 세 가지로 보여 줍니다. **첫째**, 성과를 숫자로 증명합니다. **둘째**, 글과 스토리텔링으로 리더들을 설득합니다. **셋째**, 강한 어필로 모두에게 존재감을 남깁니다. 당신은 단순한 '열심히 일만 하는 사람'입니까, 아니면 한 걸음 더 나아간 **'잘 보여지는 사람'**입니까?\",\"body_en\":\"Sometimes the win goes to whoever\\nshows the work, not whoever does it best.\\n\\nWhat seven years of watching Meta's billion-won engineers taught me. **Visibility sometimes matters more than competence.** The actually-successful in Silicon Valley aren't the heads-down coders. They're the ones who know how to surface their own value. Three moves: **One**, they prove results in numbers. **Two**, they persuade leaders through writing and story. **Three**, they leave a presence on every meeting they're in. Are you the *worker* — or the one who's also *seen*?\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFpgFHftEbj\",\"date\":\"2025-02-04\",\"original\":\"실리콘밸리 메타에서 연봉 10억 넘는 개발자들을 보면서 깨달은 것:\\n\\n\\\"일만 잘하는 것보다, '잘 보여지는 것 (visibility)' 이 때론 더 중요하다.\\\"\\n\\n실리콘밸리에서 진짜 성공하는 사람들은,\\n코딩만, 자기 일만 열심히 하는 게 아니라,\\n자신의 가치를 제대로 보여줄 줄 아는 사람들이다.\\n\\n- 성과를 숫자로 증명하고,\\n- 글과 스토리텔링으로 리더들을 설득하고,\\n- 강한 어필로 모두에게 존재감을 남긴다.\\n\\n당신은 단순한 '열심히 일만하는 사람'인가,\\n아니면 더 나아가서 '잘 보여지는 사람'인가?\"}]},{\"id\":\"voice-input-beats-typing-by-four-times\",\"label\":\"voice-input-beats-typing-by-four-times\",\"claim_ko\":\"프롬프트는 타자가 아니라 입으로 칩니다.\\n타이핑은 병목이고, 말로 입력하면 네 배 빠릅니다.\",\"claim_en\":\"Don't type prompts — speak them.\\nTyping is the bottleneck; voice is 4× faster.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"productivity\"],\"theses\":[\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"lecture-ready\",\"blog-candidate\",\"threads-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-05-18\",\"body_ko\":\"프롬프트는 타자가 아니라 입으로 칩니다.\\n타이핑은 병목이고, 말로 입력하면 네 배 빠릅니다.\\n\\nAI 도구가 빨라질수록 사람이 느려집니다. 답변은 1초 안에 시작되는데, 프롬프트를 손으로 치는 데에는 30초가 걸립니다. 그 30초가 하루를 8번, 10번 반복되면, 도구의 속도가 아무리 빨라도 내가 부르는 속도에서 막힙니다. 입으로 부르면 네 배가 빨라지고, 정형화되지 않은 자연스러운 프롬프트가 오히려 더 좋은 결과를 만듭니다. 추천 도구는 Whisper Flow 또는 Super Whisper.\",\"body_en\":\"Don't type prompts — speak them. Typing is the bottleneck; voice is 4× faster.\\n\\nThe faster the AI tool gets, the slower the human becomes. The answer starts in under a second; typing the prompt takes thirty. Multiply that thirty seconds by the ten times a day you summon the model, and the tool's speed no longer matters — your input speed is what gates everything. Speaking the prompt is roughly four times faster, and the more conversational, less-templated phrasing tends to produce *better* outputs, not worse. Tooling: Whisper Flow or Super Whisper.\",\"sources\":[{\"platform\":\"lecture\",\"url\":\"lectures:ai-native:ch01:transcript\",\"date\":\"2026-05-18\",\"original\":\"여러분들 눈치채셨을 것 같은데 Whisper Flow라는 건데 저는 Prompt를 할 때 타이핑을 하는 게 아니라 이렇게 보이스로 모든 Prompt를 쓰거든요.\\n그 이유는 이 타이핑을 하는 것 자체가 나중에는 Bottleneck이 된다는 것을 깨달았어요. 이 Bottleneck이라는 거는 시간 소요가 너무 오래 걸린다. 이게 가장 내가 비효율적으로 일하는 방식이다.\\n…\\n4배 빠르다. 타이핑하는 것보다 말로 하는 게 훨씬 빠르다.\\n…\\nWhisper Flow 한번 사용해 보시는 걸 추천드리고요. 이거 말고도 비슷한 거 몇 개 있기는 한데, Super Whisper 아니면 여러 가지 앱들이 있는데 개인적으로는 이 Whisper Flow 좋았던 것 같아서 저는 쓰고 있습니다.\"}]},{\"id\":\"vp-says-drop-ego-for-ai-native\",\"label\":\"vp-says-drop-ego-for-ai-native\",\"claim_ko\":\"자존심을 내려놓지 않으면\\nAI 네이티브가 될 수 없습니다.\",\"claim_en\":\"You can't become AI-native\\nwithout dropping your ego.\",\"memory_type\":\"episodic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-native\",\"career-strategy\"],\"theses\":[\"bigtech-comp-is-a-system\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2026-02-01\",\"body_ko\":\"자존심을 내려놓지 않으면\\nAI 네이티브가 될 수 없습니다.\\n\\n메타에서 8년을 일하며 들어본 말 중에 가장 박힌 한마디는 어느 VP가 던진 것이었습니다. **\\\"자존심 다 버리고 어떻게든 AI 네이티브가 되라. '이 일 만큼은 인공지능이 못할 것이다'라고 생각하고 있다면, 이미 당신의 자존심이 당신 앞길을 망치고 있는 것이다.\\\"** 그동안 쌓아온 직업적 자긍심이 이제는 가장 큰 장벽입니다. \\\"실리콘밸리 개발자\\\" 라고 자부하던 사람일수록, 가장 먼저 무너뜨려야 합니다.\",\"body_en\":\"You can't become AI-native\\nwithout dropping your ego.\\n\\nOf everything I've heard in eight years at Meta, what stuck hardest was a recent line from one of our VPs: **\\\"Drop the ego and become AI-native, whatever it takes. The moment you think 'AI can't do this part of my job,' your ego is already costing you the path forward.\\\"** The professional pride you've spent a career accumulating is now the biggest blocker. The harder you self-identify as a \\\"Silicon Valley engineer,\\\" the more violently that identity has to come down first.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/pos
