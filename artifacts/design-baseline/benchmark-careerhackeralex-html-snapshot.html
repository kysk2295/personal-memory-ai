t/DUM0MnrEW2i\",\"date\":\"2026-02-01\",\"original\":\"메타에서 8년 동안 정말 별의별 이야기를 다 들어봤지만,\\n최근 한 VP가 던진 이 한마디가 유독 뇌리에 박힌다.\\n\\n\\\"자존심 다 버리고 어떻게든 AI 네이티브가 되라.\\n당신이 지금 '이 일 만큼은 인공지능이 못할 것이다'라고 생각하고 있다면,\\n이미 네 ego (자존심) 가 이 네 앞 길을 망치고 있는 것일지도 모른다.\\\"\\n\\n우리는 지금까지 쌓아왔던 모든 \\\"나의 일에 대한 자긍심\\\"을 버려야만 한다.\\n\\n\\\"실리콘밸리 개발자\\\"라고 자부하던 나 또한 마찬가지이다.\"}]},{\"id\":\"work-the-website-section-by-section-not-all-at-once\",\"label\":\"work-the-website-section-by-section-not-all-at-once\",\"claim_ko\":\"Claude Design에 \\\"웹사이트 하나 만들어줘\\\"라고 하지 않습니다.\\n페이지를 섹션으로 쪼개 한 섹션씩 레이아웃·카피·미디어를 따로 굴립니다.\",\"claim_en\":\"Don't tell Claude Design to 'build a whole website' — break the page into sections and iterate one section at a time, prompting per-section for layout, copy, and media.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"external\",\"external_source\":{\"author\":\"Nate Herk\",\"author_handle\":\"@nateherk\",\"publication\":\"YouTube · Nate Herk | AI Automation\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"published_at\":\"2026-04-29\"},\"path\":\"\",\"topics\":[\"productivity\",\"ai-tooling\",\"ai-coding\"],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[\"rag-eligible\"],\"earliest_date\":\"2026-04-29\",\"body_ko\":\"Claude Design에 \\\"웹사이트 하나 만들어줘\\\"라고 하지 않습니다.\\n페이지를 섹션으로 쪼개 한 섹션씩 레이아웃·카피·미디어를 따로 굴립니다.\\n\\ncanonical 분해 휴리스틱 — 실행 가능할 정도로 작습니다. 웹사이트를 넘어 슬라이드 · 모바일 화면 · 모든 복합 시각 표면에 일반화됩니다.\",\"body_en\":\"\",\"sources\":[{\"platform\":\"web_article\",\"url\":\"https://youtu.be/ovabeVoWrA0\",\"date\":\"2026-04-29\",\"original\":\"if you basically just break the website into sections, so here's section. Okay, cool. Section one. What can we do to section one to make this cool?... we can just kind of keep taking it section by section, and that way it's not so overwhelming of, \\\"Oh well, my gosh, I have to build a whole website.\\\" Just take it section by section and just use these principles.\"}]},{\"id\":\"working-software-beats-perfect-design\",\"label\":\"working-software-beats-perfect-design\",\"claim_ko\":\"완벽한 설계보다\\n지금 돌아가는 무언가가 훨씬 강합니다.\",\"claim_en\":\"Working software now\\nbeats perfect design later.\",\"memory_type\":\"semantic\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"solo-builder\"],\"theses\":[\"move-first-or-lose-the-game\",\"pillar-belief\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-05-08\",\"body_ko\":\"완벽한 설계보다\\n지금 돌아가는 무언가가 훨씬 강합니다.\\n\\n저도 바이브 코딩을 처음 봤을 땐 반신반의했습니다. \\\"이게 진짜 될까? 제대로 작동이나 할까?\\\" 8년 엔지니어 생활에서 한 가지 분명히 깨달은 게 있습니다. **완벽한 설계보다 지금 돌아가는 무언가가 훨씬 강합니다.** 아이디어는 보여줘야 설득이 되고, 움직여야 피드백이 오고, 그제야 발전이 시작됩니다. 지금 수준의 바이브 코딩이면 충분합니다. 앞으로는 분명히 더 잘하게 됩니다. 만들다가 막히면 그때 하나씩 배우고 고치면 됩니다.\",\"body_en\":\"Working software now\\nbeats perfect design later.\\n\\nI was a skeptic at first. *\\\"Does this actually work? Does it run?\\\"* Eight years of engineering taught me one thing for sure: **working software now beats perfect design later.** Ideas only persuade once people see them move. Motion is what brings feedback, and feedback is what lets a thing become better. Today's vibe coding is enough. It will get better. If you hit a wall while building, learn that one piece and patch it then. The wall isn't the obstacle. *Starting* is.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DKJO1LFR3ME\",\"date\":\"2025-05-08\",\"original\":\"실리콘밸리 8년차 개발자로써 바이브코딩 처음 봤을 땐 나도 반신반의했어.\\n\\\"이게 진짜 될까?\\\" \\\"작동이나 제대로 할까?\\\"\\n\\n하지만 8년간 엔지니어로 일하면서 깨달은게 하나 있어.\\n완벽한 설계보다, 지금 당장 돌아가는 무언가가 훨씬 강하다는 거.\\n\\n아이디어는 보여줘야 설득이 되고,\\n움직여야 피드백이 오고, 그제야 발전이 시작돼.\\n\\n지금 수준의 바이브 코딩이면 충분해.\\n앞으로는 무조건 더 잘할거라보고.\\n\\n만들어보다가 막히면 그때가서 하나씩 배우고 고치면 돼.\\n쫄지 말고, 일단 한 번 시도해봐.\"}]},{\"id\":\"youtube-intro-30-seconds-blueprint\",\"label\":\"youtube-intro-30-seconds-blueprint\",\"claim_ko\":\"유튜브 인트로 30초는\\n강력한 훅 · 이유 · 빌드업 · 예제 · 스며들기 · 하이라이트 여섯 단계로 만듭니다.\",\"claim_en\":\"Build a 30-second YouTube intro in six beats:\\nhard hook, reason, buildup, example, slow-in, highlight.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"creator-economy\"],\"theses\":[\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-30\",\"body_ko\":\"유튜브 인트로 30초는\\n강력한 훅 · 이유 · 빌드업 · 예제 · 스며들기 · 하이라이트 여섯 단계로 만듭니다.\\n\\n15만 유튜버가 되는 데 가장 크게 기여한 일은 인트로에 초집중한 것이었습니다. 30~40초짜리 인트로 하나에 최소 2시간씩 들였습니다. 그 짧은 인트로 안에는 여섯 가지 장치가 들어갑니다. **첫째, 강력한 훅** — 첫 문장으로 시청자의 손가락을 잡습니다. **둘째, 궁금할 만한 소재나 이유** 던지기 — 왜 이 영상을 끝까지 봐야 하는지. **셋째, 빌드업과 주제 소개** — 15초 안에 무엇을 다룰지 명확히. **넷째, 예제 + '나'** — making it personal. **다섯째, 스며들기** — 핵심 메시지를 자연스럽게 깔기. **여섯째, 비디오 하이라이트** — 끝까지 보면 무엇을 얻는지 예고.\",\"body_en\":\"Build a 30-second YouTube intro in six beats:\\nhard hook, reason, buildup, example, slow-in, highlight.\\n\\nThe single biggest contributor to my 150K YouTube run was over-investing in intros. A thirty-to-forty-second intro got minimum two hours of work, every time. Six moves fit inside that window. **One, a hard hook** — first sentence has to grab the scroll. **Two, the *why* of the video** — give them a reason to stay. **Three, buildup and subject in 15 seconds** — what is this about, said clearly. **Four, example + *me*** — making it personal. **Five, slow-in** — slip the core thesis in naturally. **Six, highlight** — preview what they'll walk away with.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DFR4SNtPe5j\",\"date\":\"2025-01-30\",\"original\":\"내가 15만 유튜버가 될 수 있었던 데에는 \\\"인트로\\\"에 초-집중했던게 큰 도움이 됬어.\\n오늘도 진짜 오랜만에 유튜브 \\\"인트로\\\"에 힘 제대로 줘봤는데,\\n이 짧은 30-40초 영상 만드는데 최소 2시간은 고민하고 작업했던 것 같아.\\n사실 이 짧은 인트로 영상 안에는 수많은 장치들과 전략들이 들어가 있어.\\n\\n1. 첫 훅은 무조건 강력하게\\n2. 그리고 바로 궁금할만한 소재 / 이유 던지기\\n3. 빌드업과 주제 소개 (15초안에)\\n4. 예제 + \\\"나\\\" (making it personal)\\n5. 스며들기\\n6. 비디오 \\\"하이라이트\\\"\\n\\n사실 이거 말고도 많은데, 궁금한거 있으면 댓글 남겨줘!\"}]},{\"id\":\"youtube-success-formula-six-rules\",\"label\":\"youtube-success-formula-six-rules\",\"claim_ko\":\"1만에서 14만 유튜브를 만든 공식은\\n대충 찍고 · 대중을 위해 · 30초에 몰빵하는 것입니다.\",\"claim_en\":\"What took my YouTube from 10K to 140K:\\nship rough, build for the audience, front-load the first 30 seconds.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"creator-economy\"],\"theses\":[\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"blog-candidate\",\"lecture-ready\",\"linkedin-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-01-09\",\"body_ko\":\"1만에서 14만 유튜브를 만든 공식은\\n대충 찍고 · 대중을 위해 · 30초에 몰빵하는 것입니다.\\n\\n1년 만에 14만 구독자를 찍은 유튜버가 알려드리는 유튜브 떡상 하는 법 세 가지입니다. **첫째, 대충 찍으십시오.** 대본 쓰고 열심히 아닌 척 그대로 읽었던 첫 스무 개 영상은 전부 망했습니다. **둘째, 대중이 원하는 걸 만드십시오.** 내가 만들고 싶은 영상이 아니라 대중이 보고 싶어 하는 콘텐츠입니다. **셋째, 첫 30초에 몰빵하십시오.** 썸네일, 제목, 인트로에 전체 시간의 50% 이상을 투자해야 합니다.\",\"body_en\":\"What took my YouTube from 10K to 140K:\\nship rough, build for the audience, front-load the first 30 seconds.\\n\\nThree rules from someone who hit 140K subs in twelve months. **One, ship rough.** My first twenty over-rehearsed videos — script written, pretending not to read it — all flopped. **Two, build for the audience, not yourself.** The video you want to make ≠ the video the audience wants. **Three, the first 30 seconds is half the job.** Thumbnail + title + intro should consume more than 50% of your production time.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DEhMwupxQHi\",\"date\":\"2025-01-09\",\"original\":\"1년만에 14만 구독자찍은 유튜버가 알려주는 유튜브 떡상 하는 법:\\n\\n1. 대충 찍어라\\n- 대본 쓰고 열심히 아닌척 그대로 읽었던 첫 영상 스무개는 전부 망했다.\\n\\n2. 사람들이 원하는걸 만들어라\\n- \\\"내\\\" 가 만들고 싶은 영상 말고, \\\"대중\\\" 들이 원하는 콘텐츠.\\n\\n3. 첫 30초에 몰빵해라\\n- 썸네일, 제목, 그리고 인트로에 50% 이상의 시간을 투자해야 되더라.\"}]},{\"id\":\"youtube-thumbnail-by-nano-banana\",\"label\":\"youtube-thumbnail-by-nano-banana\",\"claim_ko\":\"유튜브 썸네일은\\n나노바나나로 그냥 뽑아냅니다.\",\"claim_en\":\"Just generate your YouTube thumbnails\\nwith nano-banana.\",\"memory_type\":\"procedural\",\"node_kind\":\"thought\",\"origin\":\"alex\",\"external_source\":null,\"path\":\"\",\"topics\":[\"ai-tooling\",\"creator-economy\"],\"theses\":[\"personal-brand-is-the-moat\"],\"confidentiality\":\"public\",\"surfaces\":[\"threads-ready\",\"lecture-ready\",\"rag-eligible\"],\"earliest_date\":\"2025-11-19\",\"body_ko\":\"유튜브 썸네일은\\n나노바나나로 그냥 뽑아냅니다.\\n\\n이제는 유튜버가 안 쓰고 베길 수 없는 도구가 나왔습니다. 방금 나노바나나로 유튜브 썸네일을 기가막히게 뽑았습니다. 어이가 없어서 웃음만 나옵니다. 디자이너 외주, 포토샵 작업, 시안 반복 — 그동안 들였던 시간이 한 번에 사라집니다. 한 줄 프롬프트면 끝납니다.\",\"body_en\":\"Just generate your YouTube thumbnails\\nwith nano-banana.\\n\\nThere's now a tool no serious YouTuber can keep ignoring. Generated a thumbnail with nano-banana just now — the output is absurd in a good way. Designer outsourcing, Photoshop passes, draft cycles — the entire stack collapses into one prompt.\",\"sources\":[{\"platform\":\"threads\",\"url\":\"https://www.threads.com/@careerhackeralex/post/DReTRP7Edgx\",\"date\":\"2025-11-19\",\"original\":\"와 이건 진짜 이제 유튜버들이 안쓰고 베길수가 없다.\\n방금 나노바나나로 유튜브 썸네일 기가막히게 뽑아버렸는데\\n이젠 그냥 어이가 없어서 웃음만 나오네요.\\n이렇게 유튜브로 썸네일 만들어본사람?\"}]},{\"id\":\"topic/ai-foundations\",\"label\":\"AI 기초\",\"claim_ko\":\"AI 기초\",\"claim_en\":\"AI Foundations\",\"memory_type\":\"topic\",\"node_kind\":\"topic\",\"path\":\"\",\"topics\":[],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[]},{\"id\":\"topic/ai-native\",\"label\":\"AI 네이티브\",\"claim_ko\":\"AI 네이티브\",\"claim_en\":\"AI-Native\",\"memory_type\":\"topic\",\"node_kind\":\"topic\",\"path\":\"\",\"topics\":[],\"theses\":[],\"confidentiality\":\"public\",\"surfaces\":[]},{\"id\":\"topic/ai-tooling\",\"label\":\"AI 도구\",\"claim_ko\":\"AI 도구\",\"claim_en\":\"AI Tooling\",\"m
